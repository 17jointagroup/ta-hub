<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700;900&family=Noto+Sans+TC:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a2a50}
#cvs{position:fixed;top:0;left:0;display:block;cursor:default}
/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:20;pointer-events:none;
  display:flex;align-items:flex-start;padding:12px 14px;gap:10px}
.pill{background:rgba(0,0,0,0.48);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.12);border-radius:14px;
  padding:8px 14px;pointer-events:auto}
#logo-txt{font-family:'Josefin Sans',sans-serif;font-weight:900;
  font-size:clamp(14px,2.0vw,20px);color:#fff;letter-spacing:3px}
#logo-sub{font-size:9px;color:rgba(255,255,255,0.42);letter-spacing:2px;
  font-family:'Josefin Sans',sans-serif;margin-top:1px}
#xp-pill{margin-left:auto;display:flex;align-items:center;gap:6px;
  border-color:rgba(255,200,50,0.30)!important}
#xp-n{font-family:'Josefin Sans',sans-serif;font-weight:700;font-size:13px;color:#ffc040}
/* ── Info Card ── */
#card{position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:rgba(4,14,30,0.96);backdrop-filter:blur(24px);
  border-top:1.5px solid rgba(255,255,255,0.09);
  padding:18px 18px 24px;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.22,1,.36,1);
  max-width:480px;margin:0 auto;border-radius:28px 28px 0 0}
#card.on{transform:translateY(0)}
#cx{position:absolute;top:14px;right:16px;font-size:17px;
  color:rgba(255,255,255,0.22);cursor:pointer;padding:4px;z-index:1}
.ct{display:flex;align-items:center;gap:14px;margin-bottom:12px}
#ci{font-size:42px;line-height:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.4))}
#cn{font-family:'Josefin Sans',sans-serif;font-weight:700;font-size:20px;color:#fff}
#cs{font-size:12px;color:rgba(255,255,255,0.40);margin-top:4px;line-height:1.5}
.cst{font-size:24px;letter-spacing:3px;margin-bottom:10px}
.cbr{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.cbb{flex:1;height:5px;background:rgba(255,255,255,0.09);border-radius:3px;overflow:hidden}
#cbf{height:100%;border-radius:3px;transition:width .6s ease}
.cbp{font-size:11px;color:rgba(255,255,255,0.32);font-family:monospace;white-space:nowrap}
#cbtn{width:100%;padding:14px;border:none;border-radius:13px;cursor:pointer;
  font-family:'Josefin Sans',sans-serif;font-weight:900;
  font-size:16px;letter-spacing:2px;transition:all .18s}
#cbtn.go{color:#fff;box-shadow:0 6px 24px rgba(0,0,0,0.35)}
#cbtn.go:active{transform:scale(0.97)}
#cbtn.no{background:#1a1a1a;color:#333;cursor:default}
</style>
</head>
<body>
<canvas id="cvs"></canvas>
<div id="hud">

  </div>
  <div class="pill" style="padding:6px 12px;cursor:pointer;pointer-events:auto;display:flex;align-items:center;gap:5px" onclick="window.location.href='index.html'">
    <span style="font-size:14px">🏠</span><span style="font-family:'Josefin Sans',sans-serif;font-weight:700;font-size:12px;color:#fff;letter-spacing:1px">HQ</span>
  </div>
  <div class="pill" id="xp-pill">
    <span>⭐</span><span id="xp-n">XP 0</span>
  </div>
</div>
<div id="card">
  <span id="cx" onclick="closeCard()">✕</span>
  <div class="ct">
    <span id="ci">⬡</span>
    <div><div id="cn">—</div><div id="cs">—</div></div>
  </div>
  <div class="cst" id="cst">☆☆☆</div>
  <div class="cbr">
    <div class="cbb"><div id="cbf" style="width:0"></div></div>
    <span class="cbp" id="cbp">0%</span>
  </div>
  <button id="cbtn" class="go" onclick="goHub()">進入學習 →</button>
</div>

<script>
// ════════════════════════════════════════════
//  GLOBALS
// ════════════════════════════════════════════
var cvs, ctx, W, H, dpr, T=0;
var hovSW=null, selSW=null;

// Pre-computed island polygon cache
var isoCache={};

// Clouds array
var CLOUDS=[];

// ════════════════════════════════════════════
//  SOFTWARE DATA
// ════════════════════════════════════════════
var SW=[
  { id:'blender',
    name:'Blender',         icon:'⬡',
    sub:'3D 建模・動畫・渲染', hub:'blender-hub.html',
    avail:true, totalLv:12, pfx:'blender_ui_lv',
    fx:0.13, fy:0.60, rw:0.115, rh:0.165,
    seed:1.40,
    water:'#1a6030', sand:'#b5a060', shore:'#7ab840',
    grass:'#3a9228', hill:'#246018', peak:'#122e08',
    accent:'#ff8832', aura:'rgba(255,136,50,0.20)',
    landmarks:['cube','tower','forest'],
    label:'#ffd090'
  },
  { id:'substance',
    name:'Substance Painter', icon:'🎨',
    sub:'材質・貼圖・PBR 繪製', hub:'substance-hub.html',
    avail:false, totalLv:10, pfx:'substance_lv',
    fx:0.37, fy:0.25, rw:0.098, rh:0.148,
    seed:2.10,
    water:'#5a1880', sand:'#d0a0c8', shore:'#9060a8',
    grass:'#7a3898', hill:'#521870', peak:'#340848',
    accent:'#ff66cc', aura:'rgba(255,100,200,0.18)',
    landmarks:['palette','spire','forest'],
    label:'#ffc0f0'
  },
  { id:'ue5',
    name:'Unreal Engine 5', icon:'⚡',
    sub:'遊戲引擎・Lumen・Nanite', hub:'ue5-hub.html',
    avail:false, totalLv:15, pfx:'ue5_lv',
    fx:0.60, fy:0.16, rw:0.108, rh:0.158,
    seed:0.82,
    water:'#0a1850', sand:'#708090', shore:'#304878',
    grass:'#1a3870', hill:'#0e2050', peak:'#08102a',
    accent:'#4488ff', aura:'rgba(60,120,255,0.18)',
    landmarks:['skyscraper','tower','forest'],
    label:'#a0c8ff'
  },
  { id:'houdini',
    name:'Houdini', icon:'🌀',
    sub:'程序化・VFX・模擬', hub:'houdini-hub.html',
    avail:false, totalLv:10, pfx:'houdini_lv',
    fx:0.78, fy:0.42, rw:0.092, rh:0.142,
    seed:3.20,
    water:'#4a3000', sand:'#d0b070', shore:'#a88030',
    grass:'#806020', hill:'#584010', peak:'#38280a',
    accent:'#ffcc00', aura:'rgba(255,200,0,0.18)',
    landmarks:['vortex','temple','forest'],
    label:'#ffe090'
  },
  { id:'opengl',
    name:'OpenGL', icon:'🔷',
    sub:'渲染管線・Shader 程式', hub:'opengl-hub.html',
    avail:false, totalLv:9, pfx:'opengl_lv',
    fx:0.48, fy:0.70, rw:0.088, rh:0.135,
    seed:1.95,
    water:'#004858', sand:'#80c8c8', shore:'#208888',
    grass:'#1a6878', hill:'#0a4858', peak:'#052838',
    accent:'#00d8ff', aura:'rgba(0,200,255,0.18)',
    landmarks:['crystal','tower','forest'],
    label:'#80f0ff'
  },
  { id:'directx',
    name:'DirectX', icon:'🎮',
    sub:'Windows 渲染・DX12・HLSL', hub:'directx-hub.html',
    avail:false, totalLv:9, pfx:'directx_lv',
    fx:0.86, fy:0.74, rw:0.085, rh:0.128,
    seed:2.80,
    water:'#200848', sand:'#807090', shore:'#482878',
    grass:'#281850', hill:'#180a38', peak:'#0c0620',
    accent:'#9944ff', aura:'rgba(140,60,255,0.18)',
    landmarks:['castle','tower','forest'],
    label:'#cc88ff'
  }
];

var PATH_ORDER=[0,1,2,3,4,5];

// ════════════════════════════════════════════
//  ORGANIC ISLAND SHAPE (polar perturbation)
// ════════════════════════════════════════════
function buildIslandPts(cx,cy,rw,rh,seed,scale,n){
  n=n||28;
  var pts=[];
  for(var i=0;i<n;i++){
    var ang=(i/n)*Math.PI*2 - Math.PI*0.5;
    var pert=1
      + 0.20*Math.sin(ang*3 + seed*1.2)
      + 0.12*Math.sin(ang*5 + seed*2.1)
      + 0.07*Math.sin(ang*7 + seed*0.8)
      + 0.04*Math.sin(ang*11+ seed*1.6);
    var r=pert*scale;
    pts.push({x:cx+Math.cos(ang)*rw*r, y:cy+Math.sin(ang)*rh*r});
  }
  return pts;
}

// Catmull-Rom through polygon points (closed)
function drawIslandPoly(pts){
  var n=pts.length;
  ctx.moveTo((pts[n-1].x+pts[0].x)/2,(pts[n-1].y+pts[0].y)/2);
  for(var i=0;i<n;i++){
    var p1=pts[i], p2=pts[(i+1)%n];
    ctx.quadraticCurveTo(p1.x,p1.y,(p1.x+p2.x)/2,(p1.y+p2.y)/2);
  }
}

// Cache island polygon sets per SW
function getIsoPoly(sw,scale,n){
  var key=sw.id+'_'+scale+'_'+n;
  if(!isoCache[key]){
    isoCache[key]=buildIslandPts(
      sw.fx*W, sw.fy*H, sw.rw*W, sw.rh*H, sw.seed, scale||1, n||28
    );
  }
  return isoCache[key];
}

// ════════════════════════════════════════════
//  SETUP
// ════════════════════════════════════════════
function setup(){
  cvs=document.getElementById('cvs');
  ctx=cvs.getContext('2d');
  resize();
  buildClouds();
  cvs.addEventListener('click',     onClick);
  cvs.addEventListener('mousemove', onMove);
  cvs.addEventListener('touchend',  onTouch,{passive:true});
  window.addEventListener('resize', function(){
    ctx.setTransform(1,0,0,1,0,0);
    isoCache={};
    resize();
    buildClouds();
  });
}

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2.5);
  W=window.innerWidth; H=window.innerHeight;
  cvs.width=W*dpr; cvs.height=H*dpr;
  cvs.style.width=W+'px'; cvs.style.height=H+'px';
  ctx.scale(dpr,dpr);
  isoCache={};
}

// ════════════════════════════════════════════
//  CLOUDS
// ════════════════════════════════════════════
function buildClouds(){
  CLOUDS=[];
  var n=Math.round(W/150)+5;
  for(var i=0;i<n;i++){
    CLOUDS.push({
      x:(i/n)*W*1.1+W*0.05,
      y:H*(0.015+(i%5)*0.045),
      w:W*(0.06+((i*7)%5)*0.014),
      spd:0.40+((i*3)%5)*0.11,
      a:0.70+((i*2)%4)*0.07,
      puff:1.0+((i*4)%3)*0.15
    });
  }
}

function drawCloud(cl){
  var x=cl.x,y=cl.y,w=cl.w,r=w*0.38*cl.puff;
  ctx.save();
  ctx.globalAlpha=cl.a;
  // Shadow
  ctx.shadowColor='rgba(100,160,220,0.30)'; ctx.shadowBlur=16;
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.beginPath();
  ctx.arc(x,       y,       r*0.92,0,Math.PI*2);
  ctx.arc(x+w*0.28,y-r*0.20,r*1.05,0,Math.PI*2);
  ctx.arc(x+w*0.54,y+r*0.05,r*0.85,0,Math.PI*2);
  ctx.arc(x+w*0.74,y+r*0.12,r*0.68,0,Math.PI*2);
  ctx.arc(x+w*0.22,y+r*0.28,r*0.72,0,Math.PI*2);
  ctx.arc(x-w*0.05,y+r*0.22,r*0.65,0,Math.PI*2);
  ctx.fill();
  // Bottom shadow on cloud
  ctx.globalAlpha=cl.a*0.10;
  ctx.fillStyle='#7090c0';
  ctx.beginPath();
  ctx.ellipse(x+w*0.35, y+r*0.40, w*0.52, r*0.20, 0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// ════════════════════════════════════════════
//  OCEAN  (layered gradient + caustics + waves)
// ════════════════════════════════════════════
function drawOcean(){
  // Main gradient
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0.00,'#8ad8f0');
  g.addColorStop(0.12,'#3ab0e0');
  g.addColorStop(0.35,'#1880c0');
  g.addColorStop(0.65,'#0c58a0');
  g.addColorStop(1.00,'#082050');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Caustic shimmer (animated sin grid)
  ctx.save(); ctx.globalAlpha=0.04;
  var cs=W/8;
  for(var gy=0;gy<H;gy+=cs){
    for(var gx=0;gx<W;gx+=cs){
      var v=Math.sin(gx*0.04+T*1.2)*Math.cos(gy*0.04+T*0.9);
      if(v>0.3){
        ctx.fillStyle='rgba(255,255,255,'+(v*0.5)+')';
        ctx.beginPath();
        ctx.ellipse(gx+cs/2,gy+cs/2,cs*0.4*v,cs*0.25*v,-0.4,0,Math.PI*2);
        ctx.fill();
      }
    }
  }
  ctx.restore();

  // Wave stripes
  for(var i=0;i<9;i++){
    var wy=H*(0.15+i*0.10);
    var wlen=W*0.016;
    ctx.beginPath(); ctx.moveTo(0,wy);
    for(var x=0;x<=W;x+=16)
      ctx.lineTo(x, wy+Math.sin(x*wlen+T*0.7+i*1.1)*3.5);
    ctx.strokeStyle='rgba(255,255,255,'+(0.025+i*0.006)+')';
    ctx.lineWidth=1+i*0.08; ctx.stroke();
  }

  // Sparkle dots (fixed positions)
  var sparks=[[0.05,0.30],[0.18,0.48],[0.30,0.35],[0.45,0.62],[0.58,0.28],
              [0.70,0.52],[0.85,0.38],[0.92,0.58],[0.35,0.75],[0.65,0.78]];
  for(var s=0;s<sparks.length;s++){
    var sv=Math.sin(T*2.8+s*1.7)*0.5+0.5;
    ctx.globalAlpha=sv*0.35;
    ctx.fillStyle='#fff';
    ctx.font=Math.round(9+sv*4)+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('✦', sparks[s][0]*W, sparks[s][1]*H);
  }
  ctx.globalAlpha=1;
}

// ════════════════════════════════════════════
//  CONNECTING PATH  (Catmull-Rom dashes)
// ════════════════════════════════════════════
function drawPath(){
  var pts=PATH_ORDER.map(function(i){
    var sw=SW[i];
    return{x:sw.fx*W, y:sw.fy*H};
  });
  function crDraw(){
    ctx.moveTo(pts[0].x,pts[0].y);
    for(var i=0;i<pts.length-1;i++){
      var p0=pts[Math.max(i-1,0)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(i+2,pts.length-1)];
      var cp1x=p1.x+(p2.x-p0.x)/6, cp1y=p1.y+(p2.y-p0.y)/6;
      var cp2x=p2.x-(p3.x-p1.x)/6, cp2y=p2.y-(p3.y-p1.y)/6;
      ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,p2.x,p2.y);
    }
  }
  // Glow halo
  ctx.save(); ctx.globalAlpha=0.08; ctx.lineWidth=28;
  ctx.strokeStyle='#ffffff'; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); crDraw(); ctx.stroke(); ctx.restore();
  // Outer glow
  ctx.save(); ctx.globalAlpha=0.18; ctx.lineWidth=12;
  ctx.strokeStyle='#c8e8ff'; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); crDraw(); ctx.stroke(); ctx.restore();
  // Dashes
  var off=(T*14)%26;
  ctx.save(); ctx.setLineDash([13,13]); ctx.lineDashOffset=-off;
  ctx.lineWidth=3.5; ctx.strokeStyle='rgba(255,255,255,0.88)';
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); crDraw(); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}

// ════════════════════════════════════════════
//  ISLAND  (main drawing routine)
// ════════════════════════════════════════════
function drawIsland(sw){
  var cx=sw.fx*W, cy=sw.fy*H;
  var rw=sw.rw*W,  rh=sw.rh*H;
  var active=(hovSW===sw||selSW===sw);
  var bob=Math.sin(T*1.2+sw.seed)*0.005;
  var sc=1+(active?0.028:0)+bob;

  ctx.save();
  ctx.translate(cx,cy); ctx.scale(sc,sc); ctx.translate(-cx,-cy);

  // — Aura / sea glow —
  var aG=ctx.createRadialGradient(cx,cy,rw*0.3,cx,cy,rw*2.5);
  aG.addColorStop(0,sw.avail?sw.aura:'rgba(0,0,0,0.04)');
  aG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=aG;
  ctx.beginPath(); ctx.ellipse(cx,cy,rw*2.5,rh*2.0,0,0,Math.PI*2); ctx.fill();

  // — Ocean ring around island (tinted water) —
  var wG=ctx.createRadialGradient(cx,cy,rw*0.7,cx,cy,rw*1.55);
  wG.addColorStop(0,sw.water+'aa');
  wG.addColorStop(0.6,sw.water+'44');
  wG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=wG;
  ctx.beginPath(); ctx.ellipse(cx,cy,rw*1.55,rh*1.30,0,0,Math.PI*2); ctx.fill();

  // — Drop shadow —
  var sPts=getIsoPoly(sw,1.05,20);
  ctx.save(); ctx.translate(rw*0.06,rh*0.18);
  ctx.beginPath(); drawIslandPoly(sPts); ctx.closePath();
  ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.fill(); ctx.restore();

  // — Shore foam ring (offset polygon) —
  var foamPts=getIsoPoly(sw,1.04,24);
  ctx.beginPath(); drawIslandPoly(foamPts); ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,0.75)'; ctx.fill();
  // Animated foam dots
  var fOff=(T*0.5)%1;
  for(var fi=0;fi<foamPts.length;fi++){
    var fp=foamPts[fi];
    var fv=Math.sin(T*2.5+fi*0.7)*0.5+0.5;
    ctx.beginPath();
    ctx.arc(fp.x,fp.y,(rw*0.020)*fv+rw*0.010,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,'+(0.4+fv*0.5)+')'; ctx.fill();
  }

  // — Sand shore —
  var sandPts=getIsoPoly(sw,1.00,26);
  ctx.beginPath(); drawIslandPoly(sandPts); ctx.closePath();
  ctx.fillStyle=sw.sand; ctx.fill();

  // — Grass body —
  var grassPts=getIsoPoly(sw,0.88,26);
  ctx.beginPath(); drawIslandPoly(grassPts); ctx.closePath();
  var gG=ctx.createRadialGradient(cx,cy-rh*0.10,rw*0.05,cx,cy+rh*0.20,rw*0.95);
  gG.addColorStop(0,sw.grass); gG.addColorStop(0.5,sw.grass+'dd'); gG.addColorStop(1,sw.shore);
  ctx.fillStyle=gG; ctx.fill();

  // — Hill center —
  var hillPts=getIsoPoly(sw,0.58,20);
  ctx.beginPath(); drawIslandPoly(hillPts); ctx.closePath();
  ctx.fillStyle=sw.hill; ctx.fill();

  // — Mountains (3 peaks) —
  drawMtn(ctx, cx-rw*0.26, cy-rh*0.55, rw*0.26, rh*0.42, sw.peak);
  drawMtn(ctx, cx+rw*0.12, cy-rh*0.64, rw*0.20, rh*0.36, sw.peak);
  drawMtn(ctx, cx-rw*0.52, cy-rh*0.28, rw*0.14, rh*0.22, sw.hill);

  // — Trees —
  drawTrees(cx,cy,rw,rh,sw);

  // — Landmark / building —
  drawLandmark(cx,cy,rw,rh,sw,active);

  // — Central badge —
  drawBadge(cx,cy,rw,rh,sw,active);

  // — Name label —
  drawLabel(cx, cy+rh*0.70, sw, active);

  ctx.restore();
}

// ─── Mountain peak ───
function drawMtn(ctx,x,y,w,h,dark){
  // Body
  ctx.beginPath();
  ctx.moveTo(x-w,y+h*0.5); ctx.lineTo(x,y-h*0.5); ctx.lineTo(x+w,y+h*0.5);
  ctx.closePath(); ctx.fillStyle=dark; ctx.fill();
  // Shading (left face slightly lighter)
  ctx.beginPath();
  ctx.moveTo(x,y-h*0.5); ctx.lineTo(x+w,y+h*0.5); ctx.lineTo(x,y+h*0.5);
  ctx.closePath(); ctx.fillStyle='rgba(0,0,0,0.20)'; ctx.fill();
  // Snow cap
  ctx.beginPath();
  ctx.moveTo(x-w*0.24,y-h*0.10); ctx.lineTo(x,y-h*0.50); ctx.lineTo(x+w*0.24,y-h*0.10);
  ctx.closePath(); ctx.fillStyle='rgba(255,255,255,0.82)'; ctx.fill();
}

// ─── Fixed tree positions ───
var TPOS=[
  [-0.68, 0.14],[-0.56,-0.02],[-0.76,-0.02],
  [ 0.65, 0.12],[ 0.74,-0.04],[ 0.80, 0.07],
  [-0.12, 0.46],[ 0.22, 0.44],[-0.32, 0.42],[ 0.04, 0.36],
  [ 0.44, 0.28],[-0.46, 0.26],[0.30,0.30],[-0.18,0.30],
];
function drawTrees(cx,cy,rw,rh,sw){
  for(var i=0;i<TPOS.length;i++){
    var tx=cx+TPOS[i][0]*rw, ty=cy+TPOS[i][1]*rh;
    var sz=rh*0.165*(0.88+(i%3)*0.08);
    // Only draw if within island bounds
    var dx=(tx-cx)/rw, dy=(ty-cy)/rh;
    if(dx*dx+dy*dy>0.72) continue;
    // Trunk
    ctx.fillStyle='#4a2e10';
    ctx.fillRect(tx-sz*0.06, ty, sz*0.12, sz*0.34);
    // 3 foliage tiers
    var fColors=[sw.peak, sw.hill, sw.grass];
    for(var l=0;l<3;l++){
      var hw=sz*(0.48-l*0.06), ht=sz*(0.90+l*0.30);
      ctx.beginPath();
      ctx.moveTo(tx, ty-ht);
      ctx.lineTo(tx-hw, ty-sz*(0.10+l*0.25));
      ctx.lineTo(tx+hw, ty-sz*(0.10+l*0.25));
      ctx.closePath(); ctx.fillStyle=fColors[l]; ctx.fill();
    }
  }
}

// ─── Landmark buildings (per software theme) ───
function drawLandmark(cx,cy,rw,rh,sw,active){
  var bx=cx+rw*0.35, by=cy-rh*0.15;
  var sz=rh*0.28;
  var ac=sw.accent;
  ctx.save();
  ctx.globalAlpha=active?0.95:0.80;
  switch(sw.landmarks[0]){
    case 'cube':      drawCube(bx,by,sz,ac);       break;
    case 'palette':   drawPalette(bx,by,sz,ac);    break;
    case 'skyscraper':drawSkyscraper(bx,by,sz,ac); break;
    case 'vortex':    drawVortex(bx,by,sz,ac);     break;
    case 'crystal':   drawCrystal(bx,by,sz,ac);    break;
    case 'castle':    drawCastle(bx,by,sz,ac);     break;
  }
  ctx.restore();
}

function drawCube(bx,by,sz,ac){
  // Isometric cube (Blender icon feel)
  var w=sz*0.55, h=sz*0.48, d=sz*0.26;
  // Top face
  ctx.beginPath();
  ctx.moveTo(bx,by-h/2);
  ctx.lineTo(bx+w,by-h/2+d);
  ctx.lineTo(bx,by+d/2);
  ctx.lineTo(bx-w,by-h/2+d);
  ctx.closePath(); ctx.fillStyle=ac; ctx.fill();
  // Left face
  ctx.beginPath();
  ctx.moveTo(bx-w,by-h/2+d);
  ctx.lineTo(bx,by+d/2);
  ctx.lineTo(bx,by+h/2);
  ctx.lineTo(bx-w,by+d/2);
  ctx.closePath(); ctx.fillStyle='rgba(0,0,0,0.30)'; ctx.fill();
  ctx.fillStyle=ac+'88'; ctx.fill();
  // Right face
  ctx.beginPath();
  ctx.moveTo(bx,by+d/2);
  ctx.lineTo(bx+w,by-h/2+d);
  ctx.lineTo(bx+w,by+d/2);
  ctx.lineTo(bx,by+h/2);
  ctx.closePath(); ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fill();
  ctx.fillStyle=ac+'aa'; ctx.fill();
  // Edge highlight
  ctx.strokeStyle='rgba(255,255,255,0.40)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(bx,by-h/2); ctx.lineTo(bx+w,by-h/2+d); ctx.stroke();
}

function drawPalette(bx,by,sz,ac){
  // Paint palette shape
  ctx.beginPath();
  ctx.ellipse(bx,by,sz*0.48,sz*0.42,0.2,0,Math.PI*2);
  ctx.fillStyle=ac+'88'; ctx.fill();
  ctx.strokeStyle=ac; ctx.lineWidth=2.5; ctx.stroke();
  // Color dots
  var dots=['#ff4466','#44aaff','#44ff88','#ffcc00'];
  for(var d=0;d<4;d++){
    var da=(d/4)*Math.PI*1.5-0.4;
    ctx.beginPath();
    ctx.arc(bx+Math.cos(da)*sz*0.28, by+Math.sin(da)*sz*0.26, sz*0.08,0,Math.PI*2);
    ctx.fillStyle=dots[d]; ctx.fill();
  }
  // Brush
  ctx.beginPath();
  ctx.moveTo(bx+sz*0.30,by-sz*0.50);
  ctx.lineTo(bx+sz*0.55,by-sz*0.10);
  ctx.lineTo(bx+sz*0.50,by-sz*0.06);
  ctx.lineTo(bx+sz*0.25,by-sz*0.46);
  ctx.closePath(); ctx.fillStyle='#c0a080'; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(bx+sz*0.50,by-sz*0.06); ctx.lineTo(bx+sz*0.62,by+sz*0.06);
  ctx.lineTo(bx+sz*0.52,by+sz*0.08); ctx.lineTo(bx+sz*0.45,by-sz*0.02);
  ctx.closePath(); ctx.fillStyle=ac; ctx.fill();
}

function drawSkyscraper(bx,by,sz,ac){
  // Main tower
  ctx.fillStyle=ac+'66';
  ctx.fillRect(bx-sz*0.15,by-sz*0.70,sz*0.30,sz*0.72);
  ctx.fillStyle=ac;
  ctx.fillRect(bx-sz*0.12,by-sz*0.70,sz*0.24,sz*0.68);
  // Windows
  ctx.fillStyle='rgba(255,255,255,0.55)';
  for(var wr=0;wr<5;wr++){
    for(var wc=0;wc<2;wc++){
      ctx.fillRect(bx-sz*0.08+wc*sz*0.12, by-sz*0.62+wr*sz*0.12, sz*0.06, sz*0.06);
    }
  }
  // Spire
  ctx.beginPath();
  ctx.moveTo(bx-sz*0.04,by-sz*0.70);
  ctx.lineTo(bx,by-sz*1.0);
  ctx.lineTo(bx+sz*0.04,by-sz*0.70);
  ctx.closePath(); ctx.fillStyle='rgba(255,255,255,0.80)'; ctx.fill();
  // Lightning bolt
  ctx.font=(sz*0.38)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('⚡',bx+sz*0.45,by-sz*0.30);
}

function drawVortex(bx,by,sz,ac){
  // Spiral arms
  for(var arm=0;arm<3;arm++){
    var aOff=(arm/3)*Math.PI*2+T*0.5;
    ctx.beginPath();
    for(var sp=0;sp<=24;sp++){
      var ang=aOff+sp*0.25;
      var r=sz*(0.06+sp*0.018);
      var px=bx+Math.cos(ang)*r, py=by+Math.sin(ang)*r;
      if(sp===0)ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.strokeStyle=ac+(arm===0?'ff':'99');
    ctx.lineWidth=sz*0.06; ctx.lineCap='round'; ctx.stroke();
  }
  // Center gem
  ctx.beginPath(); ctx.arc(bx,by,sz*0.14,0,Math.PI*2);
  ctx.fillStyle=ac; ctx.fill();
  ctx.beginPath(); ctx.arc(bx,by,sz*0.08,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
}

function drawCrystal(bx,by,sz,ac){
  // Multi-faceted crystal
  ctx.save();
  // Main gem
  ctx.beginPath();
  ctx.moveTo(bx,by-sz*0.72);
  ctx.lineTo(bx+sz*0.32,by-sz*0.16);
  ctx.lineTo(bx+sz*0.22,by+sz*0.30);
  ctx.lineTo(bx,by+sz*0.42);
  ctx.lineTo(bx-sz*0.22,by+sz*0.30);
  ctx.lineTo(bx-sz*0.32,by-sz*0.16);
  ctx.closePath(); ctx.fillStyle=ac+'99'; ctx.fill();
  ctx.strokeStyle=ac; ctx.lineWidth=2; ctx.stroke();
  // Inner shine
  ctx.beginPath();
  ctx.moveTo(bx,by-sz*0.72);
  ctx.lineTo(bx+sz*0.10,by-sz*0.10);
  ctx.lineTo(bx,by-sz*0.05);
  ctx.lineTo(bx-sz*0.10,by-sz*0.10);
  ctx.closePath(); ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fill();
  // Glow
  ctx.globalAlpha=0.35+Math.sin(T*3)*0.15;
  var cg=ctx.createRadialGradient(bx,by,0,bx,by,sz*0.6);
  cg.addColorStop(0,ac); cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(bx,by,sz*0.6,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCastle(bx,by,sz,ac){
  // Wall base
  ctx.fillStyle=ac+'55';
  ctx.fillRect(bx-sz*0.40,by-sz*0.35,sz*0.80,sz*0.38);
  // Battlements
  for(var b=0;b<5;b++){
    ctx.fillStyle=ac+'88';
    ctx.fillRect(bx-sz*0.38+b*sz*0.18,by-sz*0.52,sz*0.12,sz*0.18);
  }
  // Tower left
  ctx.fillStyle=ac+'99';
  ctx.fillRect(bx-sz*0.50,by-sz*0.62,sz*0.22,sz*0.65);
  // Tower right
  ctx.fillRect(bx+sz*0.28,by-sz*0.55,sz*0.22,sz*0.58);
  // Tower roofs (triangles)
  ctx.beginPath(); ctx.moveTo(bx-sz*0.50,by-sz*0.62); ctx.lineTo(bx-sz*0.39,by-sz*0.86); ctx.lineTo(bx-sz*0.28,by-sz*0.62); ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(bx+sz*0.28,by-sz*0.55); ctx.lineTo(bx+sz*0.39,by-sz*0.80); ctx.lineTo(bx+sz*0.50,by-sz*0.55); ctx.closePath();
  ctx.fill();
  // Gate
  ctx.beginPath();
  ctx.arc(bx,by,sz*0.16,Math.PI,0,true); ctx.lineTo(bx+sz*0.16,by+sz*0.03); ctx.lineTo(bx-sz*0.16,by+sz*0.03); ctx.closePath();
  ctx.fillStyle='rgba(0,0,0,0.60)'; ctx.fill();
}

// ─── Badge circle ───
function drawBadge(cx,cy,rw,rh,sw,active){
  var r=rw*0.285;
  // Outer shadow
  ctx.beginPath(); ctx.arc(cx,cy+r*0.16,r*1.08,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.32)'; ctx.fill();
  // Animated outer pulse ring
  if(sw.avail||active){
    var pr=r*(1.40+Math.sin(T*3)*0.08);
    ctx.beginPath(); ctx.arc(cx,cy,pr,0,Math.PI*2);
    ctx.strokeStyle=sw.avail?sw.accent+'44':'rgba(255,255,255,0.15)';
    ctx.lineWidth=4; ctx.stroke();
  }
  // Ring border
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  var rb=ctx.createLinearGradient(cx-r,cy-r,cx+r,cy+r);
  if(sw.avail){
    rb.addColorStop(0,sw.accent);
    rb.addColorStop(1,'#c07010');
  } else {
    rb.addColorStop(0,'#444'); rb.addColorStop(1,'#222');
  }
  ctx.fillStyle=rb; ctx.fill();
  // Inner radial
  var ig=ctx.createRadialGradient(cx-r*0.20,cy-r*0.25,0,cx,cy,r*0.92);
  if(sw.avail){
    ig.addColorStop(0,'#fffef0');
    ig.addColorStop(0.55,'#f0d870');
    ig.addColorStop(1,'#c09020');
  } else {
    ig.addColorStop(0,'#606060'); ig.addColorStop(1,'#282828');
  }
  ctx.beginPath(); ctx.arc(cx,cy,r*0.87,0,Math.PI*2);
  ctx.fillStyle=ig; ctx.fill();
  // Shine
  ctx.beginPath(); ctx.arc(cx-r*0.24,cy-r*0.28,r*0.28,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.fill();
  // Icon
  ctx.font=(r*1.05)+'px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=sw.avail?sw.accent:'#666';
  ctx.fillText(sw.icon, cx, cy+r*0.07);
  // Lock overlay
  if(!sw.avail){
    var lr=r*0.30;
    ctx.beginPath(); ctx.arc(cx+r*0.56,cy-r*0.56,lr,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.14)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.font=(lr*1.1)+'px sans-serif';
    ctx.fillText('🔒',cx+r*0.56,cy-r*0.56);
  }
}

// ─── Name label (pill below island) ───
function drawLabel(lx,ly,sw,active){
  var lines=sw.name.length>14?sw.name.split(' '):([sw.name]);
  var fs=Math.max(10,Math.min(W*0.012,16));
  ctx.font='bold '+fs+'px "Josefin Sans",sans-serif';
  var mw=0;
  lines.forEach(function(l){mw=Math.max(mw,ctx.measureText(l).width);});
  var lh=fs*1.32, bw=mw+fs*1.1, bh=lines.length*lh+fs*0.55;
  var bx=lx-bw/2, by=ly-bh/2;
  var ri=fs*0.42;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';
  rrect(ctx,bx+3,by+3,bw,bh,ri); ctx.fill();
  // Background
  ctx.fillStyle=active?'rgba(0,0,0,0.92)':'rgba(0,0,0,0.70)';
  rrect(ctx,bx,by,bw,bh,ri); ctx.fill();
  // Border
  if(active){
    ctx.strokeStyle=sw.accent+'99'; ctx.lineWidth=1.8;
    rrect(ctx,bx,by,bw,bh,ri); ctx.stroke();
  }
  // Text
  ctx.fillStyle=sw.avail?sw.label:'#666';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  lines.forEach(function(l,j){
    ctx.fillText(l, lx, ly+(j-(lines.length-1)*0.5)*lh);
  });
  // Coming soon tag
  if(!sw.avail){
    ctx.font=(fs*0.66)+'px "Josefin Sans",sans-serif';
    ctx.fillStyle='rgba(180,150,70,0.75)';
    ctx.fillText('即將推出',lx,ly+bh*0.5+fs*0.80);
  }
}

function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ════════════════════════════════════════════
//  HIT TEST
// ════════════════════════════════════════════
function hitTest(mx,my){
  for(var i=SW.length-1;i>=0;i--){
    var sw=SW[i];
    var dx=(mx-sw.fx*W)/(sw.rw*W*1.15);
    var dy=(my-sw.fy*H)/(sw.rh*H*1.15);
    if(dx*dx+dy*dy<1.25)return sw;
  }
  return null;
}
function onClick(e){var sw=hitTest(e.clientX,e.clientY);sw?(selSW=sw,showCard(sw)):(selSW=null,closeCard());}
function onMove(e){hovSW=hitTest(e.clientX,e.clientY);cvs.style.cursor=hovSW?'pointer':'default';}
function onTouch(e){var t=e.changedTouches[0];if(!t)return;var sw=hitTest(t.clientX,t.clientY);if(sw){selSW=sw;showCard(sw);}}

// ════════════════════════════════════════════
//  CARD
// ════════════════════════════════════════════
function showCard(sw){
  document.getElementById('ci').textContent=sw.icon;
  document.getElementById('cn').textContent=sw.name;
  document.getElementById('cs').textContent=sw.sub;
  var done=0;
  for(var i=1;i<=sw.totalLv;i++){
    try{var d=JSON.parse(localStorage.getItem(sw.pfx+i)||'{}');if(d.done)done++;}catch(e){}
  }
  var pct=sw.totalLv?Math.round(done/sw.totalLv*100):0;
  document.getElementById('cbf').style.width=pct+'%';
  document.getElementById('cbf').style.background=sw.accent;
  document.getElementById('cbp').textContent=pct+'%';
  document.getElementById('cst').textContent=
    done===sw.totalLv&&done>0?'★★★':done>sw.totalLv/2?'★★☆':done>0?'★☆☆':'☆☆☆';
  var btn=document.getElementById('cbtn');
  if(sw.avail){
    btn.className='go'; btn.style.background=sw.accent;
    btn.textContent=done>0?'繼續學習 →':'進入學習 →';
    btn.onclick=function(){window.location.href=sw.hub;};
  }else{
    btn.className='no'; btn.textContent='🔒 即將推出'; btn.onclick=null;
  }
  document.getElementById('card').classList.add('on');
}
function closeCard(){document.getElementById('card').classList.remove('on');selSW=null;}
function goHub(){if(selSW&&selSW.avail)window.location.href=selSW.hub;}

// ════════════════════════════════════════════
//  XP
// ════════════════════════════════════════════
function calcXP(){
  var xp=0;
  SW.forEach(function(sw){
    for(var i=1;i<=sw.totalLv;i++){
      try{var d=JSON.parse(localStorage.getItem(sw.pfx+i)||'{}');if(d.done)xp+=(d.xp||300);}catch(e){}
    }
  });
  document.getElementById('xp-n').textContent='XP '+xp;
}

// ════════════════════════════════════════════
//  MAIN DRAW LOOP
// ════════════════════════════════════════════
function draw(){
  ctx.clearRect(0,0,W,H);
  drawOcean();
  drawPath();
  // Sort islands back to front by fy
  var sorted=SW.slice().sort(function(a,b){return a.fy-b.fy;});
  sorted.forEach(drawIsland);
  // Clouds on top
  CLOUDS.forEach(function(cl){
    cl.x+=cl.spd*0.28;
    if(cl.x>W+cl.w*2)cl.x=-cl.w*2;
    drawCloud(cl);
  });
}

function loop(){
  requestAnimationFrame(loop);
  T+=0.016;
  draw();
}

window.onload=function(){
  setup();
  calcXP();
  loop();
};
</script>
