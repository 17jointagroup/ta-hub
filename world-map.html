<script>
// ── Device Detection (runs before page renders) ──
(function(){
  var ua=navigator.userAgent;
  var w=window.innerWidth||screen.width;
  var isMobile=/iPhone|iPad|iPod|Android|Mobile/i.test(ua)||w<=768;
  var isIOS=/iPhone|iPad|iPod/i.test(ua);
  var size=w<=390?'xs':w<=430?'sm':w<=768?'md':'lg';
  document.documentElement.setAttribute('data-device',isMobile?'mobile':'desktop');
  document.documentElement.setAttribute('data-size',size);
  if(isIOS)document.documentElement.classList.add('ios');
  window.DEV={isMobile:isMobile,isIOS:isIOS,size:size,W:w};
})();
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{

/* ── XP POP ── */

@keyframes loadAnim{0%{width:0%;opacity:1}80%{width:100%;opacity:1}100%{width:100%;opacity:0}}

<script>
// ════════════════════════════════════════════════
//  COURSE DATA
// ════════════════════════════════════════════════
const COURSES = [
  {
    id:'blender', icon:'🟠', name:'Blender',
    tag:'3D 建模 · 動畫 · 渲染',
    desc:'從零開始學 3D 建模：視角操控、Extrude、Loop Cut、Bevel、Boolean、Subdivision⋯ 全互動關卡！',
    color:0xe8780a, light:0xffa040,
    chips:['6 關卡','2,250 XP','Three.js 互動'],
    hub:'blender-hub.html',

  },
  {

    tag:'PBR 材質 · 貼圖烘焙',
    desc:'Substance Painter 完整課程：PBR 材質、Smart Material、貼圖烘焙、匯出到 UE5。',
    color:0x4a90d9, light:0x88c0ff,
    chips:['5 關卡','1,800 XP','即將上線'],
    hub:'#',
    pos:{x:4.5, z:-3}, level:1,
    unlocked:false
  },
  {
    id:'ue5', icon:'⬡', name:'UE5',
    tag:'Nanite · Lumen · Niagara',
    desc:'Unreal Engine 5 完整 TA 課程：Nanite 虛擬幾何、Lumen 全域光照、Niagara 特效、PCG 程序化。',
    color:0x0891b2, light:0x40d0ff,
    chips:['8 關卡','3,200 XP','即將上線'],
    hub:'#',
    pos:{x:0, z:5}, level:2,
    unlocked:false
  },
  {
    id:'houdini', icon:'🌀', name:'Houdini',
    tag:'VEX · 特效模擬 · PDG',
    desc:'Houdini 程序化建模與特效：SOP 節點、VEX 程式化、爆炸模擬、Karma 渲染。',
    color:0xd97706, light:0xffb840,
    chips:['7 關卡','2,800 XP','即將上線'],
    hub:'#',
    pos:{x:-5.5, z:3.5}, level:3,
    unlocked:false
  },
  {
    id:'opengl', icon:'💎', name:'OpenGL',
    tag:'GLSL · 著色器 · 圖學',
    desc:'OpenGL 完整圖學課程：像素王國入門關卡、GLSL 著色器、光照模型、後處理效果。',
    color:0x7c3aed, light:0xb080ff,
    chips:['9 關卡','2,250 XP','已上線'],
    hub:'opengl-map.html',
    pos:{x:5.5, z:3}, level:4,
    unlocked:true
  },
  {
    id:'directx', icon:'⚔️', name:'DirectX',
    tag:'HLSL · DX11/12 · GPU',
    desc:'DirectX 11/12 完整課程：HLSL 著色語言、Command Queue、光線追蹤、Compute Shader。',
    color:0xe84545, light:0xff8888,
    chips:['9 關卡','2,250 XP','已上線'],
    hub:'dx-map.html',
    pos:{x:1.5, z:-5.5}, level:5,
    unlocked:true
  },
];

// ════════════════════════════════════════════════
//  THREE.JS SETUP
// ════════════════════════════════════════════════
const canvas = document.getElementById('world');
const renderer = new THREE.WebGLRenderer({
  canvas, antialias:true,
  powerPreference:'high-performance'
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2e6880);
scene.fog = new THREE.FogExp2(0x3d7a96, 0.022);

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 200);
camera.position.set(0, 14, 18);
camera.lookAt(0, 0, 0);

// ── Lights ──
const sun = new THREE.DirectionalLight(0xfffaee, 1.8);
sun.position.set(8, 20, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -25; sun.shadow.camera.right = 25;
sun.shadow.camera.top = 25; sun.shadow.camera.bottom = -25;
sun.shadow.bias = -0.001;
scene.add(sun);

scene.add(new THREE.AmbientLight(0xc8e8ff, 0.7));

const fillLight = new THREE.DirectionalLight(0xffd4a0, 0.4);
fillLight.position.set(-8, 5, -10);
scene.add(fillLight);

// ════════════════════════════════════════════════
//  GEOMETRY BUILDERS (low-poly cartoon style)
// ════════════════════════════════════════════════
function flatShade(geo){
  geo.computeVertexNormals();
  return geo;
}

// Ocean base
function makeOcean(){
  const geo = new THREE.CylinderGeometry(28, 28, 0.6, 6);
  flatShade(geo);
  const mat = new THREE.MeshPhongMaterial({
    color:0x1a6080, specular:0x2a90b0, shininess:60,
    flatShading:true
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.y = -0.8;
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Ocean shimmer plane
  const shimGeo = new THREE.PlaneGeometry(56, 56, 1, 1);
  const shimMat = new THREE.MeshBasicMaterial({
    color:0x1a5570, transparent:true, opacity:.25
  });
  const shim = new THREE.Mesh(shimGeo, shimMat);
  shim.rotation.x = -Math.PI/2;
  shim.position.y = -0.45;
  scene.add(shim);

  return mesh;
}

// Island base
function makeIsland(x, z, colorHex, radius=2.2){
  const group = new THREE.Group();
  group.position.set(x, 0, z);

  // Main island body (low-poly cone shape)
  const pts = [];
  pts.push(new THREE.Vector2(0, 0));
  pts.push(new THREE.Vector2(radius*0.3, 0.25));
  pts.push(new THREE.Vector2(radius*0.85, 0.5));
  pts.push(new THREE.Vector2(radius, 0));
  pts.push(new THREE.Vector2(radius*1.05, -0.3));
  pts.push(new THREE.Vector2(radius*0.6, -0.8));
  pts.push(new THREE.Vector2(0, -0.8));

  const geo = new THREE.LatheGeometry(pts, 7);
  flatShade(geo);
  const mat = new THREE.MeshPhongMaterial({
    color:colorHex, flatShading:true,
    specular:0x224411, shininess:20
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  group.add(mesh);

  // Grass top
  const grassGeo = new THREE.CylinderGeometry(radius*0.65, radius*0.88, 0.35, 7);
  flatShade(grassGeo);
  const grassMat = new THREE.MeshPhongMaterial({
    color:0x5aab30, flatShading:true
  });
  const grass = new THREE.Mesh(grassGeo, grassMat);
  grass.position.y = 0.5;
  grass.castShadow = true;
  group.add(grass);

  // Sand ring
  const sandGeo = new THREE.RingGeometry(radius*0.88, radius*1.0, 7);
  const sandMat = new THREE.MeshPhongMaterial({color:0xf0d080,side:THREE.DoubleSide,flatShading:true});
  const sand = new THREE.Mesh(sandGeo, sandMat);
  sand.rotation.x = -Math.PI/2;
  sand.position.y = 0.18;
  group.add(sand);

  return group;
}

// Low-poly tree
function makeTree(x, y, z, scale=1, colorHex=0x3a8a20){
  const g = new THREE.Group();
  g.position.set(x,y,z);
  g.scale.setScalar(scale);

  // trunk
  const trunkGeo = new THREE.CylinderGeometry(.08,.12,.6,5);
  flatShade(trunkGeo);
  g.add(new THREE.Mesh(trunkGeo, new THREE.MeshPhongMaterial({color:0x8B5e3c,flatShading:true})));

  // foliage layers
  [[0.55,0.55,0.5],[0.78,0.42,0.42],[0.48,0.32,0.32]].forEach(([h,r,y2])=>{
    const fGeo = new THREE.ConeGeometry(r,h,6);
    flatShade(fGeo);
    const fMesh = new THREE.Mesh(fGeo, new THREE.MeshPhongMaterial({color:colorHex,flatShading:true}));
    fMesh.position.y = y2 + .3;
    fMesh.castShadow = true;
    g.add(fMesh);
  });
  return g;
}

// Low-poly rock
function makeRock(x,y,z,scale=1){
  const geo = new THREE.DodecahedronGeometry(0.3, 0);
  flatShade(geo);
  const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({color:0x9a9a9a,flatShading:true}));
  mesh.position.set(x,y,z);
  mesh.scale.set(scale,scale*0.7,scale*0.8);
  mesh.rotation.y = Math.random()*Math.PI*2;
  mesh.castShadow=true;
  return mesh;
}

// Course island node (floating platform + sign)
function makeCourseNode(course){
  const group = new THREE.Group();
  group.userData = {courseId: course.id, course};

  // Island
  const island = makeIsland(0, 0, course.color);
  group.add(island);

  // Floating crystal / icon tower
  const towerGeo = new THREE.OctahedronGeometry(0.45, 0);
  flatShade(towerGeo);
  const towerMat = new THREE.MeshPhongMaterial({
    color:course.light, flatShading:true,
    specular:0xffffff, shininess:120,
    transparent:true, opacity: course.unlocked ? .95 : .45,
    emissive: course.unlocked ? new THREE.Color(course.color).multiplyScalar(.3) : new THREE.Color(0)
  });
  const tower = new THREE.Mesh(towerGeo, towerMat);
  tower.position.y = 2.2;
  tower.castShadow = true;
  tower.userData.rotates = true;
  group.add(tower);

  // Tower pole
  const poleGeo = new THREE.CylinderGeometry(0.04, 0.04, 1.8, 5);
  group.add(new THREE.Mesh(poleGeo, new THREE.MeshPhongMaterial({color:0x8888aa, flatShading:true})));

  // Glow ring (point light)
  if(course.unlocked){
    const pl = new THREE.PointLight(course.light, 1.2, 4.5);
    pl.position.y = 2.2;
    group.add(pl);
  }

  // Lock overlay
  if(!course.unlocked){
    const lockGeo = new THREE.BoxGeometry(.5,.6,.5);
    const lock = new THREE.Mesh(lockGeo, new THREE.MeshPhongMaterial({color:0x444466,transparent:true,opacity:.7,flatShading:true}));
    lock.position.y = 2.2;
    lock.castShadow = true;
    group.add(lock);
  }

  // Trees around island
  const treeColors = [0x3a8a20,0x4aaa28,0x2a7018];
  const treeCount = course.unlocked ? 5 : 2;
  for(let i=0;i<treeCount;i++){
    const a = (i/treeCount)*Math.PI*2 + .3;
    const r = 1.5 + Math.random()*.4;
    const tree = makeTree(Math.cos(a)*r, .65, Math.sin(a)*r, .7+Math.random()*.4, treeColors[i%3]);
    group.add(tree);
  }

  // Rocks
  for(let i=0;i<3;i++){
    const a = Math.random()*Math.PI*2;
    const r = 1.0+Math.random()*.8;
    group.add(makeRock(Math.cos(a)*r, .55, Math.sin(a)*r, .4+Math.random()*.4));
  }

  group.position.set(course.pos.x, 0, course.pos.z);
  return group;
}

// Clouds
function makeCloud(x,y,z,scale=1){
  const g = new THREE.Group();
  g.position.set(x,y,z);
  const parts = [
    {ox:0,oy:0,oz:0,s:1},
    {ox:.8,oy:-.1,oz:.1,s:.75},
    {ox:-.7,oy:-.15,oz:.05,s:.7},
    {ox:.2,oy:.25,oz:0,s:.6},
  ];
  parts.forEach(p=>{
    const geo = new THREE.SphereGeometry(.7,5,4);
    flatShade(geo);
    const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({
      color:0xffffff,flatShading:true,
      transparent:true,opacity:.88
    }));
    mesh.position.set(p.ox,p.oy,p.oz);
    mesh.scale.setScalar(p.s*scale);
    g.add(mesh);
  });
  return g;
}

// Path/bridge between islands
function makePath(from, to, color=0xd4b896){
  const start = new THREE.Vector3(from.pos.x, 0.2, from.pos.z);
  const end = new THREE.Vector3(to.pos.x, 0.2, to.pos.z);
  const mid = start.clone().add(end).multiplyScalar(.5);
  mid.y = 0.8;
  const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
  const pts = curve.getPoints(20);
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineDashedMaterial({
    color, dashSize:.3, gapSize:.2, linewidth:2
  });
  const line = new THREE.Line(geo, mat);
  line.computeLineDistances();
  return line;
}

// ════════════════════════════════════════════════
//  BUILD THE WORLD
// ════════════════════════════════════════════════
const courseNodes = [];
const clouds = [];
const oceanMesh = makeOcean();

// Build course islands
COURSES.forEach(course=>{
  const node = makeCourseNode(course);
  scene.add(node);
  courseNodes.push(node);
});

// Paths between unlocked courses
scene.add(makePath(COURSES[0], COURSES[4]));
scene.add(makePath(COURSES[0], COURSES[5]));

// Decorative mini islands
[
  {x:-8,z:1,c:0x6ab840,r:1.2},
  {x:8,z:0,c:0x5aaa30,r:1.0},
  {x:2,z:9,c:0x7ac850,r:1.4},
  {x:-2,z:-8,c:0x5aa028,r:1.1},
  {x:-10,z:-4,c:0x4a9820,r:0.9},
  {x:10,z:5,c:0x60b038,r:0.8},
].forEach(({x,z,c,r})=>{

  for(let i=0;i<3;i++){

});

// Clouds
const cloudPositions = [
  [-6,8,-4],[4,9,-2],[10,7,4],[-3,10,6],[8,8,8],[-9,7,6],[0,9,-7],[5,10,-6]
];
cloudPositions.forEach(([x,y,z])=>{
  const c = makeCloud(x,y,z,.9+Math.random()*.4);
  c.userData.speed = (.5+Math.random())*(Math.random()>.5?1:-1)*.003;
  c.userData.baseX = x;
  scene.add(c);
  clouds.push(c);
});

// Underwater rocks/coral
for(let i=0;i<20;i++){
  const a=Math.random()*Math.PI*2;
  const r=8+Math.random()*16;
  const rockGeo = new THREE.ConeGeometry(.2+Math.random()*.5, .8+Math.random()*1.2, 4+Math.floor(Math.random()*3));
  flatShade(rockGeo);
  const colors=[0x2a7098,0x2a9888,0x1a6080];
  const rock = new THREE.Mesh(rockGeo, new THREE.MeshPhongMaterial({color:colors[i%3],flatShading:true}));
  rock.position.set(Math.cos(a)*r, -1.1, Math.sin(a)*r);
  rock.rotation.y = Math.random()*Math.PI;

}

// ════════════════════════════════════════════════
//  ORBIT CONTROLS (custom - Bruno Simon style)
// ════════════════════════════════════════════════
const orb = {
  isDown:false, prevX:0, prevY:0,
  theta: .4, phi: .85,
  targetTheta:.4, targetPhi:.85,
  radius:20, targetRadius:20,
  targetX:0, targetZ:0, currentX:0, currentZ:0,
};

function getEv(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}

canvas.addEventListener('mousedown',e=>{orb.isDown=true;const p=getEv(e);orb.prevX=p.x;orb.prevY=p.y;});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    orb._pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  } else {
    orb.isDown=true;const p=getEv(e);orb.prevX=p.x;orb.prevY=p.y;
  }
},{passive:false});
window.addEventListener('mouseup',()=>orb.isDown=false);
window.addEventListener('touchend',()=>orb.isDown=false);

let lastDrag=0;
window.addEventListener('mousemove',e=>{
  if(!orb.isDown)return;
  const p=getEv(e);
  const dx=p.x-orb.prevX,dy=p.y-orb.prevY;
  orb.targetTheta-=dx*.007;
  orb.targetPhi=Math.max(.35,Math.min(1.35,orb.targetPhi+dy*.006));
  orb.prevX=p.x;orb.prevY=p.y;
  lastDrag=Date.now();
});
window.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!orb.isDown)return;
  const p=getEv(e);
  const dx=p.x-orb.prevX,dy=p.y-orb.prevY;
  orb.targetTheta-=dx*.007;
  orb.targetPhi=Math.max(.35,Math.min(1.35,orb.targetPhi+dy*.006));
  orb.prevX=p.x;orb.prevY=p.y;
  lastDrag=Date.now();
},{passive:false});

canvas.addEventListener('wheel',e=>{
  orb.targetRadius=Math.max(8,Math.min(35,orb.targetRadius+e.deltaY*.04));
});

// ── Raycasting for clicks ──
const raycaster = new THREE.Raycaster();
const mouse2 = new THREE.Vector2();

canvas.addEventListener('click',e=>{
  if(Date.now()-lastDrag < 200) return; // ignore after drag
  const rect=canvas.getBoundingClientRect();
  mouse2.set(
    ((e.clientX-rect.left)/rect.width)*2-1,
    -((e.clientY-rect.top)/rect.height)*2+1
  );
  raycaster.setFromCamera(mouse2,camera);
  const hits=raycaster.intersectObjects(scene.children,true);
  for(const hit of hits){
    let obj=hit.object;
    while(obj.parent && !obj.userData.courseId) obj=obj.parent;
    if(obj.userData.courseId){
      showPopup(obj.userData.course, obj);
      break;
    }
  }
});

// ════════════════════════════════════════════════
//  POPUP
// ════════════════════════════════════════════════
let activeNode = null;

function showPopup(course, node){
  if(activeNode) resetNode(activeNode);
  activeNode = node;

  // Focus camera on island
  orb.targetX = course.pos.x;
  orb.targetZ = course.pos.z;
  orb.targetRadius = 12;

  // Bounce island
  node.userData.bouncing = true;
  setTimeout(()=>{if(node.userData)node.userData.bouncing=false;},600);

  document.getElementById('pop-emoji').textContent = course.icon;
  document.getElementById('pop-tag').textContent = course.tag;
  document.getElementById('pop-title').textContent = course.name;
  document.getElementById('pop-desc').textContent = course.desc;

  const meta = document.getElementById('pop-meta');
  meta.innerHTML = course.chips.map(c=>`<span class="popup-chip">${c}</span>`).join('');

  const goBtn = document.getElementById('pop-go');
  if(course.unlocked){
    goBtn.href = course.hub;
    goBtn.textContent = '▶ 進入課程';
    goBtn.style.background='var(--acc)';
    goBtn.style.pointerEvents='all';
  } else {
    goBtn.href = '#';
    goBtn.textContent = '🔒 尚未解鎖';
    goBtn.style.background='rgba(100,100,120,.5)';
    goBtn.style.pointerEvents='none';
  }

  document.getElementById('popup').classList.add('show');
  document.getElementById('hint-bar').style.opacity='0';

  // XP pop
  if(course.unlocked){
    const pop = document.createElement('div');
    pop.className='xp-pop';pop.textContent='點擊探索！';
    pop.style.cssText=`left:${window.innerWidth*.45}px;top:${window.innerHeight*.5}px`;
    document.body.appendChild(pop);
    setTimeout(()=>pop.remove(),1600);
  }
}

function closePopup(){
  document.getElementById('popup').classList.remove('show');
  document.getElementById('hint-bar').style.opacity='1';
  orb.targetX=0;orb.targetZ=0;orb.targetRadius=20;
  activeNode=null;
}

function resetNode(node){}

// ════════════════════════════════════════════════
//  PROGRESS SIDEBAR
// ════════════════════════════════════════════════
function buildProgressStrip(){
  const strip = document.getElementById('prog-strip');
  strip.innerHTML = COURSES.map(c=>{
    const xp = 0;
    return `<div class="prog-item" onclick="focusCourse('${c.id}')">
      <div class="prog-dot" style="background:${c.unlocked?'#'+c.color.toString(16).padStart(6,'0'):'#444'}">${c.icon}</div>
      <span class="prog-name">${c.name}</span>
      <span class="prog-xp">${c.unlocked?'開放':'🔒'}</span>
    </div>`;
  }).join('');
}

function focusCourse(id){
  const c=COURSES.find(c=>c.id===id);
  const node=courseNodes.find(n=>n.userData.courseId===id);
  if(c && node) showPopup(c, node);
}

buildProgressStrip();

// ════════════════════════════════════════════════
//  RENDER LOOP
// ════════════════════════════════════════════════
function resize(){
  const w=canvas.clientWidth,h=canvas.clientHeight;
  if(canvas.width!==w||canvas.height!==h){
    renderer.setSize(w,h,false);
    camera.aspect=w/h;camera.updateProjectionMatrix();
  }
}

let time=0;
const LERP = .06;

function animate(){
  requestAnimationFrame(animate);
  resize();
  time+=.016;

  // Smooth camera
  orb.theta += (orb.targetTheta-orb.theta)*LERP;
  orb.phi   += (orb.targetPhi  -orb.phi  )*LERP;
  orb.radius+= (orb.targetRadius-orb.radius)*LERP;
  orb.currentX+=(orb.targetX-orb.currentX)*LERP;
  orb.currentZ+=(orb.targetZ-orb.currentZ)*LERP;

  const cx=orb.currentX+orb.radius*Math.sin(orb.phi)*Math.sin(orb.theta);
  const cy=orb.radius*Math.cos(orb.phi);
  const cz=orb.currentZ+orb.radius*Math.sin(orb.phi)*Math.cos(orb.theta);
  camera.position.set(cx,cy,cz);
  camera.lookAt(orb.currentX,0,orb.currentZ);

  // Animate course nodes
  courseNodes.forEach((node,i)=>{
    const course=COURSES[i];
    // Float up/down
    node.position.y = Math.sin(time*.8+i*1.2)*.15;

    // Bounce on click
    if(node.userData.bouncing){
      node.scale.setScalar(1+Math.sin(time*12)*.08);
    } else {
      node.scale.lerp(new THREE.Vector3(1,1,1),.1);
    }

    // Rotate crystal tower
    node.children.forEach(child=>{
      if(child.userData.rotates){
        child.rotation.y += course.unlocked ? .02 : .005;
        child.position.y = 2.2 + Math.sin(time*1.5+i)*.12;
      }
    });
  });

  // Animate clouds
  clouds.forEach(c=>{
    c.position.x += c.userData.speed;
    if(c.position.x > 15) c.position.x = -15;
    if(c.position.x < -15) c.position.x = 15;
  });

  // Ocean shimmer
  oceanMesh.rotation.y += .0008;

  renderer.render(scene,camera);
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
setTimeout(()=>{
  const loading=document.getElementById('loading');
  loading.style.opacity='0';
  setTimeout(()=>loading.style.display='none',800);
},1200);

animate();
