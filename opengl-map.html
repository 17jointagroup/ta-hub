<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>🗺️ OpenGL 魔法王國</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Nunito',sans-serif;overflow:hidden;height:100%;background:#060210;touch-action:none;user-select:none}

/* ── HUD ── */
.hud{position:fixed;top:0;left:0;right:0;z-index:200;
  padding:max(10px,env(safe-area-inset-top)) 12px 8px;
  background:rgba(3,1,16,.94);border-bottom:1px solid rgba(180,130,255,.14);
  display:flex;align-items:center;gap:10px;backdrop-filter:blur(14px)}
.av{width:36px;height:36px;border-radius:50%;border:2px solid #c084fc;background:#100828;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.25rem}
.pi{flex:1;min-width:0}
.pnr{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.pn{font-size:.9rem;font-weight:900;color:#f0e8ff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lv{background:linear-gradient(135deg,#c084fc,#34d399);color:#050210;font-size:.6rem;font-weight:900;padding:2px 7px;border-radius:100px;flex-shrink:0}
.ttl{font-size:.6rem;font-weight:800;color:#a78bfa;flex-shrink:0}
.brs{display:flex;flex-direction:column;gap:3px}
.br{display:flex;align-items:center;gap:5px}
.brl{font-size:.58rem;font-weight:800;color:#3d2a60;min-width:18px}
.brb{flex:1;height:5px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden}
.brf{height:100%;border-radius:100px;transition:width .4s}
.hb{background:linear-gradient(90deg,#ef4444,#f87171)}.xb{background:linear-gradient(90deg,#f59e0b,#fcd34d)}
.hbtn{background:rgba(192,132,252,.12);border:1px solid rgba(192,132,252,.22);color:#c084fc;border-radius:9px;padding:6px 10px;font-size:.7rem;font-weight:800;cursor:pointer;flex-shrink:0;font-family:inherit}

/* ── SCROLL (horizontal) ── */
.outer{position:fixed;top:0;left:0;right:0;bottom:60px;overflow:hidden;cursor:grab}
.outer:active{cursor:grabbing}
.stage{position:absolute;transform-origin:0 0;will-change:transform}

/* ── ISOMETRIC CANVAS ── */
#mapCanvas{display:block;position:absolute;top:0;left:0;pointer-events:none}

/* ── Castle HTML nodes overlay ── */
#castleLayer{position:absolute;top:0;left:0;pointer-events:none}
.cnode{position:absolute;transform:translate(-50%,-100%);pointer-events:all;text-align:center;cursor:pointer;z-index:30}
.cnode.locked{cursor:not-allowed}
.cnode-inner{display:flex;flex-direction:column;align-items:center;gap:3px}
.cnode-badge{background:rgba(4,2,18,.88);border-radius:12px;padding:5px 10px;border:2px solid transparent;backdrop-filter:blur(6px);transition:border-color .2s,box-shadow .2s;min-width:72px;text-align:center}
.cnode:not(.locked):active .cnode-badge{transform:scale(.92)}
.cnode.unlocked .cnode-badge{border-color:var(--cc,#c084fc);box-shadow:0 0 14px var(--cc,rgba(192,132,252,.35))}
.cnode.done .cnode-badge{border-color:gold;box-shadow:0 0 18px rgba(255,215,0,.4);animation:cglow 2.5s ease infinite}
@keyframes cglow{0%,100%{box-shadow:0 0 12px rgba(255,215,0,.3)}50%{box-shadow:0 0 26px rgba(255,215,0,.6)}}
.cnode.locked .cnode-badge{border-color:rgba(255,255,255,.08);opacity:.4}
.cn-em{font-size:1.8rem;line-height:1.1;display:block}
.cn-name{font-size:.65rem;font-weight:900;color:#f0e8ff;margin-top:1px;white-space:nowrap}
.cn-num{font-size:.56rem;font-weight:800;color:#a78bfa}
.cn-pct{font-size:.56rem;font-weight:900;color:#a0f8ff;background:rgba(0,0,0,.4);border-radius:100px;padding:0 6px;margin-top:1px}
.cn-stars{font-size:.58rem;letter-spacing:1px;margin-top:1px}
.cn-tap{font-size:.55rem;font-weight:800;color:rgba(255,255,255,.4);margin-top:2px}
.cnode.unlocked .cn-tap{color:var(--cc,#c084fc)}

/* Player */
.pp{position:absolute;pointer-events:none;z-index:50;text-align:center;transform:translate(-50%,-90%);transition:left .95s cubic-bezier(.34,1.56,.64,1),top .95s cubic-bezier(.34,1.56,.64,1)}
.pp-em{font-size:2rem;line-height:1;animation:ppbob .8s ease infinite alternate;filter:drop-shadow(0 4px 10px rgba(192,132,252,.8))}
@keyframes ppbob{from{transform:translateY(0)}to{transform:translateY(-5px)}}
.pp-shadow{width:18px;height:5px;background:rgba(0,0,0,.3);border-radius:50%;margin:2px auto 0}
.pp-dot{width:6px;height:6px;background:#c084fc;border-radius:50%;margin:2px auto 0;animation:blink .9s infinite;box-shadow:0 0 8px #c084fc}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

/* Bottom panel */
.sp{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(3,1,16,.96);border-top:1px solid rgba(192,132,252,.14);padding-bottom:max(8px,env(safe-area-inset-bottom));transition:height .3s;height:60px;overflow:hidden}
.sp.open{height:230px}
.spt{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 0;cursor:pointer}
.sptl{font-size:.82rem;font-weight:800;color:#c084fc;display:flex;align-items:center;gap:10px}
.spar{color:#3d2a60;transition:.25s}.sp.open .spar{transform:rotate(180deg)}
.spb{padding:8px 14px 4px;overflow-y:auto;height:170px}
.eqg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.eq{background:rgba(192,132,252,.04);border:1px dashed rgba(192,132,252,.16);border-radius:10px;padding:8px 4px;text-align:center;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.eq.fl{border-style:solid;border-color:rgba(192,132,252,.32);background:rgba(192,132,252,.07)}
.eq-ic{font-size:1.25rem}.eq-nm{font-size:.58rem;font-weight:800;color:#c084fc}.eq-st{font-size:.54rem;color:#34d399}.eq-em{font-size:.6rem;color:#2d1a50;font-weight:800}
.fsg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.fs{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:9px;padding:7px 3px;text-align:center}
.fsv{font-size:1.1rem;font-weight:900;font-family:monospace}.fsl{font-size:.58rem;color:#3d2a60;font-weight:800;letter-spacing:.04em;margin-top:2px}

/* Level up toast */
.lut{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-120px);background:linear-gradient(135deg,#c084fc,#34d399);color:#04020e;border-radius:100px;padding:10px 22px;font-size:.9rem;font-weight:900;z-index:300;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
.lut.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hud">
  <div class="av" id="hudAv">🧙</div>
  <div class="pi">
    <div class="pnr"><span class="pn" id="hudN">冒險者</span><span class="lv" id="hudLv">Lv.1</span><span class="ttl" id="hudTtl">初學者</span></div>
    <div class="brs">
      <div class="br"><span class="brl">HP</span><div class="brb"><div class="brf hb" id="hpB" style="width:100%"></div></div><span style="font-size:.58rem;color:#f87171;font-weight:800;min-width:38px;text-align:right" id="hpT">100/100</span></div>
      <div class="br"><span class="brl">XP</span><div class="brb"><div class="brf xb" id="xpB" style="width:0%"></div></div><span style="font-size:.58rem;color:#fcd34d;font-weight:800;min-width:38px;text-align:right" id="xpT">0/500</span></div>
    </div>
  </div>
  <button class="hbtn" onclick="location.href='index.html'">🏠</button>
</div>

<div class="outer" id="outer">
  <div class="stage" id="stage">
    <canvas id="mapCanvas"></canvas>
    <div id="castleLayer"></div>
    <div class="pp" id="pp">
      <div class="pp-em" id="ppEm">🧙</div>
      <div class="pp-shadow"></div>
      <div class="pp-dot"></div>
    </div>
  </div>
</div>

<div class="sp" id="sp">
  <div class="spt" onclick="document.getElementById('sp').classList.toggle('open')">
    <div class="sptl"><span>⚔️ 裝備 &amp; 能力值</span><span id="spSum" style="font-size:.66rem;color:#3d2a60"></span></div>
    <span class="spar">▲</span>
  </div>
  <div class="spb">
    <div class="eqg" id="eqg"></div>
    <div class="fsg" id="fsg"></div>
  </div>
</div>
<div class="lut" id="lut">🎉 升級了！</div>

<script>
var C=[
  {id:1,em:'🏰',name:'召喚之城',col:'#7c3aed',key:'tower1_done',tot:9, rw:{slot:'weapon',name:'召喚法杖',icon:'🪄',stat:'INT+3',bonus:{int:3}}},
  {id:2,em:'⚡',name:'光之城',  col:'#d97706',key:'tower2_done',tot:6, rw:{slot:'hat',name:'光明王冠',icon:'👑',stat:'INT+2,SPD+2',bonus:{int:2,spd:2}}},
  {id:3,em:'🗿',name:'模型之城',col:'#059669',key:'tower3_done',tot:3, rw:{slot:'accessory',name:'立體鏡',icon:'🥽',stat:'INT+2',bonus:{int:2}}},
  {id:4,em:'🔮',name:'術式之城',col:'#7c3aed',key:'tower4_done',tot:11,rw:{slot:'armor',name:'術式護甲',icon:'🛡️',stat:'DEF+4,INT+3',bonus:{def:4,int:3}}},
  {id:5,em:'🌟',name:'光輝之城',col:'#d97706',key:'tower5_done',tot:8, rw:{slot:'accessory',name:'光之戒指',icon:'💍',stat:'INT+4',bonus:{int:4}}},
  {id:6,em:'🧪',name:'物理之城',col:'#0891b2',key:'tower6_done',tot:9, rw:{slot:'armor',name:'PBR護甲',icon:'🦺',stat:'DEF+5,ATK+2',bonus:{def:5,atk:2}}},
  {id:7,em:'⚔️',name:'競技之城',col:'#dc2626',key:'tower7_done',tot:9, rw:{slot:'hat',name:'戰鬥頭盔',icon:'⛑️',stat:'ATK+3,SPD+3',bonus:{atk:3,spd:3}}},
  {id:8,em:'🌌',name:'秘境之城',col:'#7c3aed',key:'tower8_done',tot:8, rw:{slot:'weapon',name:'古代法杖',icon:'🔮',stat:'INT+7',bonus:{int:7}}},
  {id:9,em:'👑',name:'終極城堡',col:'#ca8a04',key:'tower9_done',tot:8, rw:{slot:'accessory',name:'終極王冠',icon:'👑',stat:'全屬性+5',bonus:{atk:5,def:5,int:5,spd:5}}}
];
var LX=[0,300,700,1200,1800,2500,3400,4400,5600,7000];
var TITLES=['初學者','OpenGL學徒','著色器術士','渲染騎士','圖形學大師','終極魔法師'];
function getTitle(lv){return TITLES[Math.min(Math.floor((lv-1)/2),TITLES.length-1)];}
function getLevel(xp){for(var i=LX.length-1;i>=0;i--)if(xp>=LX[i])return i+1;return 1;}
function getDone(c){try{return JSON.parse(localStorage.getItem(c.key)||'[]').filter(Boolean).length;}catch(e){return 0;}}
function getTotalXP(){return C.reduce(function(s,c){var d=getDone(c);return s+Math.round(d/c.tot*(c.id*100+20));},0);}
function getEq(){var eq={weapon:null,armor:null,hat:null,accessory:null};C.forEach(function(c){if(getDone(c)>=c.tot&&c.rw)eq[c.rw.slot]=c.rw;});return eq;}

// ── Isometric 45° setup (horizontal scroll, left→right) ──
// Each grid cell in screen space
var TW=96, TH=48; // tile width/height in iso projection
var TILE_DEPTH=28; // wall height

// Grid layout: 9 castles on a horizontal world
// World is ~18 cells wide, 6 cells tall
var WORLD_COLS=20, WORLD_ROWS=8;

// Castle grid positions [col, row] - snake path left to right, slight elevation changes
var CPOS_G=[
  [1, 5], // 城堡1 - start (leftmost, lower ground)
  [3, 4], // 城堡2
  [5, 5], // 城堡3
  [7, 3], // 城堡4 - elevated
  [9, 4], // 城堡5
  [11,3], // 城堡6
  [13,5], // 城堡7
  [15,2], // 城堡8 - high peak
  [18,3], // 城堡9 - final (rightmost)
];

// Iso projection: 45° angle, right-pointing x, down-right y
function iso(col, row, elev) {
  // Staggered isometric: each col shifts right+down, each row shifts right-down
  var sx = (col - row) * TW/2;
  var sy = (col + row) * TH/2 - (elev||0) * TILE_DEPTH;
  return {x: sx, y: sy};
}

// Map canvas size
var MAP_W = (WORLD_COLS + WORLD_ROWS) * TW/2 + 200;
var MAP_H = (WORLD_COLS + WORLD_ROWS) * TH/2 + 400;

// Elevation map for terrain variety
var ELEV_MAP={};
function setElev(c,r,e){ELEV_MAP[c+','+r]=e;}
function getElev(c,r){return ELEV_MAP[c+','+r]||0;}

// Initialize elevations around castle positions
function initElevMap(){
  CPOS_G.forEach(function(pos,i){
    var c=pos[0],r=pos[1];
    var baseElev=[1,1,1,2,1,2,1,3,2][i];
    // Set castle area to elevated
    for(var dc=-2;dc<=2;dc++)for(var dr=-2;dr<=2;dr++){
      var d=Math.abs(dc)+Math.abs(dr);
      var e=Math.max(0,baseElev-Math.floor(d/2));
      var key=(c+dc)+','+(r+dr);
      if(!ELEV_MAP[key]||ELEV_MAP[key]<e)ELEV_MAP[key]=e;
    }
  });
  // Path elevation gradient
  for(var i=0;i<CPOS_G.length-1;i++){
    var p0=CPOS_G[i],p1=CPOS_G[i+1];
    var steps=Math.max(Math.abs(p1[0]-p0[0]),Math.abs(p1[1]-p0[1]))*3;
    for(var t=0;t<=steps;t++){
      var gc=Math.round(p0[0]+(p1[0]-p0[0])*t/steps);
      var gr=Math.round(p0[1]+(p1[1]-p0[1])*t/steps);
      var e=Math.round(getElev(p0[0],p0[1])+(getElev(p1[0],p1[1])-getElev(p0[0],p0[1]))*t/steps);
      var key=gc+','+gr;
      if(!ELEV_MAP[key])ELEV_MAP[key]=e;
    }
  }
}

// ── Draw isometric tile ──
function drawTile(ctx, col, row, elev, topCol, leftCol, rightCol, depth) {
  var p = iso(col, row, elev);
  var x=p.x, y=p.y, hw=TW/2, hh=TH/2, d=depth||TILE_DEPTH;
  // Top face
  ctx.beginPath();
  ctx.moveTo(x, y-hh); ctx.lineTo(x+hw, y); ctx.lineTo(x, y+hh); ctx.lineTo(x-hw, y);
  ctx.closePath(); ctx.fillStyle=topCol; ctx.fill();
  // Left wall
  ctx.beginPath();
  ctx.moveTo(x-hw, y); ctx.lineTo(x, y+hh); ctx.lineTo(x, y+hh+d); ctx.lineTo(x-hw, y+d);
  ctx.closePath(); ctx.fillStyle=leftCol; ctx.fill();
  // Right wall
  ctx.beginPath();
  ctx.moveTo(x, y+hh); ctx.lineTo(x+hw, y); ctx.lineTo(x+hw, y+d); ctx.lineTo(x, y+hh+d);
  ctx.closePath(); ctx.fillStyle=rightCol; ctx.fill();
  // Edges
  ctx.strokeStyle='rgba(0,0,0,.2)'; ctx.lineWidth=.5;
  ctx.beginPath(); ctx.moveTo(x,y-hh); ctx.lineTo(x+hw,y); ctx.lineTo(x,y+hh); ctx.lineTo(x-hw,y); ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-hw,y+d); ctx.lineTo(x-hw,y); ctx.moveTo(x,y+hh+d); ctx.lineTo(x,y+hh); ctx.moveTo(x+hw,y+d); ctx.lineTo(x+hw,y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-hw,y+d); ctx.lineTo(x,y+hh+d); ctx.lineTo(x+hw,y+d); ctx.stroke();
}

// ── Tile color by type ──
function tileColor(col, row) {
  // Zone-based colors
  for(var i=0;i<CPOS_G.length;i++){
    var p=CPOS_G[i];
    var d=Math.abs(col-p[0])+Math.abs(row-p[1]);
    if(d<=2){
      var zoneColors=[
        ['#2d4a20','#1e3414','#162610'], // 1 forest
        ['#4a3810','#342808','#261c06'], // 2 golden
        ['#1a3a28','#102a1c','#081e12'], // 3 teal
        ['#280e40','#1c0830','#100520'], // 4 purple
        ['#3a2810','#2a1c08','#1e1204'], // 5 amber
        ['#082030','#051828','#03101c'], // 6 blue
        ['#280808','#1c0606','#100404'], // 7 red
        ['#160830','#0e0520','#06030e'], // 8 deep purple
        ['#302200','#221800','#180e00'], // 9 gold
      ][i];
      return zoneColors;
    }
  }
  // Default ground
  var h = Math.sin(col*1.3+row*2.1)*0.5+0.5;
  var e = getElev(col,row);
  if(e>=3) return ['#9ea8b0','#6e7880','#4e5860']; // snow/rock
  if(e>=2) return ['#556640','#384430','#283020']; // highland
  if(h>0.7) return ['#2a4820','#1c3214','#14220c']; // dark forest
  return ['#1e3a18','#142810','#0c1c08']; // default green
}

// ── Draw the map ──
function drawIsometricMap(canvas, unlockedCount) {
  var W=MAP_W, H=MAP_H;
  canvas.width=W; canvas.height=H;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  // Offset so whole map is visible
  ctx.save();
  ctx.translate(WORLD_ROWS*TW/2 + 50, WORLD_ROWS*TH/2 + 150);

  // Sky gradient
  ctx.restore();
  var sky=ctx.createLinearGradient(0,0,0,H*0.45);
  sky.addColorStop(0,'#050220'); sky.addColorStop(1,'#0a0840');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*0.45);
  // Lower ground bg
  ctx.fillStyle='#04100a'; ctx.fillRect(0,H*0.4,W,H*0.6);
  ctx.save();
  ctx.translate(WORLD_ROWS*TW/2 + 50, WORLD_ROWS*TH/2 + 150);

  // Stars
  ctx.restore();
  var rng=function(s){var x=Math.sin(s+1)*43758.5;return x-Math.floor(x);};
  for(var i=0;i<120;i++){
    var sx=rng(i*2)*W, sy=rng(i*2+1)*(H*0.38);
    var sr=rng(i*3)<.15?1.5:rng(i*3)<.4?1:.5;
    ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2);
    ctx.fillStyle='rgba(200,180,255,'+(0.3+rng(i*5)*0.5)+')'; ctx.fill();
  }
  ctx.save();
  ctx.translate(WORLD_ROWS*TW/2 + 50, WORLD_ROWS*TH/2 + 150);

  // Draw tiles back-to-front (painter's algorithm: high col+row first for proper overlap)
  // Sort order: col+row descending
  var tiles=[];
  for(var r=WORLD_ROWS-1;r>=0;r--){
    for(var c=WORLD_COLS-1;c>=0;c--){
      tiles.push([c,r]);
    }
  }

  tiles.forEach(function(t){
    var c=t[0],r=t[1],e=getElev(c,r);
    var colors=tileColor(c,r);
    drawTile(ctx,c,r,e,colors[0],colors[1],colors[2]);
    // Draw intermediate elevation tiles as walls only
    for(var el=0;el<e;el++){
      var cc=colors;
      ctx.beginPath();
      var p=iso(c,r,el);
      var x=p.x,y=p.y,hw=TW/2,hh=TH/2,d=TILE_DEPTH;
      ctx.moveTo(x-hw,y+hh+d); ctx.lineTo(x-hw,y+hh+d-TILE_DEPTH);
      ctx.lineTo(x,y+2*hh+d-TILE_DEPTH); ctx.lineTo(x,y+2*hh+d);
      ctx.closePath(); ctx.fillStyle=cc[1]; ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x,y+2*hh+d); ctx.lineTo(x,y+2*hh+d-TILE_DEPTH);
      ctx.lineTo(x+hw,y+hh+d-TILE_DEPTH); ctx.lineTo(x+hw,y+hh+d);
      ctx.closePath(); ctx.fillStyle=cc[2]; ctx.fill();
    }
  });

  // ── Draw path between castles ──
  for(var i=0;i<CPOS_G.length-1;i++){
    var p0=CPOS_G[i],p1=CPOS_G[i+1];
    var isDone=i<unlockedCount;
    var steps=Math.max(Math.abs(p1[0]-p0[0]),Math.abs(p1[1]-p0[1]))*4;
    for(var t=0;t<=steps;t++){
      var gc=Math.round(p0[0]+(p1[0]-p0[0])*t/steps);
      var gr=Math.round(p0[1]+(p1[1]-p0[1])*t/steps);
      var ge=getElev(gc,gr);
      var pp=iso(gc,gr,ge+0.08);
      var rpw=TW*0.55,rph=TH*0.55;
      // Road tile
      ctx.beginPath();
      ctx.moveTo(pp.x,pp.y-rph/2); ctx.lineTo(pp.x+rpw/2,pp.y); ctx.lineTo(pp.x,pp.y+rph/2); ctx.lineTo(pp.x-rpw/2,pp.y);
      ctx.closePath();
      ctx.fillStyle=isDone?'rgba(180,140,60,.75)':'rgba(80,70,50,.4)'; ctx.fill();
    }
  }

  // ── Trees ──
  function drawTree(ctx,c,r,e){
    var p=iso(c,r,e+0.1);
    // Trunk
    ctx.fillStyle='#4a2c10';
    ctx.fillRect(p.x-3,p.y-8,6,20);
    // 3 layers of foliage
    var gc=ctx.createRadialGradient(p.x,p.y-20,0,p.x,p.y-20,28);
    gc.addColorStop(0,'#3a6428'); gc.addColorStop(1,'rgba(20,40,15,0)');
    ctx.beginPath(); ctx.arc(p.x,p.y-20,22,0,Math.PI*2); ctx.fillStyle=gc; ctx.fill();
    gc=ctx.createRadialGradient(p.x,p.y-30,0,p.x,p.y-30,18);
    gc.addColorStop(0,'#4a8030'); gc.addColorStop(1,'rgba(20,40,15,0)');
    ctx.beginPath(); ctx.arc(p.x,p.y-30,16,0,Math.PI*2); ctx.fillStyle=gc; ctx.fill();
  }

  var treeCells=[[0,6],[2,5],[2,7],[4,6],[6,6],[8,5],[8,7],[10,6],[12,4],[12,6],[14,4],[16,5],[17,4],[19,5]];
  treeCells.forEach(function(t){
    var e2=getElev(t[0],t[1]);
    drawTree(ctx,t[0],t[1],e2);
  });

  ctx.restore();
}

// ── Render castle HTML overlay nodes ──
function renderCastles(hi) {
  var layer=document.getElementById('castleLayer');
  layer.innerHTML='';
  var ox=WORLD_ROWS*TW/2+50, oy=WORLD_ROWS*TH/2+150;

  C.forEach(function(c,idx){
    var done=getDone(c)>=c.tot;
    var unlocked=idx===0||(getDone(C[idx-1])>=C[idx-1].tot);
    var pos=CPOS_G[idx];
    var elev=getElev(pos[0],pos[1]);
    var p=iso(pos[0],pos[1],elev);
    var sx=p.x+ox, sy=p.y+oy;
    var pct=Math.round(getDone(c)/c.tot*100);
    var stars=done?'⭐⭐⭐':getDone(c)>0?(getDone(c)>=Math.ceil(c.tot*.6)?'⭐⭐☆':'⭐☆☆'):'☆☆☆';

    var div=document.createElement('div');
    div.className='cnode'+(done?' done':unlocked?' unlocked':' locked');
    div.style.cssText='left:'+sx+'px;top:'+(sy-TILE_DEPTH*(elev+1))+'px;--cc:'+c.col;
    div.innerHTML='<div class="cnode-inner"><div class="cnode-badge">'+
      '<span class="cn-em">'+c.em+'</span>'+
      '<div class="cn-name">'+c.name+'</div>'+
      '<div class="cn-num">城堡 '+c.id+'</div>'+
      (unlocked&&!done?'<div class="cn-pct">'+pct+'%</div>':'')+
      '<div class="cn-stars">'+stars+'</div>'+
      (unlocked?'<div class="cn-tap">點擊進入</div>':'<div class="cn-tap">🔒 未解鎖</div>')+
    '</div></div>';

    if(unlocked){
      div.addEventListener('click',function(id){return function(){location.href='opengl-tower'+id+'.html';};}(c.id));
    }
    layer.appendChild(div);
  });
}

// ── HUD update ──
function updateHUD(xp,lv,eq){
  var base=player.stats||{atk:8,def:6,int:10,spd:8};
  var tot=Object.assign({},base);
  Object.values(eq).forEach(function(it){if(it&&it.bonus)Object.keys(it.bonus).forEach(function(k){if(tot[k]!==undefined)tot[k]+=it.bonus[k];});});
  var xpNext=LX[Math.min(lv,LX.length-1)]||9999,xpPrev=LX[Math.max(lv-1,0)]||0;
  var xpPct=Math.min(100,Math.round((xp-xpPrev)/Math.max(1,xpNext-xpPrev)*100));
  document.getElementById('hudN').textContent=player.name;
  document.getElementById('hudLv').textContent='Lv.'+lv;
  document.getElementById('hudTtl').textContent=getTitle(lv);
  document.getElementById('hpB').style.width=Math.round(player.hp/player.hpMax*100)+'%';
  document.getElementById('hpT').textContent=player.hp+'/'+player.hpMax;
  document.getElementById('xpB').style.width=xpPct+'%';
  document.getElementById('xpT').textContent=xp+'/'+xpNext;
  document.getElementById('spSum').textContent='ATK '+tot.atk+'  INT '+tot.int+'  DEF '+tot.def+'  SPD '+tot.spd;
  var slots=[['weapon','武器'],['armor','防具'],['hat','頭盔'],['accessory','飾品']];
  document.getElementById('eqg').innerHTML=slots.map(function(s){var it=eq[s[0]];return it?'<div class="eq fl"><div class="eq-ic">'+it.icon+'</div><div class="eq-nm">'+it.name+'</div><div class="eq-st">'+it.stat+'</div></div>':'<div class="eq"><div class="eq-em">'+s[1]+'</div></div>';}).join('');
  document.getElementById('fsg').innerHTML=[['ATK',tot.atk,'#f87171'],['DEF',tot.def,'#60a5fa'],['INT',tot.int,'#c084fc'],['SPD',tot.spd,'#34d399']].map(function(x){return '<div class="fs"><div class="fsv" style="color:'+x[2]+'">'+x[1]+'</div><div class="fsl">'+x[0]+'</div></div>';}).join('');
  var clsEmoji={mage:'🧙',warrior:'⚔️',archer:'🏹'};
  var em=clsEmoji[player.class||'mage']||'🧙';
  document.getElementById('hudAv').textContent=em;
  document.getElementById('ppEm').textContent=em;
}

// ── Pan & zoom ──
var panX=0,panY=0,sc=1,lx=0,ly=0,drag=false,lastDist=0;
var outer=document.getElementById('outer');
var stage=document.getElementById('stage');

function applyT(){stage.style.transform='translate('+panX+'px,'+panY+'px) scale('+sc+')';}
function clamp(){
  var vw=window.innerWidth,vh=window.innerHeight-60;
  var mw=MAP_W*sc,mh=MAP_H*sc;
  panX=Math.min(0,Math.max(panX,vw-mw));
  panY=Math.min(80,Math.max(panY,vh-mh));
}
function scrollToISO(col,row,elev){
  var p=iso(col,row,elev);
  var sx=p.x+WORLD_ROWS*TW/2+50, sy=p.y+WORLD_ROWS*TH/2+150;
  var vw=window.innerWidth,vh=window.innerHeight-60;
  panX=vw/2-sx*sc; panY=vh/2-sy*sc; clamp(); applyT();
}

outer.addEventListener('touchstart',function(e){
  if(e.touches.length===1){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
  else if(e.touches.length===2){lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
},{passive:true});
outer.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(e.touches.length===1&&drag){panX+=e.touches[0].clientX-lx;panY+=e.touches[0].clientY-ly;lx=e.touches[0].clientX;ly=e.touches[0].clientY;clamp();applyT();}
  if(e.touches.length===2){
    var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    var ns=Math.min(2.5,Math.max(0.3,sc*d/lastDist));
    var cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    panX=cx-(cx-panX)*ns/sc; panY=cy-(cy-panY)*ns/sc; sc=ns; lastDist=d; clamp(); applyT();
  }
},{passive:false});
outer.addEventListener('touchend',function(){drag=false;});
outer.addEventListener('mousedown',function(e){drag=true;lx=e.clientX;ly=e.clientY;});
outer.addEventListener('mousemove',function(e){if(!drag)return;panX+=e.clientX-lx;panY+=e.clientY-ly;lx=e.clientX;ly=e.clientY;clamp();applyT();});
outer.addEventListener('mouseup',function(){drag=false;});
outer.addEventListener('wheel',function(e){e.preventDefault();var ns=Math.min(2.5,Math.max(0.3,sc*Math.exp(-e.deltaY*.001)));panX=e.clientX-(e.clientX-panX)*ns/sc;panY=e.clientY-(e.clientY-panY)*ns/sc;sc=ns;clamp();applyT();},{passive:false});

var player=null;

function init(){
  var raw=localStorage.getItem('player_data');
  if(!raw){location.href='character.html';return;}
  player=JSON.parse(raw);

  initElevMap();

  var xp=getTotalXP(),lv=getLevel(xp),eq=getEq();
  updateHUD(xp,lv,eq);

  // Find current castle
  var hi=0;
  C.forEach(function(c,i){
    if(getDone(c)>0)hi=i;
    if(getDone(c)>=c.tot&&i+1<C.length)hi=i+1;
  });
  hi=Math.min(hi,C.length-1);

  // Draw map
  try{
    drawIsometricMap(document.getElementById('mapCanvas'),hi);
  }catch(e){
    console.error('Map draw error:',e);
  }

  renderCastles(hi);

  // Position player pin
  var pp=document.getElementById('pp');
  var ppos=CPOS_G[hi], pelev=getElev(ppos[0],ppos[1]);
  var piso=iso(ppos[0],ppos[1],pelev);
  var ox=WORLD_ROWS*TW/2+50, oy=WORLD_ROWS*TH/2+150;
  pp.style.left=(piso.x+ox)+'px';
  pp.style.top=(piso.y+oy-TILE_DEPTH*(pelev+1)-10)+'px';

  // Initial scroll to player, show most of horizontal map
  setTimeout(function(){
    var vw=window.innerWidth,vh=window.innerHeight-60;
    sc=Math.max(0.45,Math.min(vw/MAP_W*0.9,0.9));
    scrollToISO(ppos[0],ppos[1],pelev);

    // Level up check
    var prevLv=player.level||1;
    if(lv>prevLv){
      player.level=lv; localStorage.setItem('player_data',JSON.stringify(player));
      setTimeout(function(){
        var t=document.getElementById('lut');
        t.textContent='🎉 升到 Lv.'+lv+'！稱號：'+getTitle(lv);
        t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},3000);
      },800);
    }
  },60);

  // Hash routing from castle completion
  if(location.hash&&location.hash.indexOf('#done-')===0){
    var cid=parseInt(location.hash.replace('#done-',''));
    var ni=Math.min(cid,C.length-1);
    setTimeout(function(){
      var npos=CPOS_G[ni],ne=getElev(npos[0],npos[1]);
      var niso=iso(npos[0],npos[1],ne);
      pp.style.left=(niso.x+ox)+'px';
      pp.style.top=(niso.y+oy-TILE_DEPTH*(ne+1)-10)+'px';
      setTimeout(function(){scrollToISO(npos[0],npos[1],ne);},300);
    },500);
    history.replaceState(null,'',location.pathname);
  }
}

window.addEventListener('resize',function(){clamp();applyT();});
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}
</script>
