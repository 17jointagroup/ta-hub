<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 像素王國 — 圖形學種子課程</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
html{font-size:20px;}
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef5d8;--bg2:#e2edc4;--card:#f0ead4;--border:#8bc34a;
  --acc:#c8440a;--acc2:#e8c84a;--acc3:#5a9e40;--acc4:#2d5a1b;
  --txt:#1e3a0e;--txt2:#4a7230;--mono:"Space Mono",monospace;--font:"Fredoka One","Nunito",-apple-system,sans-serif;
  --glow:0 0 18px rgba(138,195,74,.4);
}
body{background:var(--bg);color:var(--txt);font-family:var(--font);overflow-x:hidden;min-height:100vh;padding-bottom:120px}
header{position:sticky;top:0;z-index:100;background:rgba(245,240,216,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px}
.back-btn{background:var(--card);border:1px solid var(--border);color:#4a7230;padding:6px 14px;border-radius:100px;font-family:var(--font);font-size:.8rem;font-weight:800;cursor:pointer;text-decoration:none;transition:.2s}
.back-btn:hover{color:var(--acc2);border-color:var(--acc2)}
.header-title{font-size:1.1rem;font-weight:900;color:var(--acc)}
.xp-bar{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:.85rem;font-weight:800}
.xp-total{color:var(--acc3);font-family:var(--mono)}
.xp-track{width:120px;height:8px;background:var(--border);border-radius:100px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:100px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) var(--dl,0s) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
.hero{position:relative;z-index:1;text-align:center;padding:60px 24px 40px;overflow:hidden}
.tower-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(200,68,10,.12);border:1px solid rgba(200,68,10,.3);border-radius:100px;padding:6px 18px;font-size:.8rem;font-weight:800;color:var(--acc);margin-bottom:20px;letter-spacing:.05em}
.hero h1{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;line-height:1.1;margin-bottom:12px}
.hero h1 span{background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:#4a7230;font-size:1rem;max-width:500px;margin:0 auto 32px;line-height:1.7}
.stats-row{display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
.stat-chip{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 20px;text-align:center}
.stat-chip .num{font-size:1.5rem;font-weight:900;font-family:var(--mono);color:var(--acc3)}
.stat-chip .lbl{font-size:.7rem;color:#4a7230;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
.chapter-map{position:relative;z-index:1;padding:24px;max-width:1100px;margin:0 auto}
.lesson{background:var(--card);border:1px solid var(--border);border-radius:20px;margin-bottom:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s;cursor:pointer}
.lesson:hover{border-color:var(--acc);box-shadow:var(--glow)}
.lesson.active{border-color:var(--acc);box-shadow:var(--glow)}
.lesson.done{}
.lesson.locked{opacity:.5;cursor:not-allowed}
.lesson.boss{border-color:rgba(255,215,0,.3)}
.lesson.boss:hover,.lesson.boss.active{border-color:var(--acc3);box-shadow:0 0 22px rgba(255,215,0,.3)}
.lesson-header{display:flex;align-items:center;gap:14px;padding:16px 18px}
.lesson-num{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-family:var(--mono);font-size:.9rem;flex-shrink:0}
.done-num{background:var(--card);color:var(--acc2);border:1px solid var(--border)}
.active-num{background:rgba(200,68,10,.15);color:var(--acc);border:1px solid var(--acc)}
.locked-num{background:var(--border);color:#4a7230;border:1px solid transparent}
.lesson-info{flex:1;min-width:0}
.lesson-title{font-size:1rem;font-weight:900;margin-bottom:3px}
.lesson-desc{font-size:.8rem;color:#4a7230;font-weight:700}
.lesson-meta{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.xp-badge{background:rgba(255,163,67,.1);color:var(--acc4);border:1px solid rgba(255,163,67,.3);border-radius:100px;padding:3px 10px;font-size:.75rem;font-weight:800;font-family:var(--mono)}
.boss-badge{background:rgba(255,215,0,.1);color:var(--acc3);border:1px solid rgba(255,215,0,.3);border-radius:100px;padding:3px 10px;font-size:.72rem;font-weight:800}
.check{width:28px;height:28px;border-radius:50%;background:transparent;color:#4a7230;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.lesson-body{display:none;border-top:1px solid var(--border);padding:24px}
.lesson.active .lesson-body{display:block}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);border-radius:12px;padding:4px}
.tab{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:.8rem;font-weight:800;cursor:pointer;transition:.15s;color:#4a7230}
.tab.on{background:var(--card);color:var(--txt);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.tab-panel{display:none}.tab-panel.on{display:block}
.story-box{background:linear-gradient(135deg,rgba(200,68,10,.06),rgba(0,212,255,.04));border:1px solid rgba(200,68,10,.2);border-radius:16px;padding:20px;margin-bottom:16px;font-size:.9rem;line-height:1.8}
.hl{background:rgba(0,212,255,.15);color:var(--acc2);border-radius:4px;padding:1px 6px;font-weight:900}
.emoji-big{font-size:2.5rem;display:block;margin-bottom:10px}
.src-link{display:inline-flex;align-items:center;gap:6px;background:rgba(200,68,10,.08);border:1px solid rgba(200,68,10,.25);border-radius:8px;padding:4px 12px;font-size:.75rem;font-weight:800;color:var(--acc);margin-top:12px;text-decoration:none}
.code-block{background:#050710;border:1px solid var(--border);border-radius:12px;padding:16px;font-family:var(--mono);font-size:.75rem;line-height:1.7;overflow-x:auto;position:relative;margin-bottom:16px;white-space:pre}
.kw{color:#c8440a}.fn{color:#5a9e40}.str{color:#00f5c4}.num{color:#ffd93d}.cm{color:#4a5568}.tp{color:#c084fc}
.copy-btn{position:absolute;top:10px;right:10px;background:var(--card);border:1px solid var(--border);color:#4a7230;padding:4px 10px;border-radius:6px;font-family:var(--mono);font-size:.7rem;cursor:pointer;transition:.2s}
.copy-btn:hover{color:var(--acc2);border-color:var(--acc2)}
.demo-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px}
.demo-label{font-size:.75rem;font-weight:800;color:#4a7230;padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.demo-label::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 6px var(--acc);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
canvas{display:block;width:100%;max-width:100%}
.ctrl-row{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0}
.ctrl-btn{background:var(--card);border:1px solid var(--border);color:var(--txt);padding:8px 18px;border-radius:100px;font-family:var(--font);font-size:.8rem;font-weight:800;cursor:pointer;transition:.15s}
.ctrl-btn:hover,.ctrl-btn.on,.ctrl-btn.active{background:rgba(200,68,10,.12);border-color:var(--acc);color:var(--acc)}
.slider-row{display:flex;align-items:center;gap:12px;margin:8px 0}
.slider-row label{font-size:.8rem;font-weight:800;color:#4a7230;min-width:80px}
input[type=range]{flex:1;accent-color:var(--acc)}
.slider-val{font-family:var(--mono);font-size:.8rem;color:var(--acc3);min-width:40px}
.quiz-box{background:rgba(200,68,10,.05);border:1px solid rgba(200,68,10,.2);border-radius:16px;padding:20px;margin-bottom:16px}
.quiz-title{font-size:.85rem;font-weight:900;color:var(--acc);margin-bottom:10px}
.quiz-q{font-size:.88rem;line-height:1.7;color:#4a7230;margin-bottom:14px}
.opts{display:grid;gap:8px}
.opt{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;cursor:pointer;font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:10px;transition:.15s}
.opt:hover{border-color:var(--acc);background:rgba(200,68,10,.05)}
.opt.correct{border-color:var(--acc2);background:rgba(0,212,255,.06);color:var(--acc2)}
.opt.wrong{border-color:var(--acc);background:rgba(200,68,10,.06);color:var(--acc)}
.opt-key{width:24px;height:24px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900;flex-shrink:0}
.complete-btn{width:100%;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#07080f;border:none;border-radius:100px;padding:14px;font-family:var(--font);font-size:.95rem;font-weight:900;cursor:pointer;margin-top:16px;transition:.2s}
.complete-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,68,10,.35)}
.complete-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.connector{width:2px;height:12px;background:linear-gradient(var(--acc),transparent);margin:0 auto -2px;position:relative;z-index:1}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(200px);background:var(--card);border:1px solid var(--acc2);border-radius:100px;padding:12px 28px;font-weight:800;font-size:.9rem;color:var(--acc2);z-index:999;transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .4s ease;box-shadow:0 8px 32px rgba(0,212,255,.2);opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.xp-pop{position:fixed;font-family:var(--mono);font-weight:900;font-size:1.2rem;color:var(--acc3);pointer-events:none;z-index:9999;animation:xpFloat 1.2s ease forwards}
@keyframes xpFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
.comp-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(4,2,14,.9);backdrop-filter:blur(18px);flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px}
.comp-overlay.show{display:flex;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.comp-trophy{font-size:5rem;margin-bottom:16px;animation:bounce 1s ease infinite alternate}
@keyframes bounce{from{transform:scale(1)}to{transform:scale(1.1)}}
.comp-stars{font-size:2rem;margin-bottom:16px}
.comp-title{font-size:2rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--acc),var(--acc3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.comp-sub{color:#4a7230;margin-bottom:32px}
.comp-next-btn{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#050210;border:none;border-radius:100px;padding:14px 32px;font-family:var(--font);font-size:1rem;font-weight:900;cursor:pointer;margin-bottom:12px;box-shadow:0 6px 28px rgba(200,68,10,.4)}
.comp-map-btn{background:transparent;border:1.5px solid rgba(255,255,255,.2);color:#4a7230;border-radius:100px;padding:10px 24px;font-family:var(--font);font-size:.85rem;font-weight:800;cursor:pointer}
.fw-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.fw{position:absolute;border-radius:50%;animation:fw var(--d,.8s) var(--dl,0s) ease-out forwards}
@keyframes fw{0%{opacity:1;transform:translate(0,0)}100%{opacity:0;transform:translate(var(--tx,0),var(--ty,-100px))}}
@media(max-width:600px){.stats-row{gap:12px}.stat-chip .num{font-size:1.2rem}.hero h1{font-size:1.8rem}}
</style>
<style>body{font-weight:400;letter-spacing:.02em}.lesson-num{background:#e4ddb8!important}.lesson{background:#f0ead4!important}.lesson-title{font-weight:400!important;letter-spacing:.02em!important}.lesson-desc{font-weight:500!important}header{font-weight:600!important}</style>


<style>
/* Seed version overrides - bigger, friendlier */
.hero h1{font-size:2.2rem;font-weight:900;letter-spacing:-.01em}
.tower-badge{font-size:.95rem;padding:8px 18px}
.lesson-card{border-radius:16px}
.lesson-icon{font-size:1.5rem}
.lesson-title{font-size:1.08rem;font-weight:700;letter-spacing:.01em}
.fq-opt{font-size:1rem;padding:12px 16px;border-radius:12px}
.emoji-big{font-size:2.5rem;display:block;text-align:center;margin-bottom:12px}
</style>

<body>
<div class="stars" id="stars"></div>
<header>
  <a href="index.html" class="back-btn">🏠 首頁</a>
  <span class="header-title" style="color:#2d5a1b">🌱 像素王國</span>
  <div class="xp-bar"><span style="color:#4a7230">⭐</span><div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div><span class="xp-total" id="xp-total">0 / 730</span></div>
</header>
<section class="hero">
  <div class="tower-badge" style="background:rgba(107,203,119,.12);border-color:rgba(107,203,119,.35);color:#4aba57">🌱 像素王國 · 給小朋友的圖形學</div>
  <h1>遊戲畫面是<br><span style="background:linear-gradient(135deg,#3d7a28,#8bc34a);-webkit-background-clip:text;-webkit-text-fill-color:transparent">怎麼做的？</span></h1>
  <p>用手電筒、積木、魔法咒語來認識電腦圖形！不需要任何基礎，一起探索遊戲背後的秘密！</p>
  <div class="stats-row">
    <div class="stat-chip"><div class="num" id="done-count">0</div><div class="lbl">已解鎖</div></div>
    <div class="stat-chip"><div class="num">10</div><div class="lbl">關卡</div></div>
    <div class="stat-chip"><div class="num">730</div><div class="lbl">星星數</div></div>
    <div class="stat-chip"><div class="num">🎆</div><div class="lbl">Boss：煙火</div></div>
  </div>
</section>
<div class="chapter-map"><div id="lesson-list"></div></div>
<div class="toast" id="toast"></div>
<script>
(function(){const s=document.getElementById("stars");for(let i=0;i<60;i++){const d=document.createElement("div");d.className="star";d.style.cssText="left:"+Math.random()*100+"%;top:"+Math.random()*100+"%;--d:"+(2+Math.random()*4)+"s;--dl:"+Math.random()*4+"s";s.appendChild(d);}})();
const CASTLE_KEY="seed_done",CASTLE_TOTAL=10,CASTLE_NUM=0,NEXT_CASTLE=0;
let earned=JSON.parse(localStorage.getItem(CASTLE_KEY)||"[]");
let currentLesson=null;
const demoInited={};
const LESSONS=[
  {id:"s1",num:"1-1",icon:"🎨",title:"畫面是由什麼組成的？",desc:"像素、馬賽克拼圖、螢幕的秘密",xp:60,type:"normal",q:"螢幕上的每一個小格子叫做什麼？",opts:["馬賽克","像素","貼圖","點點"],ans:1,src:"opengl-intro",story:`<span class="emoji-big">🔍</span>你有沒有把臉貼近電視螢幕，看到一個個小格子？<br><br>那些小格子就叫做 <span class="hl">像素</span>（pixel）！<br><br>每個像素都是一個小小的彩色燈泡🔦<br>把成千上萬個像素排在一起，就變成了一張完整的畫面！<br><br>🖥️ 普通螢幕有 <span class="hl">約 200 萬個</span>像素<br>📱 手機螢幕有 <span class="hl">約 400 萬個</span>像素<br><br>電腦在每一秒鐘，要告訴所有像素「你要亮什麼顏色」——<br>這就是遊戲圖形的魔法！`,code:`<span class="cm">// 每個像素就是一個小格子</span>
<span class="cm">// 這個格子在座標 (3, 2) 的位置</span>
<span class="tp">pixel</span>[<span class="num">3</span>][<span class="num">2</span>] = <span class="str">紅色</span>;

<span class="cm">// 把很多格子排在一起</span>
<span class="cm">// 就組成了一張圖片！</span>
<span class="tp">螢幕</span> = <span class="fn">排列</span>(所有像素);
<span class="cm">// 一個全螢幕 HD 畫面</span>
<span class="cm">// = 1920 × 1080 = 約200萬個像素</span>`},
  {id:"s2",num:"1-2",icon:"🌈",title:"顏色是怎麼調出來的？",desc:"紅綠藍三原色、RGB、混色魔法",xp:60,type:"normal",q:"電腦的顏色是由哪三種顏色混合出來的？",opts:["紅黃藍","紅綠藍","白黑灰","橙紫綠"],ans:1,src:"opengl-color",story:`<span class="emoji-big">🌈</span>電腦的顏色有個超酷的秘密！<br><br>它只用 <span class="hl">三種顏色</span> 就能做出所有顏色：<br><br>🔴 <span class="hl">紅色（Red）</span><br>🟢 <span class="hl">綠色（Green）</span><br>🔵 <span class="hl">藍色（Blue）</span><br><br>就像用三支手電筒照在同一個地方：<br>🔴+🟢 = 黃色！<br>🔴+🔵 = 粉紅紫！<br>🟢+🔵 = 青色！<br>🔴+🟢+🔵 全部加在一起 = <span class="hl">白色</span>！<br><br>這就叫 <span class="hl">RGB</span>，每個顏色可以有 0~255 的強度`,code:`<span class="cm">// 用 RGB 描述顏色</span>
<span class="tp">紅色</span> = RGB(<span class="num">255</span>, <span class="num">0</span>, <span class="num">0</span>);
<span class="tp">綠色</span> = RGB(<span class="num">0</span>, <span class="num">255</span>, <span class="num">0</span>);
<span class="tp">藍色</span> = RGB(<span class="num">0</span>, <span class="num">0</span>, <span class="num">255</span>);
<span class="tp">黃色</span> = RGB(<span class="num">255</span>, <span class="num">255</span>, <span class="num">0</span>);
<span class="tp">白色</span> = RGB(<span class="num">255</span>, <span class="num">255</span>, <span class="num">255</span>);
<span class="tp">黑色</span> = RGB(<span class="num">0</span>, <span class="num">0</span>, <span class="num">0</span>);
<span class="cm">// 試試看！</span>`},
  {id:"s3",num:"1-3",icon:"📐",title:"電腦怎麼畫三角形？",desc:"頂點、連線、所有形狀的基礎",xp:60,type:"normal",q:"電腦畫出所有形狀的最基本積木是什麼？",opts:["圓形","正方形","三角形","線段"],ans:2,src:"opengl-triangle",story:`<span class="emoji-big">📐</span>遊戲裡的所有東西——龍、城堡、汽車——<br>其實都是由 <span class="hl">超多三角形</span> 拼起來的！<br><br>為什麼是三角形？<br>因為三角形是 <span class="hl">最穩定的形狀</span>，電腦很容易計算！<br><br>畫三角形很簡單：<br>1️⃣ 在地圖上放三個點（叫做<span class="hl">頂點</span>）<br>2️⃣ 把三個點連起來<br>3️⃣ 在裡面塗上顏色<br><br>🎮 一個遊戲角色大約由 <span class="hl">幾千到幾百萬</span> 個三角形組成！`,code:`<span class="cm">// 三個頂點的座標</span>
<span class="tp">頂點A</span> = (x:<span class="num">0.0</span>, y:<span class="num">0.5</span>);  <span class="cm">// 最上面</span>
<span class="tp">頂點B</span> = (x:-<span class="num">0.5</span>, y:-<span class="num">0.5</span>); <span class="cm">// 左下</span>
<span class="tp">頂點C</span> = (x:<span class="num">0.5</span>, y:-<span class="num">0.5</span>);  <span class="cm">// 右下</span>

<span class="cm">// 連起來就是三角形！</span>

function makeSphere(r){const v=[];const ST=28,SL=36;function pv(la,lo){const x=Math.cos(la)*Math.cos(lo),y=Math.sin(la),z=Math.cos(la)*Math.sin(lo);v.push(x*r,y*r,z*r,x,y,z);}for(let si=0;si<ST;si++){const la0=(si/ST-.5)*Math.PI,la1=((si+1)/ST-.5)*Math.PI;for(let li=0;li<SL;li++){const lo0=li/SL*Math.PI*2,lo1=(li+1)/SL*Math.PI*2;pv(la0,lo0);pv(la1,lo0);pv(la1,lo1);pv(la0,lo0);pv(la1,lo1);pv(la0,lo1);}}return new Float32Array(v);}
function syncCV(cv,h){const w=cv.clientWidth||600;if(cv.width!==w||cv.height!==h){cv.width=w;cv.height=h;cv.style.height=h+"px";}return w/h;}
function updateXP(){
  const tot=earned.reduce((s,id)=>{const l=LESSONS.find(x=>x.id===id);return s+(l?l.xp:0);},0);
  const mx=LESSONS.reduce((s,l)=>s+l.xp,0);
  document.getElementById("xp-fill").style.width=(tot/mx*100)+"%";
  document.getElementById("xp-total").textContent=tot+" / "+mx;
  document.getElementById("done-count").textContent=earned.length;
}

function renderLessons(){
  const list=document.getElementById("lesson-list");
  list.innerHTML="";
  LESSONS.forEach((lesson,idx)=>{
    const isDone=earned.includes(lesson.id);
    const isActive=currentLesson===lesson.id;
    const isLocked=idx>0&&!earned.includes(LESSONS[idx-1].id)&&!isDone&&!isActive;
    const div=document.createElement("div");
    div.className="lesson"+(isDone?" done":"")+(isActive?" active":"")+(isLocked?" locked":"")+(lesson.type==="boss"?" boss":"");
    div.id="lesson-"+lesson.id;
    const numCls=isDone?"done-num":isActive?"active-num":"locked-num";
    const metaHTML=lesson.type==="boss"
      ?'<span class="boss-badge">👑 BOSS</span><span class="xp-badge">+'+lesson.xp+' XP</span>'
      :'<span class="xp-badge">+'+lesson.xp+' XP</span>';
    const checkHTML=isDone?'<div class="check">✓</div>':(isLocked?'<div class="check" style="color:#4a7230">🔒</div>':"");
    div.innerHTML='<div class="lesson-header"><div class="lesson-num '+numCls+'">'+(isDone?"✓":lesson.icon)+'</div><div class="lesson-info"><div class="lesson-title">'+lesson.num+" "+lesson.title+'</div><div class="lesson-desc">'+lesson.desc+'</div></div><div class="lesson-meta">'+metaHTML+checkHTML+'</div></div>'+(isActive?'<div class="lesson-body">'+buildBody(lesson,isDone)+'</div>':'<div class="lesson-body"></div>');
    if(!isLocked)div.querySelector(".lesson-header").addEventListener("click",()=>toggleLesson(lesson.id));
    if(idx<LESSONS.length-1){const conn=document.createElement("div");conn.className="connector";list.appendChild(div);list.appendChild(conn);}
    else list.appendChild(div);
  });
}

function toggleLesson(id){
  currentLesson=(currentLesson===id)?null:id;
  renderLessons();
  if(currentLesson){
    setTimeout(()=>{
      const el=document.getElementById("lesson-"+id);
      if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
      initDemo(id);
    },50);
  }
}

function buildBody(lesson,isDone){
  const opts=lesson.opts.map((o,i)=>'<div class="opt" id="opt-'+lesson.id+"-"+i+'" onclick="checkAns(\''+lesson.id+"\',"+i+')"><div class="opt-key">'+["A","B","C","D"][i]+"</div>"+o+"</div>").join("");
  return '<div class="tabs"><div class="tab on" onclick="switchTab(this,\'story-'+lesson.id+"\',\'"+lesson.id+'\')">📖 概念</div><div class="tab" onclick="switchTab(this,\'demo-'+lesson.id+"\',\'"+lesson.id+'\')">🎮 互動</div><div class="tab" onclick="switchTab(this,\'code-'+lesson.id+"\',\'"+lesson.id+'\')">💻 GLSL</div></div><div id="story-'+lesson.id+'" class="tab-panel on"><div class="story-box">'+lesson.story+'</div><div class="quiz-box" style="margin-top:16px"><div class="quiz-title">🎯 理解測驗</div><div class="quiz-q">'+lesson.q+'</div><div class="opts">'+opts+'</div><div id="ex-'+lesson.id+'" style="display:none;margin-top:12px;padding:12px;background:rgba(90,158,64,.08);border:1px solid rgba(90,158,64,.3);border-radius:10px;font-size:.85rem;color:#4a7230"></div></div>'+(isDone?'<button class="complete-btn" disabled style="background:var(--border);color:#4a7230">✅ 已完成！</button>':'<button class="complete-btn" id="btn-'+lesson.id+'" onclick="completeL(\''+lesson.id+'\')" disabled>完成測驗後解鎖 →</button>')+'</div><div id="demo-'+lesson.id+'" class="tab-panel"><div id="dc-'+lesson.id+'"><div style="text-align:center;padding:40px;color:#4a7230">點互動載入 Demo…</div></div></div><div id="code-'+lesson.id+'" class="tab-panel"><div class="code-block"><button class="copy-btn" onclick="copyC(this)">複製</button>'+lesson.code+'</div></div>';
}

function switchTab(tabEl,panelId,lessonId){
  const body=document.getElementById("lesson-"+lessonId).querySelector(".lesson-body");
  body.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  body.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("on"));
  tabEl.classList.add("on");document.getElementById(panelId).classList.add("on");
  if(panelId.startsWith("demo-"))initDemo(lessonId);
}

function checkAns(lessonId,idx){
  const lesson=LESSONS.find(l=>l.id===lessonId);
  // Only mark the clicked option — no answer reveal
  document.querySelectorAll('[id^="opt-'+lessonId+'-"]').forEach((o,i)=>{
    o.classList.remove("correct","wrong");
    if(i===idx){
      o.classList.add(idx===lesson.ans?"correct":"wrong");
    }
  });
  const ex=document.getElementById("ex-"+lessonId);
  if(ex){
    ex.style.display="block";
    ex.textContent=idx===lesson.ans?"✅ 正確！":"❌ 答錯了，再試試看！";
  }
  const btn=document.getElementById("btn-"+lessonId);
  if(btn&&idx===lesson.ans){btn.disabled=false;btn.textContent="✅ 完成此關 → 解鎖下一關";}
}

function completeL(id){
  if(earned.includes(id))return;
  const lesson=LESSONS.find(l=>l.id===id);
  earned.push(id);
  localStorage.setItem(CASTLE_KEY,JSON.stringify(earned));
  const btn=document.getElementById("btn-"+id);
  if(btn){const r=btn.getBoundingClientRect();const d=document.createElement("div");d.className="xp-pop";d.textContent="+"+lesson.xp+" XP!";d.style.cssText="left:"+r.left+"px;top:"+(r.top+window.scrollY)+"px";document.body.appendChild(d);setTimeout(()=>d.remove(),1200);}
  const t=document.getElementById("toast");t.textContent="🎉 +"+lesson.xp+" XP！「"+lesson.title+"」完成！";t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000);
  // 記住目前捲動位置，重繪後還原
  const scrollY=window.scrollY;
  setTimeout(()=>{
    currentLesson=null;
    renderLessons();
    updateXP();
    window.scrollTo({top:scrollY,behavior:'instant'});
  },600);
  checkCompletion();
}

function copyC(btn){
  const text=btn.parentElement.innerText.replace("複製","").trim();
  navigator.clipboard.writeText(text).then(()=>{btn.textContent="✓ 已複製";setTimeout(()=>btn.textContent="複製",2000);});
}

  const cv=cont.querySelector("canvas");

  cv.width=W;cv.height=H;
  cv.style.width="100%";cv.style.display="block";
  function syncGrid(){
    const dispW=cv.getBoundingClientRect().width||cv.offsetWidth||600;
    cv.style.height=Math.round(dispW*H/W)+"px";
  }
  setTimeout(syncGrid,0);
  window.addEventListener("resize",syncGrid);
  new ResizeObserver(syncGrid).observe(cv);
  const ctx=cv.getContext("2d");ctx.imageSmoothingEnabled=false;
  const pixels=new Array(W*H).fill(null);
  const COLORS=["#ff4d4d","#ff9900","#ffd700","#66cc66","#4da6ff","#cc66ff","#ff66b3","#ffffff","#888888","#000000"];
  let curColor=COLORS[0],drawing=false;
  const btns=cont.querySelector("#color-btns");
  COLORS.forEach((c,i)=>{const b=document.createElement("button");b.style.cssText="width:28px;height:28px;border-radius:50%;background:"+c+";border:2px solid "+(curColor===c?"#333":"transparent")+";cursor:pointer;";b.onclick=()=>{curColor=c;btns.querySelectorAll("button").forEach((x,j)=>x.style.border="2px solid "+(j===i?"#333":"transparent"));};btns.appendChild(b);});
  const clearBtn=document.createElement("button");
  clearBtn.textContent="🗑️ 清空";
  clearBtn.style.cssText="margin-left:auto;padding:5px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);cursor:pointer;font-size:13px;font-weight:600;";
  clearBtn.onmouseenter=()=>clearBtn.style.background="rgba(255,100,100,.22)";
  clearBtn.onmouseleave=()=>clearBtn.style.background="rgba(255,255,255,.07)";
  clearBtn.onclick=()=>{pixels.fill(null);ctx.fillStyle="#1a1a2e";ctx.fillRect(0,0,W,H);};
  btns.appendChild(clearBtn);
  function draw(e){
    const r=cv.getBoundingClientRect();
    const px=Math.floor((e.clientX-r.left)/r.width*W);
    const py=Math.floor((e.clientY-r.top)/r.height*H);
    if(px<0||px>=W||py<0||py>=H)return;
    pixels[py*W+px]=curColor;
    ctx.fillStyle=curColor;ctx.fillRect(px,py,1,1);
  }
  cv.addEventListener("mousedown",e=>{drawing=true;draw(e);});
  cv.addEventListener("mousemove",e=>{if(drawing)draw(e);});
  cv.addEventListener("mouseup",()=>drawing=false);
  cv.addEventListener("touchstart",e=>{drawing=true;draw(e.touches[0]);e.preventDefault();},{passive:false});
  cv.addEventListener("touchmove",e=>{draw(e.touches[0]);e.preventDefault();},{passive:false});
  cv.addEventListener("touchend",()=>drawing=false);
  // Draw grid
  ctx.fillStyle="#1a1a2e";ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="rgba(255,255,255,0.08)";ctx.lineWidth=0.05;
  for(let x=0;x<W;x++){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y++){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function demoTriangle(cont,isMobile){
  cont.innerHTML='<div class="demo-wrap"><div class="demo-label">📐 拖動三個頂點，改變三角形的形狀！</div><canvas style="width:100%;display:block;height:280px;cursor:grab"></canvas></div>';
  const cv=cont.querySelector("canvas");
  function sync(){const w=cv.clientWidth||600;if(cv.width!==w||cv.height!==280){cv.width=w;cv.height=280;cv.style.height="280px";}return w;}
  sync();
  const ctx=cv.getContext("2d");
  const w=cv.width,h=cv.height;
  const pts=[{x:w/2,y:50},{x:w/2-130,y:h-60},{x:w/2+130,y:h-60}];
  const colors=["#ff6b6b","#ffd93d","#6bcb77"];
  let drag=-1;
  function nearest(x,y){
    const HIT=isMobile?40:24;
    return pts.reduce((a,p,i)=>{const d=Math.hypot(p.x-x,p.y-y);return d<a.d?{d,i}:a;},{d:HIT,i:-1}).i;
  }
  function render(){
    const w2=cv.width,h2=cv.height;
    ctx.fillStyle="#0d0d1a";ctx.fillRect(0,0,w2,h2);
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);ctx.lineTo(pts[1].x,pts[1].y);ctx.lineTo(pts[2].x,pts[2].y);ctx.closePath();
    const gr=ctx.createLinearGradient(pts[0].x,pts[0].y,pts[2].x,pts[2].y);
    gr.addColorStop(0,"#ff6b6b");gr.addColorStop(0.5,"#ffd93d");gr.addColorStop(1,"#6bcb77");
    ctx.fillStyle=gr;ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,.3)";ctx.lineWidth=1.5;ctx.stroke();
    pts.forEach((p,i)=>{
      ctx.beginPath();ctx.arc(p.x,p.y,10,0,Math.PI*2);
      ctx.fillStyle=drag===i?"#fff":colors[i];ctx.fill();
      ctx.strokeStyle="rgba(255,255,255,.6)";ctx.lineWidth=2;ctx.stroke();
      const labels=["頂點 A","頂點 B","頂點 C"];
      ctx.fillStyle="rgba(255,255,255,.9)";ctx.font="bold 11px sans-serif";ctx.textAlign="center";
      ctx.fillText(labels[i],p.x,p.y+(i===0?-16:18));
    });
  }
  function pos(e){
    const r=cv.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    const scaleX=cv.width/r.width;
    const scaleY=cv.height/r.height;
    return{x:(src.clientX-r.left)*scaleX,y:(src.clientY-r.top)*scaleY};
  }
  cv.addEventListener("mousedown",e=>{const p=pos(e);drag=nearest(p.x,p.y);cv.style.cursor="grabbing";});
  cv.addEventListener("mousemove",e=>{if(drag<0)return;const p=pos(e);pts[drag].x=p.x;pts[drag].y=p.y;render();});
  cv.addEventListener("mouseup",()=>{drag=-1;cv.style.cursor="grab";});
  cv.addEventListener("touchstart",e=>{const p=pos(e);drag=nearest(p.x,p.y);e.preventDefault();},{passive:false});
  cv.addEventListener("touchmove",e=>{if(drag<0)return;const p=pos(e);pts[drag].x=p.x;pts[drag].y=p.y;render();e.preventDefault();},{passive:false});
  cv.addEventListener("touchend",()=>drag=-1);
  render();
}

  sync();if(isMobile)window.addEventListener("resize",sync);
  const g=cv.getContext("webgl");if(!g)return;
  function mkS(t,s){const sh=g.createShader(t);g.shaderSource(sh,s);g.compileShader(sh);return sh;}
  function mkP(vs,fs){const p=g.createProgram();g.attachShader(p,mkS(g.VERTEX_SHADER,vs));g.attachShader(p,mkS(g.FRAGMENT_SHADER,fs));g.linkProgram(p);return p;}
  const progs=[
    mkP("attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}","precision mediump float;void main(){gl_FragColor=vec4(1.,0.,0.,1.);}"),
    mkP("attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}","precision mediump float;uniform vec2 res;void main(){vec2 uv=gl_FragCoord.xy/res;gl_FragColor=vec4(uv.x,uv.y,1.-uv.x,1.);}"),
    mkP("attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}","precision mediump float;uniform vec2 res;uniform float t;void main(){vec2 uv=(gl_FragCoord.xy/res)*2.-1.;uv.x*=res.x/res.y;float r=length(uv);float a=atan(uv.y,uv.x)+t;float v=sin(a*6.+r*10.-t*3.)*.5+.5;gl_FragColor=vec4(v,v*.5,1.-v,1.);}"),
    mkP("attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}","precision mediump float;uniform vec2 res;void main(){vec2 uv=gl_FragCoord.xy/res;vec2 brick=uv*vec2(8.,5.);brick.x+=step(1.,mod(brick.y,2.))*.5;vec2 bf=fract(brick);float mortar=step(bf.x,.06)+step(1.-bf.x,.06)+step(bf.y,.08)+step(1.-bf.y,.08);vec3 brickCol=vec3(.72,.28,.14)+fract(floor(brick.x)*17.+floor(brick.y)*31.)*.08;gl_FragColor=vec4(mortar>.0?vec3(.22,.18,.14):brickCol,1.);}"),
  ];
  const buf=g.createBuffer();g.bindBuffer(g.ARRAY_BUFFER,buf);g.bufferData(g.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),g.STATIC_DRAW);
  let shaderMode=0,t=0;
  window.setShader=m=>{shaderMode=m;cont.querySelectorAll(".ctrl-btn").forEach(b=>b.classList.remove("active"));event.target.classList.add("active");};
  function frame(){
    t+=0.016;sync();g.viewport(0,0,cv.width,cv.height);
    const p=progs[shaderMode];g.useProgram(p);
    const ap=g.getAttribLocation(p,"p");g.bindBuffer(g.ARRAY_BUFFER,buf);g.enableVertexAttribArray(ap);g.vertexAttribPointer(ap,2,g.FLOAT,false,0,0);
    const ur=g.getUniformLocation(p,"res"),ut=g.getUniformLocation(p,"t");
    if(ur)g.uniform2f(ur,cv.width,cv.height);if(ut)g.uniform1f(ut,t);
    g.drawArrays(g.TRIANGLE_STRIP,0,4);requestAnimationFrame(frame);
  }

function demoGradient(cont,isMobile){
  cont.innerHTML='<div class="demo-wrap"><div class="demo-label">🌅 調整日落天空的漸層</div><canvas style="width:100%;display:block;height:260px"></canvas></div><div class="slider-row"><label>🔄 旋轉角度</label><input type="range" min="0" max="360" value="180" id="gradAngle" oninput="updGrad()"><span class="slider-val" id="gav">180°</span></div><div class="ctrl-row"><button class="ctrl-btn active" onclick="setGradPreset(0)">🌅 日落</button><button class="ctrl-btn" onclick="setGradPreset(1)">🌌 夜空</button><button class="ctrl-btn" onclick="setGradPreset(2)">🌊 海洋</button><button class="ctrl-btn" onclick="setGradPreset(3)">🌿 森林</button></div>';
  const cv=cont.querySelector("canvas");
  function sync(){const w=cv.clientWidth||600;if(cv.width!==w||cv.height!==260){cv.width=w;cv.height=260;cv.style.height="260px";}}
  sync();if(isMobile)window.addEventListener("resize",sync);
  const ctx=cv.getContext("2d");
  const PRESETS=[
    ["#ff6b35","#f7c59f","#2c3e7a","#0a0a2e"],
    ["#0a0a2e","#1a1a4e","#4a2080","#000000"],
    ["#006994","#00b4d8","#90e0ef","#caf0f8"],
    ["#1a4731","#2d6a4f","#74c69d","#d8f3dc"],
  ];
  let angle=180,preset=0;
  new ResizeObserver(()=>{sync();render();}).observe(cv);
  window.updGrad=()=>{angle=parseInt(document.getElementById("gradAngle").value);document.getElementById("gav").textContent=angle+"°";render();};
  window.setGradPreset=p=>{preset=p;render();cont.querySelectorAll(".ctrl-btn").forEach(b=>b.classList.remove("active"));event.target.classList.add("active");};
  function render(){
    sync();const w=cv.width,h=cv.height;
    const rad=angle*Math.PI/180;
    const cx=w/2,cy=h/2;const len=Math.sqrt(w*w+h*h)/2;
    const x0=cx-Math.cos(rad)*len,y0=cy-Math.sin(rad)*len;
    const x1=cx+Math.cos(rad)*len,y1=cy+Math.sin(rad)*len;
    const gr=ctx.createLinearGradient(x0,y0,x1,y1);
    const cols=PRESETS[preset];
    cols.forEach((c,i)=>gr.addColorStop(i/(cols.length-1),c));
    ctx.fillStyle=gr;ctx.fillRect(0,0,w,h);
    // Sun
    if(preset===0){
      const sx=w*.65,sy=h*.25;
      ctx.beginPath();ctx.arc(sx,sy,25,0,Math.PI*2);
      ctx.fillStyle="rgba(255,220,100,.9)";ctx.fill();
      for(let i=0;i<8;i++){const a=i/8*Math.PI*2;ctx.beginPath();ctx.moveTo(sx+Math.cos(a)*28,sy+Math.sin(a)*28);ctx.lineTo(sx+Math.cos(a)*38,sy+Math.sin(a)*38);ctx.strokeStyle="rgba(255,220,100,.5)";ctx.lineWidth=2;ctx.stroke();}
    }
    // 🌙 Night sky: crescent moon + stars
    if(preset===1){
      const mx=w*.72,my=h*.22,mr=22;
      ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);
      ctx.fillStyle="rgba(255,248,200,.95)";ctx.fill();
      // Repaint sky gradient inside the bite — use same angle as background
      ctx.save();
      ctx.beginPath();ctx.arc(mx+11,my-4,mr*.82,0,Math.PI*2);ctx.clip();
      const gr2=ctx.createLinearGradient(x0,y0,x1,y1);
      PRESETS[1].forEach((col,i)=>gr2.addColorStop(i/(PRESETS[1].length-1),col));
      ctx.fillStyle=gr2;ctx.fillRect(0,0,w,h);
      ctx.restore();
      [[w*.15,h*.15],[w*.35,h*.08],[w*.55,h*.18],[w*.2,h*.32],[w*.8,h*.12],[w*.65,h*.28],[w*.42,h*.22]].forEach(([sx,sy])=>{
        ctx.beginPath();ctx.arc(sx,sy,1.5,0,Math.PI*2);ctx.fillStyle="rgba(255,255,220,.85)";ctx.fill();
      });
    }
    // ⛵ Ocean: boat
    if(preset===2){
      const bx=w*.45,by=h*.62;
      ctx.beginPath();ctx.moveTo(bx-38,by);ctx.lineTo(bx+38,by);ctx.lineTo(bx+28,by+18);ctx.lineTo(bx-28,by+18);ctx.closePath();
      ctx.fillStyle="rgba(80,50,20,.95)";ctx.fill();
      ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx,by-55);ctx.strokeStyle="rgba(160,120,60,.9)";ctx.lineWidth=2;ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx,by-50);ctx.lineTo(bx+32,by-18);ctx.lineTo(bx,by-8);ctx.closePath();
      ctx.fillStyle="rgba(240,235,215,.85)";ctx.fill();
    }
    // 🌲 Forest: trees
    if(preset===3){
      [[w*.1,h*.72,38],[w*.25,h*.78,28],[w*.4,h*.68,44],[w*.56,h*.75,32],[w*.70,h*.70,46],[w*.82,h*.76,30],[w*.92,h*.72,36]].forEach(([tx,ty,ts])=>{
        ctx.beginPath();ctx.rect(tx-3,ty,6,ts*.3);ctx.fillStyle="rgba(55,30,10,.85)";ctx.fill();
        ctx.beginPath();ctx.moveTo(tx,ty-ts*.9);ctx.lineTo(tx-ts*.42,ty);ctx.lineTo(tx+ts*.42,ty);ctx.closePath();
        ctx.fillStyle="rgba(30,80,30,.9)";ctx.fill();
        ctx.beginPath();ctx.moveTo(tx,ty-ts*1.2);ctx.lineTo(tx-ts*.32,ty-ts*.35);ctx.lineTo(tx+ts*.32,ty-ts*.35);ctx.closePath();
        ctx.fillStyle="rgba(40,100,35,.9)";ctx.fill();
      });
    }
  }
}

function demoPlanet(cont,isMobile){
  cont.innerHTML='<div class="demo-wrap"><div class="demo-label">🎆 點擊畫面放煙火！</div><canvas style="width:100%;display:block;height:300px;cursor:crosshair"></canvas></div><div style="text-align:center;padding:6px;font-size:.8rem;color:var(--muted)">點擊任何地方發射煙火 ✨</div>';
  const cv=cont.querySelector("canvas");
  function sync(){const w=cv.clientWidth||600;if(cv.width!==w||cv.height!==300){cv.width=w;cv.height=300;cv.style.height="300px";}return w;}
  sync();if(isMobile)window.addEventListener("resize",sync);
  const ctx=cv.getContext("2d");

  const rockets=[],explosions=[];
  const COLORS=[
    ["#ff4444","#ff8800","#ffff44"],
    ["#44aaff","#aa44ff","#ffffff"],
    ["#44ff88","#ffff44","#ffffff"],
    ["#ff44aa","#ff8844","#ffaaff"],
    ["#ffffff","#aaddff","#ffeeaa"],
    ["#ff6600","#ffcc00","#ff0044"],
  ];

  function spawnRocket(tx,ty){
    const w=cv.width,h=cv.height;
    const cols=COLORS[Math.floor(Math.random()*COLORS.length)];
    rockets.push({
      x:w*.3+Math.random()*w*.4, y:h,
      tx:tx, ty:ty+(Math.random()-.5)*40,
      vx:0, vy:0,
      cols, trail:[], life:1
    });
  }

  function explode(x,y,cols){
    const count=80+Math.floor(Math.random()*60);
    const burst=[];
    // Main burst
    for(let i=0;i<count;i++){
      const a=Math.random()*Math.PI*2;
      const spd=1.5+Math.random()*3.5;
      burst.push({
        x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
        col:cols[Math.floor(Math.random()*cols.length)],
        life:1,maxLife:0.6+Math.random()*0.5,
        size:1.5+Math.random()*2,trail:[]
      });
    }
    // Sparkle ring
    for(let i=0;i<20;i++){
      const a=i/20*Math.PI*2;
      const spd=4+Math.random()*.5;
      burst.push({
        x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
        col:"#ffffff",
        life:1,maxLife:.4+Math.random()*.2,
        size:2.5,trail:[]
      });
    }
    explosions.push({particles:burst,x,y});
  }

  // Auto-launch a few rockets at start
  setTimeout(()=>{const w=cv.width,h=cv.height;spawnRocket(w*.35,h*.25);},200);
  setTimeout(()=>{const w=cv.width,h=cv.height;spawnRocket(w*.65,h*.2);},800);
  setTimeout(()=>{const w=cv.width,h=cv.height;spawnRocket(w*.5,h*.15);},1400);

  cv.addEventListener("click",e=>{
    const r=cv.getBoundingClientRect();
    spawnRocket(e.clientX-r.left,e.clientY-r.top);
  });
  cv.addEventListener("touchstart",e=>{
    const r=cv.getBoundingClientRect();
    spawnRocket(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);
    e.preventDefault();
  },{passive:false});

  let t=0;
  function frame(){
    t+=0.016;const w=cv.width,h=cv.height;
    // Fade background
    ctx.fillStyle="rgba(4,2,12,0.22)";ctx.fillRect(0,0,w,h);

    // Update rockets
    for(let i=rockets.length-1;i>=0;i--){
      const r=rockets[i];
      const dx=r.tx-r.x,dy=r.ty-r.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<12){
        explode(r.x,r.y,r.cols);
        rockets.splice(i,1);continue;
      }
      const spd=Math.min(12,dist*.15+4);
      r.vx+=(dx/dist)*spd*.18;r.vy+=(dy/dist)*spd*.18;
      r.vx*=.82;r.vy*=.82;
      r.x+=r.vx;r.y+=r.vy;
      r.trail.push({x:r.x,y:r.y});
      if(r.trail.length>12)r.trail.shift();
      // Draw trail
      for(let j=1;j<r.trail.length;j++){
        const p=r.trail[j-1],q=r.trail[j];
        const a=j/r.trail.length;
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);
        ctx.strokeStyle=r.cols[0]+(Math.round(a*180).toString(16).padStart(2,"0"));
        ctx.lineWidth=2*a;ctx.stroke();
      }
      // Rocket head glow
      ctx.beginPath();ctx.arc(r.x,r.y,3,0,Math.PI*2);
      ctx.fillStyle="#ffffff";ctx.fill();
    }

    // Update explosions
    for(let e=explosions.length-1;e>=0;e--){
      const exp=explosions[e];
      let alive=false;
      exp.particles.forEach(p=>{
        p.life-=0.016/p.maxLife;
        if(p.life<=0)return;
        alive=true;
        p.vx*=.97;p.vy=p.vy*.97+.04;// gravity
        p.x+=p.vx;p.y+=p.vy;
        p.trail.push({x:p.x,y:p.y});
        if(p.trail.length>5)p.trail.shift();
        const alpha=Math.max(0,p.life);
        // Particle trail
        for(let j=1;j<p.trail.length;j++){
          const a2=(j/p.trail.length)*alpha;
          const pr=p.trail[j-1],qr=p.trail[j];
          ctx.beginPath();ctx.moveTo(pr.x,pr.y);ctx.lineTo(qr.x,qr.y);
          ctx.strokeStyle=p.col+(Math.round(a2*160).toString(16).padStart(2,"0"));
          ctx.lineWidth=p.size*(j/p.trail.length);ctx.stroke();
        }
        // Particle dot
        ctx.beginPath();ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);
        ctx.fillStyle=p.col+(Math.round(alpha*255).toString(16).padStart(2,"0"));
        ctx.fill();
      });
      if(!alive)explosions.splice(e,1);
    }

    // Random auto-launch every ~3s
    if(Math.random()<.005){
      const w2=cv.width,h2=cv.height;
      spawnRocket(w2*.2+Math.random()*w2*.6,h2*.1+Math.random()*h2*.25);
    }

    requestAnimationFrame(frame);
  }
  // Dark background
  ctx.fillStyle="#04020c";ctx.fillRect(0,0,cv.width,cv.height);
  frame();
}

function demoMove(cont,isMobile){
  cont.innerHTML='<div class="demo-wrap"><div class="demo-label">🕹️ 拖動三角形到畫布任何地方！</div><canvas style="width:100%;display:block;height:280px;cursor:grab"></canvas></div><div style="padding:8px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><div id="coord-display" style="font-family:Space Mono,monospace;font-size:13px;color:rgba(255,255,255,.7);background:rgba(255,255,255,.06);padding:5px 14px;border-radius:20px;border:0.5px solid rgba(255,255,255,.12)">X: 0.00 &nbsp;|&nbsp; Y: 0.00</div><button onclick="resetShape()" style="padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);cursor:pointer;font-size:13px">⟳ 回中心</button></div>';
  const cv=cont.querySelector("canvas");
  function sync(){
    const w=cv.getBoundingClientRect().width||cv.parentElement?.clientWidth||600;
    if(Math.abs(cv.width-w)>1||cv.height!==280){cv.width=Math.round(w);cv.height=280;}
    return {w:cv.width,h:cv.height};
  }
  const ctx=cv.getContext("2d");
  let ox=0,oy=0,dragging=false,dragStartX=0,dragStartY=0,shapeStartX=0,shapeStartY=0;
  window.addEventListener("resize",()=>{sync();render();});
  const ro=new ResizeObserver(()=>{sync();render();});
  ro.observe(cv);

  function toCanvas(nx,ny){
    const {w,h}=sync();
    return {x:(nx+1)/2*w, y:(1-ny)/2*h};
  }
  function toNorm(cx,cy){
    const {w,h}=sync();
    return {x:(cx/w)*2-1, y:1-(cy/h)*2};
  }

  function render(){
    const {w,h}=sync();
    ctx.fillStyle="#0d0d1a";ctx.fillRect(0,0,w,h);
    // Grid lines — use same pixel step for both axes so cells are square
    const step=h/8;
    ctx.strokeStyle="rgba(255,255,255,.06)";ctx.lineWidth=1;
    for(let x=w/2%step;x<=w;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
    for(let y=h/2%step;y<=h;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
    // Axis labels
    ctx.font="11px Space Mono,monospace";ctx.textAlign="center";ctx.fillStyle="rgba(255,255,255,.3)";
    ctx.fillText("X: -1",w*.06,h*.5-6);ctx.fillText("X: +1",w*.94,h*.5-6);
    ctx.textAlign="right";ctx.fillText("Y:+1",w*.5-8,h*.06);ctx.fillText("Y:-1",w*.5-8,h*.96);
    // Center cross
    ctx.strokeStyle="rgba(255,255,255,.15)";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(w/2,0);ctx.lineTo(w/2,h);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,h/2);ctx.lineTo(w,h/2);ctx.stroke();
    // Triangle
    const ctr=toCanvas(ox,oy);
    const size=Math.min(w,h)*0.14;
    const tx=ctr.x,ty=ctr.y;
    ctx.beginPath();
    ctx.moveTo(tx, ty-size);
    ctx.lineTo(tx-size*.85, ty+size*.6);
    ctx.lineTo(tx+size*.85, ty+size*.6);
    ctx.closePath();
    const gr=ctx.createLinearGradient(tx,ty-size,tx,ty+size);
    gr.addColorStop(0,"#ff6b6b");gr.addColorStop(1,"#ffd93d");
    ctx.fillStyle=gr;ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,.4)";ctx.lineWidth=1.5;ctx.stroke();
    // Drag handle dot
    ctx.beginPath();ctx.arc(tx,ty,8,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,.9)";ctx.fill();
    // Coordinate label on shape
    ctx.font="bold 12px Space Mono,monospace";ctx.textAlign="center";ctx.fillStyle="#fff";
    ctx.fillText("("+ox.toFixed(2)+", "+oy.toFixed(2)+")",tx,ty+size+20);
    // Update display
    const disp=document.getElementById("coord-display");
    if(disp)disp.innerHTML="X: <span style='color:#ff6b6b;font-weight:700'>"+ox.toFixed(2)+"</span> &nbsp;|&nbsp; Y: <span style='color:#6bcb77;font-weight:700'>"+oy.toFixed(2)+"</span>";
  }

  function getPos(e){
    const r=cv.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return {cx:(src.clientX-r.left)*cv.width/r.width, cy:(src.clientY-r.top)*cv.height/r.height};
  }

  cv.addEventListener("mousedown",e=>{
    const {cx,cy}=getPos(e);
    const ctr=toCanvas(ox,oy);
    if(Math.hypot(cx-ctr.x,cy-ctr.y)<40){
      dragging=true;dragStartX=cx;dragStartY=cy;shapeStartX=ox;shapeStartY=oy;
      cv.style.cursor="grabbing";
    }
  });
  cv.addEventListener("mousemove",e=>{
    if(!dragging)return;
    const {cx,cy}=getPos(e);
    const dn=toNorm(cx,cy),ds=toNorm(dragStartX,dragStartY);
    ox=Math.max(-0.9,Math.min(0.9,shapeStartX+(dn.x-ds.x)));
    oy=Math.max(-0.9,Math.min(0.9,shapeStartY+(dn.y-ds.y)));
    render();
  });
  cv.addEventListener("mouseup",()=>{dragging=false;cv.style.cursor="grab";});
  cv.addEventListener("touchstart",e=>{
    const {cx,cy}=getPos(e);
    const ctr=toCanvas(ox,oy);
    if(Math.hypot(cx-ctr.x,cy-ctr.y)<60){
      dragging=true;dragStartX=cx;dragStartY=cy;shapeStartX=ox;shapeStartY=oy;
    }
    e.preventDefault();
  },{passive:false});
  cv.addEventListener("touchmove",e=>{
    if(!dragging)return;
    const {cx,cy}=getPos(e);
    const dn=toNorm(cx,cy),ds=toNorm(dragStartX,dragStartY);
    ox=Math.max(-0.9,Math.min(0.9,shapeStartX+(dn.x-ds.x)));
    oy=Math.max(-0.9,Math.min(0.9,shapeStartY+(dn.y-ds.y)));
    render();e.preventDefault();
  },{passive:false});
  cv.addEventListener("touchend",()=>dragging=false);
  window.resetShape=()=>{ox=0;oy=0;render();};
}

// Shared sphere setup helper
function setupSphere(gl,r){
  const verts=makeSphere(r);

function syncCV(cv,h){

}

function demoPointLight(cont,isMobile){
  cont.innerHTML=`<div class="demo-wrap"><div class="demo-label">🔵 Point Light — 移動光源衰減效果</div><canvas style="width:100%;display:block;height:260px"></canvas></div>

  function mkS(t,s){const sh=g.createShader(t);g.shaderSource(sh,s);g.compileShader(sh);return sh;}
  function mkP(vs,fs){const p=g.createProgram();g.attachShader(p,mkS(g.VERTEX_SHADER,vs));g.attachShader(p,mkS(g.FRAGMENT_SHADER,fs));g.linkProgram(p);return p;}

  // Sphere geometry

  for(let a=0;a<=ST;a++){const phi=Math.PI*a/ST;for(let b=0;b<=SL;b++){const th=2*Math.PI*b/SL;const x=Math.sin(phi)*Math.cos(th),y=Math.cos(phi),z=Math.sin(phi)*Math.sin(th);vA.push(x*.79,y*.79,z*.79);nA.push(x,y,z);}}
  for(let a=0;a<ST;a++)for(let b=0;b<SL;b++){const p0=a*(SL+1)+b,q=p0+SL+1;iA.push(p0,q,p0+1,q,q+1,p0+1);}
  const vD=new Float32Array(vA),nD=new Float32Array(nA),iD=new Uint16Array(iA);
  function mkBuf(d,t){const b=g.createBuffer();g.bindBuffer(t,b);g.bufferData(t,d,g.STATIC_DRAW);return b;}
  const vB=mkBuf(vD,g.ARRAY_BUFFER),nB=mkBuf(nD,g.ARRAY_BUFFER),iB=mkBuf(iD,g.ELEMENT_ARRAY_BUFFER);

  const prog=mkP(
    // VS: Y-rotation + orthographic projection
    `attribute vec3 aPos;attribute vec3 aNor;
     varying vec3 vN;varying vec3 vW;
     uniform float asp;uniform float rotY;
     void main(){
       float cy=cos(rotY),sy=sin(rotY);
       vec3 rp=vec3(aPos.x*cy+aPos.z*sy, aPos.y, -aPos.x*sy+aPos.z*cy);
       vec3 rn=vec3(aNor.x*cy+aNor.z*sy, aNor.y, -aNor.x*sy+aNor.z*cy);
       vN=rn; vW=rp;
       gl_Position=vec4(rp.x*0.92/asp, rp.y*0.92+0.22, rp.z*0.1, 1.0);
     }`,
    `precision mediump float;
     varying vec3 vN; varying vec3 vW;
     uniform vec3 lP0,lP1,lP2, lC0,lC1,lC2;
     uniform float k; uniform int nL; uniform float flameAtt;

     // Fixed key light (directional, no attenuation) — always illuminates sphere front
     vec3 keyLight(vec3 N, vec3 P){
       vec3 L = normalize(vec3(-0.4, 0.6, 1.0));  // upper-left-front
       vec3 V = normalize(vec3(0.0, 0.0, 2.5) - P);
       vec3 H = normalize(L + V);
       float lambert = max(dot(N, L), 0.0);
       float spec    = pow(max(dot(N, H), 0.0), 96.0);
       vec3 base = vec3(0.85, 0.15, 0.15);
       return base * lambert * 1.8 + vec3(1.0,0.95,0.85) * spec * 2.2;
     }

     // Orbiting point light with attenuation — shows k slider effect
     vec3 pointLight(vec3 N, vec3 P, vec3 lPos, vec3 lCol){
       vec3 toL = lPos - P;
       float dist = max(length(toL), 0.001);
       vec3 L = normalize(toL);
       float lambert = max(dot(N, L), 0.0);
       vec3 V = normalize(vec3(0.0, 0.0, 2.5) - P);
       vec3 H = normalize(L + V);
       float spec = pow(max(dot(N, H), 0.0), 128.0);
       // k=0.01 bright, k=1.0 nearly dark
       float att = 1.0 / (1.0 + k*dist*2.0 + k*dist*dist*4.0);
       vec3 base = vec3(0.85, 0.15, 0.15);
       return (base * lCol * lambert * 3.5 + lCol * spec * 2.0) * att;
     }

     void main(){
       vec3 N = normalize(vN);
       vec3 base = vec3(0.85, 0.15, 0.15);

       // Hemisphere ambient
       float sky = N.y*0.5+0.5;
       vec3 amb = base * mix(vec3(0.05,0.02,0.02), vec3(0.28,0.10,0.10), sky);

       // Fire ground bounce: scales with attenuation — dimmer when k is high
       float groundFire = max(-N.y, 0.0);
       vec3 fireBounce = vec3(0.9, 0.35, 0.05) * groundFire * flameAtt * 1.8;

       // Fixed key light (always visible, shows glossiness)
       vec3 key = keyLight(N, vW);

       // Orbiting point lights (show attenuation)
       vec3 pts = pointLight(N, vW, lP0, lC0);
       if(nL>=2) pts += pointLight(N, vW, lP1, lC1);
       if(nL>=3) pts += pointLight(N, vW, lP2, lC2);

       gl_FragColor = vec4(clamp(amb + fireBounce + key + pts, 0.0, 1.0), 1.0);
     }`
  );

  g.useProgram(prog);
  const aPos=g.getAttribLocation(prog,"aPos"), aNor=g.getAttribLocation(prog,"aNor");
  const uAsp=g.getUniformLocation(prog,"asp"), uK=g.getUniformLocation(prog,"k"), uNL=g.getUniformLocation(prog,"nL"), uRotY=g.getUniformLocation(prog,"rotY");
  const uFlameAtt=g.getUniformLocation(prog,"flameAtt");
  const uLP=[0,1,2].map(i=>g.getUniformLocation(prog,"lP"+i));
  const uLC=[0,1,2].map(i=>g.getUniformLocation(prog,"lC"+i));

  // Light dot shader
  const dotP=mkP(
    `attribute vec2 p;uniform float asp;void main(){gl_Position=vec4(p.x*0.92/asp,p.y*0.92,0,1);gl_PointSize=14.0;}`,
    `precision mediump float;uniform vec3 col;void main(){float d=length(gl_PointCoord-0.5)*2.0;if(d>1.0)discard;gl_FragColor=vec4(col,1.0-d*0.3);}`
  );
  const haloP=mkP(
    `attribute vec2 p;uniform float asp;void main(){gl_Position=vec4(p.x*0.92/asp,p.y*0.92,0,1);gl_PointSize=36.0;}`,
    `precision mediump float;uniform vec3 col;void main(){float d=length(gl_PointCoord-0.5)*2.0;if(d>1.0)discard;gl_FragColor=vec4(col,(1.0-d)*(1.0-d)*0.4);}`
  );
  const dotAP=g.getAttribLocation(dotP,"p"), dotUC=g.getUniformLocation(dotP,"col"), dotAS=g.getUniformLocation(dotP,"asp");
  const haloAP=g.getAttribLocation(haloP,"p"), haloUC=g.getUniformLocation(haloP,"col"), haloAS=g.getUniformLocation(haloP,"asp");
  const ptBuf=g.createBuffer();

  g.enable(g.DEPTH_TEST);
  g.enable(g.BLEND); g.blendFunc(g.SRC_ALPHA, g.ONE_MINUS_SRC_ALPHA);

  const lCols=[[1.0,0.8,0.3],[0.3,0.6,1.0],[0.5,1.0,0.4]];
  // Lights orbit at r=1.4 in front hemisphere
  function lPos(i,t){
    const speed=[0.9,0.6,1.2][i], phase=[0,2.1,4.2][i];
    const a=t*speed+phase;
    const x=Math.cos(a)*1.2;
    const y=Math.sin(a)*0.9;
    const z=0.7; // always in front
    return [x,y,z];
  }

  // Flame: flickering position + intensity noise using sin harmonics
  function flameNoise(t,seed){
    return Math.sin(t*7.3+seed)*0.4 + Math.sin(t*13.1+seed*2.1)*0.2
         + Math.sin(t*23.7+seed*0.7)*0.1 + Math.sin(t*43.0+seed*3.3)*0.05;
  }
  function flamePos(t){
    // Flame hovers below sphere, flickers side-to-side
    const jx = flameNoise(t, 0)*0.18;
    const jy = flameNoise(t, 5)*0.12 - 0.80; // below sphere
    const jz = 0.55;
    return [jx, jy, jz];
  }
  function flameIntensity(t){
    return 1.0 + flameNoise(t,1)*0.45; // 0.55 ~ 1.45 flicker range
  }

  let kVal=0.10, nL=9, t=0;
  window.updPL=()=>{kVal=document.getElementById("pat").value/100;document.getElementById("pvp").textContent=kVal.toFixed(2);};
  window.setPLM=n=>{nL=n;cont.querySelectorAll(".ctrl-btn").forEach(b=>b.classList.remove("active"));event.target.classList.add("active");};

  function frame(){
    t+=0.016;
    const asp=syncSize();
    g.viewport(0,0,cv.width,cv.height);
    g.clearColor(0.04,0.03,0.09,1); g.clear(g.COLOR_BUFFER_BIT|g.DEPTH_BUFFER_BIT);

    // Flame mode (nL===9) vs normal mode
    const isFlame = nL===9;
    const lights = isFlame
      ? [flamePos(t), flamePos(t+1.1), flamePos(t+2.2)]
      : [0,1,2].map(i=>lPos(i,t));
    const flameMult = isFlame ? Math.max(0.7, flameIntensity(t)) : 1.0;
    const flameColors = isFlame ? [
      [1.0*flameMult, 0.55*flameMult, 0.05],
      [1.0*flameMult, 0.35*flameMult, 0.02],
      [0.9*flameMult, 0.65*flameMult, 0.08],
    ] : lCols;
    const activeLights = isFlame ? 3 : nL;

    // Draw sphere
    g.useProgram(prog);
    // Compute attenuation at sphere surface (dist≈0.79 from center) for fireBounce
    const flameDist=0.79+Math.abs(lights[0][1]+0.80);
    const flameAtt=1.0/(1.0+kVal*flameDist*2.0+kVal*flameDist*flameDist*4.0);
    g.uniform1f(uAsp,asp); g.uniform1f(uK,kVal); g.uniform1i(uNL,activeLights); g.uniform1f(uRotY,t*0.5);
    g.uniform1f(uFlameAtt, flameAtt);
    lights.forEach(([x,y,z],i)=>{g.uniform3f(uLP[i],x,y,z); g.uniform3f(uLC[i],...flameColors[i]);});
    g.bindBuffer(g.ARRAY_BUFFER,vB); g.enableVertexAttribArray(aPos); g.vertexAttribPointer(aPos,3,g.FLOAT,false,0,0);
    g.bindBuffer(g.ARRAY_BUFFER,nB); g.enableVertexAttribArray(aNor); g.vertexAttribPointer(aNor,3,g.FLOAT,false,0,0);
    g.bindBuffer(g.ELEMENT_ARRAY_BUFFER,iB);
    g.drawElements(g.TRIANGLES,iD.length,g.UNSIGNED_SHORT,0);

    // Draw halos & dots
    g.depthMask(false);
    for(let i=0;i<activeLights;i++){
      const [x,y]=lights[i];
      const d=new Float32Array([x,y]);
      g.bindBuffer(g.ARRAY_BUFFER,ptBuf); g.bufferData(g.ARRAY_BUFFER,d,g.DYNAMIC_DRAW);
      [haloP,dotP].forEach((p2,pi)=>{
        g.useProgram(p2);
        const ap=pi===0?haloAP:dotAP, uc=pi===0?haloUC:dotUC, as2=pi===0?haloAS:dotAS;
        g.enableVertexAttribArray(ap); g.vertexAttribPointer(ap,2,g.FLOAT,false,0,0);
        g.uniform3f(uc,...flameColors[i]); g.uniform1f(as2,asp);
        g.drawArrays(g.POINTS,0,1);
      });
    }
    g.depthMask(true);
    requestAnimationFrame(frame);
  }
  frame();
}

// 2-7: Reflection - Fresnel + env cube map simulation
function demoReflect(cont,isMobile){
  cont.innerHTML=`<div class="demo-wrap"><div class="demo-label">💎 Reflection — Fresnel 混合係數</div><canvas style="width:100%;display:block;height:260px"></canvas></div>
  <div class="slider-row"><label>💎 反射強度</label><input type="range" min="0" max="100" value="40" id="rfl" oninput="updRf()"><span class="slider-val" id="rvr">0.40</span></div>`;
  const cv=cont.querySelector("canvas");
  const gl=cv.getContext("webgl");if(!gl)return;
  let reflStrength=.4,t=0;
  const sph=setupSphere(gl,.88);
  const p=mkProg(gl,
    "attribute vec3 pos;attribute vec3 nor;varying vec3 vn;varying vec3 vr;uniform float asp;uniform float t;void main(){float cy=cos(t*.3),sy=sin(t*.3);vec3 rpos=vec3(pos.x*cy+pos.z*sy,pos.y,-pos.x*sy+pos.z*cy);vec3 rnor=vec3(nor.x*cy+nor.z*sy,nor.y,-nor.x*sy+nor.z*cy);vn=rnor;vec3 viewDir=normalize(vec3(0,0,1)-rpos);vr=reflect(-viewDir,rnor);gl_Position=vec4(rpos.x*0.92/asp,rpos.y*0.92,rpos.z*.01,1.);}",
    "precision mediump float;varying vec3 vn;varying vec3 vr;uniform float rfl;void main(){vec3 n=normalize(vn);vec3 l=normalize(vec3(1,1.5,2));float d=max(dot(n,l),0.);vec3 base=vec3(.88,.27,.27)*(.2+d*.8);vec3 r=normalize(vr);float envR=.5+.5*sin(r.x*4.+r.y*3.);float envG=.5+.5*cos(r.y*4.+r.z*2.);float envB=.5+.5*sin(r.z*5.+r.x*2.);vec3 env=vec3(envR,envG,envB);gl_FragColor=vec4(mix(base,env,rfl),1.);}");
  gl.useProgram(p);
  const ap=gl.getAttribLocation(p,"pos"),an=gl.getAttribLocation(p,"nor");
  gl.enableVertexAttribArray(ap);gl.vertexAttribPointer(ap,3,gl.FLOAT,false,24,0);
  gl.enableVertexAttribArray(an);gl.vertexAttribPointer(an,3,gl.FLOAT,false,24,12);
  const uasp=gl.getUniformLocation(p,"asp"),urfl=gl.getUniformLocation(p,"rfl"),ut2=gl.getUniformLocation(p,"t");
  gl.enable(gl.DEPTH_TEST);
  window.updRf=()=>{reflStrength=document.getElementById("rfl").value/100;document.getElementById("rvr").textContent=reflStrength.toFixed(2);};
  function frame(){
    t+=.016;
    const asp=syncCV(cv,260);
    gl.viewport(0,0,cv.width,cv.height);
    gl.clearColor(.04,.03,.09,1);gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
    gl.uniform1f(uasp,asp);gl.uniform1f(urfl,reflStrength);gl.uniform1f(ut2,t);
    gl.drawArrays(gl.TRIANGLES,0,sph.count);requestAnimationFrame(frame);
  }
  frame();
  if(isMobile)window.addEventListener("resize",()=>syncCV(cv,260));
}

// 2-8: Fog effect
function demoFog(cont,isMobile){
  cont.innerHTML=`<div class="demo-wrap"><div class="demo-label">🌫️ Fog — 遠處球體消失在霧中</div><canvas style="width:100%;display:block;height:260px"></canvas></div>
  <div class="slider-row"><label>🌫️ 霧濃度</label><input type="range" min="0" max="100" value="40" id="fdn" oninput="updFog()"><span class="slider-val" id="fvd">0.40</span></div>
  <div class="ctrl-row">
    <button class="ctrl-btn active" onclick="setFogT(0)">📏 線性霧</button>
    <button class="ctrl-btn" onclick="setFogT(1)">🌊 指數霧</button>
  </div>`;

  const cv=cont.querySelector("canvas");
  function syncSize(){const w=cv.clientWidth||600;if(cv.width!==w||cv.height!==260){cv.width=w;cv.height=260;cv.style.height="260px";}return w/260;}
  syncSize();
  if(isMobile)window.addEventListener("resize",()=>syncSize());

  const g=cv.getContext("webgl");if(!g)return;
  function mkS(t,s){const sh=g.createShader(t);g.shaderSource(sh,s);g.compileShader(sh);return sh;}
  function mkP(vs,fs){const p=g.createProgram();g.attachShader(p,mkS(g.VERTEX_SHADER,vs));g.attachShader(p,mkS(g.FRAGMENT_SHADER,fs));g.linkProgram(p);return p;}

  // Unit sphere geometry
  const ST=28,SL=36,vA=[],nA=[],iA=[];
  for(let a=0;a<=ST;a++){const phi=Math.PI*a/ST;for(let b=0;b<=SL;b++){const th=2*Math.PI*b/SL;const x=Math.sin(phi)*Math.cos(th),y=Math.cos(phi),z=Math.sin(phi)*Math.sin(th);vA.push(x,y,z);nA.push(x,y,z);}}
  for(let a=0;a<ST;a++)for(let b=0;b<SL;b++){const p0=a*(SL+1)+b,q=p0+SL+1;iA.push(p0,q,p0+1,q,q+1,p0+1);}
  const vD=new Float32Array(vA),nD=new Float32Array(nA),iD=new Uint16Array(iA);
  function mkBuf(d,t){const b=g.createBuffer();g.bindBuffer(t,b);g.bufferData(t,d,g.STATIC_DRAW);return b;}
  const vB=mkBuf(vD,g.ARRAY_BUFFER),nB=mkBuf(nD,g.ARRAY_BUFFER),iB=mkBuf(iD,g.ELEMENT_ARRAY_BUFFER);

  // VS: true perspective projection — same radius, different Z = different apparent size
  const prog=mkP(
    `attribute vec3 aPos;attribute vec3 aNor;
     varying vec3 vN;varying float vFog;
     uniform float asp;
     uniform vec3 sPos;    // sphere world position
     uniform float radius;
     uniform float fogD;
     uniform int fogT;
     void main(){
       vec3 wp = aPos*radius + sPos;
       vN = aNor;
       // Fog based on sphere depth (sPos.z, more negative = farther)
       float depth = -sPos.z;
       if(fogT==0){
         float fogEnd = max(0.5, (1.0-fogD)*12.0);
         vFog = clamp((depth-1.0)/fogEnd, 0.0, 1.0);
       } else {
         vFog = clamp(1.0-exp(-fogD*depth*0.5), 0.0, 1.0);
       }
       // Perspective: camera at z=0, scene at negative z
       float fov=0.55;
       float pz = -wp.z;
       gl_Position = vec4(
         wp.x/pz*fov/asp,
         wp.y/pz*fov,
         ((-wp.z-0.5)/15.0)*2.0-1.0,
         1.0
       );
     }`,
    `precision mediump float;
     varying vec3 vN;varying float vFog;
     uniform vec3 baseCol;
     void main(){
       vec3 N=normalize(vN);
       vec3 L=normalize(vec3(0.5,0.8,0.5));
       float diff=max(dot(N,L),0.0);
       vec3 H=normalize(L+vec3(0,0,1));
       float spec=pow(max(dot(N,H),0.0),64.0);
       vec3 lit=baseCol*(0.22+diff*0.78)+vec3(1.0,0.95,0.9)*spec*0.55;
       vec3 fogCol=vec3(0.14,0.12,0.18);
       gl_FragColor=vec4(mix(lit,fogCol,vFog),1.0);
     }`
  );

  g.useProgram(prog);
  const aPos=g.getAttribLocation(prog,"aPos"),aNor=g.getAttribLocation(prog,"aNor");
  const uAsp=g.getUniformLocation(prog,"asp");
  const uSPos=g.getUniformLocation(prog,"sPos");
  const uRad=g.getUniformLocation(prog,"radius");
  const uCol=g.getUniformLocation(prog,"baseCol");
  const uFogD=g.getUniformLocation(prog,"fogD");
  const uFogT=g.getUniformLocation(prog,"fogT");

  g.enable(g.DEPTH_TEST);

  // 3 identical spheres at different Z depths — perspective makes them look different sizes
  const SPHERES=[
    {pos:[0.0, 0.0, -2.0],  col:[0.88,0.22,0.22]},  // near: appears large
    {pos:[0.0, 0.0, -5.0],  col:[0.25,0.55,0.88]},  // mid
    {pos:[0.0, 0.0, -11.0], col:[0.25,0.78,0.42]},  // far: appears small
  ];
  const RADIUS=1.50;

  let fogD=0.40,fogT=0;
  window.updFog=()=>{fogD=document.getElementById("fdn").value/100;document.getElementById("fvd").textContent=fogD.toFixed(2);};
  window.setFogT=n=>{fogT=n;cont.querySelectorAll(".ctrl-btn").forEach(b=>b.classList.remove("active"));event.target.classList.add("active");};

  function frame(){
    const asp=syncSize();
    g.viewport(0,0,cv.width,cv.height);
    g.clearColor(0.14,0.12,0.18,1.0);
    g.clear(g.COLOR_BUFFER_BIT|g.DEPTH_BUFFER_BIT);
    g.useProgram(prog);
    g.uniform1f(uAsp,asp);
    g.uniform1f(uRad,RADIUS);
    g.uniform1f(uFogD,fogD);
    g.uniform1i(uFogT,fogT);

    g.bindBuffer(g.ARRAY_BUFFER,vB);g.enableVertexAttribArray(aPos);g.vertexAttribPointer(aPos,3,g.FLOAT,false,0,0);
    g.bindBuffer(g.ARRAY_BUFFER,nB);g.enableVertexAttribArray(aNor);g.vertexAttribPointer(aNor,3,g.FLOAT,false,0,0);
    g.bindBuffer(g.ELEMENT_ARRAY_BUFFER,iB);

    // Draw back to front
    [...SPHERES].reverse().forEach(({pos,col})=>{
      g.uniform3f(uSPos,...pos);
      g.uniform3f(uCol,...col);
      g.drawElements(g.TRIANGLES,iD.length,g.UNSIGNED_SHORT,0);
    });
    requestAnimationFrame(frame);
  }
  frame();
}
