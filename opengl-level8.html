// ── iOS Safari Fixes ──
// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    const R=Math.min(typeof r==='number'?r:r[0],w/2,h/2);
    this.beginPath();this.moveTo(x+R,y);this.lineTo(x+w-R,y);
    this.arcTo(x+w,y,x+w,y+R,R);this.lineTo(x+w,y+h-R);
    this.arcTo(x+w,y+h,x+w-R,y+h,R);this.lineTo(x+R,y+h);
    this.arcTo(x,y+h,x,y+h-R,R);this.lineTo(x,y+R);
    this.arcTo(x,y,x+R,y,R);this.closePath();
  };
}
// WebGL context pool - prevents iOS 8-context limit crash
const _glPool = {};
function safeGL(cv) {
  if(!cv) return null;
  const id = cv.id || ('cv_'+Math.random().toString(36).slice(2));
  cv.id = id;
  if(!window._glPool) window._glPool = {};
  const pool = window._glPool;
  if(pool[id] && !pool[id].isContextLost()) return pool[id];
  // Release oldest contexts if near iOS limit
  const keys = Object.keys(pool);
  if(keys.length >= 6) {
    try { pool[keys[0]].getExtension('WEBGL_lose_context')?.loseContext(); } catch(e){}
    delete pool[keys[0]];
  }
  const opts = {powerPreference:'low-power', preserveDrawingBuffer:false,
    failIfMajorPerformanceCaveat:false, antialias:true};
  const gl = cv.getContext('webgl', opts) || cv.getContext('experimental-webgl', opts);
  if(!gl) { console.warn('WebGL unavailable:', id); return null; }
  pool[id] = gl;
  cv.addEventListener('webglcontextlost', e=>{e.preventDefault();delete pool[id];});
  return gl;
}

story:'<span class="be">🔮</span>傳統渲染：三角形 → 光柵化 → 著色<br><span class="hl">Raymarching</span>：光線 → 沿路一步步走 → 碰到物體停下！<br><br>核心：<span class="hl2">SDF（有向距離場）</span><br>一個函數 f(p) 回傳「點 p 到最近物體表面的距離」<br><br>球：<code>sdSphere(p,r) = length(p) - r</code><br>方塊：<code>sdBox(p,b) = length(max(abs(p)-b,0))</code><br><br>Raymarching 算法：<br>從攝影機射出光線，<br>每次沿光線方向走「SDF距離」那麼遠（保證安全！）<br>重複直到 SDF ≈ 0（碰到表面）或超出最大距離<br><br>法線估計：<br><code>N = normalize(f(p+ε)-f(p-ε))</code> （對三個軸各算一次）<br><br>神奇之處：<span class="hl3">布林運算</span>！<br>union: min(a,b) — intersection: max(a,b) — subtraction: max(a,-b)',
quiz:{q:'Raymarching 為什麼每步走「SDF 距離」而不是固定步長？',opts:['固定步長更準確','SDF 保證那個距離內沒有物體，走 SDF 距離就是每步能走的最大安全距離，最快收斂','節省記憶體','OpenGL 要求'],ans:1,explain:'如果固定步長太小 → 慢；太大 → 可能跳過薄物體。SDF 精確告訴你「最近物體至少這麼遠」，所以這一步就走這麼多，絕對不會穿過物體！這是 Sphere Tracing 算法的核心智慧 🔮'}},
{id:'l3',num:'8-3',icon:'🌫️',title:'體積霧 — 光在空氣中散射',sub:'Volumetric Fog：丁達爾效應，光束穿透霧氣',xp:100,type:'normal',school:'物理：Mie 散射、消光係數、光線步進積分',
story:'<span class="be">🌫️</span>真實霧氣不只是讓遠處變白 — 光在霧中<span class="hl">散射</span>！<br>你能看到光束穿透樹林、霧中的燈光光暈。<br>這叫<span class="hl2">丁達爾效應</span>。<br><br>體積霧的算法：<span class="hl3">光線步進積分</span><br>沿視線方向一步一步走，<br>在每個步驟：<br>1️⃣ 計算這個點到光源的遮蔽（Shadow Map）<br>2️⃣ 計算散射（Mie/Rayleigh 相位函數）<br>3️⃣ 累積散射光<br>4️⃣ 累積消光（光走得越遠越暗）<br><br>最終：<code>color = fogColor * scattering + originalColor * transmittance</code><br><br>效能優化：低解析度渲染（1/4 解析度）然後 Upsample。',
quiz:{q:'體積霧為什麼需要 Shadow Map 的資訊？',opts:['讓霧更白','確定霧中每個採樣點是否在陰影中 — 只有被光照到的霧體積才會散射（可見的光束）','降低解析度','節省記憶體'],ans:1,explain:'沒有陰影的霧 = 到處都均勻散光，沒有光束感。加入陰影後，光束只在沒有被遮擋的地方出現，霧中的光束（God Ray）正是因為部分體積被遮擋、部分被照亮的對比！🌟'}},
{id:'l4',num:'8-4',icon:'🪞',title:'SSR — 螢幕空間反射',sub:'Screen Space Reflection：GPU 動態反射無需 Cubemap',xp:110,type:'normal',school:'電腦視覺：光線投影，深度重建世界座標',
story:'<span class="be">🪞</span>反射的傳統做法：Cubemap（靜態）或 FBO 鏡像渲染（貴！）<br><span class="hl">SSR</span> 用更聰明的方式：利用你<span class="hl2">已經有的畫面</span>！<br><br>算法：<br>1️⃣ 對每個 Roughness 低的像素<br>2️⃣ 計算反射光線方向 R = reflect(-V, N)<br>3️⃣ 沿 R 方向在<span class="hl3">螢幕空間</span>做光線步進<br>4️⃣ 比較步進位置的深度和 G-Buffer 深度<br>5️⃣ 碰到深度 = 找到反射點！採樣那個顏色<br><br>優點：<br>✅ 完全動態（反射實時的場景）<br>✅ 不需要額外渲染 Pass<br>✅ 自動包含所有螢幕上的物件<br><br>缺點：<br>❌ 螢幕邊緣反射丟失（出了畫面就不知道）<br>❌ Roughness 高的表面需要很多採樣',
quiz:{q:'SSR 最大的局限是什麼？',opts:['計算太慢','只能反射畫面中可見的物件，攝影機背後或螢幕外的物件無法被反射（需要後備的 Cubemap 填補）','顏色不夠真實','需要特別的硬體'],ans:1,explain:'SSR 用的是「螢幕空間」 — 當反射光線指向螢幕外、被其他物件遮蔽的區域、或攝影機背後，就找不到反射資訊。解決方案：用低解析度 Cubemap 作為後備（fallback），SSR 找不到時退回 Cubemap 🪞'}},
{id:'l5',num:'8-5',icon:'⏱️',title:'TAA — 時間性抗鋸齒',sub:'Temporal Anti-Aliasing：時間上的積分消除鋸齒',xp:100,type:'normal',school:'訊號處理：奈奎斯特定理、抖動採樣、時間濾波',
story:'<span class="be">⏱️</span>抗鋸齒的發展歷史：<br>MSAA → 每像素多重採樣（貴！）<br>FXAA → 後處理邊緣模糊（快但糊）<br><span class="hl">TAA</span> → 跨越時間的超級採樣！<br><br>核心想法：<br>同一個像素，每幀在不同的<span class="hl2">亞像素位置</span>取樣（Halton 序列）<br>把多幀的結果<span class="hl3">時間累積</span>！<br>等效於超採樣，但分散在多幀，每幀沒有額外開銷！<br><br>挑戰：<br>攝影機移動了怎麼辦？<br>用<span class="hl">速度緩衝（Velocity Buffer）</span>把前幀的像素「反投影」回去對齊！<br><br>Ghost 問題：<br>快速移動的物件有殘影 → 用「重投影可信度」控制混合比例。<br>現代 TAA（DLSS/FSR 前身）是最省效能的抗鋸齒！',
quiz:{q:'TAA 為什麼要用 Halton 序列做亞像素抖動？',opts:['隨機更好看','Halton 序列是低差異序列，確保抖動樣本分布均勻，多幀累積後採樣更均勻，消除鋸齒更完整','節省記憶體','OpenGL 標準'],ans:1,explain:'純隨機抖動可能連續幾幀都偏同一側，累積效果差。Halton 序列（準隨機數）保證樣本在像素內均勻分布，就像手動精心排列的採樣點，幾幀後就達到超採樣的品質 📐'}},
{id:'l6',num:'8-6',icon:'🧊',title:'OIT — 透明度的正確排序',sub:'Order Independent Transparency：不用排序的透明渲染',xp:90,type:'normal',school:'電腦科學：A-Buffer、Weighted Blended OIT',
story:'<span class="be">🧊</span>透明物件的渲染有個大問題：<br>必須從後往前排序才能正確混合！<br>100 個透明物件 = 每幀重新排序 = 效能殺手！<br><br><span class="hl">OIT（Order Independent Transparency）</span><br>讓你不用排序就能正確渲染透明物件！<br><br>方法一：<span class="hl2">Weighted Blended OIT</span>（快！近似）<br>同時累積：加權顏色總和 + 透明度總乘積<br>最後合成時除以權重和。<br>不完全精確，但大多數情況視覺差異很小！<br><br>方法二：<span class="hl3">A-Buffer</span>（精確但記憶體重）<br>每個像素儲存所有透明片段的列表，<br>最後排序並混合。<br>需要 SSBO 動態分配每像素儲存空間。<br><br>Unreal/Unity 等引擎預設用近似版本 🎮',
quiz:{q:'為什麼 Weighted Blended OIT 的近似值通常可以接受？',opts:['不透明物件不用它','大多數半透明效果（玻璃、煙霧、粒子）在視覺上對排序不敏感，近似的混合結果在人眼看起來正確','計算量相同','OpenGL 特性'],ans:1,explain:'玻璃窗後面的場景看起來差不多不管哪個玻璃片先混合。粒子、霧氣等效果本來就不需要精確排序。只有非常不透明的重疊物件（如疊起來的塑膠板）才會看出差異，而那種情況很少見 🧊'}},

function showXPPop(xp,el){const r=el.getBoundingClientRect();const d=document.createElement('div');d.className='xp-pop';d.textContent='+'+xp+' ⚡';d.style.cssText=`left:${r.left+r.width/2-25}px;top:${r.top+window.scrollY-10}px`;document.body.appendChild(d);setTimeout(()=>d.remove(),950);}

function mkP(gl,vs,fs){const mk=(t,s)=>{const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.warn(gl.getShaderInfoLog(sh));return sh;};const p=gl.createProgram();gl.attachShader(p,mk(gl.VERTEX_SHADER,vs));gl.attachShader(p,mk(gl.FRAGMENT_SHADER,fs));gl.linkProgram(p);return p;}
function qB(gl){const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);return b;}
const VS='attribute vec2 p;varying vec2 uv;void main(){uv=p*.5+.5;gl_Position=vec4(p,0,1);}';
function mkSD8(cont,id,label,mnames,fs,extras){
  const btns=mnames.map((n,i)=>`<button class="ctrl-btn ${i===0?'on':''}" id="m8${id}${i}" onclick="setM8_${id}(${i})">${n}</button>`).join('');

  window[`_m8${id}`]=0;window[`setM8_${id}`]=m=>{window[`_m8${id}`]=m;mnames.forEach((_,i)=>document.getElementById(`m8${id}${i}`).classList.toggle('on',i===m));};
  const cv=document.getElementById('cv8'+id);const gl=cv.getContext('webgl');if(!gl)return;
  const prog=mkP(gl,VS,fs);if(!prog)return;
  const buf=qB(gl);const pL=gl.getAttribLocation(prog,'p'),mL=gl.getUniformLocation(prog,'mode'),tL=gl.getUniformLocation(prog,'t');
  let time=0;(function fr(){time+=0.016;gl.viewport(0,0,cv.width,cv.height);gl.clear(gl.COLOR_BUFFER_BIT);gl.useProgram(prog);gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.enableVertexAttribArray(pL);gl.vertexAttribPointer(pL,2,gl.FLOAT,false,0,0);gl.uniform1i(mL,window[`_m8${id}`]);gl.uniform1f(tL,time);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(fr);})();
}

function d1(cont){mkSD8(cont,'1','Compute Shader — GPU 並行可視化',['⚡ 並行計算','🔲 工作群組','📊 記憶體模型'],
  `precision mediump float;varying vec2 uv;uniform int mode;uniform float t;
  float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.);}
  void main(){
    if(mode==1){
      // Work group visualization
      vec2 grid=floor(uv*vec2(16.,12.));vec2 f=fract(uv*vec2(16.,12.));
      float id=grid.x+grid.y*16.;float active=step(fract(t*.2+id/192.),.5);
      float border=step(.05,f.x)*step(f.x,.95)*step(.05,f.y)*step(f.y,.95);
      vec3 col=mix(vec3(.03,.01,.06),mix(vec3(.05,.02,.12),vec3(.3,.1,.6)*active,border),border);
      gl_FragColor=vec4(col,1.);return;
    }
    if(mode==2){
      // Memory hierarchy
      float y=uv.y;
      vec3 col=vec3(.03,.01,.06);
      if(y>.7)col=mix(vec3(.5,.1,.1),vec3(.8,.2,.2),fract(uv.x*20.));       // Global (slow)
      else if(y>.45)col=mix(vec3(.1,.3,.1),vec3(.2,.6,.2),fract(uv.x*8.)); // Shared
      else if(y>.25)col=mix(vec3(.1,.1,.5),vec3(.2,.2,.9),fract(uv.x*4.)); // L1 Cache
      else col=mix(vec3(.5,.4,.1),vec3(.9,.8,.2),fract(uv.x*2.));           // Register
      gl_FragColor=vec4(col,1.);return;
    }
    // Parallel particle simulation (visual)
    vec2 c=uv*2.-1.;vec3 col=vec3(.03,.01,.06);
    for(int i=0;i<64;i++){
      float s=float(i)/64.;float a=s*6.28*3.;float spd=.5+s*.5;
      vec2 pos=vec2(cos(a+t*spd),sin(a*1.3+t*spd*.7))*.6;
      float d=length(c-pos);
      col+=vec3(.4,.1,.8)*exp(-d*30.)*(1.-s*.5);
    }
    gl_FragColor=vec4(col,1.);
  }`);}

function d2(cont){mkSD8(cont,'2','Raymarching + SDF — 純數學場景',['🔮 SDF 場景','🎭 操作展示','🌈 法線可視化'],
  `precision mediump float;varying vec2 uv;uniform int mode;uniform float t;
  float sdSphere(vec3 p,float r){return length(p)-r;}
  float sdBox(vec3 p,vec3 b){vec3 d=abs(p)-b;return length(max(d,0.))+min(max(d.x,max(d.y,d.z)),0.);}
  float sdPlane(vec3 p){return p.y+1.;}
  float scene(vec3 p){
    float s1=sdSphere(p-vec3(sin(t)*.6,0.,0.),.4);
    float s2=sdSphere(p-vec3(-sin(t)*.6,.4,0.),.3);
    float box=sdBox(p-vec3(0.,-0.5,0.),vec3(.8,.05,.8));
    if(mode==1)return min(min(s1,s2),box);
    return min(min(s1,s2),box);
  }
  vec3 normal(vec3 p){const float e=.001;return normalize(vec3(scene(p+vec3(e,0,0))-scene(p-vec3(e,0,0)),scene(p+vec3(0,e,0))-scene(p-vec3(0,e,0)),scene(p+vec3(0,0,e))-scene(p-vec3(0,0,e))));}
  float softshadow(vec3 ro,vec3 rd,float mint,float k){float r=1.;float t2=mint;for(int i=0;i<24;i++){float h=scene(ro+rd*t2);if(h<.001)return 0.;r=min(r,k*h/t2);t2+=h;}return r;}
  void main(){
    vec2 c=(uv-.5)*vec2(600./280.,1.)*2.;
    vec3 ro=vec3(0.,1.,3.);vec3 rd=normalize(vec3(c.x,c.y-0.3,-2.));
    float dist=0.;vec3 p=ro;bool hit=false;
    for(int i=0;i<64;i++){p=ro+rd*dist;float d=scene(p);if(d<.001){hit=true;break;}if(dist>10.)break;dist+=d;}
    vec3 col=mix(vec3(.05,.02,.12),vec3(.2,.1,.3),uv.y);
    if(hit){
      vec3 N=normal(p);
      if(mode==2){col=N*.5+.5;gl_FragColor=vec4(col,1.);return;}
      vec3 L=normalize(vec3(cos(t*.5)*2.,3.,sin(t*.5)*2.));
      float diff=max(dot(N,L),0.);
      float sh=softshadow(p,L,.01,16.);
      float spec=pow(max(dot(reflect(-L,N),-rd),0.),32.);
      col=vec3(.3,.1,.6)*(diff*sh*.8+.1)+vec3(.8,.6,1.)*spec*.3;
    }
    col=col/(col+1.);col=pow(col,vec3(1./2.2));gl_FragColor=vec4(col,1.);
  }`);}

function d3(cont){mkSD8(cont,'3','體積霧 — 光線步進散射',['🌫️ 體積霧','☀️ 光束效果','🌑 陰影光束'],
  `precision mediump float;varying vec2 uv;uniform int mode;uniform float t;
  float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.);}
  float density(vec3 p){return max(0.,1.-length(p.xz)/2.)*.3*(1.+sin(p.x*3.+t)*.2);}
  void main(){
    vec2 c=(uv-.5)*2.;
    vec3 ro=vec3(0.,1.,3.);vec3 rd=normalize(vec3(c.x,c.y-0.3,-2.));
    vec3 sunDir=normalize(vec3(cos(t*.3)*2.,1.5,sin(t*.3)*2.));
    vec3 sunCol=vec3(1.,.85,.5);
    vec3 scatter=vec3(0.);float transmit=1.;
    float stepSize=.2;
    for(int i=0;i<20;i++){
      vec3 p=ro+rd*float(i)*stepSize;if(p.y<-1.)break;
      float d=density(p);
      if(d>0.){
        float inLight=1.;
        if(mode>=1){float shadow=0.;for(int j=0;j<8;j++){vec3 sp=p+sunDir*float(j)*.15;shadow+=density(sp)*.15;}inLight=exp(-shadow);}
        float phase=1.+pow(max(dot(rd,sunDir),0.),4.)*4.;
        scatter+=sunCol*d*inLight*(mode==0?1.:phase)*transmit*stepSize;
        transmit*=exp(-d*stepSize*3.);
      }
    }
    vec3 sky=mix(vec3(.05,.02,.12),vec3(.3,.2,.5),uv.y);
    vec3 col=sky*transmit+scatter;
    float sun=pow(max(dot(rd,sunDir),0.),64.);col+=sunCol*sun*transmit;
    col=col/(col+1.);col=pow(col,vec3(1./2.2));gl_FragColor=vec4(col,1.);
  }`);}

function d4(cont){mkSD8(cont,'4','SSR — 螢幕空間反射',['🪞 SSR 效果','📊 光線步進','🔲 深度緩衝'],
  `precision mediump float;varying vec2 uv;uniform int mode;uniform float t;
  float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.);}
  vec3 scene(vec2 u){
    vec3 col=vec3(.05,.02,.12);
    for(int i=0;i<4;i++){float f=float(i);vec2 lp=vec2(cos(t*.4+f*1.5)*.35+.5,sin(t*.35+f*1.1)*.25+.65);col+=mix(vec3(.5,.2,.9),vec3(.2,.5,1.),f/3.)*exp(-length(u-lp)*14.)*1.5;}
    return col;
  }
  void main(){
    float floorY=.5;float isFloor=step(uv.y,floorY);
    if(mode==2){float d=length(vec2(uv.x,floorY-uv.y));gl_FragColor=vec4(vec3(d*.8),1.);return;}
    vec3 col;
    if(isFloor>0.){
      vec2 reflUV=vec2(uv.x,floorY*2.-uv.y);
      float roughness=.05;float F=.6+.4*pow(max(1.-(uv.y-0.)*2.,0.),3.);
      if(mode==1){col=vec3(F);gl_FragColor=vec4(col,1.);return;}
      vec3 refl=scene(reflUV);vec3 refr=mix(vec3(.05,.02,.1),vec3(.1,.05,.2),(uv.y/floorY));
      col=mix(refr,refl,F*step(reflUV.y,1.)*step(0.,reflUV.y));
    } else {col=scene(uv);}
    col=col/(col+1.);col=pow(col,vec3(1./2.2));gl_FragColor=vec4(col,1.);
  }`);}

function d5(cont){mkSD8(cont,'5','TAA — 時間抗鋸齒',['⏱️ TAA 效果','📐 亞像素抖動','🔲 無 AA 對比'],
  `precision mediump float;varying vec2 uv;uniform int mode;uniform float t;
  float edge(vec2 u){
    float circle=abs(length(u-.5)-.25)-.005;
    float line=abs(u.x-.5)-.002;
    float diag=abs(u.x-u.y)-.002;
    return min(circle,min(line,diag));
  }
  void main(){
    if(mode==2){float e=edge(uv);gl_FragColor=vec4(vec3(step(0.,e)*.1+.02),1.);return;}
    if(mode==1){
      // Show jitter pattern
      vec2 halton=vec2(fract(float(int(t*30.))*0.5),fract(float(int(t*30.))*0.333));
      vec2 jittered=floor(uv*40.)/40.+halton/40.;
      float d=length(jittered-.5)-.25;float e=abs(d)-.004;
      gl_FragColor=vec4(step(0.,e)*.08+.02,step(0.,e)*.02+.01,step(0.,e)*.12+.04,1.);return;
    }
    // TAA: accumulate over multiple jittered frames
    vec3 col=vec3(0.);float weight=0.;
    for(int frame=0;frame<8;frame++){
      float h1=fract(float(frame)*.618);float h2=fract(float(frame)*.309);
      vec2 jittered=uv+vec2(h1,h2)/600.;
      float e=edge(jittered);
      float coverage=smoothstep(.003,-.003,e);
      col+=vec3(.5,.2,.9)*coverage;weight+=1.;
    }
    col/=weight;col+=.03;
    gl_FragColor=vec4(col,1.);
  }`);}

function d6(cont){mkSD8(cont,'6','OIT — 透明度排序無關渲染',['🧊 正確 OIT','❌ 無排序','🎨 權重可視化'],
  `precision mediump float;varying vec2 uv;uniform int mode;uniform float t;
  void main(){
    vec2 c=uv*2.-1.;vec3 result=vec3(.03,.01,.08);
    // 3 overlapping transparent circles
    vec2 c1=vec2(sin(t*.4)*.3,0.),c2=vec2(-.2,.2),c3=vec2(.2,-.2);
    float r1=.35,r2=.32,r3=.32;
    float d1=length(c-c1)-r1,d2=length(c-c2)-r2,d3=length(c-c3)-r3;
    bool in1=d1<0.,in2=d2<0.,in3=d3<0.;
    vec4 col1=vec4(1.,.3,.2,.5),col2=vec4(.2,.5,1.,.5),col3=vec4(.2,.9,.3,.5);
    if(mode==2){
      // Weight visualization
      float w1=in1?col1.a*exp(-d1*3.):0.;float w2=in2?col2.a*exp(-d2*3.):0.;float w3=in3?col3.a*exp(-d3*3.):0.;
      float tw=w1+w2+w3;if(tw>0.)result=(col1.rgb*w1+col2.rgb*w2+col3.rgb*w3)/tw*.7+.03;
      gl_FragColor=vec4(result,1.);return;
    }
    if(mode==1){
      // Wrong: front to back without sorting (wrong colors)
      if(in1)result=mix(result,col1.rgb,col1.a);
      if(in2)result=mix(result,col2.rgb,col2.a);
      if(in3)result=mix(result,col3.rgb,col3.a);
    } else {
      // Weighted Blended OIT
      vec4 accum=vec4(0.);float revealage=1.;
      if(in1){float w=col1.a*max(.01,abs(-d1));accum+=vec4(col1.rgb*col1.a,col1.a)*w;revealage*=(1.-col1.a);}
      if(in2){float w=col2.a*max(.01,abs(-d2));accum+=vec4(col2.rgb*col2.a,col2.a)*w;revealage*=(1.-col2.a);}
      if(in3){float w=col3.a*max(.01,abs(-d3));accum+=vec4(col3.rgb*col3.a,col3.a)*w;revealage*=(1.-col3.a);}
      if(accum.a>0.)result=mix(accum.rgb/accum.a,result,revealage);
    }
    gl_FragColor=vec4(result,1.);
  }`);}

function d7(cont){mkSD8(cont,'7','程序天空 — 大氣散射',['🌤️ 日間天空','🌅 夕陽','🌙 夜晚'],
  `precision mediump float;varying vec2 uv;uniform int mode;uniform float t;
  vec3 atmosphere(vec3 rd,vec3 sunDir){
    float sunAlt=sunDir.y;
    vec3 beta_r=vec3(5.8e-3,1.35e-2,3.31e-2);
    float mu=dot(rd,sunDir);
    float rayleigh=3./(16.*3.14159)*(1.+mu*mu);
    float mie=1./(4.*3.14159)*pow(max(0.,1.-.99+.99*mu),16.)*8.;
    float pathLen=max(.1,1./(rd.y+.1))*5.;
    vec3 scatter=exp(-beta_r*pathLen)*(beta_r*rayleigh+vec3(.01)*mie)*15.;
    vec3 sunColor=vec3(1.,.85,.5)*pow(max(0.,mu),64.)*8.*exp(-max(0.,1.-sunAlt)*4.);
    return scatter+sunColor;
  }
  void main(){
    vec2 c=(uv-.5)*2.*vec2(600./280.,1.);
    vec3 rd=normalize(vec3(c.x,c.y,.5+mode*.3));
    float sunAngle;
    if(mode==0)sunAngle=1.2;else if(mode==1)sunAngle=.1;else sunAngle=-1.2;
    vec3 sunDir=normalize(vec3(.5,sin(sunAngle),-.2));
    vec3 col=atmosphere(rd,sunDir);
    if(rd.y<0.){vec3 ground=mix(vec3(.15,.2,.08),vec3(.25,.3,.15),fract(uv.x*8.+uv.y*5.));col=mix(col,ground*max(.1,sunDir.y+.2),smoothstep(0.,-.1,rd.y));}
    if(mode==2){col*=.1;float star=step(.99,fract(sin(dot(floor(uv*80.),vec2(127.,311.)))*43758.));col+=vec3(.8,.9,1.)*star*.8;}
    col=col/(col+1.);col=pow(col,vec3(1./2.2));gl_FragColor=vec4(col,1.);
  }`);}

function d8(cont){

  document.getElementById('b8-spd').oninput=function(){document.getElementById('b8-spdv').textContent=(this.value/10).toFixed(1)+'x';};

  const cv=document.getElementById('cv8boss');
  cv.width=600;cv.height=280;cv.style.width='100%';cv.style.height='280px';const gl=cv.getContext('webgl');if(!gl)return;
  const fs=`precision mediump float;varying vec2 uv;uniform float t;uniform int mode;
  float sdSphere(vec3 p,float r){return length(p)-r;}
  float sdBox(vec3 p,vec3 b){vec3 q=abs(p)-b;return length(max(q,0.))+min(max(q.x,max(q.y,q.z)),0.);}

  vec3 normal(vec3 p){const float e=.001;return normalize(vec3(scene(p+vec3(e,0,0))-scene(p-vec3(e,0,0)),scene(p+vec3(0,e,0))-scene(p-vec3(0,e,0)),scene(p+vec3(0,0,e))-scene(p-vec3(0,0,e))));}
  float softshadow(vec3 ro,vec3 rd,float k){float r=1.,t2=.01;for(int i=0;i<32;i++){float h=scene(ro+rd*t2);if(h<.001)return 0.;r=min(r,k*h/t2);t2+=clamp(h,.01,.5);if(t2>8.)break;}return r;}
  vec3 sky(vec3 rd,vec3 sun){float mu=dot(rd,sun);vec3 blue=vec3(.1,.3,.8)*max(rd.y,0.);vec3 glow=vec3(1.,.7,.3)*pow(max(mu,0.),8.)*.5;return blue+glow+vec3(.05,.02,.1);}
  void main(){

// ── Completion System ──
const CASTLE_NUM = 8;
const CASTLE_TOTAL = 8;
const CASTLE_KEY = 'tower8_done';
const NEXT_CASTLE = 8;

function checkCompletion(){
  const done = JSON.parse(localStorage.getItem(CASTLE_KEY)||'[]').filter(Boolean).length;
  if(done >= CASTLE_TOTAL && !localStorage.getItem(CASTLE_KEY+'_comp_shown')){
    localStorage.setItem(CASTLE_KEY+'_comp_shown','1');
    setTimeout(showCompletion, 800);
  }
}

function showCompletion(){
  const overlay = document.getElementById('compOverlay');
  if(!overlay) return;
  // Fireworks
  const fw = overlay.querySelector('.fw-wrap');
  const colors=['#a78bfa','#34d399','#ffd700','#ff6b9d','#00d4ff','#ff9f43'];
  for(let i=0;i<28;i++){
    const d=document.createElement('div');
    d.className='fw';
    const tx=(Math.random()-.5)*300;
    const ty=-100-Math.random()*200;
    d.style.cssText=`width:6px;height:6px;background:${colors[i%colors.length]};left:${40+Math.random()*20}%;top:60%;--d:${.6+Math.random()*.8}s;--dl:${Math.random()*.5}s;--tx:${tx}px;--ty:${ty}px`;
    fw.appendChild(d);
  }
  overlay.classList.add('show');
}

function goNextCastle(){
  if(NEXT_CASTLE > 0){
    window.location.href='opengl-map.html#done-'+CASTLE_NUM;
  } else {
    window.location.href='opengl-map.html';
  }
}

function goMap(){ window.location.href='opengl-map.html#done-'+CASTLE_NUM; }

// Auto-scroll nav to current castle
(function(){
  const navBar = document.querySelector('div[style*="position:sticky;top:52px"]');
  if(!navBar) return;
  const current = navBar.querySelector('[style*="opacity:1"]');
  if(current) setTimeout(()=>{
    current.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }, 300);
})();
