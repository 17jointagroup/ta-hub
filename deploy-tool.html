*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#09091a;color:#dde0f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;

h1{font-size:20px;font-weight:500;margin-bottom:4px;}
.sub{font-size:12px;color:#7070a0;margin-bottom:28px;}
.card{background:#111128;border:1px solid rgba(255,255,255,0.09);border-radius:14px;

.card h2{font-size:12px;font-weight:500;color:#9090c0;margin-bottom:12px;letter-spacing:.05em;}
input[type=text],input[type=password]{width:100%;background:#0a0a1e;border:1px solid rgba(255,255,255,0.12);

input:focus{border-color:#4f80e8;}
.deploy-btn{width:100%;background:linear-gradient(135deg,#4f80e8,#9060d8);border:none;

.deploy-btn:hover{opacity:.88;} .deploy-btn:disabled{opacity:.4;cursor:not-allowed;}
.file-list{display:grid;gap:5px;}
.fr{display:flex;align-items:center;gap:10px;padding:7px 10px;
  background:rgba(255,255,255,.03);border-radius:7px;font-size:12px;}
.fr .fn{flex:1;font-family:monospace;color:#a0c0f0;}
.fr .fsz{color:#6070a0;font-size:11px;}
.sd{width:8px;height:8px;border-radius:50%;background:#333350;flex-shrink:0;}
.sd.wait{background:#333350;} .sd.up{background:#d4a017;animation:pulse .8s infinite;}
.sd.ok{background:#38c66b;} .sd.err{background:#e05050;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#log{background:#050510;border:1px solid rgba(255,255,255,.06);border-radius:8px;
  padding:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#6080a0;
  min-height:80px;max-height:220px;overflow-y:auto;white-space:pre-wrap;}
.lok{color:#38c66b;} .lerr{color:#e05050;} .linf{color:#4f80e8;}
.pb{width:100%;height:4px;background:#1a1a3a;border-radius:2px;margin:10px 0;}
.pf{height:100%;background:linear-gradient(90deg,#4f80e8,#9060d8);border-radius:2px;transition:width .3s;}
.warn{background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.3);
  border-radius:8px;padding:10px 14px;font-size:12px;color:#c09020;margin-bottom:12px;line-height:1.7;}
code{font-family:monospace;background:rgba(255,255,255,.08);padding:1px 5px;border-radius:3px;}
</style>

const REPO='17jointagroup/ta-hub', BRANCH='main', API='https://api.github.com';
const names=Object.keys(FILES);
document.getElementById('tcnt').textContent=names.length+' files';
const fl=document.getElementById('fl');
const dots={};
names.forEach(name=>{
  const row=document.createElement('div');row.className='fr';
  const sz=Math.round(atob(FILES[name]).length/1024);
  row.innerHTML=`<div class="sd wait" id="d_${name.replace(/\./g,'_')}"></div><span class="fn">${name}</span><span class="fsz">${sz}KB</span>`;
  fl.appendChild(row);dots[name]=document.getElementById('d_'+name.replace(/\./g,'_'));
});
const logEl=document.getElementById('log');
function log(msg,cls=''){const l=document.createElement('span');if(cls)l.className=cls;l.textContent=msg+'\n';logEl.appendChild(l);logEl.scrollTop=logEl.scrollHeight;}
async function getSHA(tok,path){const r=await fetch(`${API}/repos/${REPO}/contents/${path}?ref=${BRANCH}`,{headers:{Authorization:'token '+tok,Accept:'application/vnd.github.v3+json'}});if(r.status===404)return null;return(await r.json()).sha||null;}
async function putFile(tok,path,b64,sha,msg){const body={message:msg,content:b64,branch:BRANCH};if(sha)body.sha=sha;return fetch(`${API}/repos/${REPO}/contents/${path}`,{method:'PUT',headers:{Authorization:'token '+tok,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});}
async function startDeploy(){
  const tok=document.getElementById('token').value.trim();
  if(!tok||(!tok.startsWith('ghp_')&&!tok.startsWith('github_pat_'))){alert('請輸入有效的 GitHub Token（ghp_ 或 github_pat_ 開頭）');return;}
  const btn=document.getElementById('deployBtn');btn.disabled=true;btn.textContent='⏳ 部署中...';
  logEl.innerHTML='';const pf=document.getElementById('pf');let done=0;
  log('🚀 開始部署 '+names.length+' 個檔案到 '+REPO,'linf');log('─'.repeat(36));
  for(const name of names){
    dots[name].className='sd up';log('📤 '+name+' ...');
    try{
      const sha=await getSHA(tok,name);log('   └─ '+(sha?'更新 '+sha.slice(0,8):'首次上傳'));
      const res=await putFile(tok,name,FILES[name],sha,'Update '+name+' via deploy tool (castle unlock)');
      if(res.ok||res.status===200||res.status===201){dots[name].className='sd ok';log('   ✅ 成功','lok');}
      else{const e=await res.json().catch(()=>({message:'?'}));dots[name].className='sd err';log('   ❌ '+res.status+': '+(e.message||''),'lerr');}
    }catch(e){dots[name].className='sd err';log('   ❌ '+e.message,'lerr');}
    done++;pf.style.width=Math.round(done/names.length*100)+'%';
    await new Promise(r=>setTimeout(r,350));
  }
  log('─'.repeat(36));
  const errs=document.querySelectorAll('.sd.err').length;
  if(errs===0){log('🎉 全部 '+names.length+' 個檔案部署完成！','lok');log('🌐 https://17jointagroup.github.io/ta-hub/opengl-castle1.html','linf');}
  else log('⚠️ '+errs+' 個失敗，請重試','lerr');
  btn.disabled=false;btn.textContent=errs===0?'✅ 部署完成！':'🔁 重新部署';
}
</script>
