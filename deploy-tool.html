<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#09091a;color:#dde0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px;}
h1{font-size:20px;font-weight:500;margin-bottom:4px;}
.sub{font-size:12px;color:#7070a0;margin-bottom:28px;}
.card{background:#111128;border:1px solid rgba(255,255,255,0.09);border-radius:14px;
  width:100%;max-width:640px;padding:24px;margin-bottom:16px;}
.card h2{font-size:13px;font-weight:500;color:#9090c0;margin-bottom:14px;letter-spacing:.05em;}
input[type=text],input[type=password]{
  width:100%;background:#0a0a1e;border:1px solid rgba(255,255,255,0.12);border-radius:8px;
  color:#dde0f0;font-size:13px;padding:10px 12px;outline:none;margin-bottom:10px;
  font-family:monospace;}
input:focus{border-color:#4f80e8;}
.deploy-btn{width:100%;background:linear-gradient(135deg,#4f80e8,#9060d8);
  border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:500;
  padding:14px;cursor:pointer;transition:.15s;margin-top:4px;}
.deploy-btn:hover{opacity:0.88;}
.deploy-btn:disabled{opacity:0.4;cursor:not-allowed;}
.file-list{display:grid;gap:6px;}
.file-row{display:flex;align-items:center;gap:10px;padding:8px 10px;
  background:rgba(255,255,255,0.03);border-radius:7px;font-size:12px;}
.file-row .fname{flex:1;font-family:monospace;color:#a0c0f0;}
.file-row .fsize{color:#6070a0;font-size:11px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:#333350;flex-shrink:0;}
.status-dot.waiting{background:#333350;}
.status-dot.uploading{background:#d4a017;animation:pulse .8s infinite;}
.status-dot.done{background:#38c66b;}
.status-dot.error{background:#e05050;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#log{background:#050510;border:1px solid rgba(255,255,255,0.06);border-radius:8px;
  padding:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#6080a0;
  min-height:80px;max-height:240px;overflow-y:auto;white-space:pre-wrap;}
.log-ok{color:#38c66b;}
.log-err{color:#e05050;}
.log-info{color:#4f80e8;}
.progress-bar{width:100%;height:4px;background:#1a1a3a;border-radius:2px;margin:10px 0;}
.progress-fill{height:100%;background:linear-gradient(90deg,#4f80e8,#9060d8);
  border-radius:2px;transition:width .3s;}
.badge{display:inline-block;background:rgba(79,128,232,0.15);color:#6090e0;
  border:1px solid rgba(79,128,232,0.3);border-radius:20px;font-size:10px;
  padding:2px 8px;margin-left:6px;}
.warn{background:rgba(212,160,23,0.1);border:1px solid rgba(212,160,23,0.3);
  border-radius:8px;padding:10px 14px;font-size:12px;color:#c09020;margin-bottom:14px;
  line-height:1.7;}
</style>
</head>

const REPO  = '17jointagroup/ta-hub';
const BRANCH = 'main';
const API   = 'https://api.github.com';

// ══════════════════════════════════════════════════════
//  UI Setup
// ══════════════════════════════════════════════════════
const fileNames = Object.keys(FILES);
document.getElementById('totalCount').textContent = fileNames.length + ' files';

const fileListEl = document.getElementById('fileList');
const dots = {};
fileNames.forEach(name => {
  const row = document.createElement('div');
  row.className = 'file-row';
  const sizeBytes = Math.round(atob(FILES[name]).length);
  const sizeStr = sizeBytes > 1024 ? (sizeBytes/1024).toFixed(1)+'KB' : sizeBytes+'B';
  row.innerHTML = `<div class="status-dot waiting" id="dot-${CSS.escape(name)}"></div>
    <span class="fname">${name}</span>
    <span class="fsize">${sizeStr}</span>`;
  fileListEl.appendChild(row);
  dots[name] = document.getElementById('dot-' + CSS.escape(name));
});

const logEl = document.getElementById('log');
function log(msg, cls='') {
  const line = document.createElement('span');
  if(cls) line.className = cls;
  line.textContent = msg + '\n';
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}
function logClear(){ logEl.innerHTML = ''; }

// ══════════════════════════════════════════════════════
//  GitHub API Helpers
// ══════════════════════════════════════════════════════
async function getFileSHA(token, path) {
  const res = await fetch(`${API}/repos/${REPO}/contents/${path}?ref=${BRANCH}`, {
    headers: { Authorization: 'token ' + token, Accept: 'application/vnd.github.v3+json' }
  });
  if (res.status === 404) return null;
  const data = await res.json();
  return data.sha || null;
}

async function putFile(token, path, b64Content, sha, commitMsg) {
  const body = { message: commitMsg, content: b64Content, branch: BRANCH };
  if (sha) body.sha = sha;
  const res = await fetch(`${API}/repos/${REPO}/contents/${path}`, {
    method: 'PUT',
    headers: {
      Authorization: 'token ' + token,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  return res;
}

// ══════════════════════════════════════════════════════
//  Main Deploy
// ══════════════════════════════════════════════════════
async function startDeploy() {
  const token = document.getElementById('token').value.trim();
  if (!token || !token.startsWith('gh')) {
    alert('請先輸入有效的 GitHub Token（ghp_ 開頭）');
    return;
  }

  const btn = document.getElementById('deployBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 部署中...';
  logClear();

  const fill = document.getElementById('progressFill');
  let done = 0;
  const total = fileNames.length;

  log('🚀 開始部署 ' + total + ' 個檔案到 ' + REPO, 'log-info');
  log('━'.repeat(40));

  for (const name of fileNames) {
    const dot = dots[name];
    dot.className = 'status-dot uploading';
    log('📤 ' + name + ' ...');

    try {
      const sha = await getFileSHA(token, name);
      if (sha) log('   └─ 取得現有 SHA: ' + sha.substring(0,8) + '...');
      else log('   └─ 新檔案（首次上傳）');

      const res = await putFile(token, name, FILES[name], sha,
        `Update ${name} via deploy tool`);

      if (res.ok || res.status === 200 || res.status === 201) {
        dot.className = 'status-dot done';
        log('   ✅ 成功', 'log-ok');
      } else {
        const errData = await res.json().catch(()=>({message:'unknown'}));
        dot.className = 'status-dot error';
        log('   ❌ 錯誤 ' + res.status + ': ' + (errData.message||''), 'log-err');
      }
    } catch(e) {
      dot.className = 'status-dot error';
      log('   ❌ 例外: ' + e.message, 'log-err');
    }

    done++;
    fill.style.width = Math.round(done / total * 100) + '%';

    // Rate limit buffer
    await new Promise(r => setTimeout(r, 300));
  }

  log('━'.repeat(40));
  const errors = document.querySelectorAll('.status-dot.error').length;
  if (errors === 0) {
    log('🎉 全部 ' + total + ' 個檔案部署完成！', 'log-ok');
    log('🌐 https://17jointagroup.github.io/ta-hub/opengl-map.html', 'log-info');
  } else {
    log('⚠️ 完成，但 ' + errors + ' 個檔案失敗。請重試。', 'log-err');
  }

  btn.disabled = false;
  btn.textContent = errors === 0 ? '✅ 部署完成！' : '🔁 重新部署';
}
</script>
