<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 TA Hub 一鍵部署工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0b14;color:#e8eaf6;font-family:-apple-system,sans-serif;padding:20px;min-height:100vh}
h1{font-size:1.4rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,#7c6dfa,#00f5c4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#5a607a;font-size:.82rem;margin-bottom:24px}
.card{background:#13162a;border:1px solid #1e2340;border-radius:16px;padding:18px;margin-bottom:14px}
label{display:block;font-size:.78rem;font-weight:800;color:#5a607a;margin-bottom:7px;letter-spacing:.04em}
input{width:100%;background:#0a0b14;border:1px solid #1e2340;border-radius:10px;padding:11px 14px;color:#e8eaf6;font-size:.88rem;font-family:monospace;outline:none;-webkit-appearance:none}
input:focus{border-color:#7c6dfa}
.btn{width:100%;background:linear-gradient(135deg,#7c6dfa,#00f5c4);color:#0a0b14;border:none;border-radius:100px;padding:14px;font-size:1rem;font-weight:900;cursor:pointer;margin-top:8px;-webkit-appearance:none}
.btn:active{opacity:.8}
.btn:disabled{opacity:.4;cursor:not-allowed}
.file-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1e2340}
.file-row:last-child{border-bottom:none}
.file-name{font-size:.82rem;font-weight:700;font-family:monospace;color:#a0a8d0}
.status{font-size:.78rem;font-weight:800;padding:3px 10px;border-radius:100px;flex-shrink:0}
.s-wait{background:rgba(90,96,122,.15);color:#5a607a}
.s-ok{background:rgba(0,245,196,.1);color:#00f5c4}
.s-err{background:rgba(255,107,107,.1);color:#ff6b6b}
.s-run{background:rgba(124,109,250,.1);color:#7c6dfa;animation:pulse .8s infinite alternate}
@keyframes pulse{from{opacity:.5}to{opacity:1}}
.log{background:#060810;border:1px solid #1e2340;border-radius:10px;padding:12px;font-size:.73rem;font-family:monospace;color:#5a607a;max-height:160px;overflow-y:auto;margin-top:14px;white-space:pre-wrap;display:none}
.warn{background:rgba(255,179,71,.07);border:1px solid rgba(255,179,71,.2);border-radius:10px;padding:12px;font-size:.78rem;color:#ffb347;margin-bottom:14px;line-height:1.6}
.progress{height:4px;background:#1e2340;border-radius:100px;margin-top:14px;overflow:hidden;display:none}
.progress-fill{height:100%;background:linear-gradient(90deg,#7c6dfa,#00f5c4);border-radius:100px;transition:width .4s ease;width:0%}
</style>
</head>
<body>
<h1>🚀 TA Hub 一鍵部署工具</h1>
<p class="sub">自動將所有 OpenGL 塔更新到 GitHub，無需電腦</p>

<div class="warn">
  ⚠️ 需要 GitHub Personal Access Token（PAT）<br>
  前往 github.com → Settings → Developer settings → Personal access tokens → Tokens (classic) → Generate new token<br>
  勾選 <strong>repo</strong> 權限即可
</div>

<div class="card">
  <label>GitHub Token</label>
  <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" autocorrect="off" spellcheck="false">
  <label style="margin-top:14px">Repository（擁有者/repo名稱）</label>
  <input type="text" id="repo" value="17jointagroup/ta-hub" autocorrect="off" spellcheck="false">
  <label style="margin-top:14px">Branch</label>
  <input type="text" id="branch" value="main" autocorrect="off" spellcheck="false">
</div>

<div class="card">
  <label>部署檔案列表（共 9 個塔）</label>
  <div id="file-list"></div>
  <div class="progress" id="progress"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="log" id="log"></div>
  <button class="btn" id="deploy-btn" onclick="deployAll()">⚡ 一鍵部署全部 9 個塔</button>
</div>

const FILE_NAMES = Object.keys(FILES);

// Render file list
const list = document.getElementById('file-list');
FILE_NAMES.forEach(name => {
  const row = document.createElement('div');
  row.className = 'file-row';
  row.id = 'row-' + name;
  row.innerHTML = `<span class="file-name">${name}</span><span class="status s-wait" id="st-${name}">待上傳</span>`;
  list.appendChild(row);
});

function log(msg) {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function setStatus(name, cls, text) {
  const el = document.getElementById('st-' + name);
  if (el) { el.className = 'status ' + cls; el.textContent = text; }
}

async function getSHA(token, repo, branch, path) {
  const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}?ref=${branch}`, {
    headers: { Authorization: 'token ' + token, Accept: 'application/vnd.github.v3+json' }
  });
  if (r.status === 404) return null;
  const d = await r.json();
  return d.sha || null;
}

async function uploadFile(token, repo, branch, path, b64Content) {
  const sha = await getSHA(token, repo, branch, path);
  const body = { message: `Update ${path} via deploy tool`, content: b64Content, branch };
  if (sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
    method: 'PUT',
    headers: { Authorization: 'token ' + token, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return r.ok;
}

async function deployAll() {
  const token = document.getElementById('token').value.trim();
  const repo = document.getElementById('repo').value.trim();
  const branch = document.getElementById('branch').value.trim();
  if (!token) { alert('請輸入 GitHub Token'); return; }
  if (!repo) { alert('請輸入 Repository'); return; }

  const btn = document.getElementById('deploy-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 部署中...';
  document.getElementById('progress').style.display = 'block';

  let done = 0;
  for (const name of FILE_NAMES) {
    setStatus(name, 's-run', '上傳中...');
    log(`上傳 ${name}...`);
    try {
      const ok = await uploadFile(token, repo, branch, name, FILES[name]);
      if (ok) {
        setStatus(name, 's-ok', '✓ 完成');
        log(`✓ ${name} 成功`);
      } else {
        setStatus(name, 's-err', '✗ 失敗');
        log(`✗ ${name} 失敗`);
      }
    } catch(e) {
      setStatus(name, 's-err', '✗ 錯誤');
      log(`✗ ${name} 錯誤: ${e.message}`);
    }
    done++;
    document.getElementById('progress-fill').style.width = (done / FILE_NAMES.length * 100) + '%';
  }

  btn.disabled = false;
  btn.textContent = '🎉 部署完成！再次部署';
  log('\n全部完成！');
}
