<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 TA HUB Deploy Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--bg2:#0d0f1e;--card:#111326;--border:#1a1d35;
  --acc:#e84545;--acc2:#00d4ff;--acc3:#ffd700;--acc4:#50fa7b;
  --txt:#e8eaf6;--txt2:#8892b0;
  --mono:'Space Mono',monospace;--font:'Nunito',sans-serif;
}
body{background:var(--bg);color:var(--txt);font-family:var(--font);min-height:100vh;padding:0 0 60px}
header{background:rgba(7,8,15,.95);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
.logo{font-size:1.3rem;font-weight:900;color:var(--acc2)}
.logo span{color:var(--acc)}
.tag{background:rgba(80,250,123,.12);border:1px solid rgba(80,250,123,.3);color:var(--acc4);border-radius:100px;padding:3px 12px;font-size:.72rem;font-weight:800;font-family:var(--mono)}
.repo-info{margin-left:auto;font-family:var(--mono);font-size:.75rem;color:var(--txt2);display:flex;align-items:center;gap:12px}
.repo-url{color:var(--acc2);text-decoration:none}
.repo-url:hover{text-decoration:underline}

.main{max-width:900px;margin:0 auto;padding:24px}
h2{font-size:1rem;font-weight:900;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
h2::before{content:'';width:3px;height:16px;background:var(--acc);border-radius:2px}

/* Token input */
.token-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:24px}
.token-card.ok{border-color:rgba(80,250,123,.4)}
.token-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.token-label{font-size:.82rem;font-weight:800;color:var(--txt2);flex-shrink:0}
.token-input{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--border);color:var(--txt);border-radius:10px;padding:9px 14px;font-family:var(--mono);font-size:.8rem;outline:none;transition:.2s}
.token-input:focus{border-color:var(--acc2)}
.btn{background:var(--card);border:1.5px solid var(--border);color:var(--txt);border-radius:10px;padding:9px 18px;font-family:var(--font);font-size:.82rem;font-weight:800;cursor:pointer;transition:.15s;flex-shrink:0}
.btn:hover{border-color:var(--acc2);color:var(--acc2)}
.btn.primary{background:linear-gradient(135deg,var(--acc),#c02020);border:none;color:#fff}
.btn.primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(232,69,69,.35)}
.btn.green{background:linear-gradient(135deg,var(--acc4),#22c55e);border:none;color:#050a05}
.btn.green:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(80,250,123,.3)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.token-status{font-size:.78rem;font-weight:800;margin-top:10px;display:flex;align-items:center;gap:6px}

/* File list */
.files-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:24px}
.files-toolbar{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.select-all{font-size:.8rem;font-weight:800;color:var(--txt2);cursor:pointer;display:flex;align-items:center;gap:6px}
.select-all input{accent-color:var(--acc);width:15px;height:15px;cursor:pointer}
.file-count{margin-left:auto;font-family:var(--mono);font-size:.75rem;color:var(--txt2)}

.file-group{padding:8px 0}
.file-group-label{padding:4px 18px;font-size:.7rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--txt2)}
.file-row{display:flex;align-items:center;gap:12px;padding:8px 18px;transition:background .15s;cursor:pointer}
.file-row:hover{background:rgba(255,255,255,.03)}
.file-row input[type=checkbox]{accent-color:var(--acc2);width:15px;height:15px;cursor:pointer;flex-shrink:0}
.file-icon{font-size:1.1rem;flex-shrink:0;width:22px;text-align:center}
.file-name{font-family:var(--mono);font-size:.82rem;font-weight:700;flex:1;min-width:0}
.file-size{font-family:var(--mono);font-size:.72rem;color:var(--txt2);min-width:48px;text-align:right}
.file-status{font-size:.72rem;font-weight:800;min-width:70px;text-align:right;font-family:var(--mono)}
.status-pending{color:var(--txt2)}
.status-uploading{color:var(--acc3);animation:blink .8s ease infinite}
.status-done{color:var(--acc4)}
.status-error{color:var(--acc)}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}

/* Deploy panel */
.deploy-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:24px}
.commit-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.commit-input{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--border);color:var(--txt);border-radius:10px;padding:9px 14px;font-family:var(--font);font-size:.85rem;outline:none;transition:.2s}
.commit-input:focus{border-color:var(--acc)}

/* Progress */
.progress-wrap{margin-top:16px;display:none}
.progress-wrap.show{display:block}
.progress-bar{height:8px;background:var(--border);border-radius:100px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:100px;transition:width .3s ease;width:0%}
.progress-text{font-family:var(--mono);font-size:.78rem;color:var(--txt2)}

/* Log */
.log-card{background:#050710;border:1px solid var(--border);border-radius:16px;padding:16px;font-family:var(--mono);font-size:.75rem;line-height:1.8;max-height:280px;overflow-y:auto}
.log-card:empty::before{content:"等待部署…";color:var(--txt2)}
.log-line{display:flex;gap:8px}
.log-time{color:var(--txt2);flex-shrink:0}
.log-ok{color:var(--acc4)}
.log-err{color:var(--acc)}
.log-info{color:var(--acc2)}
.log-warn{color:var(--acc3)}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--acc4);border-radius:100px;padding:10px 24px;font-weight:800;font-size:.88rem;color:var(--acc4);z-index:999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(80,250,123,.2);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--acc);color:var(--acc);box-shadow:0 8px 32px rgba(232,69,69,.2)}

.stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 16px;text-align:center;flex:1;min-width:80px}
.stat .n{font-size:1.4rem;font-weight:900;font-family:var(--mono);color:var(--acc3)}
.stat .l{font-size:.68rem;color:var(--txt2);font-weight:800;text-transform:uppercase;letter-spacing:.05em}

@media(max-width:600px){
  .token-row{flex-direction:column}
  .commit-row{flex-direction:column}
  .file-size{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo"><span>TA</span> HUB</div>
  <div class="tag">🚀 Deploy Tool</div>
  <div class="repo-info">
    <span>repo:</span>
    <a class="repo-url" href="https://github.com/17jointagroup/ta-hub" target="_blank">17jointagroup/ta-hub</a>
    <span>→</span>
    <a class="repo-url" href="https://17jointagroup.github.io/ta-hub/" target="_blank">GitHub Pages</a>
  </div>
</header>

<div class="main">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat"><div class="n" id="stat-total">0</div><div class="l">總檔案</div></div>
    <div class="stat"><div class="n" id="stat-selected">0</div><div class="l">已選擇</div></div>
    <div class="stat"><div class="n" id="stat-done">0</div><div class="l">已部署</div></div>
    <div class="stat"><div class="n" id="stat-size">0KB</div><div class="l">總大小</div></div>
  </div>

  <!-- GitHub Token -->
  <h2>🔑 GitHub Token</h2>
  <div class="token-card" id="token-card">
    <div class="token-row">
      <span class="token-label">Personal Access Token</span>
      <input class="token-input" type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxx" oninput="onTokenInput()">
      <button class="btn" onclick="testToken()">🔍 驗證</button>
      <button class="btn" onclick="saveToken()">💾 儲存</button>
    </div>
    <div class="token-status" id="token-status">
      <span style="color:var(--txt2)">⚠️ 需要 repo 權限的 Personal Access Token</span>
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=TA+HUB+Deploy" target="_blank" style="color:var(--acc2);font-size:.72rem;margin-left:8px">→ 建立 Token</a>
    </div>
  </div>

  <!-- File List -->
  <h2>📁 部署檔案</h2>
  <div class="files-card">
    <div class="files-toolbar">
      <label class="select-all">
        <input type="checkbox" id="chk-all" onchange="toggleAll(this.checked)">
        全選
      </label>
      <button class="btn" onclick="selectGroup('dx')">⚔️ DX 全選</button>
      <button class="btn" onclick="selectGroup('opengl')">🏰 OpenGL 全選</button>
      <button class="btn" onclick="selectGroup('index')">📄 主頁</button>
      <span class="file-count" id="file-count">0 / 0 選中</span>
    </div>
    <div id="file-list"></div>
  </div>

  <!-- Deploy -->
  <h2>🚀 部署設定</h2>
  <div class="deploy-card">
    <div class="commit-row">
      <input class="commit-input" id="commit-msg" type="text" placeholder="✏️ Commit 訊息（例：feat: add DX level 2）" value="feat: update TA HUB files">
      <button class="btn primary" id="deploy-btn" onclick="startDeploy()" disabled>🚀 開始部署</button>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn green" onclick="openSite()">🌐 開啟網站</button>
      <button class="btn" onclick="openRepo()">📦 開啟 Repo</button>
      <button class="btn" onclick="clearLog()">🗑️ 清除日誌</button>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text">準備中…</div>
    </div>
  </div>

  <!-- Log -->
  <h2>📋 部署日誌</h2>
  <div class="log-card" id="log"></div>

</div>

<div class="toast" id="toast"></div>

<script>
const REPO_OWNER = '17jointagroup';
const REPO_NAME  = 'ta-hub';
const BRANCH     = 'main';
const API_BASE   = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`;

// ── File definitions ──
const FILES = [
  // Core
  {name:'index.html',       icon:'🏠', group:'index',  label:'主頁'},
  {name:'ta-course.html',   icon:'📚', group:'index',  label:'課程頁'},
  // OpenGL Map
  {name:'opengl-map.html',  icon:'🗺️', group:'opengl', label:'OpenGL 地圖'},
  // OpenGL Levels
  {name:'opengl-level1.html',icon:'🏰',group:'opengl', label:'OpenGL 要塞1'},
  {name:'opengl-level2.html',icon:'🏰',group:'opengl', label:'OpenGL 要塞2'},
  {name:'opengl-level3.html',icon:'🏰',group:'opengl', label:'OpenGL 要塞3'},
  {name:'opengl-level4.html',icon:'🏰',group:'opengl', label:'OpenGL 要塞4'},
  {name:'opengl-level5.html',icon:'🏰',group:'opengl', label:'OpenGL 要塞5'},
  {name:'opengl-level6.html',icon:'🏰',group:'opengl', label:'OpenGL 要塞6'},
  {name:'opengl-level7.html',icon:'🏰',group:'opengl', label:'OpenGL 要塞7'},
  {name:'opengl-level8.html',icon:'🏰',group:'opengl', label:'OpenGL 要塞8'},
  {name:'opengl-level9.html',icon:'🏰',group:'opengl', label:'OpenGL 要塞9'},
  // DX Map
  {name:'dx-map.html',      icon:'🗺️', group:'dx',     label:'DX 地圖'},
  // DX Levels
  {name:'dx-level1.html',   icon:'⚔️', group:'dx',     label:'DX 要塞1'},
  {name:'dx-level2.html',   icon:'⚔️', group:'dx',     label:'DX 要塞2'},
  {name:'dx-level3.html',   icon:'⚔️', group:'dx',     label:'DX 要塞3'},
  {name:'dx-level4.html',   icon:'⚔️', group:'dx',     label:'DX 要塞4'},
  {name:'dx-level5.html',   icon:'⚔️', group:'dx',     label:'DX 要塞5'},
  {name:'dx-level6.html',   icon:'⚔️', group:'dx',     label:'DX 要塞6'},
  {name:'dx-level7.html',   icon:'⚔️', group:'dx',     label:'DX 要塞7'},
  {name:'dx-level8.html',   icon:'⚔️', group:'dx',     label:'DX 要塞8'},
  {name:'dx-level9.html',   icon:'⚔️', group:'dx',     label:'DX 要塞9'},
  // Deploy tool itself
  {name:'deploy-tool.html', icon:'🚀', group:'index',  label:'部署工具'},
];

let token = '';
let fileStatuses = {}; // name → 'pending'|'uploading'|'done'|'error'|'skip'
let deployedCount = 0;
let isDeploying = false;

// ── Init ──
function init(){
  // Load saved token
  const saved = localStorage.getItem('gh_deploy_token');
  if(saved){
    token = saved;
    document.getElementById('gh-token').value = saved;
    setTokenStatus('ok', '✅ Token 已載入（上次儲存）');
    document.getElementById('token-card').classList.add('ok');
  }
  renderFiles();
  updateStats();
}

function renderFiles(){
  const list = document.getElementById('file-list');
  const groups = [
    {key:'index',  label:'📄 主頁 / 課程'},
    {key:'opengl', label:'🏰 OpenGL 課程'},
    {key:'dx',     label:'⚔️ DirectX 課程'},
  ];

  list.innerHTML = groups.map(g => {
    const gfiles = FILES.filter(f => f.group === g.key);
    const rows = gfiles.map(f => {
      const st = fileStatuses[f.name] || 'pending';
      const stClass = `status-${st}`;
      const stText = {pending:'—', uploading:'上傳中…', done:'✓ 完成', error:'✗ 失敗', skip:'跳過'}[st] || '—';
      return `
        <div class="file-row" onclick="toggleFile('${f.name}')" id="row-${f.name.replace('.','_')}">
          <input type="checkbox" id="chk-${f.name.replace('.','_')}" data-name="${f.name}" data-group="${f.group}"
            onclick="event.stopPropagation()" onchange="onFileCheck()" checked>
          <span class="file-icon">${f.icon}</span>
          <span class="file-name">${f.name}</span>
          <span class="file-size" id="size-${f.name.replace('.','_')}">—</span>
          <span class="file-status ${stClass}" id="st-${f.name.replace('.','_')}">${stText}</span>
        </div>`;
    }).join('');
    return `<div class="file-group"><div class="file-group-label">${g.label}</div>${rows}</div>`;
  }).join('');

  updateStats();
  document.getElementById('stat-total').textContent = FILES.length;
}

function toggleFile(name){
  const id = 'chk-' + name.replace('.','_');
  const chk = document.getElementById(id);
  if(chk) chk.checked = !chk.checked;
  onFileCheck();
}

function toggleAll(checked){
  document.querySelectorAll('[data-name]').forEach(c => c.checked = checked);
  onFileCheck();
}

function selectGroup(group){
  document.querySelectorAll('[data-name]').forEach(c => {
    if(c.dataset.group === group) c.checked = true;
  });
  onFileCheck();
}

function onFileCheck(){
  updateStats();
  checkDeployReady();
}

function getSelected(){
  return [...document.querySelectorAll('[data-name]:checked')].map(c => c.dataset.name);
}

function updateStats(){
  const sel = getSelected();
  document.getElementById('stat-selected').textContent = sel.length;
  document.getElementById('stat-done').textContent = deployedCount;
  document.getElementById('file-count').textContent = `${sel.length} / ${FILES.length} 選中`;
  document.getElementById('chk-all').checked = sel.length === FILES.length;
  document.getElementById('chk-all').indeterminate = sel.length > 0 && sel.length < FILES.length;
}

// ── Token ──
function onTokenInput(){
  token = document.getElementById('gh-token').value.trim();
  checkDeployReady();
}

function saveToken(){
  token = document.getElementById('gh-token').value.trim();
  if(!token){ showToast('❌ Token 不能為空', true); return; }
  localStorage.setItem('gh_deploy_token', token);
  showToast('💾 Token 已儲存到 localStorage');
}

function checkDeployReady(){
  const ok = token.length > 10 && getSelected().length > 0 && !isDeploying;
  document.getElementById('deploy-btn').disabled = !ok;
}

async function testToken(){
  token = document.getElementById('gh-token').value.trim();
  if(!token){ showToast('❌ 請先輸入 Token', true); return; }
  log('info', '驗證 Token 中…');
  try{
    const r = await ghFetch('/user');
    if(r.ok){
      const u = await r.json();
      setTokenStatus('ok', `✅ 已驗證：${u.login} (${u.name || ''})`);
      document.getElementById('token-card').classList.add('ok');
      log('ok', `Token 驗證成功：${u.login}`);
      checkDeployReady();
    } else {
      setTokenStatus('err', '❌ Token 無效或無 repo 權限');
      log('err', `Token 驗證失敗：HTTP ${r.status}`);
    }
  } catch(e){
    setTokenStatus('err', '❌ 網路錯誤：' + e.message);
    log('err', '網路錯誤：' + e.message);
  }
}

function setTokenStatus(type, msg){
  const el = document.getElementById('token-status');
  const colors = {ok:'var(--acc4)', err:'var(--acc)', warn:'var(--acc3)'};
  el.innerHTML = `<span style="color:${colors[type]||'var(--txt2)'}">${msg}</span>`;
}

// ── GitHub API ──
function ghFetch(path, opts={}){
  return fetch(`https://api.github.com${path}`, {
    ...opts,
    headers:{
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
      ...(opts.headers||{})
    }
  });
}

async function getFileSHA(path){
  const r = await ghFetch(`${API_BASE}/contents/${path}?ref=${BRANCH}`);
  if(r.status === 404) return null;
  if(r.ok){ const d = await r.json(); return d.sha; }
  return null;
}

async function uploadFile(filename, content, commitMsg){
  const path = filename; // files go to root of repo
  const sha = await getFileSHA(path);
  const body = {
    message: commitMsg,
    content: btoa(unescape(encodeURIComponent(content))),
    branch: BRANCH,
  };
  if(sha) body.sha = sha; // update existing
  const r = await ghFetch(`${API_BASE}/contents/${path}`, {
    method: 'PUT',
    body: JSON.stringify(body),
  });
  return r;
}

// ── Deploy ──
async function startDeploy(){
  if(isDeploying) return;
  const selected = getSelected();
  if(!selected.length){ showToast('❌ 請選擇至少一個檔案', true); return; }
  if(!token){ showToast('❌ 請先設定 GitHub Token', true); return; }

  const commitMsg = document.getElementById('commit-msg').value.trim() || 'chore: update files';

  isDeploying = true;
  deployedCount = 0;
  document.getElementById('deploy-btn').disabled = true;
  document.getElementById('progress-wrap').classList.add('show');
  log('info', `🚀 開始部署 ${selected.length} 個檔案…`);
  log('info', `Commit：${commitMsg}`);

  let success = 0, failed = 0;

  for(let i = 0; i < selected.length; i++){
    const fname = selected[i];
    const pct = Math.round((i / selected.length) * 100);
    setProgress(pct, `[${i+1}/${selected.length}] 上傳 ${fname}…`);
    setFileStatus(fname, 'uploading');

    // Load file content from /mnt/user-data/outputs/ via fetch
    // Since we can't do filesystem in browser, we ask user to have files in same folder
    // We'll try fetching relative path
    try{
      const resp = await fetch(fname);
      if(!resp.ok) throw new Error(`本地檔案 ${fname} 不存在（HTTP ${resp.status}）`);
      const content = await resp.text();

      // Show size
      const sizeKB = Math.round(content.length / 1024);
      const sizeEl = document.getElementById('size-' + fname.replace('.','_'));
      if(sizeEl) sizeEl.textContent = sizeKB + 'KB';

      log('info', `  上傳 ${fname} (${sizeKB}KB)…`);
      const r = await uploadFile(fname, content, commitMsg);

      if(r.ok || r.status === 200 || r.status === 201){
        setFileStatus(fname, 'done');
        success++;
        deployedCount++;
        log('ok', `  ✅ ${fname} 部署成功`);
      } else {
        const err = await r.json().catch(()=>({message:'未知錯誤'}));
        setFileStatus(fname, 'error');
        failed++;
        log('err', `  ❌ ${fname} 失敗：${err.message}`);
      }
    } catch(e){
      setFileStatus(fname, 'error');
      failed++;
      log('err', `  ❌ ${fname}：${e.message}`);
    }

    updateStats();
    // Small delay to avoid rate limit
    await sleep(300);
  }

  setProgress(100, `完成！成功 ${success} 個，失敗 ${failed} 個`);
  log(failed > 0 ? 'warn' : 'ok', `🏁 部署完成：成功 ${success}，失敗 ${failed}`);

  if(success > 0){
    log('info', `⏳ GitHub Pages 部署需要約 30~60 秒生效`);
    log('info', `🌐 https://17jointagroup.github.io/ta-hub/`);
    showToast(`✅ 部署完成！${success} 個成功${failed > 0 ? `，${failed} 個失敗` : ''}`);
  } else {
    showToast('❌ 所有檔案部署失敗，請檢查 Token 和網路', true);
  }

  isDeploying = false;
  checkDeployReady();
}

function setFileStatus(fname, status){
  const id = 'st-' + fname.replace('.','_');
  const el = document.getElementById(id);
  if(!el) return;
  const texts = {pending:'—', uploading:'上傳中…', done:'✓ 完成', error:'✗ 失敗', skip:'跳過'};
  el.className = `file-status status-${status}`;
  el.textContent = texts[status] || status;
}

function setProgress(pct, msg){
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = msg;
}

// ── Log ──
function log(type, msg){
  const el = document.getElementById('log');
  const now = new Date();
  const ts = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
  const colors = {ok:'log-ok', err:'log-err', info:'log-info', warn:'log-warn'};
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-time">[${ts}]</span><span class="${colors[type]||''}">${msg}</span>`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function clearLog(){
  document.getElementById('log').innerHTML = '';
  // Reset file statuses
  fileStatuses = {};
  deployedCount = 0;
  renderFiles();
}

// ── Utils ──
function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

function showToast(msg, isErr=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
}

function openSite(){
  window.open('https://17jointagroup.github.io/ta-hub/', '_blank');
}
function openRepo(){
  window.open('https://github.com/17jointagroup/ta-hub', '_blank');
}

init();
</script>
