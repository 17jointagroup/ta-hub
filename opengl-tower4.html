const LESSONS=[
{id:'l1',num:'4-1',icon:'🔲',title:'深度測試 — 誰在前面？',
 sub:'Z-buffer：解決物體重疊時的遮擋問題',xp:70,type:'normal',
 school:'數學：比較大小，排序演算法的概念',
 story:`<span class="be">🔲</span>
如果畫兩個重疊的三角形，誰應該遮住誰？<br><br>
OpenGL 用 <span class="hl">深度緩衝 Z-Buffer</span> 來解決這個問題！<br>
Z-Buffer 是一張和螢幕一樣大的圖，每個像素記錄「這裡最近的物體有多遠」。<br><br>
畫每個像素時：<br>
1️⃣ 看這個像素目前的深度值<br>
2️⃣ 跟 Z-Buffer 裡存的值比較<br>
3️⃣ 如果「更近」就更新畫面；更遠就丟掉<br><br>
這就是 <span class="hl2">深度測試 Depth Test</span>！<br><br>
你可以改變比較規則（<span class="hl">DepthFunc</span>）：<br>
GL_LESS（預設：近的勝出）、GL_ALWAYS（全部通過）、GL_NEVER（全部丟掉）⚔️`,
 quiz:{q:'關掉深度測試後畫兩個重疊球體，結果會怎樣？',
   opts:['後畫的會遮住先畫的（不管遠近）','自動用距離排序','程式當掉','兩個都消失'],
   ans:0,explain:'沒有深度測試 = 後畫的總是蓋在前面！這就是 Painter\'s Algorithm（畫家算法）的問題，從後往前畫就對了，但有時候無法排序 → 需要 Z-Buffer ✏️'}
},
{id:'l2',num:'4-2',icon:'✂️',title:'模板測試 — 蒙版魔法',

 story:`<span class="be">✂️</span>
遊戲裡的物體發光邊框（Outline）是怎麼做的？<br>
或者鏡子只顯示某個區域的反射？<br><br>
答案是 <span class="hl">模板測試 Stencil Test</span>！<br><br>
就像噴漆藝術家用的紙板蒙版：<br>
先在板子上挖洞，然後只有洞的地方才噴得到顏料。<br><br>
Stencil Buffer 的使用步驟：<br>
1️⃣ <span class="hl2">寫入模板</span> — 先畫一個「形狀」到 Stencil Buffer<br>

3️⃣ <span class="hl3">畫第二個東西</span> — 只有符合規則的像素才會被畫<br><br>
做發光邊框的技巧：<br>
先正常畫物體 → 寫入 Stencil<br>
再畫稍微放大的版本 → 只畫 Stencil 外面的部分 = 邊框！`,
 quiz:{q:'為什麼物體發光邊框要畫兩次？',

},
{id:'l3',num:'4-3',icon:'💧',title:'混合 — 透明的秘密',
 sub:'Alpha Blending：玻璃、煙霧、火焰的實現',xp:80,type:'normal',
 school:'物理：光的疊加，透明度的物理意義',
 story:`<span class="be">💧</span>
玻璃、水、煙霧… 透明效果是怎麼做的？<br><br>
答案是 <span class="hl">Alpha 混合 Blending</span>！<br><br>
每個顏色有四個值：R、G、B、<span class="hl2">A（Alpha）</span><br>
Alpha = 不透明度。0.0 = 全透明，1.0 = 完全不透明<br><br>
混合公式：<br>
<code>最終顏色 = 來源顏色 × Alpha + 目標顏色 × (1-Alpha)</code><br><br>
Alpha = 0.5（半透明）：<br>
= 玻璃顏色×0.5 + 背後顏色×0.5 → 看起來像玻璃！<br><br>
⚠️ 透明物體有個陷阱：<br>
<span class="hl3">必須從後往前畫！</span><br>
不然先畫的透明物體的深度值會擋住後畫的東西 🤯`,
 quiz:{q:'半透明物體必須從後往前畫的原因是什麼？',
   opts:['GPU 的設計限制','因為混合需要「背後已經有畫好的顏色」才能計算，而且深度寫入會擋住後畫的東西','節省電費','美觀考量'],
   ans:1,explain:'混合需要讀取「已存在的顏色」來計算 src×α + dst×(1-α)。如果先畫前面的，背後的東西會被深度值擋掉，看不到了！必須先畫遠的，再畫近的 🔭'}
},
{id:'l4',num:'4-4',icon:'📸',title:'幀緩衝 — 渲染到紋理',
 sub:'Framebuffer Object：後處理特效的基礎',xp:100,type:'normal',
 school:'攝影：底片/感光元件，「曝光」到不同的表面',
 story:`<span class="be">📸</span>

但如果我們<span class="hl">把畫面畫到一張貼圖上</span>呢？<br><br>
這就是 <span class="hl2">幀緩衝 Framebuffer Object（FBO）</span>！<br><br>
FBO 讓你「先渲染到一張貼圖」，然後用那張貼圖做任何事！<br><br>
後處理特效的流程：<br>

可以做的特效：<br>
🌊 模糊（Blur）<br>

🌈 色彩調整（Color Grading）<br>
🔪 銳化（Sharpen）`,
 quiz:{q:'FBO 最核心的用途是什麼？',
   opts:['加速渲染','把整個場景渲染到一張貼圖，再對那張貼圖做後處理','存檔用','備份 GPU 記憶體'],
   ans:1,explain:'FBO 的本質是「渲染到貼圖 Render to Texture（RTT）」！有了它，每幀先把場景存成一張圖，然後就可以對整個畫面做任何圖像處理 — 這是幾乎所有現代遊戲特效的基礎 🎬'}
},
{id:'l5',num:'4-5',icon:'🌐',title:'立方體貼圖 — 天空與反射',

{id:'l6',num:'4-6',icon:'⚙️',title:'進階 GLSL — Shader 的深層魔法',
 sub:'uniform block、Subroutine、動態 Shader 技巧',xp:80,type:'normal',

三個進階技巧：<br><br>
📦 <span class="hl">Uniform Buffer Object（UBO）</span><br>
多個 Shader 共用同一組 uniform 變數！<br>

{id:'l7',num:'4-7',icon:'💥',title:'幾何著色器 — 憑空生成三角形',

{id:'l8',num:'4-8',icon:'🌾',title:'實例化 — 一次畫一百萬棵草',
 sub:'Instancing：大量重複物件的終極優化',xp:90,type:'normal',
 school:'數學：矩陣陣列，for 迴圈的 GPU 版本',
 story:`<span class="be">🌾</span>
你要畫一片草地，有 100 萬棵草。<br>
用迴圈一棵棵畫：CPU 要呼叫 GPU 100 萬次！超慢 🐢<br><br>
解法：<span class="hl">實例化 Instancing</span>！<br><br>
把 100 萬棵草的位置全部存在 GPU 記憶體裡，<br>
然後只呼叫一次 API：<br>
<code>glDrawArraysInstanced(GL_TRIANGLES, 0, 6, 1000000)</code><br><br>
GPU 收到後，用同一個模型畫 100 萬次，<br>
但每次用不同的位置/旋轉/顏色！<br><br>
在 Shader 裡，有個神奇變數：<br>
<span class="hl2">gl_InstanceID</span> — 當前是第幾個實例（0, 1, 2, ...）<br><br>
用 gl_InstanceID 去查你存的位置陣列，就能讓每個草長在不同地方！`,
 quiz:{q:'Instancing 為什麼比一般迴圈快這麼多？',
   opts:['GPU 比 CPU 跑得快 100 倍','把 CPU→GPU 的溝通次數從 N 次減少到 1 次，消除了大量通訊延遲','Instancing 會跳過某些計算','每個實例少了很多頂點'],
   ans:1,explain:'每次 Draw Call 都有固定的 CPU-GPU 通訊開銷（稱為 overhead）。1 次 Draw Call 畫 100 萬個 vs 100 萬次 Draw Call 各畫 1 個，速度差距可以到 100 倍以上！⚡'}
},
{id:'l9',num:'4-9',icon:'🔍',title:'MSAA — 讓邊緣不再鋸齒',
 sub:'Anti-Aliasing：多重採樣消除走樣',xp:80,type:'normal',
 school:'數學：採樣定理，奈奎斯特頻率',
 school2:'訊號處理：離散採樣的混疊現象',
 story:`<span class="be">🔍</span>
你有沒有注意到遊戲裡斜線的邊緣有鋸齒？<br>
這叫做 <span class="hl">走樣 Aliasing</span>，是因為像素是方形的，斜線只能用「階梯」表示。<br><br>
解法是<span class="hl2">多重採樣 MSAA（Multi-Sample Anti-Aliasing）</span>！<br><br>
一般渲染：每個像素只採樣 1 個點<br>
MSAA 4x：每個像素採樣 <span class="hl">4 個點</span>，取平均！<br>
邊緣像素 4 個點裡有 2 個在三角形外 → 顏色混合 → 柔和邊緣！<br><br>
MSAA 的代價：<br>
4x MSAA = 4 倍的記憶體使用量<br>
8x MSAA = 8 倍，但視覺改善有限<br><br>
現代遊戲通常用 4x，或更聰明的 <span class="hl3">TAA（Temporal AA）</span> — 跨多幀採樣，更節省資源！`,
 quiz:{q:'MSAA 4x 和 8x 相比，通常玩家選 4x 的原因是什麼？',
   opts:['4x 畫質更好','8x 的記憶體是 4x 的兩倍，但肉眼幾乎看不出差別，性價比低','8x 不支援','玩家不知道有 8x'],
   ans:1,explain:'從 4x 到 8x，鋸齒的改善幅度已經很小，但記憶體用量翻倍、效能開銷也更大。遊戲通常讓玩家選「無AA/2x/4x」，因為 4x 是最佳平衡點 ⚖️'}
},
{id:'l10',num:'4-10',icon:'✨',title:'進階 GLSL 技巧集',
 sub:'深度非線性、法向量貼圖、視差貼圖一次看',xp:80,type:'normal',
 school:'數學：非線性映射，泰勒展開的直覺',
 story:`<span class="be">✨</span>
學到這裡，你需要知道幾個 GLSL 神奇技巧！<br><br>
🎯 <span class="hl">深度值的秘密</span><br>

一張藍紫色的貼圖，存著每個像素表面的法向量方向。<br>

🌊 <span class="hl3">視差貼圖 Parallax Map</span><br>
比法線貼圖更進一步：模擬視角移動時，凹凸表面的視差效果。<br>
讓磚牆看起來真的有深度！`,
 quiz:{q:'法線貼圖為什麼通常是藍紫色的？',
   opts:['這是流行色','向上的法向量是 (0,0,1)，存成 RGB 後 = (0.5,0.5,1.0)，在貼圖裡看起來藍紫色','節省記憶體','隨機決定的顏色'],
   ans:1,explain:'法向量 (0,0,1) 代表「完全朝上」。存到貼圖時需要把 [-1,1] 範圍映射到 [0,1] → (0×0.5+0.5, 0×0.5+0.5, 1×0.5+0.5) = (0.5, 0.5, 1.0) ≈ 藍紫色！這就是為什麼法線貼圖都是藍的 💙'}
},
{id:'l11',num:'4-11',icon:'💀',title:'Boss：打造完整後處理管線',

 school:'電影製作：數位調色、特效合成的工作流程',
 story:`<span class="be">💀</span>

 quiz:{q:'為什麼 MSAA FBO 的資料不能直接給後處理 Shader 使用，要先 Blit？',

];

const TOTAL_XP=LESSONS.reduce((s,l)=>s+l.xp,0);
let earned=JSON.parse(localStorage.getItem('tower4_done')||'[]');
let current=null;

function makeStars(){const c=document.getElementById('stars');for(let i=0;i<90;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()<.25?2:1;s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--d:${2+Math.random()*5}s;--dl:${Math.random()*5}s`;c.appendChild(s);}}
makeStars();

function updateXP(){const total=earned.reduce((s,id)=>{const l=LESSONS.find(x=>x.id===id);return s+(l?l.xp:0);},0);document.getElementById('xp-fill').style.width=(total/TOTAL_XP*100)+'%';document.getElementById('xp-total').textContent=total+'/'+TOTAL_XP;document.getElementById('done-count').textContent=earned.length;}
function showXPPop(xp,el){const r=el.getBoundingClientRect();const d=document.createElement('div');d.className='xp-pop';d.textContent='+'+xp+' ⚡';d.style.cssText=`left:${r.left+r.width/2-25}px;top:${r.top+window.scrollY-10}px`;document.body.appendChild(d);setTimeout(()=>d.remove(),950);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

function render(){
  const list=document.getElementById('lesson-list');list.innerHTML='';
  LESSONS.forEach((les,idx)=>{
    const done=earned.includes(les.id),active=current===les.id;
    const locked=!done&&!active&&idx>0&&!earned.includes(LESSONS[idx-1].id);
    const boss=les.type==='boss';
    const div=document.createElement('div');
    div.className=`lesson${done?' done':''}${active?' active':''}${locked?' locked':''}${boss?' boss':''}`;
    div.id='L'+les.id;
    const icCls=done?'i-d':boss?'i-b':locked?'i-l':'i-n';
    const rightHTML=(boss?`<span class="boss-pill">💀 BOSS</span>`:'')+`<span class="xp-pill">+${les.xp}</span>`+(done?`<div class="chk">✓</div>`:locked?`<div class="lck">🔒</div>`:'');
    div.innerHTML=`<div class="lesson-header"><div class="lesson-icon ${icCls}">${done?'✓':les.icon}</div><div class="lesson-info"><div class="lesson-title">${les.num} ${les.title}</div><div class="lesson-sub">${les.sub}</div></div><div class="lesson-right">${rightHTML}</div></div><div class="lesson-body">${active?buildBody(les,done):''}</div>`;
    if(!locked)div.querySelector('.lesson-header').addEventListener('click',()=>toggle(les.id));
    list.appendChild(div);
    if(idx<LESSONS.length-1){const c=document.createElement('div');c.className='conn';list.appendChild(c);}
  });
}

function toggle(id){current=current===id?null:id;render();if(current){setTimeout(()=>{const el=document.getElementById('L'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});initDemo(id);},40);}}

function buildBody(les,done){
  const opts=les.quiz.opts.map((o,i)=>`<div class="opt" id="opt-${les.id}-${i}" onclick="checkQ('${les.id}',${i})"><div class="opt-k">${['A','B','C','D'][i]}</div>${o}</div>`).join('');
  return `<div class="tab-bar"><div class="tab on" onclick="switchTab(this,'s-${les.id}','${les.id}')">📖 故事</div><div class="tab" onclick="switchTab(this,'d-${les.id}','${les.id}')">🎮 互動</div><div class="tab" onclick="switchTab(this,'c-${les.id}','${les.id}')">💻 程式碼</div></div>

function mkProg(gl,vs,fs){const mk=(t,s)=>{const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);return sh;};const p=gl.createProgram();gl.attachShader(p,mk(gl.VERTEX_SHADER,vs));gl.attachShader(p,mk(gl.FRAGMENT_SHADER,fs));gl.linkProgram(p);return p;}
function qBuf(gl){const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);return b;}

function d2(cont){
  cont.innerHTML=`<div class="demo-wrap"><div class="demo-top"><div class="demo-label"><div class="live-dot"></div>模板測試 — 物體發光邊框</div></div><canvas id="cv4-2" width="600" height="260" style="height:260px"></canvas></div>

  document.getElementById('outline-w').oninput=function(){document.getElementById('outline-wv').textContent=this.value;};

  window.setST=m=>{if(m==='col'){window._stHue=(window._stHue+30)%360;return;}window._stMode=m;['on','off'].forEach(x=>document.getElementById('st-'+x).classList.toggle('on',x===m));};
  const cv=document.getElementById('cv4-2');const gl=cv.getContext('webgl');if(!gl)return;
  gl.enable(gl.DEPTH_TEST);
  const vs=`attribute vec3 p;attribute vec3 n;varying vec3 vN;varying vec3 vP;uniform mat4 mvp;void main(){vN=n;vP=p;gl_Position=mvp*vec4(p,1);}`;
  const fs=`precision mediump float;varying vec3 vN;varying vec3 vP;uniform vec3 col;void main(){vec3 L=normalize(vec3(2,3,4));float d=max(dot(normalize(vN),L),.1);gl_FragColor=vec4(col*d+.05,1);}`;
  const prog=mkProg(gl,vs,fs);
  const {v:sv,n:sn,i:si}=genSphI(1,18,18);
  const vb=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,vb);gl.bufferData(gl.ARRAY_BUFFER,sv,gl.STATIC_DRAW);
  const nb=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,nb);gl.bufferData(gl.ARRAY_BUFFER,sn,gl.STATIC_DRAW);
  const ib=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ib);gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,si,gl.STATIC_DRAW);
  const pL=gl.getAttribLocation(prog,'p'),nL=gl.getAttribLocation(prog,'n');
  const mvpL=gl.getUniformLocation(prog,'mvp'),colL=gl.getUniformLocation(prog,'col');
  let t=0;
  function drawSphere(scale,col,mvp2){
    const s=scale===1?mvp2:m4mul(mvp2,scaleM(scale));
    gl.uniformMatrix4fv(mvpL,false,s);gl.uniform3fv(colL,col);
    gl.bindBuffer(gl.ARRAY_BUFFER,vb);gl.enableVertexAttribArray(pL);gl.vertexAttribPointer(pL,3,gl.FLOAT,false,0,0);
    gl.bindBuffer(gl.ARRAY_BUFFER,nb);gl.enableVertexAttribArray(nL);gl.vertexAttribPointer(nL,3,gl.FLOAT,false,0,0);
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ib);gl.drawElements(gl.TRIANGLES,si.length,gl.UNSIGNED_SHORT,0);
  }
  function hsl2rgb(h,s,l){const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(-1,Math.min(k-3,9-k,1));};return[f(0),f(8),f(4)];}
  function frame(){
    t+=0.01;
    const ow=parseInt(document.getElementById('outline-w').value)/100+1;
    const hue=window._stHue;
    gl.viewport(0,0,600,260);gl.clearColor(.05,.04,.1,1);gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
    const mvp=m4mul(perspM(45*Math.PI/180,600/260,.1,50),lookAtM([Math.sin(t)*4,2,Math.cos(t)*4],[0,0,0],[0,1,0]));
    gl.useProgram(prog);
    if(window._stMode==='on'){
      // Simulate outline with two-pass scale trick
      gl.uniform3f(colL,.3,.5,.9);drawSphere(1,[.3,.5,.9],mvp);
      const outlineCol=hsl2rgb(hue,1,.6);
      gl.cullFace&&gl.enable(gl.CULL_FACE);
      gl.uniform3fv(colL,outlineCol);drawSphere(ow,outlineCol,mvp);
      gl.disable&&gl.disable(gl.CULL_FACE);
    } else {
      drawSphere(1,[.3,.5,.9],mvp);
    }
    requestAnimationFrame(frame);
  }
  frame();
}

// Demo L4 - Post-processing effects
function d4(cont){
  cont.innerHTML=`<div class="demo-wrap"><div class="demo-top"><div class="demo-label"><div class="live-dot"></div>幀緩衝後處理特效</div></div><canvas id="cv4-4" width="600" height="260" style="height:260px"></canvas></div>
  <div class="ctrl-row"><button class="ctrl-btn on" id="pp-none" onclick="setPP(0)">📷 原始</button><button class="ctrl-btn" id="pp-blur" onclick="setPP(1)">🌊 模糊</button><button class="ctrl-btn" id="pp-edge" onclick="setPP(2)">✏️ 邊緣</button><button class="ctrl-btn" id="pp-gray" onclick="setPP(3)">⚫ 灰階</button><button class="ctrl-btn" id="pp-crt" onclick="setPP(4)">📺 CRT</button></div>`;
  window._ppMode=0;
  window.setPP=m=>{window._ppMode=m;[0,1,2,3,4].forEach(x=>document.getElementById('pp-'+['none','blur','edge','gray','crt'][x]).classList.toggle('on',x===m));};
  const cv=document.getElementById('cv4-4');const gl=cv.getContext('webgl');if(!gl)return;
  const vs=`attribute vec2 p;varying vec2 uv;void main(){uv=p*.5+.5;gl_Position=vec4(p,0,1);}`;
  const fs=`precision mediump float;varying vec2 uv;uniform int mode;uniform float t;
  vec3 scene(vec2 u){
    float r=sin(u.x*20.+t)*sin(u.y*15.+t*.7)*.5+.5;
    float g=sin(u.y*18.-t*.8)*.5+.5;
    float b=cos(u.x*12.+u.y*10.+t*.5)*.5+.5;
    return vec3(r*.6,g*.5,b*.8);
  }
  void main(){
    vec2 px=vec2(1./600.,1./260.);
    if(mode==0){gl_FragColor=vec4(scene(uv),1);}
    else if(mode==1){
      vec3 c=vec3(0);
      for(int x=-1;x<=1;x++)for(int y=-1;y<=1;y++)c+=scene(uv+vec2(x,y)*px*2.);
      gl_FragColor=vec4(c/9.,1);
    } else if(mode==2){
      vec3 c=scene(uv);
      vec3 r=scene(uv+vec2(px.x,0));vec3 u2=scene(uv+vec2(0,px.y));
      float edge=length(r-c)+length(u2-c);
      gl_FragColor=vec4(vec3(edge*5.),1);
    } else if(mode==3){
      vec3 c=scene(uv);float g2=dot(c,vec3(.299,.587,.114));gl_FragColor=vec4(g2,g2,g2,1);
    } else {
      vec3 c=scene(uv);
      float scanline=sin(uv.y*260.*3.14159)*0.1+0.9;
      float vignette=1.-length(uv-.5)*1.2;
      gl_FragColor=vec4(c*scanline*max(vignette,.2),1);
    }
  }`;
  const prog=mkProg(gl,vs,fs);const buf=qBuf(gl);const pL=gl.getAttribLocation(prog,'p');
  const mL=gl.getUniformLocation(prog,'mode'),tL=gl.getUniformLocation(prog,'t');
  let time=0;
  function frame(){time+=0.012;gl.viewport(0,0,600,260);gl.clear(gl.COLOR_BUFFER_BIT);gl.useProgram(prog);gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.enableVertexAttribArray(pL);gl.vertexAttribPointer(pL,2,gl.FLOAT,false,0,0);gl.uniform1i(mL,window._ppMode);gl.uniform1f(tL,time);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(frame);}
  frame();
}

// Demo L5 - Cubemap / Skybox simulation
function d5(cont){
  cont.innerHTML=`<div class="demo-wrap"><div class="demo-top"><div class="demo-label"><div class="live-dot"></div>立方體貼圖 — 天空盒 + 環境反射</div></div><canvas id="cv4-5" width="600" height="280" style="height:280px;cursor:grab"></canvas></div>
  <div class="ctrl-row"><button class="ctrl-btn on" id="cm-sky" onclick="setCM('sky')">🌅 天空盒</button><button class="ctrl-btn" id="cm-ref" onclick="setCM('ref')">🔮 環境反射</button><button class="ctrl-btn" id="cm-refr" onclick="setCM('refr')">💎 折射</button></div>`;
  window._cmMode='sky';
  window.setCM=m=>{window._cmMode=m;['sky','ref','refr'].forEach(x=>document.getElementById('cm-'+x).classList.toggle('on',x===m));};
  const cv=document.getElementById('cv4-5');const gl=cv.getContext('webgl');if(!gl)return;
  const vs=`attribute vec2 p;varying vec2 uv;void main(){uv=p*.5+.5;gl_Position=vec4(p,0,1);}`;
  const fs=`precision mediump float;varying vec2 uv;uniform int mode;uniform float t;uniform vec2 cam;
  vec3 skyColor(vec3 d){
    float sky=smoothstep(-.1,.3,d.y);
    vec3 horizon=mix(vec3(.8,.5,.3),vec3(.6,.8,1.),sky);
    vec3 zenith=mix(horizon,vec3(.1,.3,.9),sky);
    float sun=pow(max(dot(d,normalize(vec3(1,0.5,1))),0.),32.);
    return zenith+vec3(1.,.9,.5)*sun*.8;
  }
  vec3 dir(vec2 u,vec2 c){
    float yaw=c.x,pitch=c.y;
    vec3 fwd=vec3(sin(yaw)*cos(pitch),sin(pitch),cos(yaw)*cos(pitch));
    vec3 right=normalize(cross(fwd,vec3(0,1,0)));
    vec3 up=cross(right,fwd);
    vec2 ndc=(u-.5)*vec2(1.6,1.);
    return normalize(fwd+right*ndc.x+up*ndc.y);
  }
  void main(){
    vec2 c=vec2(t*.1,cam.y);
    vec3 d=dir(uv,c+vec2(cam.x,0));
    if(mode==0){gl_FragColor=vec4(skyColor(d),1);}
    else if(mode==1){
      vec3 N=normalize(d*2.-1.);
      vec3 V=normalize(vec3(0,0,1));
      float r=length(uv-.5);
      if(r<.35){
        vec3 norm=normalize(vec3((uv-.5)/.35,sqrt(1.-min(r/.35*r/.35,1.))));
        vec3 refl=reflect(-V,norm);
        gl_FragColor=vec4(skyColor(refl),1.);
      } else {gl_FragColor=vec4(skyColor(d)*.6,1.);}
    } else {
      vec3 V=normalize(vec3(0,0,1));float r=length(uv-.5);
      if(r<.35){
        vec3 norm=normalize(vec3((uv-.5)/.35,sqrt(max(0.,1.-r/.35*r/.35))));
        vec3 refr=refract(-V,norm,1./1.52);
        gl_FragColor=vec4(skyColor(refr),1.)*vec4(.7,.9,1.,1.);
      } else {gl_FragColor=vec4(skyColor(d)*.5,1.);}
    }
  }`;
  const prog=mkProg(gl,vs,fs);const buf=qBuf(gl);const pL=gl.getAttribLocation(prog,'p');
  const mL=gl.getUniformLocation(prog,'mode'),tL=gl.getUniformLocation(prog,'t'),camL=gl.getUniformLocation(prog,'cam');
  let time=0,camX=0,camY=0,drag=false,lx=0,ly=0;
  cv.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;cv.style.cursor='grabbing';});
  cv.addEventListener('mouseup',()=>{drag=false;cv.style.cursor='grab';});
  cv.addEventListener('mousemove',e=>{if(!drag)return;camX+=(e.clientX-lx)*.005;camY-=(e.clientY-ly)*.003;camY=Math.max(-.5,Math.min(.5,camY));lx=e.clientX;ly=e.clientY;});
  function frame(){time+=0.01;const modes={sky:0,ref:1,refr:2};gl.viewport(0,0,600,280);gl.clear(gl.COLOR_BUFFER_BIT);gl.useProgram(prog);gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.enableVertexAttribArray(pL);gl.vertexAttribPointer(pL,2,gl.FLOAT,false,0,0);gl.uniform1i(mL,modes[window._cmMode]||0);gl.uniform1f(tL,time);gl.uniform2f(camL,camX,camY);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(frame);}
  frame();
}

// Demo L6 - GLSL advanced visualization
function d6(cont){

// ─── MATH HELPERS ───
function genSphI(r,st,sl){const v=[],n=[],i=[];for(let s=0;s<=st;s++){const phi=s/st*Math.PI;for(let sl2=0;sl2<=sl;sl2++){const th=sl2/sl*Math.PI*2;const x=Math.sin(phi)*Math.cos(th)*r,y=Math.cos(phi)*r,z=Math.sin(phi)*Math.sin(th)*r;const l=Math.sqrt(x*x+y*y+z*z)||1;v.push(x,y,z);n.push(x/l,y/l,z/l);}}for(let s=0;s<st;s++)for(let sl2=0;sl2<sl;sl2++){const a=s*(sl+1)+sl2,b=a+sl+1;i.push(a,b,a+1,b,b+1,a+1);}return{v:new Float32Array(v),n:new Float32Array(n),i:new Uint16Array(i)};}
function perspM(fov,asp,n,f){const s=1/Math.tan(fov/2);return new Float32Array([s/asp,0,0,0,0,s,0,0,0,0,(f+n)/(n-f),-1,0,0,2*f*n/(n-f),0]);}
