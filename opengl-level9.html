<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>★ 城堡9 — OpenGL 魔法王國</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
html{font-size:20px;}
@media(max-width:480px){html{font-size:16px;}}
:root{
  --bg:#060505;--bg2:#0a0808;--card:#100c0c;--border:#2a1f10;
  --acc:#ffd700;--acc2:#ffb347;--acc3:#ff6b9d;--acc4:#ff6b6b;--acc5:#00f5c4;
  --txt:#fff8e8;--txt2:#6b5530;
  --font:'Nunito',sans-serif;--mono:'Space Mono',monospace;
  --glow:0 0 32px rgba(255,215,0,.35);
}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--font);overflow-x:hidden;min-height:100vh;padding-bottom:120px}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:#ffe066;animation:tw var(--d,3s) var(--dl,0s) infinite}
@keyframes tw{0%,100%{opacity:.07}50%{opacity:.95}}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;animation:drift var(--d,22s) ease-in-out infinite alternate}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(var(--tx,40px),var(--ty,-40px))}}
header{position:sticky;top:0;z-index:100;background:rgba(6,5,5,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:11px 24px;display:flex;align-items:center;gap:12px}
.back-btn{background:var(--card);border:1px solid var(--border);color:var(--txt2);padding:6px 14px;border-radius:100px;font-size:.78rem;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block;transition:.2s}
.back-btn:hover{color:var(--acc);border-color:var(--acc)}
.header-title{font-size:1rem;font-weight:900;color:var(--acc)}
.xp-bar{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:.82rem;font-weight:800}
.xp-total{color:var(--acc);font-family:var(--mono)}
.xp-track{width:110px;height:7px;background:var(--border);border-radius:100px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:100px;transition:width .7s cubic-bezier(.34,1.56,.64,1)}
.hero{position:relative;z-index:1;text-align:center;padding:64px 24px 44px}
.tower-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.28);border-radius:100px;padding:6px 18px;font-size:.78rem;font-weight:800;color:var(--acc);margin-bottom:20px}
.hero h1{font-size:clamp(2rem,6vw,3.6rem);font-weight:900;line-height:1.1;margin-bottom:14px}
.hero h1 span{background:linear-gradient(135deg,var(--acc),var(--acc2),var(--acc3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--txt2);font-size:.95rem;max-width:520px;margin:0 auto 32px;line-height:1.75}
.stats-row{display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
.stat-chip{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px 22px;text-align:center}
.stat-chip .num{font-size:1.5rem;font-weight:900;font-family:var(--mono);color:var(--acc)}
.stat-chip .lbl{font-size:.68rem;color:var(--txt2);font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.chapter-map{position:relative;z-index:1;padding:24px;max-width:960px;margin:0 auto}
.map-title{font-size:.75rem;font-weight:800;color:var(--txt2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px;padding-left:4px}
.lesson{background:var(--card);border:1px solid var(--border);border-radius:22px;margin-bottom:10px;overflow:hidden;transition:border-color .2s,box-shadow .2s;cursor:pointer}
.lesson:hover:not(.locked){border-color:rgba(255,215,0,.45);box-shadow:var(--glow)}
.lesson.locked{opacity:.45;cursor:not-allowed}
.lesson.active{border-color:var(--acc);box-shadow:var(--glow)}
.lesson.done{}
.lesson.boss:hover:not(.locked),.lesson.boss.active{border-color:var(--acc3);box-shadow:0 0 32px rgba(255,107,157,.4)}
.lesson.final:hover:not(.locked),.lesson.final.active{border-color:var(--acc);box-shadow:0 0 40px rgba(255,215,0,.5),0 0 80px rgba(255,215,0,.2)}
.lesson-header{display:flex;align-items:center;gap:16px;padding:16px 20px}
.lesson-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.i-n{background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.2)}
.i-d{background:rgba(255,179,71,.12);border:1px solid rgba(255,179,71,.35)}
.i-b{background:rgba(255,107,157,.07);border:1px solid rgba(255,107,157,.22)}
.i-f{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,107,157,.1));border:1px solid rgba(255,215,0,.4)}
.i-l{background:var(--border);filter:grayscale(1)}
.lesson-info{flex:1}
.lesson-title{font-size:.95rem;font-weight:900;margin-bottom:2px}
.lesson-sub{font-size:.75rem;color:var(--txt2);font-weight:700}
.lesson-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.xp-pill{background:rgba(255,215,0,.07);color:var(--acc);border:1px solid rgba(255,215,0,.22);border-radius:100px;padding:3px 10px;font-size:.7rem;font-weight:900;font-family:var(--mono)}
.boss-pill{background:rgba(255,107,157,.07);color:var(--acc3);border:1px solid rgba(255,107,157,.28);border-radius:100px;padding:3px 10px;font-size:.68rem;font-weight:900}
.final-pill{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,107,157,.1));color:var(--acc);border:1px solid var(--acc);border-radius:100px;padding:3px 12px;font-size:.68rem;font-weight:900;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.3)}50%{box-shadow:0 0 0 6px rgba(255,215,0,0)}}
.chk{width:26px;height:26px;border-radius:50%;background:rgba(255,179,71,.12);color:var(--acc2);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:900}
.lck{width:26px;height:26px;border-radius:50%;background:var(--border);color:var(--txt2);display:flex;align-items:center;justify-content:center}
.lesson-body{display:none;border-top:1px solid var(--border)}
.lesson.active .lesson-body{display:block}
.tab-bar{display:flex;gap:3px;padding:10px 14px 0;background:var(--bg2)}
.tab{padding:7px 14px;border-radius:9px 9px 0 0;font-size:.76rem;font-weight:800;cursor:pointer;transition:.15s;color:var(--txt2);border:1px solid transparent;border-bottom:none}
.tab.on{background:var(--card);color:var(--txt);border-color:var(--border)}
.tab-content{padding:18px}
.tab-panel{display:none}.tab-panel.on{display:block}
.story-box{background:linear-gradient(135deg,rgba(255,215,0,.06),rgba(255,179,71,.02));border:1px solid rgba(255,215,0,.15);border-radius:18px;padding:20px;margin-bottom:16px;line-height:1.85;font-size:.91rem}
.be{font-size:2.5rem;display:block;margin-bottom:10px;animation:bob .9s ease infinite alternate}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-6px)}}
.hl{background:rgba(255,215,0,.15);color:var(--acc);border-radius:4px;padding:1px 7px;font-weight:900}
.hl2{background:rgba(255,179,71,.13);color:var(--acc2);border-radius:4px;padding:1px 7px;font-weight:900}
.hl3{background:rgba(255,107,157,.1);color:var(--acc3);border-radius:4px;padding:1px 7px;font-weight:900}
.hl4{background:rgba(0,245,196,.1);color:var(--acc5);border-radius:4px;padding:1px 7px;font-weight:900}
.school-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.2);border-radius:8px;padding:6px 12px;font-size:.76rem;font-weight:800;color:var(--acc);margin-top:12px}
.code-wrap{background:#060402;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:12px 0}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
.code-lang{font-size:.68rem;font-weight:800;color:var(--txt2);font-family:var(--mono)}
.copy-btn{background:none;border:1px solid var(--border);color:var(--txt2);padding:3px 9px;border-radius:5px;font-size:.65rem;font-weight:800;cursor:pointer;transition:.15s;font-family:var(--mono)}
.copy-btn:hover{color:var(--acc);border-color:var(--acc)}
pre{padding:14px;font-family:var(--mono);font-size:.75rem;line-height:1.7;overflow-x:auto;white-space:pre}
.kw{color:#ffd700}.fn{color:#ffb347}.str{color:#00f5c4}.num{color:#ff9f43}.cm{color:#2a1f10}.type{color:#c792ea}
.demo-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px}
.demo-top{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border)}
.demo-label{font-size:.68rem;font-weight:800;color:var(--txt2);letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--acc);box-shadow:0 0 6px var(--acc);animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
canvas{display:block;width:100%}
.ctrl-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.ctrl-btn{background:var(--card);border:1px solid var(--border);color:var(--txt2);padding:6px 14px;border-radius:100px;font-family:var(--font);font-size:.78rem;font-weight:800;cursor:pointer;transition:.2s}
.ctrl-btn:hover{border-color:var(--acc);color:var(--acc)}
.ctrl-btn.on{background:rgba(255,215,0,.1);border-color:var(--acc);color:var(--acc)}
.slider-row{display:flex;align-items:center;gap:10px;margin:6px 0}
.slider-label{font-size:.75rem;font-weight:800;color:var(--txt2);min-width:90px}
input[type=range]{flex:1;accent-color:var(--acc)}
.slider-val{font-family:var(--mono);font-size:.75rem;color:var(--acc2);min-width:44px;text-align:right}
.quiz-box{background:rgba(255,215,0,.04);border:1px solid rgba(255,215,0,.15);border-radius:14px;padding:18px;margin-top:16px}
.quiz-title{font-size:.8rem;font-weight:900;color:var(--acc);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.quiz-q{font-size:.88rem;line-height:1.6;color:var(--txt);margin-bottom:12px;font-weight:700}
.opts{display:grid;gap:7px}
.opt{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 14px;cursor:pointer;font-size:.84rem;font-weight:700;transition:.2s;display:flex;align-items:center;gap:9px}
.opt:hover{border-color:var(--acc);background:rgba(255,215,0,.04)}
.opt.correct{border-color:var(--acc5);background:rgba(0,245,196,.05);color:var(--acc5);pointer-events:none}
.opt.wrong{border-color:var(--acc4);background:rgba(255,107,107,.05);color:var(--acc4);pointer-events:none}
.opt.disabled{pointer-events:none;opacity:.6}
.opt-k{width:22px;height:22px;border-radius:5px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:900;font-family:var(--mono);flex-shrink:0}
.explain-box{margin-top:10px;padding:11px 14px;background:rgba(0,245,196,.04);border:1px solid rgba(0,245,196,.15);border-radius:9px;font-size:.81rem;line-height:1.65;color:var(--txt2);display:none}
.done-btn{width:100%;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#060402;border:none;border-radius:100px;padding:12px;font-family:var(--font);font-size:.92rem;font-weight:900;cursor:pointer;margin-top:14px;transition:.25s;display:flex;align-items:center;justify-content:center;gap:8px}
.done-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,215,0,.4)}
.done-btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.conn{width:2px;height:10px;background:linear-gradient(var(--border),transparent);margin:0 auto -1px;position:relative;left:21px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--acc);border-radius:100px;padding:10px 26px;font-weight:800;font-size:.86rem;color:var(--acc);z-index:999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
.xp-pop{position:fixed;font-family:var(--mono);font-weight:900;font-size:1.2rem;color:var(--acc);pointer-events:none;z-index:999;text-shadow:0 0 20px var(--acc);animation:floatUp .9s ease-out forwards}
/* Graduation overlay */
.grad-overlay{position:fixed;inset:0;z-index:9999;background:rgba(6,5,5,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;animation:fadeIn .6s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.firework{position:absolute;width:4px;height:4px;border-radius:50%;animation:fw var(--d,1s) var(--dl,0s) ease-out infinite}
@keyframes fw{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx,50px),var(--ty,-80px)) scale(0);opacity:0}}
.tower-progress{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 20px;margin:0 auto 24px;max-width:600px}
.tower-row{display:flex;align-items:center;gap:10px;margin:5px 0;font-size:.82rem;font-weight:800}
.tower-bar-bg{flex:1;height:6px;background:var(--border);border-radius:100px;overflow:hidden}
.tower-bar-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:100px}

/* ── Completion Banner ── */
.comp-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(4,2,14,.88);backdrop-filter:blur(18px);flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px}
.comp-overlay.show{display:flex;animation:fadeInComp .5s ease}
@keyframes fadeInComp{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.comp-title{font-size:2.2rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.comp-sub{font-size:.9rem;color:var(--txt2);margin-bottom:24px;line-height:1.6}
.comp-trophy{font-size:4rem;margin-bottom:12px;animation:trophy-bob .8s ease infinite alternate}
@keyframes trophy-bob{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-10px) rotate(5deg)}}
.comp-next-btn{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#050210;border:none;border-radius:100px;padding:14px 32px;font-family:var(--font);font-size:1rem;font-weight:900;cursor:pointer;-webkit-appearance:none;margin-bottom:12px;transition:.2s;box-shadow:0 6px 28px rgba(var(--acc-rgb),.4)}
.comp-next-btn:active{opacity:.85;transform:scale(.97)}
.comp-map-btn{background:transparent;border:1.5px solid rgba(255,255,255,.2);color:var(--txt2);border-radius:100px;padding:10px 24px;font-family:var(--font);font-size:.85rem;font-weight:800;cursor:pointer;-webkit-appearance:none;transition:.2s}
.comp-map-btn:active{opacity:.7}
.comp-stars{font-size:2rem;letter-spacing:6px;margin-bottom:16px;animation:stars-in .6s .3s ease both}
@keyframes stars-in{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
/* Firework particles */
.fw-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.fw{position:absolute;border-radius:50%;animation:fwFly var(--d,.8s) var(--dl,0s) ease-out forwards}
@keyframes fwFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx,0px),var(--ty,-80px)) scale(0);opacity:0}}

/* ── Font size boost ── */
.lesson-title{font-size:1.05rem!important}
.lesson-sub{font-size:.85rem!important}
.story-box{font-size:1rem!important;line-height:1.9!important}
.quiz-q{font-size:.98rem!important;line-height:1.7!important}
.opt{font-size:.95rem!important}
.done-btn{font-size:1rem!important}
.xp-pill{font-size:.78rem!important}
.tab{font-size:.85rem!important}
.school-badge{font-size:.84rem!important}
.code-wrap pre{font-size:.82rem!important}
.map-title{font-size:.82rem!important}
</style>

.opt:hover{border-color:#3d6860!important;background:#e8f4c8!important}

.demo-label{color:#c8e8a0!important}

// ── iOS Safari Fixes ──
// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    const R=Math.min(typeof r==='number'?r:r[0],w/2,h/2);
    this.beginPath();this.moveTo(x+R,y);this.lineTo(x+w-R,y);
    this.arcTo(x+w,y,x+w,y+R,R);this.lineTo(x+w,y+h-R);
    this.arcTo(x+w,y+h,x+w-R,y+h,R);this.lineTo(x+R,y+h);
    this.arcTo(x,y+h,x,y+h-R,R);this.lineTo(x,y+R);
    this.arcTo(x,y,x+R,y,R);this.closePath();
  };
}
// WebGL context pool - prevents iOS 8-context limit crash
const _glPool = {};
function safeGL(cv) {
  if(!cv) return null;
  const id = cv.id || 'cv_'+Math.random();
  cv.id = id;
  if(_glPool[id] && !_glPool[id].isContextLost()) return _glPool[id];
  const gl = cv.getContext('webgl',{powerPreference:'low-power',preserveDrawingBuffer:false,failIfMajorPerformanceCaveat:false});
  if(!gl) return null;
  _glPool[id] = gl;
  cv.addEventListener('webglcontextlost',e=>{e.preventDefault();delete _glPool[id];});
  return gl;
}

const inited={};
function initDemo(id){const cont=document.getElementById('dc-'+id);if(!cont)return;if(inited[id])return;if(window._glPool){Object.values(window._glPool).forEach(function(g){try{var e=g.getExtension('WEBGL_lose_context');if(e)e.loseContext();}catch(e2){}});window._glPool={};}Object.keys(inited).forEach(function(k){if(k!==id)inited[k]=false;});inited[id]=true;const fn={l1:d1,l2:d2,l3:d3,l4:d4,l5:d5,l6:d6,l7:d7,l8:d8};fn[id]?.(cont);}
function mkP(gl,vs,fs){const mk=(t,src)=>{const sh=gl.createShader(t);gl.shaderSource(sh,src);gl.compileShader(sh);return sh;};const p=gl.createProgram();gl.attachShader(p,mk(gl.VERTEX_SHADER,vs));gl.attachShader(p,mk(gl.FRAGMENT_SHADER,fs));gl.linkProgram(p);return p;}
function qB(gl){const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);return b;}
const VS='attribute vec2 p;varying vec2 uv;void main(){uv=p*.5+.5;gl_Position=vec4(p,0,1);}';
function mkSD9(cont,id,label,mnames,fs,extras){
  const btns=mnames.map((n,i)=>`<button class="ctrl-btn ${i===0?'on':''}" id="m9${id}${i}" onclick="setM9_${id}(${i})">${n}</button>`).join('');
  cont.innerHTML=`<div class="demo-wrap"><div class="demo-top"><div class="demo-label"><div class="live-dot"></div>${label}</div></div><canvas id="cv9${id}" width="600" height="260" style="height:260px"></canvas></div><div class="ctrl-row">${btns}</div>${extras||''}`;
  window[`_m9${id}`]=0;window[`setM9_${id}`]=m=>{window[`_m9${id}`]=m;mnames.forEach((_,i)=>document.getElementById(`m9${id}${i}`).classList.toggle('on',i===m));};
  const cv=document.getElementById('cv9'+id);const gl=cv.getContext('webgl',{powerPreference:'low-power'});if(!gl)return;
  const prog=mkP(gl,VS,fs);const buf=qB(gl);
  const pL=gl.getAttribLocation(prog,'p'),mL=gl.getUniformLocation(prog,'mode'),tL=gl.getUniformLocation(prog,'t');
  let time=0;(function fr(){time+=0.016;gl.viewport(0,0,600,260);gl.clear(gl.COLOR_BUFFER_BIT);gl.useProgram(prog);gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.enableVertexAttribArray(pL);gl.vertexAttribPointer(pL,2,gl.FLOAT,false,0,0);gl.uniform1i(mL,window[`_m9${id}`]);gl.uniform1f(tL,time);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(fr);})();
}

function d1(cont){mkSD9(cont,'1','引擎架構 — ECS 視覺化',['🧩 ECS 結構','🔄 渲染管線','🏛️ 系統圖'],
  `precision mediump float;varying vec2 uv;uniform int mode;uniform float t;
  float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.);}
  float box(vec2 p,vec2 s){vec2 d=abs(p)-s;return length(max(d,0.))+min(max(d.x,d.y),0.);}
  void main(){
    vec2 c=uv*2.-1.;vec3 col=vec3(.04,.03,.01);
    if(mode==0){
      // ECS diagram
      float E=box(c-vec2(-.6,.3),vec2(.12,.08));float C=box(c-vec2(0.,.3),vec2(.12,.08));float S=box(c-vec2(.6,.3),vec2(.12,.08));
      float arrow1=box(c-vec2(-.3,.3),vec2(.08,.006));float arrow2=box(c-vec2(.3,.3),vec2(.08,.006));
      col=mix(col,vec3(.9,.7,.1),smoothstep(.015,0.,E));
      col=mix(col,vec3(.1,.6,.9),smoothstep(.015,0.,C));
      col=mix(col,vec3(.1,.9,.4),smoothstep(.015,0.,S));
      col=mix(col,vec3(.5,.5,.5),smoothstep(.008,0.,min(arrow1,arrow2)));
      // Moving entities
      for(int i=0;i<8;i++){float f=float(i)/8.;float x=sin(t*.5+f*6.28)*.5;float y=cos(t*.4+f*6.28)*.3-.3;float d=length(c-vec2(x,y))-.04;col=mix(col,vec3(.9,.6,.1)*(1.-f*.5),smoothstep(.01,0.,d));}
    }
    if(mode==1){
      // Pipeline stages
      float stageW=.22;float stageH=.1;
      for(int i=0;i<5;i++){float x=-1.+float(i)*.5+.25;float d=box(c-vec2(x,0.),vec2(stageW,stageH));vec3 sc=i==0?vec3(.9,.3,.1):i==1?vec3(.1,.7,.3):i==2?vec3(.1,.4,.9):i==3?vec3(.8,.5,.1):vec3(.9,.7,.2);col=mix(col,sc,smoothstep(.012,0.,d)*.8);}
      // Arrows
      for(int i=0;i<4;i++){float x=-.75+float(i)*.5;float d=box(c-vec2(x,.0),vec2(.03,.006));col=mix(col,vec3(.6,.5,.3),smoothstep(.008,0.,d));}
    }
    if(mode==2){
      // System hierarchy circles
      float sys=length(c)-.85;float subsys=length(c)-.55;float comp=length(c)-.3;
      col=mix(col,vec3(.9,.7,.1)*.15,smoothstep(.01,0.,sys));
      col=mix(col,vec3(.1,.6,.9)*.2,smoothstep(.01,0.,subsys));
      col=mix(col,vec3(.1,.9,.4)*.3,smoothstep(.01,0.,comp));
      for(int i=0;i<6;i++){float a=float(i)/6.*6.28+t*.3;vec2 lp=vec2(cos(a)*.7,sin(a)*.7);float d=length(c-lp)-.07;col=mix(col,vec3(.9,.7,.1),smoothstep(.01,0.,d));}
    }
    gl_FragColor=vec4(col,1.);
  }`);}

function d2(cont){mkSD9(cont,'2','資源管理 — Handle 系統',['📦 資源池','🔄 載入狀態','💾 記憶體'],
  `precision mediump float;varying vec2 uv;uniform int mode;uniform float t;
  float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.);}
  void main(){
    vec2 c=uv*2.-1.;vec3 col=vec3(.04,.03,.01);
    if(mode==0){
      // Resource pool grid
      for(int row=0;row<5;row++)for(int col2=0;col2<8;col2++){
        float x=-1.+float(col2)*.26+.13;float y=.7-float(row)*.36;
        float life=hash(vec2(float(row),float(col2)));float used=step(.3,life);float loading=step(life,.5)*step(.3,life);
        vec2 rp=c-vec2(x,y);float d=length(rp)-.09;
        vec3 rc=used>0.?loading>0.?vec3(.9,.7,.1):vec3(.2,.7,.3):vec3(.2,.2,.3);
        col=mix(col,rc,smoothstep(.015,0.,d));
      }
    }
    if(mode==1){
      // Loading state machine
      float prog=fract(t*.2);float bar=box(c,vec2(.7,.04));float fill=box(c-vec2(-(.7*(1.-prog)),0.),vec2(.7*prog,.04));
      col=mix(col,vec3(.2,.2,.4),smoothstep(.01,0.,bar));col=mix(col,vec3(.9,.7,.1),smoothstep(.01,0.,fill));
      // Status icons
      for(int i=0;i<6;i++){float f=float(i)/5.;float x=-1.+f*2.;float state=step(f,prog);float d=length(c-vec2(x,-.4))-.07;col=mix(col,state>0.?vec3(.2,.9,.4):vec3(.5,.3,.1),smoothstep(.01,0.,d));}
    }
    if(mode==2){
      // Memory layout
      float y=uv.y;
      if(y>.75){float x=mod(uv.x*12.,1.);float used=step(.3,hash(vec2(floor(uv.x*12.),3.)));col=mix(vec3(.1,.05,.2),used>0.?vec3(.4,.1,.8):vec3(.15,.1,.25),step(.05,x)*step(x,.95));}
      else if(y>.5){float x=mod(uv.x*8.,1.);float used=step(.2,hash(vec2(floor(uv.x*8.),2.)));col=mix(vec3(.05,.1,.2),used>0.?vec3(.1,.4,.9):vec3(.08,.12,.25),step(.05,x)*step(x,.95));}
      else if(y>.25){float x=mod(uv.x*5.,1.);float used=step(.25,hash(vec2(floor(uv.x*5.),1.)));col=mix(vec3(.05,.15,.08),used>0.?vec3(.1,.8,.3):vec3(.07,.18,.1),step(.05,x)*step(x,.95));}
      else{col=vec3(.04,.03,.01);}
    }
    gl_FragColor=vec4(col,1.);
  }`);}

function d3(cont){mkSD9(cont,'3','材質系統 — Shader 變體',['🎨 材質球','🔀 Uber Shader','🌈 材質節點'],
  `precision mediump float;varying vec2 uv;uniform int mode;uniform float t;
  const float PI=3.14159265;
  float sdSphere(vec2 c,float r){return length(c)-r;}
  vec3 pbr_approx(vec2 c,float r,float metallic,float roughness,vec3 albedo,vec2 ldir){
    float dist=length(c);if(dist>r)return vec3(0.);
    vec3 N=normalize(vec3(c,sqrt(max(0.,r*r-dot(c,c)))/r));
    vec3 L=normalize(vec3(ldir,.8));vec3 V=vec3(0,0,1);
    float NdL=max(dot(N,L),.0);vec3 H=normalize(L+V);
    float NdH=max(dot(N,H),.0);float HdV=max(dot(H,V),.0);
    float a=roughness*roughness;float a2=a*a;float d2=(NdH*NdH*(a2-1.)+1.);
    float NDF=a2/(PI*d2*d2+.001);
    vec3 F0=mix(vec3(.04),albedo,metallic);vec3 F=F0+(1.-F0)*pow(1.-HdV,5.);
    vec3 kD=(1.-F)*(1.-metallic);
    vec3 col=(kD*albedo/PI+NDF*F*.5/(4.*max(dot(N,V),.01)*NdL+.001))*NdL*5.+albedo*.04;
    col=col/(col+1.);return pow(col,vec3(1./2.2));
  }
  void main(){
    vec2 c=uv*2.-1.;vec3 col=vec3(.04,.03,.01);
    vec2 ldir=vec2(cos(t),sin(t*.7));
    if(mode==0){
      // Material sphere grid: 3x3
      vec3 albedos[3];albedos[0]=vec3(1.,.766,.336);albedos[1]=vec3(.9,.3,.1);albedos[2]=vec3(.55,.56,.55);
      for(int row=0;row<3;row++)for(int cc=0;cc<3;cc++){
        float x=-0.65+float(cc)*.65;float y=0.55-float(row)*.55;
        float met=float(row)/2.;float rough=float(cc)/2.*.8+.05;
        vec3 sphere=pbr_approx(c-vec2(x,y),.22,met,rough,albedos[cc],ldir);
        col+=sphere;
      }
    }
    if(mode==1){
      // Uber shader toggles
      float barH=.07;
      for(int i=0;i<6;i++){float y=.7-float(i)*.27;float on=step(.5,fract(float(i)*.618+t*.1));float bar=length(vec2(max(abs(c.x)-.6,0.),c.y-y))-barH;vec3 fc=on>0.?vec3(.9,.7,.1):vec3(.2,.2,.3);col=mix(col,fc,smoothstep(.01,0.,bar)*.7);}
    }
    if(mode==2){
      // Node graph
      for(int i=0;i<8;i++){float f=float(i);float a=f/8.*6.28;float r=.5+mod(f,3.)*.15;vec2 np=vec2(cos(a)*r,sin(a)*r);float d=length(c-np)-.07;vec3 nc=vec3(fract(f*.31+.1),fract(f*.17+.3),fract(f*.53+.5));col=mix(col,nc*.8+.1,smoothstep(.012,0.,d));}
      // Connections
      for(int i=0;i<5;i++){float f=float(i);float a1=f/8.*6.28;float a2=(f+2.)/8.*6.28;vec2 p1=vec2(cos(a1)*.6,sin(a1)*.6);vec2 p2=vec2(cos(a2)*.6,sin(a2)*.6);vec2 ab=p2-p1;vec2 ap=c-p1;float h=clamp(dot(ap,ab)/dot(ab,ab),0.,1.);float d=length(ap-ab*h)-.005;col=mix(col,vec3(.6,.5,.2),smoothstep(.008,0.,d));}
    }
    gl_FragColor=vec4(col,1.);
  }`);}

function d4(cont){mkSD9(cont,'4','Clustered Shading — 光源分格',['💡 Cluster 分格','🗺️ 光源分配','⚡ 效能對比'],
  `precision mediump float;varying vec2 uv;uniform int mode;uniform float t;
  float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.);}
  void main(){
    vec2 c=uv*2.-1.;vec3 col=vec3(.04,.03,.01);
    if(mode==0){
      // 3D cluster grid (2D projection)
      vec2 grid=floor(uv*vec2(8.,6.));vec2 f=fract(uv*vec2(8.,6.));
      float clusterID=grid.x+grid.y*8.;
      // How many lights in this cluster?
      float lights=floor(hash(grid+vec2(t*.05))*4.);
      float border=step(.05,f.x)*step(f.x,.95)*step(.05,f.y)*step(f.y,.95);
      vec3 cc=lights==0.?vec3(.06,.05,.03):lights<2.?vec3(.2,.15,.05)*lights:lights<3.?vec3(.5,.3,.05):vec3(.9,.5,.05);
      col=mix(col,cc*border,border);
      // Active lights
      for(int i=0;i<6;i++){float a=float(i)/6.*6.28+t*.4;vec2 lp=vec2(cos(a)*.7,sin(a)*.5);float d=length(c-lp)-.04;col=mix(col,vec3(1.,.8,.2),smoothstep(.01,0.,d));}
    }
    if(mode==1){
      // Light assignment heatmap
      for(int i=0;i<6;i++){float a=float(i)/6.*6.28+t*.4;vec2 lp=vec2(cos(a)*.7+1.,sin(a)*.5+1.)*uv;float glow=exp(-length(uv-vec2(cos(a)*.35+.5,sin(a)*.25+.5))*5.);col+=vec3(glow*.5)*mix(vec3(1.,0.,0.),vec3(0.,1.,0.5),float(i)/5.);}
      col=col/(col+.8);
    }
    if(mode==2){
      // Performance bar chart: naive vs clustered
      float naiveH=.7;float clusterH=.15;
      float naiveBar=box(c-vec2(-.4,naiveH*.5-.5),vec2(.15,naiveH*.5));

function d5(cont){mkSD9(cont,'5','動畫狀態機 — 角色狀態',['🎭 狀態機','🦿 IK 逆向運動','🔄 動畫混合'],
  `precision mediump float;varying vec2 uv;uniform int mode;uniform float t;
  float seg(vec2 p,vec2 a,vec2 b,float r){vec2 ab=b-a,ap=p-a;float h=clamp(dot(ap,ab)/dot(ab,ab),0.,1.);return length(ap-ab*h)-r;}
  void main(){
    vec2 c=uv*2.-1.;vec3 col=vec3(.04,.03,.01);
    if(mode==0){
      // State machine graph
      vec2 states[4];states[0]=vec2(-.6,.4);states[1]=vec2(.6,.4);states[2]=vec2(-.6,-.4);states[3]=vec2(.6,-.4);
      for(int i=0;i<4;i++){float d=length(c-states[i])-.13;bool active=int(fract(t*.3)*4.)==i;vec3 sc=active?vec3(.9,.7,.1):vec3(.2,.3,.5);col=mix(col,sc,smoothstep(.015,0.,d));}
      // Transitions
      for(int i=0;i<4;i++){for(int j=0;j<4;j++){if(i==j)continue;float d=seg(c,states[i],states[j],.005);col=mix(col,vec3(.4,.35,.2),smoothstep(.008,0.,d));}}
    }
    if(mode==1){
      // IK chain
      vec2 target=vec2(cos(t*.7)*.6,sin(t*.5)*.4);

      vec2 root=vec2(0.,-.5);vec2 j1=vec2(0.,-.1);
      vec2 toTarget=target-root;float totalLen=.8;vec2 dir=length(toTarget)>totalLen?normalize(toTarget)*totalLen:toTarget;
      j1=root+dir*.4;
      float b1=seg(c,root,j1,.025);float b2=seg(c,j1,target,.02);
      float joints=min(min(length(c-root)-.04,length(c-j1)-.03),length(c-target)-.025);
      col=mix(col,vec3(.9,.6,.2),smoothstep(.015,0.,min(b1,b2)));

    if(mode==2){

      float speed=sin(t*.5)*.5+.5;

      float legAngle=sin(t*3.)*.3*(1.-speed);
      vec2 hip=vec2(0.,.4);vec2 knee=hip+vec2(sin(legAngle)*.25,-0.3);vec2 foot=knee+vec2(sin(-legAngle)*.25,-0.25);
      // Run pose

    }
    gl_FragColor=vec4(col,1.);
  }`);}

function d6(cont){mkSD9(cont,'6','開放世界 — Chunk 串流',['🌍 世界地圖','📦 Chunk 載入','🗻 LOD 系統'],
  `precision mediump float;varying vec2 uv;uniform int mode;uniform float t;
  float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.);}
  float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*hash(floor(p));p*=2.1;a*=.5;}return v;}
  void main(){
    vec2 c=uv*2.-1.;vec3 col=vec3(.04,.03,.01);

      float h=fbm(grid*.3)*.6+.2;
      vec3 terrain=h>.7?vec3(.8,.8,.9):h>.4?vec3(.2,.4,.15):h>.25?vec3(.5,.4,.25):vec3(.2,.35,.5);

    }

    if(mode==2){

      vec3 terrain=h2>.7?snow:h2>.45?rock:h2>.25?grass:water;

  }`);}

function d8(cont){

  const cv=document.getElementById('cv9boss');const gl=cv.getContext('webgl',{powerPreference:'low-power'});if(!gl)return;
  const fs=`precision mediump float;varying vec2 uv;uniform float t;uniform int mode;
  const float PI=3.14159265;
  float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.);}
  float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*hash(floor(p));p*=2.1;a*=.5;}return v;}

  float sdBox(vec3 p,vec3 b){vec3 q=abs(p)-b;return length(max(q,0.))+min(max(q.x,max(q.y,q.z)),0.);}

    float b1=sdBox(p-vec3(-.7,-.4,0.),vec3(.2));

  }
  vec3 normal(vec3 p){const float e=.001;return normalize(vec3(scene(p+vec3(e,0,0))-scene(p-vec3(e,0,0)),scene(p+vec3(0,e,0))-scene(p-vec3(0,e,0)),scene(p+vec3(0,0,e))-scene(p-vec3(0,0,e))));}
  float softshadow(vec3 ro,vec3 rd,float k){float r=1.,d=.01;for(int i=0;i<32;i++){float h=scene(ro+rd*d);if(h<.001)return .0;r=min(r,k*h/d);d+=clamp(h,.01,.3);if(d>6.)break;}return r;}
  vec3 atm(vec3 rd,vec3 sun){float mu=dot(rd,sun);vec3 b=vec3(.05,.15,.45)*max(rd.y+.1,0.);return b+vec3(.9,.7,.3)*pow(max(mu,0.),12.)*.4+vec3(.05,.04,.08);}
  vec3 pbr(vec3 N,vec3 V,vec3 L,vec3 alb,float met,float rou){
    vec3 F0=mix(vec3(.04),alb,met);vec3 H=normalize(L+V);
    float a=rou*rou;float a2=a*a;float NdH=max(dot(N,H),0.);float d2=(NdH*NdH*(a2-1.)+1.);
    float NDF=a2/(PI*d2*d2+.001);float NdV=max(dot(N,V),.01);float NdL=max(dot(N,L),0.);

  void main(){

}

// ── Completion System ──
const CASTLE_NUM = 9;
const CASTLE_TOTAL = 8;
const CASTLE_KEY = 'tower9_done';
const NEXT_CASTLE = 9;

function checkCompletion(){
  const done = JSON.parse(localStorage.getItem(CASTLE_KEY)||'[]').filter(Boolean).length;
  if(done >= CASTLE_TOTAL && !localStorage.getItem(CASTLE_KEY+'_comp_shown')){
    localStorage.setItem(CASTLE_KEY+'_comp_shown','1');
    setTimeout(showCompletion, 800);
  }
}

function showCompletion(){
  const overlay = document.getElementById('compOverlay');
  if(!overlay) return;
  // Fireworks
  const fw = overlay.querySelector('.fw-wrap');
  const colors=['#a78bfa','#34d399','#ffd700','#ff6b9d','#00d4ff','#ff9f43'];
  for(let i=0;i<28;i++){
    const d=document.createElement('div');
    d.className='fw';
    const tx=(Math.random()-.5)*300;
    const ty=-100-Math.random()*200;
    d.style.cssText=`width:6px;height:6px;background:${colors[i%colors.length]};left:${40+Math.random()*20}%;top:60%;--d:${.6+Math.random()*.8}s;--dl:${Math.random()*.5}s;--tx:${tx}px;--ty:${ty}px`;
    fw.appendChild(d);
  }
  overlay.classList.add('show');
}

function goNextCastle(){
  if(NEXT_CASTLE > 0){
    window.location.href='opengl-map.html#done-'+CASTLE_NUM;
  } else {
    window.location.href='opengl-map.html';
  }
}

function goMap(){ window.location.href='opengl-map.html#done-'+CASTLE_NUM; }

// Auto-scroll nav to current castle
(function(){
  const navBar = document.querySelector('div[style*="position:sticky;top:52px"]');
  if(!navBar) return;
  const current = navBar.querySelector('[style*="opacity:1"]');
  if(current) setTimeout(()=>{
    current.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }, 300);
})();

// Hook into existing complete() function
const _origComplete = complete;
if(typeof complete === 'function'){

  window._patchedComplete = true;
}
// Check on page load
document.addEventListener('DOMContentLoaded', ()=>{
  setTimeout(checkCompletion, 500);
});
// Also check after any storage changes
window.addEventListener('storage', checkCompletion);

// Hide overlay on back-forward cache restore
window.addEventListener('pageshow', (e) => {
  // Clear overlay/toast
  const overlay = document.getElementById('compOverlay');
  if (overlay) overlay.classList.remove('show');
  const toast = document.getElementById('toast');
  if (toast) toast.classList.remove('show');
  // On bfcache restore: reset and re-render lessons cleanly
  if (e.persisted) {
    if (typeof currentLesson !== 'undefined') currentLesson = null;
    if (typeof renderLessons === 'function') renderLessons();
  }
});
