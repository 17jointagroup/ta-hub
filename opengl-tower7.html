<style>
:root{
  --bg:#0e0505;--bg2:#130707;--card:#180a0a;--border:#2e1010;
  --acc:#ff4757;--acc2:#ff6b81;--acc3:#ffd93d;--acc4:#ff6b6b;--acc5:#00f5c4;
  --txt:#ffe8e8;--txt2:#6e3535;
  --font:'Nunito',sans-serif;--mono:'Space Mono',monospace;
  --glow:0 0 28px rgba(255,71,87,.3);
}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--font);overflow-x:hidden}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:#ff9999;animation:tw var(--d,3s) var(--dl,0s) infinite}
@keyframes tw{0%,100%{opacity:.06}50%{opacity:.6}}
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;animation:drift var(--d,20s) ease-in-out infinite alternate}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(var(--tx,40px),var(--ty,-40px))}}
header{position:sticky;top:0;z-index:100;background:rgba(14,5,5,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:11px 24px;display:flex;align-items:center;gap:12px}
.back-btn{background:var(--card);border:1px solid var(--border);color:var(--txt2);padding:6px 14px;border-radius:100px;font-size:.78rem;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block;transition:.2s}
.back-btn:hover{color:var(--acc);border-color:var(--acc)}
.header-title{font-size:1rem;font-weight:900;color:var(--acc)}
.xp-bar{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:.82rem;font-weight:800}
.xp-total{color:var(--acc);font-family:var(--mono)}
.xp-track{width:110px;height:7px;background:var(--border);border-radius:100px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:100px;transition:width .7s cubic-bezier(.34,1.56,.64,1)}
.hero{position:relative;z-index:1;text-align:center;padding:64px 24px 44px}
.tower-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,71,87,.07);border:1px solid rgba(255,71,87,.22);border-radius:100px;padding:6px 18px;font-size:.78rem;font-weight:800;color:var(--acc);margin-bottom:20px}
.hero h1{font-size:clamp(2rem,6vw,3.4rem);font-weight:900;line-height:1.1;margin-bottom:14px}
.hero h1 span{background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--txt2);font-size:.95rem;max-width:500px;margin:0 auto 32px;line-height:1.75}
.stats-row{display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
.stat-chip{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px 22px;text-align:center}
.stat-chip .num{font-size:1.5rem;font-weight:900;font-family:var(--mono);color:var(--acc)}
.stat-chip .lbl{font-size:.68rem;color:var(--txt2);font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.chapter-map{position:relative;z-index:1;padding:24px;max-width:920px;margin:0 auto}
.map-title{font-size:.75rem;font-weight:800;color:var(--txt2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px;padding-left:4px}
.lesson{background:var(--card);border:1px solid var(--border);border-radius:22px;margin-bottom:10px;overflow:hidden;transition:border-color .2s,box-shadow .2s;cursor:pointer}
.lesson:hover:not(.locked){border-color:rgba(255,71,87,.4);box-shadow:var(--glow)}
.lesson.locked{opacity:.45;cursor:not-allowed}
.lesson.active{border-color:var(--acc);box-shadow:var(--glow)}
.lesson.done{border-color:rgba(255,107,129,.4)}
.lesson.boss:hover:not(.locked),.lesson.boss.active{border-color:var(--acc3);box-shadow:0 0 24px rgba(255,217,61,.3)}
.lesson-header{display:flex;align-items:center;gap:16px;padding:16px 20px}
.lesson-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.i-n{background:rgba(255,71,87,.07);border:1px solid rgba(255,71,87,.18)}
.i-d{background:rgba(255,107,129,.1);border:1px solid rgba(255,107,129,.3)}
.i-b{background:rgba(255,217,61,.07);border:1px solid rgba(255,217,61,.22)}
.i-l{background:var(--border);filter:grayscale(1)}
.lesson-info{flex:1}
.lesson-title{font-size:.95rem;font-weight:900;margin-bottom:2px}
.lesson-sub{font-size:.75rem;color:var(--txt2);font-weight:700}
.lesson-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.xp-pill{background:rgba(255,71,87,.07);color:var(--acc);border:1px solid rgba(255,71,87,.2);border-radius:100px;padding:3px 10px;font-size:.7rem;font-weight:900;font-family:var(--mono)}
.boss-pill{background:rgba(255,217,61,.07);color:var(--acc3);border:1px solid rgba(255,217,61,.25);border-radius:100px;padding:3px 10px;font-size:.68rem;font-weight:900}
.chk{width:26px;height:26px;border-radius:50%;background:rgba(255,107,129,.1);color:var(--acc2);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:900}
.lck{width:26px;height:26px;border-radius:50%;background:var(--border);color:var(--txt2);display:flex;align-items:center;justify-content:center}
.lesson-body{display:none;border-top:1px solid var(--border)}
.lesson.active .lesson-body{display:block}
.tab-bar{display:flex;gap:3px;padding:10px 14px 0;background:var(--bg2)}
.tab{padding:7px 14px;border-radius:9px 9px 0 0;font-size:.76rem;font-weight:800;cursor:pointer;transition:.15s;color:var(--txt2);border:1px solid transparent;border-bottom:none}
.tab.on{background:var(--card);color:var(--txt);border-color:var(--border)}
.tab-content{padding:18px}
.tab-panel{display:none}.tab-panel.on{display:block}
.story-box{background:linear-gradient(135deg,rgba(255,71,87,.05),rgba(255,107,129,.02));border:1px solid rgba(255,71,87,.14);border-radius:18px;padding:20px;margin-bottom:16px;line-height:1.85;font-size:.91rem}
.be{font-size:2.5rem;display:block;margin-bottom:10px;animation:bob .9s ease infinite alternate}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-6px)}}
.hl{background:rgba(255,71,87,.14);color:var(--acc);border-radius:4px;padding:1px 7px;font-weight:900}
.hl2{background:rgba(255,107,129,.12);color:var(--acc2);border-radius:4px;padding:1px 7px;font-weight:900}
.hl3{background:rgba(255,217,61,.1);color:var(--acc3);border-radius:4px;padding:1px 7px;font-weight:900}
.hl4{background:rgba(0,245,196,.1);color:var(--acc5);border-radius:4px;padding:1px 7px;font-weight:900}
.school-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,71,87,.06);border:1px solid rgba(255,71,87,.18);border-radius:8px;padding:6px 12px;font-size:.76rem;font-weight:800;color:var(--acc);margin-top:12px}
.code-wrap{background:#0a0202;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:12px 0}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
.code-lang{font-size:.68rem;font-weight:800;color:var(--txt2);font-family:var(--mono)}
.copy-btn{background:none;border:1px solid var(--border);color:var(--txt2);padding:3px 9px;border-radius:5px;font-size:.65rem;font-weight:800;cursor:pointer;transition:.15s;font-family:var(--mono)}
.copy-btn:hover{color:var(--acc);border-color:var(--acc)}
pre{padding:14px;font-family:var(--mono);font-size:.75rem;line-height:1.7;overflow-x:auto;white-space:pre}
.kw{color:#ff4757}.fn{color:#ff9f43}.str{color:#00f5c4}.num{color:#ffd93d}.cm{color:#2e1010}.type{color:#c792ea}
.demo-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px}
.demo-top{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border)}
.demo-label{font-size:.68rem;font-weight:800;color:var(--txt2);letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--acc);box-shadow:0 0 5px var(--acc);animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
canvas{display:block;width:100%}
.ctrl-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.ctrl-btn{background:var(--card);border:1px solid var(--border);color:var(--txt2);padding:6px 14px;border-radius:100px;font-family:var(--font);font-size:.78rem;font-weight:800;cursor:pointer;transition:.2s}
.ctrl-btn:hover{border-color:var(--acc);color:var(--acc)}
.ctrl-btn.on{background:rgba(255,71,87,.1);border-color:var(--acc);color:var(--acc)}
.slider-row{display:flex;align-items:center;gap:10px;margin:6px 0}
.slider-label{font-size:.75rem;font-weight:800;color:var(--txt2);min-width:90px}
input[type=range]{flex:1;accent-color:var(--acc)}
.slider-val{font-family:var(--mono);font-size:.75rem;color:var(--acc3);min-width:44px;text-align:right}
.quiz-box{background:rgba(255,217,61,.04);border:1px solid rgba(255,217,61,.15);border-radius:14px;padding:18px;margin-top:16px}
.quiz-title{font-size:.8rem;font-weight:900;color:var(--acc3);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.quiz-q{font-size:.88rem;line-height:1.6;color:var(--txt);margin-bottom:12px;font-weight:700}
.opts{display:grid;gap:7px}
.opt{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 14px;cursor:pointer;font-size:.84rem;font-weight:700;transition:.2s;display:flex;align-items:center;gap:9px}
.opt:hover{border-color:var(--acc);background:rgba(255,71,87,.04)}
.opt.correct{border-color:var(--acc5);background:rgba(0,245,196,.05);color:var(--acc5);pointer-events:none}
.opt.wrong{border-color:var(--acc4);background:rgba(255,107,107,.05);color:var(--acc4);pointer-events:none}
.opt.disabled{pointer-events:none;opacity:.6}
.opt-k{width:22px;height:22px;border-radius:5px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:900;font-family:var(--mono);flex-shrink:0}
.explain-box{margin-top:10px;padding:11px 14px;background:rgba(0,245,196,.04);border:1px solid rgba(0,245,196,.15);border-radius:9px;font-size:.81rem;line-height:1.65;color:var(--txt2);display:none}
.done-btn{width:100%;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#0a0000;border:none;border-radius:100px;padding:12px;font-family:var(--font);font-size:.92rem;font-weight:900;cursor:pointer;margin-top:14px;transition:.25s;display:flex;align-items:center;justify-content:center;gap:8px}
.done-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,71,87,.35)}
.done-btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.conn{width:2px;height:10px;background:linear-gradient(var(--border),transparent);margin:0 auto -1px;position:relative;left:21px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--acc);border-radius:100px;padding:10px 26px;font-weight:800;font-size:.86rem;color:var(--acc);z-index:999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
.xp-pop{position:fixed;font-family:var(--mono);font-weight:900;font-size:1.2rem;color:var(--acc);pointer-events:none;z-index:999;text-shadow:0 0 20px var(--acc);animation:floatUp .9s ease-out forwards}
</style></head>
<body>
<div class="stars" id="stars"></div>
<div class="orb" style="width:400px;height:400px;background:rgba(255,71,87,.05);top:0%;left:-5%;--d:20s;--tx:70px;--ty:50px"></div>
<div class="orb" style="width:260px;height:260px;background:rgba(255,107,129,.04);bottom:5%;right:0%;--d:24s;--tx:-50px;--ty:-40px"></div>
<header>
  <a href="opengl-tower6.html" class="back-btn">&#8592; 塔6</a>
  <a href="opengl-tower8.html" class="back-btn">塔8 &#8594;</a>
  <a href="index.html" class="back-btn">&#127968; 首頁</a>
  <span class="header-title">&#9876; 實戰競技場</span>
  <div class="xp-bar">
    <span style="color:var(--txt2)">&#9889;</span>
    <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    <span class="xp-total" id="xp-total">0/870</span>
  </div>
</header>
<section class="hero">
  <div class="tower-badge">&#9876; 塔7 · 實戰競技場 · Game Dev</div>
  <h1>讓場景<span>活起來</span></h1>
  <p>粒子、骨骼動畫、地形、水面、LOD — 真實遊戲裡必用的技術，一次全部學會 🎮</p>
  <div class="stats-row">
    <div class="stat-chip"><div class="num" id="done-count">0</div><div class="lbl">已完成</div></div>
    <div class="stat-chip"><div class="num">9</div><div class="lbl">關卡數</div></div>
    <div class="stat-chip"><div class="num">870</div><div class="lbl">總 XP</div></div>
    <div class="stat-chip"><div class="num">&#127381;</div><div class="lbl">Boss 1關</div></div>
  </div>
</section>
<div class="chapter-map">
  <div class="map-title">&#128205; 關卡地圖</div>
  <div id="lesson-list"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const LESSONS=[
{id:'l1',num:'7-1',icon:'✨',title:'粒子系統 — 生命的誕生',sub:'CPU 粒子：生命週期、速度、重力、淡出',xp:70,type:'normal',school:'物理：運動學方程，隨機過程',
story:'<span class="be">✨</span><span class="hl">粒子系統</span>是遊戲最萬能的工具！<br>火焰、爆炸、下雨、魔法、煙霧 — 全靠它！<br><br>每個粒子有這些屬性：<br>• <span class="hl2">位置</span> pos = pos + vel * dt<br>• <span class="hl">速度</span> vel = vel + gravity * dt<br>• <span class="hl3">生命</span> life -= dt（到 0 就消失重生）<br>• 大小、顏色（隨生命衰減淡出）<br><br>每幀：<br>1️⃣ 更新所有粒子物理（CPU）<br>2️⃣ 上傳位置到 VBO（動態緩衝）<br>3️⃣ 用 <span class="hl">Billboard</span> 渲染：永遠朝向攝影機的四邊形<br><br>優化：用<span class="hl2">粒子池</span>，死掉的粒子重設，不刪不建！',
quiz:{q:'Billboard 技術的用途是什麼？',opts:['讓粒子更大','讓四邊形永遠正對攝影機，避免側面看起來只是一條線','讓粒子更亮','加速渲染'],ans:1,explain:'一個四邊形從側面看幾乎看不見。Billboard 讓每個粒子的四邊形永遠旋轉朝向攝影機，從任何角度看都像圓形。用攝影機的 right 和 up 向量構建四邊形角落 📷'}},
{id:'l2',num:'7-2',icon:'🦴',title:'骨骼動畫 — 讓角色動起來',sub:'Skinning：骨骼 + 蒙皮 + 線性混合',xp:90,type:'normal',school:'線性代數：矩陣層次結構，線性混合，四元數插值',
story:'<span class="be">🦴</span>遊戲角色怎麼跑跳揮劍？答案是<span class="hl">骨骼動畫</span>！<br><br>三個層次：<br>🦴 <span class="hl">骨骼 Skeleton</span>：一棵樹狀結構（臀部→脊椎→胸→肩→臂→手）<br>🎭 <span class="hl2">蒙皮 Skinning</span>：每個頂點被 1~4 根骨骼影響，有各自的<span class="hl">權重</span><br>🎬 <span class="hl3">動畫 Animation</span>：每幀每根骨骼的旋轉/位移關鍵幀<br><br>渲染時：<br>1️⃣ 計算每根骨骼的全局矩陣（從根往葉子累乘）<br>2️⃣ 頂點最終位置 = Σ(骨骼矩陣 × 原始位置 × 權重)<br><br>動畫混合：走路 → 奔跑之間可以<span class="hl2">線性插值</span>過渡！',
quiz:{q:'為什麼骨骼動畫中每個頂點最多只受 4 根骨骼影響？',opts:['物理限制','GPU 的 vec4 剛好存 4 個權重，超過 4 個幾乎無感知差異，是效能和品質的最佳平衡','骨骼不夠','美觀考量'],ans:1,explain:'GPU shader 用 vec4 存 4 個骨骼索引和 4 個權重，剛好一個向量。實驗證明 4 骨骼影響的效果和 8 骨骼幾乎看不出差別，但計算量少一半！現代 AAA 遊戲標準是 4 個影響骨骼 🎯'}},
{id:'l3',num:'7-3',icon:'🏔️',title:'程序地形 — 無限世界',sub:'Heightmap + Tessellation：無限延伸的大地',xp:80,type:'normal',school:'數學：Perlin Noise、分形布朗運動（fBM）',
story:'<span class="be">🏔️</span>開放世界遊戲的地形是怎麼做的？<br><br>最簡單的方法：<span class="hl">高度圖 Heightmap</span><br>一張灰度圖，白=山峰，黑=低谷。<br>把圖片的像素值當做 Y 座標！<br><br>但美術畫的高度圖不夠自然。<br>用<span class="hl2">程序生成</span>更好：<br><br><b>Perlin Noise / 分形雜訊</b><br>多層不同頻率的 Noise 疊加：<br>低頻（大山）+ 中頻（山丘）+ 高頻（石礫）= 真實地形！<br><br>進階：<span class="hl3">曲面細分 Tessellation</span><br>近處的地形三角形更細，遠處的更粗。<br>同樣的 GPU 資源，近處更精細！',
quiz:{q:'為什麼地形生成要疊加多層不同頻率的 Noise？',opts:['讓顏色更好看','模擬真實地形的分形結構：大山（低頻）上有山丘（中頻），山丘上有碎石（高頻）','讓計算更快','OpenGL 要求'],ans:1,explain:'真實山脈是分形的：大尺度看是連綿山脈，中等尺度是山丘，小尺度是岩石紋路。用多層 fBM（分形布朗運動）精準模擬這個自相似結構，比任何單層 Noise 都更自然 🏔️'}},
{id:'l4',num:'7-4',icon:'🌊',title:'水面渲染 — 波光粼粼',sub:'反射 + 折射 + Gerstner Wave：真實的水',xp:90,type:'normal',school:'物理：波動方程，Snell 折射定律，菲涅耳',
story:'<span class="be">🌊</span>遊戲水面的三個魔法：<br><br>1️⃣ <span class="hl">Gerstner 波浪</span><br>比 sin 波更真實的海浪公式！<br>頂點在水平方向也有位移，形成特有的「尖峰」<br><br>2️⃣ <span class="hl2">反射</span> — 水面照出天空<br>用 FBO 渲染鏡像場景，貼到水面<br>（攝影機 Y 軸翻轉，clip plane 剪掉水面以下）<br><br>3️⃣ <span class="hl3">折射</span> — 水下的扭曲<br>用另一個 FBO 渲染水下視角<br>用 DuDv 貼圖擾動 UV，讓水底看起來在晃動<br><br>最後用<span class="hl">菲涅耳</span>混合反射和折射！<br>正視 → 看到水底（折射），掠射 → 看到天空（反射）',

{id:'l5',num:'7-5',icon:'🌿',title:'植被 Instancing — 千棵樹一瞬間',sub:'GPU Instancing：一次 DrawCall 渲染百萬顆草',xp:80,type:'normal',school:'電腦科學：批次處理，GPU 平行計算特性',
story:'<span class="be">🌿</span>草地、樹林、岩石 — 同樣的模型要畫幾萬次！<br>一個個 DrawCall 會讓 FPS 崩潰！<br><br><span class="hl">GPU Instancing</span> 一次 DrawCall 畫所有！<br><br>方法：<br>1️⃣ 只上傳<span class="hl2">一個</span>草葉模型（頂點）<br>2️⃣ 另外上傳每棵草的<span class="hl3">位置/旋轉/大小矩陣陣列</span><br>3️⃣ 一次 `glDrawElementsInstanced(N)` 畫 N 個！<br><br>在頂點著色器裡用 `gl_InstanceID` 取得當前是第幾個實例：<br>`vec3 pos = instancePos[gl_InstanceID]`<br><br>加上隨機偏轉、風吹動畫（sin 波），草就活了！<br>現代 GPU 可以用 Instancing 一幀畫<span class="hl">百萬顆草</span>！',
quiz:{q:'Instancing 的最大優點是什麼？',opts:['讓模型更精細','把 N 次 DrawCall 減少成 1 次，消除 CPU-GPU 通訊瓶頸，利用 GPU 大量平行計算能力','增加顏色數量','簡化程式碼'],ans:1,explain:'每次 DrawCall 都有 CPU-GPU 命令傳輸開銷（state change, dispatch overhead）。5000 棵樹 = 5000 次 DrawCall，CPU 成為瓶頸！Instancing 把傳輸壓縮成 1 次，GPU 並行處理所有實例 ⚡'}},
{id:'l6',num:'7-6',icon:'📐',title:'LOD — 遠近有別',sub:'Level of Detail：距離決定模型精細度',xp:70,type:'normal',school:'感知心理學：Weber 定律，遠處細節不可辨',
story:'<span class="be">📐</span>遠處的敵人和近處的敵人，需要一樣多的三角形嗎？<br><br>不需要！這就是 <span class="hl">LOD（Level of Detail）</span>的核心思想。<br><br>同一個模型準備多個精細度版本：<br>0~10m：<span class="hl2">LOD 0</span> — 10000 個三角形，高精細<br>10~50m：<span class="hl">LOD 1</span> — 3000 個三角形<br>50~200m：<span class="hl3">LOD 2</span> — 500 個三角形<br>200m 以上：<span class="hl">Impostor</span> — 只是一張貼圖！<br><br>配合 <span class="hl2">Frustum Culling</span>（攝影機視錐體剔除）和<br><span class="hl3">Occlusion Culling</span>（遮擋剔除）：<br>看不到的東西完全不渲染！<br><br>OpenGL：<span class="hl">glDrawElementsBaseVertex</span> + 距離判斷切換 LOD。',
quiz:{q:'Frustum Culling 和 Occlusion Culling 的區別？',opts:['沒有差別','Frustum 剔除攝影機視錐體外的物件（不在畫面裡），Occlusion 剔除被其他物件遮住的物件（在畫面裡但看不到）','Frustum 更快','只有 Frustum 是 GPU 支援的'],ans:1,explain:'Frustum Culling：攝影機只看前方 FOV 範圍，視錐體外的物件完全不必渲染（CPU 端快速 AABB 測試）。Occlusion Culling：視錐體內但被牆擋住的物件也不需要渲染（更複雜，用遮擋查詢）。兩者搭配能省去大量不可見物件的渲染 🎯'}},
{id:'l7',num:'7-7',icon:'💨',title:'GPU 粒子 — 百萬粒子不卡頓',sub:'Transform Feedback / SSBO：粒子物理全在 GPU 算',xp:90,type:'normal',school:'電腦科學：Transform Feedback, GPGPU, 流水線平行',
story:'<span class="be">💨</span>CPU 粒子系統幾千個就開始卡，但 GPU 粒子可以跑幾十萬！<br><br><span class="hl">Transform Feedback</span>（OpenGL 的 GPGPU）：<br><br>Vertex Shader 不只讀頂點，還能<span class="hl2">輸出頂點</span>！<br>輸出的資料存回 VBO，下幀再當輸入。<br><br>流程：<br>1️⃣ VBO-A（粒子現在的位置/速度）→ 頂點著色器<br>2️⃣ Transform Feedback 把更新後的位置/速度寫入 VBO-B<br>3️⃣ 用 VBO-B 渲染粒子<br>4️⃣ 下幀交換 A 和 B（Ping-Pong！）<br><br>好處：粒子物理完全在 GPU 算，<br>CPU 完全不需要參與更新！<br>從幾千個粒子擴展到<span class="hl3">幾十萬</span>！',
quiz:{q:'Transform Feedback 的核心機制是什麼？',opts:['讓貼圖反饋到頂點','讓 Vertex Shader 把處理結果寫回 VBO，實現 GPU 端的粒子物理計算，不需要 CPU 參與','讓幾何著色器輸出更多三角形','加速著色器編譯'],ans:1,explain:'Transform Feedback 打破了 GPU 管線單向（頂點→像素）的限制，讓頂點著色器的輸出可以捕獲回 Buffer。這樣粒子的物理模擬（位置+速度更新）可以完全在 GPU 完成，CPU 只發送一次 Draw Call ⚡'}},

const TOTAL_XP=LESSONS.reduce((s,l)=>s+l.xp,0);
let earned=JSON.parse(localStorage.getItem('tower7_done')||'[]');
let current=null;

function makeStars(){const c=document.getElementById('stars');for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()<.25?2:1;s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--d:${2+Math.random()*5}s;--dl:${Math.random()*5}s`;c.appendChild(s);}}
makeStars();
function updateXP(){const total=earned.reduce((s,id)=>{const l=LESSONS.find(x=>x.id===id);return s+(l?l.xp:0);},0);document.getElementById('xp-fill').style.width=(total/TOTAL_XP*100)+'%';document.getElementById('xp-total').textContent=total+'/'+TOTAL_XP;document.getElementById('done-count').textContent=earned.length;}
function showXPPop(xp,el){const r=el.getBoundingClientRect();const d=document.createElement('div');d.className='xp-pop';d.textContent='+'+xp+' ⚡';d.style.cssText=`left:${r.left+r.width/2-25}px;top:${r.top+window.scrollY-10}px`;document.body.appendChild(d);setTimeout(()=>d.remove(),950);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function render(){
  const list=document.getElementById('lesson-list');list.innerHTML='';
  LESSONS.forEach((les,idx)=>{
    const done=earned.includes(les.id),active=current===les.id;
    const locked=!done&&!active&&idx>0&&!earned.includes(LESSONS[idx-1].id);
    const boss=les.type==='boss';
    const div=document.createElement('div');
    div.className=`lesson${done?' done':''}${active?' active':''}${locked?' locked':''}${boss?' boss':''}`;
    div.id='L'+les.id;
    const icCls=done?'i-d':boss?'i-b':locked?'i-l':'i-n';
    const rightHTML=(boss?'<span class="boss-pill">🏆 BOSS</span>':'')+`<span class="xp-pill">+${les.xp}</span>`+(done?'<div class="chk">✓</div>':locked?'<div class="lck">🔒</div>':'');
    div.innerHTML=`<div class="lesson-header"><div class="lesson-icon ${icCls}">${done?'✓':les.icon}</div><div class="lesson-info"><div class="lesson-title">${les.num} ${les.title}</div><div class="lesson-sub">${les.sub}</div></div><div class="lesson-right">${rightHTML}</div></div><div class="lesson-body">${active?buildBody(les,done):''}</div>`;
    if(!locked)div.querySelector('.lesson-header').addEventListener('click',()=>toggle(les.id));
    list.appendChild(div);
    if(idx<LESSONS.length-1){const c=document.createElement('div');c.className='conn';list.appendChild(c);}
  });
}
function toggle(id){current=current===id?null:id;render();if(current){setTimeout(()=>{const el=document.getElementById('L'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});initDemo(id);},40);}}
function buildBody(les,done){
  const opts=les.quiz.opts.map((o,i)=>`<div class="opt" id="opt-${les.id}-${i}" onclick="checkQ('${les.id}',${i})"><div class="opt-k">${['A','B','C','D'][i]}</div>${o}</div>`).join('');
  return `<div class="tab-bar"><div class="tab on" onclick="switchTab(this,'s-${les.id}','${les.id}')">📖 故事</div><div class="tab" onclick="switchTab(this,'d-${les.id}','${les.id}')">🎮 互動</div><div class="tab" onclick="switchTab(this,'c-${les.id}','${les.id}')">💻 程式碼</div></div><div class="tab-content"><div id="s-${les.id}" class="tab-panel on"><div class="story-box">${les.story}<div class="school-badge">📚 ${les.school}</div></div><div class="quiz-box"><div class="quiz-title">🎯 挑戰問題</div><div class="quiz-q">${les.quiz.q}</div><div class="opts">${opts}</div><div class="explain-box" id="ex-${les.id}"></div></div><button class="done-btn" id="btn-${les.id}" onclick="complete('${les.id}')" ${done?'disabled':''}>${done?'✅ 已完成！':'⚡ 完成此關 → 解鎖下一關'}</button></div><div id="d-${les.id}" class="tab-panel"><div id="dc-${les.id}"><div style="text-align:center;padding:40px;color:var(--txt2)">🎮 載入 Demo…</div></div></div><div id="c-${les.id}" class="tab-panel">${buildCode(les)}</div></div>`;
}
function switchTab(el,panelId,lid){const body=document.getElementById('L'+lid).querySelector('.lesson-body');body.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));body.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('on'));el.classList.add('on');document.getElementById(panelId).classList.add('on');if(panelId.startsWith('d-'))initDemo(lid);}
function checkQ(lid,idx){const les=LESSONS.find(l=>l.id===lid);document.querySelectorAll(`[id^="opt-${lid}-"]`).forEach((o,i)=>{o.classList.add('disabled');if(i===les.quiz.ans)o.classList.add('correct');else if(i===idx)o.classList.add('wrong');});const ex=document.getElementById('ex-'+lid);ex.innerHTML='💡 '+les.quiz.explain;ex.style.display='block';}
function complete(id){if(earned.includes(id))return;earned.push(id);localStorage.setItem('tower7_done',JSON.stringify(earned));const les=LESSONS.find(l=>l.id===id);const btn=document.getElementById('btn-'+id);showXPPop(les.xp,btn);toast(`⚔️ +${les.xp} XP！「${les.title}」完成！`);setTimeout(()=>{current=null;render();updateXP();},500);}

const inited={};
function initDemo(id){if(inited[id])return;inited[id]=true;const cont=document.getElementById('dc-'+id);if(!cont)return;const fn={l1:d1,l2:d2,l3:d3,l4:d4,l5:d5,l6:d6,l7:d7,l8:d8,l9:d9};fn[id]?.(cont);}
function mkP(gl,vs,fs){const mk=(t,s)=>{const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);return sh;};const p=gl.createProgram();gl.attachShader(p,mk(gl.VERTEX_SHADER,vs));gl.attachShader(p,mk(gl.FRAGMENT_SHADER,fs));gl.linkProgram(p);return p;}
function qB(gl){const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);return b;}
function mkSD(cont,id,label,mnames,fs,extras){
  const btns=mnames.map((n,i)=>`<button class="ctrl-btn ${i===0?'on':''}" id="m7${id}${i}" onclick="setM7_${id}(${i})">${n}</button>`).join('');
  cont.innerHTML=`<div class="demo-wrap"><div class="demo-top"><div class="demo-label"><div class="live-dot"></div>${label}</div></div><canvas id="cv7${id}" width="600" height="280" style="height:280px"></canvas></div><div class="ctrl-row">${btns}</div>${extras||''}`;
  window[`_m7${id}`]=0;window[`setM7_${id}`]=m=>{window[`_m7${id}`]=m;mnames.forEach((_,i)=>document.getElementById(`m7${id}${i}`).classList.toggle('on',i===m));};
  const cv=document.getElementById('cv7'+id);const gl=cv.getContext('webgl');if(!gl)return;
  const prog=mkP(gl,'attribute vec2 p;varying vec2 uv;void main(){uv=p*.5+.5;gl_Position=vec4(p,0,1);}',fs);
  const buf=qB(gl);const pL=gl.getAttribLocation(prog,'p'),mL=gl.getUniformLocation(prog,'mode'),tL=gl.getUniformLocation(prog,'t');
  let time=0;(function fr(){time+=0.016;gl.viewport(0,0,600,280);gl.clear(gl.COLOR_BUFFER_BIT);gl.useProgram(prog);gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.enableVertexAttribArray(pL);gl.vertexAttribPointer(pL,2,gl.FLOAT,false,0,0);gl.uniform1i(mL,window[`_m7${id}`]);gl.uniform1f(tL,time);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(fr);})();
}

function d1(cont){
  // Particle system demo using WebGL instanced-style drawing
  cont.innerHTML='<div class="demo-wrap"><div class="demo-top"><div class="demo-label"><div class="live-dot"></div>粒子系統 — CPU 粒子</div></div><canvas id="cv7p1" width="600" height="280" style="height:280px"></canvas></div><div class="ctrl-row"><button class="ctrl-btn on" id="pe-fire" onclick="setPE(\'fire\')">🔥 火焰</button><button class="ctrl-btn" id="pe-magic" onclick="setPE(\'magic\')">✨ 魔法</button><button class="ctrl-btn" id="pe-rain" onclick="setPE(\'rain\')">🌧️ 雨</button></div><div class="slider-row"><span class="slider-label">粒子數量</span><input type="range" min="50" max="500" value="200" id="pe-cnt"><span class="slider-val" id="pe-cntv">200</span></div>';
  document.getElementById('pe-cnt').oninput=function(){document.getElementById('pe-cntv').textContent=this.value;};
  window._pe='fire';window.setPE=m=>{window._pe=m;['fire','magic','rain'].forEach(x=>document.getElementById('pe-'+x).classList.toggle('on',x===m));};
  const cv=document.getElementById('cv7p1');const gl=cv.getContext('webgl');if(!gl)return;
  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE);
  const vs=`attribute vec2 pos;attribute float life;uniform mat4 mvp;void main(){float s=life*4.+1.;gl_PointSize=s;gl_Position=vec4(pos,0,1);}`;
  const fs=`precision mediump float;uniform int mode;uniform float t;varying float vLife;void main(){vec2 c=gl_PointCoord-.5;float r=length(c);if(r>.5)discard;float a=(1.-r*2.)*vLife;vec3 col;if(mode==0)col=mix(vec3(1.,.3,.0),vec3(1.,.9,.2),vLife);else if(mode==1)col=vec3(abs(sin(t+vLife*3.)),vLife,1.);else col=vec3(.4,.7,1.);gl_FragColor=vec4(col,a*(.3+vLife*.7));}`;
  // Note: varying not set in VS for simplicity - use uniform trick
  const vs2=`attribute vec2 pos;attribute float life;void main(){gl_PointSize=max(1.,life*8.);gl_Position=vec4(pos,0,1);}`;
  const fs2=`precision mediump float;uniform int mode;uniform float t;void main(){vec2 c=gl_PointCoord-.5;float r=length(c);if(r>.5)discard;gl_FragColor=vec4(1.,.5,.1,.5);}`;
  // Simple approach: use 2D canvas for particles, convert to WebGL
  cv.getContext('webgl');
  // Use 2D canvas overlay
  const ctx2=document.createElement('canvas');ctx2.width=600;ctx2.height=280;ctx2.style.cssText='position:absolute;top:0;left:0;width:100%;height:280px;pointer-events:none';
  cv.parentElement.style.position='relative';cv.parentElement.appendChild(ctx2);
  const c2=ctx2.getContext('2d');
  let particles=[];
  function spawnP(n){
    const mode=window._pe;
    for(let i=0;i<n;i++){
      let p={x:300,y:200,vx:0,vy:0,life:1,maxLife:1};

function d3(cont){mkSD(cont,'3','程序地形 — Perlin Noise 高度圖',['🏔️ 3D 地形','🗺️ 高度圖','🌈 分層噪聲'],

function d8(cont){mkSD(cont,'8','後處理管線 — 電影感',['🎬 完整後處理','📷 景深 DoF','🌈 色差','🔲 暈影'],
  `precision mediump float;varying vec2 uv;uniform int mode;uniform float t;
  float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.);}
  vec3 scene(vec2 u){
    vec3 col=vec3(.04,.01,.02);
    for(int i=0;i<5;i++){
      float f=float(i);vec2 lp=vec2(cos(t*.4+f*1.2)*.35+.5,sin(t*.3+f*.9)*.3+.5);
      vec3 lc=vec3(hash(vec2(f,0.))*.8+.2,hash(vec2(f,1.))*.8+.2,hash(vec2(f,2.))*.8+.2);
      col+=lc*exp(-length(u-lp)*12.)*1.5;
    }
    return col;
  }
  void main(){
    if(mode==0){
      // Full pipeline: DoF + CA + Vignette + Bloom
      vec2 c=uv-.5;float vign=1.-length(c)*1.4;
      vec2 ca_off=c*.008;
      float r=scene(uv+ca_off).r,g=scene(uv).g,b=scene(uv-ca_off).b;
      vec3 col=vec3(r,g,b);
      // Bloom
      vec3 bloom=vec3(0.);for(int i=-2;i<=2;i++)for(int j=-2;j<=2;j++){vec2 off=vec2(i,j)/400.;bloom+=max(scene(uv+off)-1.,0.);}
      col+=bloom*.1;
      col=col/(col+1.);col=pow(col,vec3(1./2.2));col*=vign;
      gl_FragColor=vec4(col,1.);return;
    }
    if(mode==1){
      // DoF: blur based on distance from focal plane
      float focal=.5;float dof=abs(uv.x-focal)*8.;
      vec3 col=vec3(0.);float s=dof*.015;
      for(int i=-4;i<=4;i++)for(int j=-4;j<=4;j++)col+=scene(uv+vec2(i,j)*s);col/=81.;
      col=col/(col+1.);gl_FragColor=vec4(pow(col,vec3(1./2.2)),1.);return;
    }
    if(mode==2){
      // Chromatic aberration
      vec2 c2=uv-.5;vec2 off=c2*.015;
      float r2=scene(uv+off).r,g2=scene(uv).g,b2=scene(uv-off).b;
      vec3 col=vec3(r2,g2,b2);col=col/(col+1.);gl_FragColor=vec4(pow(col,vec3(1./2.2)),1.);return;
    }
    // Vignette
    vec3 col=scene(uv);col=col/(col+1.);col=pow(col,vec3(1./2.2));
    vec2 c3=uv-.5;col*=smoothstep(.7,.2,length(c3));
    gl_FragColor=vec4(col,1.);
  }`);}
