const CASTLE_KEY='dx1_done', CASTLE_TOTAL=9, CASTLE_NUM=1, NEXT_CASTLE=2;
let earned=JSON.parse(localStorage.getItem(CASTLE_KEY)||'[]');
let currentLesson=null;
const demoInited={};

const LESSONS=[
  {id:"d1",num:"1-1",icon:"🛠️",title:"設定 DirectX 11 開發環境",desc:"Visual Studio 2022 + Windows SDK，準備出發！",xp:80,type:"normal",q:"DirectX 11 需要額外安裝哪個 SDK？",opts:["DirectX SDK（舊版）","Windows SDK（已內含）","OpenGL SDK","不需要 SDK"],ans:1,src:"rastertek.com/dx11win10tut01.html",story:`<span class="emoji-big">🛠️</span>DirectX 11 是 <span class="hl">Windows 原生</span>的圖形 API，不需要額外 SDK！<br><br>你只需要：<br>🔹 <span class="hl">Visual Studio 2022 Community</span>（免費）<br>🔹 安裝 <span class="hl">Game development with C++</span> 工作負載<br>🔹 Windows SDK 自動包含所有標頭和函式庫<br><br>和 OpenGL 不同：DirectX 是 <span class="hl">Microsoft 獨家</span>，只跑 Windows，但與 Xbox 完整整合！`,code:`<span class="cm">// DirectX11 標頭</span>
<span class="kw">#include</span> <span class="str">&lt;d3d11.h&gt;</span>
<span class="kw">#include</span> <span class="str">&lt;d3dcompiler.h&gt;</span>
<span class="kw">#include</span> <span class="str">&lt;DirectXMath.h&gt;</span>
<span class="kw">#pragma</span> comment(lib, <span class="str">"d3d11.lib"</span>)
<span class="kw">#pragma</span> comment(lib, <span class="str">"dxgi.lib"</span>)`},

function updateXP(){
  const tot=earned.reduce((s,id)=>{const l=LESSONS.find(x=>x.id===id);return s+(l?l.xp:0);},0);
  const mx=LESSONS.reduce((s,l)=>s+l.xp,0);
  document.getElementById("xp-fill").style.width=(tot/mx*100)+"%";
  document.getElementById("xp-total").textContent=tot+" / "+mx;
  document.getElementById("done-count").textContent=earned.length;
}

function renderLessons(){
  const list=document.getElementById("lesson-list");
  list.innerHTML="";
  LESSONS.forEach((lesson,idx)=>{
    const isDone=earned.includes(lesson.id);
    const isActive=currentLesson===lesson.id;
    const isLocked=idx>0&&!earned.includes(LESSONS[idx-1].id)&&!isDone&&!isActive;
    const div=document.createElement("div");
    div.className="lesson"+(isDone?" done":"")+(isActive?" active":"")+(isLocked?" locked":"")+(lesson.type==="boss"?" boss":"");
    div.id="lesson-"+lesson.id;
    const numCls=isDone?"done-num":isActive?"active-num":"locked-num";
    const metaHTML=lesson.type==="boss"
      ?'<span class="boss-badge">👑 BOSS</span><span class="xp-badge">+'+lesson.xp+' XP</span>'
      :'<span class="xp-badge">+'+lesson.xp+' XP</span>';
    const checkHTML=isDone?'<div class="check">✓</div>':(isLocked?'<div class="check" style="color:var(--txt2)">🔒</div>':"");
    div.innerHTML='<div class="lesson-header"><div class="lesson-num '+numCls+'">'+(isDone?"✓":lesson.icon)+'</div><div class="lesson-info"><div class="lesson-title">'+lesson.num+" "+lesson.title+'</div><div class="lesson-desc">'+lesson.desc+'</div></div><div class="lesson-meta">'+metaHTML+checkHTML+'</div></div>'+(isActive?'<div class="lesson-body">'+buildBody(lesson,isDone)+'</div>':'<div class="lesson-body"></div>');
    if(!isLocked)div.querySelector(".lesson-header").addEventListener("click",()=>toggleLesson(lesson.id));
    if(idx<LESSONS.length-1){const conn=document.createElement("div");conn.className="connector";list.appendChild(div);list.appendChild(conn);}
    else list.appendChild(div);
  });
}

function toggleLesson(id){
  currentLesson=(currentLesson===id)?null:id;
  renderLessons();
  if(currentLesson){
    setTimeout(()=>{
      const el=document.getElementById("lesson-"+id);
      if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
      initDemo(id);
    },50);
  }
}

function buildBody(lesson,isDone){
  const opts=lesson.opts.map((o,i)=>'<div class="opt" id="opt-'+lesson.id+"-"+i+'" onclick="checkAns(\''+lesson.id+"\',"+i+')"><div class="opt-key">'+["A","B","C","D"][i]+"</div>"+o+"</div>").join("");
  return '<div class="tabs"><div class="tab on" onclick="switchTab(this,\'story-'+lesson.id+"\',\'"+lesson.id+'\')">📖 概念</div><div class="tab" onclick="switchTab(this,\'demo-'+lesson.id+"\',\'"+lesson.id+'\')">🎮 互動</div><div class="tab" onclick="switchTab(this,\'code-'+lesson.id+"\',\'"+lesson.id+'\')">💻 HLSL</div></div><div id="story-'+lesson.id+'" class="tab-panel on"><div class="story-box">'+lesson.story+'</div><a class="src-link" href="https://www.'+lesson.src+'" target="_blank">📖 Rastertek 原始教學 →</a><div class="quiz-box" style="margin-top:16px"><div class="quiz-title">🎯 理解測驗</div><div class="quiz-q">'+lesson.q+'</div><div class="opts">'+opts+'</div><div id="ex-'+lesson.id+'" style="display:none;margin-top:12px;padding:12px;background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.2);border-radius:10px;font-size:.85rem;color:var(--txt2)"></div></div>'+(isDone?'<button class="complete-btn" disabled style="background:var(--border);color:var(--txt2)">✅ 已完成！</button>':'<button class="complete-btn" id="btn-'+lesson.id+'" onclick="completeL(\''+lesson.id+'\')" disabled>完成測驗後解鎖 →</button>')+'</div><div id="demo-'+lesson.id+'" class="tab-panel"><div id="dc-'+lesson.id+'"><div style="text-align:center;padding:40px;color:var(--txt2)">點互動載入 Demo…</div></div></div><div id="code-'+lesson.id+'" class="tab-panel"><div class="code-block"><button class="copy-btn" onclick="copyC(this)">複製</button>'+lesson.code+'</div></div>';
}

function switchTab(tabEl,panelId,lessonId){
  const body=document.getElementById("lesson-"+lessonId).querySelector(".lesson-body");
  body.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  body.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("on"));
  tabEl.classList.add("on");document.getElementById(panelId).classList.add("on");
  if(panelId.startsWith("demo-"))initDemo(lessonId);
}

function checkAns(lessonId,idx){
  const lesson=LESSONS.find(l=>l.id===lessonId);
  // Only mark the clicked option — no answer reveal
  document.querySelectorAll('[id^="opt-'+lessonId+'-"]').forEach((o,i)=>{
    o.classList.remove("correct","wrong");
    if(i===idx){
      o.classList.add(idx===lesson.ans?"correct":"wrong");
    }
  });
  const ex=document.getElementById("ex-"+lessonId);
  if(ex){
    ex.style.display="block";
    ex.textContent=idx===lesson.ans?"✅ 正確！":"❌ 答錯了，再試試看！";
  }
  const btn=document.getElementById("btn-"+lessonId);
  if(btn&&idx===lesson.ans){btn.disabled=false;btn.textContent="✅ 完成此關 → 解鎖下一關";}
}

function completeL(id){
  if(earned.includes(id))return;
  const lesson=LESSONS.find(l=>l.id===id);
  earned.push(id);
  localStorage.setItem(CASTLE_KEY,JSON.stringify(earned));
  const btn=document.getElementById("btn-"+id);
  if(btn){const r=btn.getBoundingClientRect();const d=document.createElement("div");d.className="xp-pop";d.textContent="+"+lesson.xp+" XP!";d.style.cssText="left:"+r.left+"px;top:"+(r.top+window.scrollY)+"px";document.body.appendChild(d);setTimeout(()=>d.remove(),1200);}
  const t=document.getElementById("toast");t.textContent="🎉 +"+lesson.xp+" XP！「"+lesson.title+"」完成！";t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000);
  // 記住目前捲動位置，重繪後還原
  const scrollY=window.scrollY;
  setTimeout(()=>{
    currentLesson=null;
    renderLessons();
    updateXP();
    window.scrollTo({top:scrollY,behavior:'instant'});
  },600);
  checkCompletion();
}

function copyC(btn){
  const text=btn.parentElement.innerText.replace("複製","").trim();
  navigator.clipboard.writeText(text).then(()=>{btn.textContent="✓ 已複製";setTimeout(()=>btn.textContent="複製",2000);});
}

function mkGL(cont,label,h){
  cont.innerHTML='<div class="demo-wrap"><div class="demo-label">'+label+'</div><canvas style="width:100%;display:block;height:'+h+'px"></canvas></div>';
  const cv=cont.querySelector("canvas");cv.width=cv.clientWidth||600;cv.height=h;
  return{cv,gl:cv.getContext("webgl")};
}

function mkProg(gl,vs,fs){
  function sh(t,src){const s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);return s;}
  const p=gl.createProgram();
  gl.attachShader(p,sh(gl.VERTEX_SHADER,vs));gl.attachShader(p,sh(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(p);return p;
}

// ── Sphere geometry helper (shared by 1-7, 1-8, 1-9) ──
function makeSphere(r){
  const v=[];const ST=28,SL=36;
  function pv(lat,lon){const x=Math.cos(lat)*Math.cos(lon),y=Math.sin(lat),z=Math.cos(lat)*Math.sin(lon);v.push(x*r,y*r,z*r,x,y,z);}
  for(let si=0;si<ST;si++){
    const la0=(si/ST-.5)*Math.PI,la1=((si+1)/ST-.5)*Math.PI;
    for(let li=0;li<SL;li++){
      const lo0=li/SL*Math.PI*2,lo1=(li+1)/SL*Math.PI*2;
      pv(la0,lo0);pv(la1,lo0);pv(la1,lo1);
      pv(la0,lo0);pv(la1,lo1);pv(la0,lo1);
    }
  }
  return new Float32Array(v);
}

function demoLight(cont,isMobile){
  const sliders = isMobile
    ? `<div class="slider-row" style="flex-direction:column;align-items:flex-start;gap:4px"><label style="min-width:auto">💡 光照角度</label><div style="display:flex;width:100%;gap:8px;align-items:center"><input type="range" min="-180" max="180" value="45" id="la" oninput="updL()" style="flex:1"><span class="slider-val" id="lva">45°</span></div></div><div class="slider-row" style="flex-direction:column;align-items:flex-start;gap:4px"><label style="min-width:auto">🌙 環境光</label><div style="display:flex;width:100%;gap:8px;align-items:center"><input type="range" min="0" max="60" value="15" id="lb" oninput="updL()" style="flex:1"><span class="slider-val" id="lvb">0.15</span></div></div>`
    : `<div class="slider-row"><label>💡 光照角度</label><input type="range" min="-180" max="180" value="45" id="la" oninput="updL()"><span class="slider-val" id="lva">45°</span></div><div class="slider-row"><label>🌙 環境光</label><input type="range" min="0" max="60" value="15" id="lb" oninput="updL()"><span class="slider-val" id="lvb">0.15</span></div>`;
  cont.innerHTML='<div class="demo-wrap"><div class="demo-label">💡 Lambert 漫反射光照（HLSL 模擬）</div><canvas style="width:100%;display:block;height:260px"></canvas></div>'+sliders;
  const cv=cont.querySelector("canvas");
  let ang=45,amb=.15;

  // syncSize: 保持 canvas pixel 尺寸，修正 aspect ratio
  function syncSize(){
    const w=cv.clientWidth||600;
    const h=260;
    if(cv.width!==w||cv.height!==h){cv.width=w;cv.height=h;cv.style.height=h+'px';}
    return w/h; // aspect ratio
  }

  const gl=cv.getContext("webgl");if(!gl)return;
  syncSize();

  // 真正的 3D 球體（lat/lon 球面三角網格）
  const verts3d=[];
  const STACKS=24,SLICES=32;
  function pushVert(lat,lon){
    const x=Math.cos(lat)*Math.cos(lon);
    const y=Math.sin(lat);
    const z=Math.cos(lat)*Math.sin(lon);
    verts3d.push(x*.88,y*.88,z*.88, x,y,z); // pos(xyz) + normal(xyz)
  }
  for(let si=0;si<STACKS;si++){
    const lat0=(si/STACKS-.5)*Math.PI;
    const lat1=((si+1)/STACKS-.5)*Math.PI;
    for(let li=0;li<SLICES;li++){
      const lon0=li/SLICES*Math.PI*2;
      const lon1=(li+1)/SLICES*Math.PI*2;
      pushVert(lat0,lon0);pushVert(lat1,lon0);pushVert(lat1,lon1);
      pushVert(lat0,lon0);pushVert(lat1,lon1);pushVert(lat0,lon1);
    }
  }

  const p=mkProg(gl,
    // aspect ratio uniform 修正球的形狀
    "attribute vec3 pos;attribute vec3 nor;varying vec3 vn;uniform float asp;void main(){vn=nor;gl_Position=vec4(pos.x*0.92/asp,pos.y*0.92,pos.z*.01,1.);}",
    "precision mediump float;varying vec3 vn;uniform vec3 ld;uniform float amb;void main(){vec3 n=normalize(vn);float d=max(dot(n,ld),0.);vec3 c=vec3(.88,.27,.27);gl_FragColor=vec4(c*(amb+d*(1.-amb)),1.);}");
  gl.useProgram(p);
  const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(verts3d),gl.STATIC_DRAW);
  const ap=gl.getAttribLocation(p,"pos"),an=gl.getAttribLocation(p,"nor");
  gl.enableVertexAttribArray(ap);gl.vertexAttribPointer(ap,3,gl.FLOAT,false,24,0);
  gl.enableVertexAttribArray(an);gl.vertexAttribPointer(an,3,gl.FLOAT,false,24,12);
  const ul=gl.getUniformLocation(p,"ld"),ua=gl.getUniformLocation(p,"amb"),uasp=gl.getUniformLocation(p,"asp");
  gl.enable(gl.DEPTH_TEST);
  window.updL=()=>{
    ang=parseFloat(document.getElementById("la").value);
    amb=document.getElementById("lb").value/100;
    document.getElementById("lva").textContent=ang+"°";
    document.getElementById("lvb").textContent=amb.toFixed(2);
  };
  function frame(){
    const asp=syncSize();
    gl.viewport(0,0,cv.width,cv.height);
    gl.clearColor(.04,.03,.09,1);gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
    const r=ang*Math.PI/180;
    gl.uniform3f(ul,Math.cos(r),Math.sin(r),.5);
    gl.uniform1f(ua,amb);
    gl.uniform1f(uasp,asp);
    gl.drawArrays(gl.TRIANGLES,0,verts3d.length/6);
    requestAnimationFrame(frame);
  }
  frame();
  if(isMobile) window.addEventListener('resize',syncSize);
}

    gl.uniform2f(uoff,.45,0);
    gl.uniform3f(ucol,.2,.5,1.0);
    gl.uniform1f(ualpha,blendOn?alpha:1.0);
    gl.drawArrays(gl.TRIANGLES,0,sphVerts.length/6);
    requestAnimationFrame(frame);
  }
  frame();
}


function checkCompletion(){
  if(earned.length>=CASTLE_TOTAL&&!localStorage.getItem(CASTLE_KEY+"_comp_shown")){
    localStorage.setItem(CASTLE_KEY+"_comp_shown","1");
    setTimeout(showCompletion,800);
  }
}
function showCompletion(){
  const ov=document.getElementById("compOverlay");if(!ov)return;
  const fw=ov.querySelector(".fw-wrap");
  const colors=["#e84545","#00d4ff","#ffd700","#ff9f43","#c084fc","#50fa7b"];
  for(let i=0;i<28;i++){const d=document.createElement("div");d.className="fw";const tx=(Math.random()-.5)*300,ty=-100-Math.random()*200;d.style.cssText="width:6px;height:6px;background:"+colors[i%colors.length]+";left:"+(40+Math.random()*20)+"%;top:60%;--d:"+(0.6+Math.random()*.8)+"s;--dl:"+Math.random()*.5+"s;--tx:"+tx+"px;--ty:"+ty+"px";fw.appendChild(d);}
  ov.classList.add("show");
}
function goNextCastle(){window.location.href="dx-level2.html";}
function goMap(){window.location.href="dx-map.html";}

updateXP();renderLessons();
window.addEventListener("pageshow",(e)=>{
  const ov=document.getElementById("compOverlay");if(ov)ov.classList.remove("show");
  const toast=document.getElementById("toast");if(toast)toast.classList.remove("show");
  if(e.persisted){if(typeof currentLesson!=="undefined")currentLesson=null;if(typeof renderLessons==="function")renderLessons();}
});
document.addEventListener("DOMContentLoaded",()=>{setTimeout(checkCompletion,500);});
window.addEventListener("storage",checkCompletion);
</script>

  <button class="comp-next-btn" onclick="goNextCastle()">⚔️ 前往要塞2 →</button>
  <button class="comp-map-btn" onclick="goMap()">🗺️ 返回地圖</button>
</div>
