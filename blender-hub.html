<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Blender 課程地圖 — TA HUB</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#1a5a10;touch-action:manipulation}
#cvs{position:fixed;top:0;left:0;display:block}
/* ── Header ── */
#hdr{
  position:fixed;top:0;left:0;right:0;height:54px;z-index:20;
  background:rgba(5,22,5,0.45);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;padding:0 12px;gap:10px;
}
#back{
  width:40px;height:40px;background:rgba(255,255,255,0.10);
  border:1.5px solid rgba(255,255,255,0.18);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;color:#fff;transition:all .18s;flex-shrink:0;
}
#back:hover{background:rgba(255,255,255,0.20);}
#hinfo{flex:1;min-width:0}
#htitle{font-family:'Josefin Sans',sans-serif;font-weight:700;
  font-size:clamp(13px,2vw,17px);color:#fff;letter-spacing:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#hsub{font-size:10px;color:rgba(255,255,255,0.40);letter-spacing:1px}
#hxp{
  display:flex;align-items:center;gap:5px;
  background:rgba(0,0,0,0.38);padding:5px 10px;
  border-radius:14px;border:1px solid rgba(255,200,50,0.25);flex-shrink:0;
}
#hxpv{font-family:'Josefin Sans',sans-serif;font-weight:700;font-size:12px;color:#ffc040}
/* ── Bottom Panel ── */
#panel{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  background:rgba(5,18,5,0.94);backdrop-filter:blur(16px);
  border-top:1.5px solid rgba(255,255,255,0.08);
  padding:14px 16px 18px;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.22,1,.36,1);
}
#panel.on{transform:translateY(0)}
#pcx{position:absolute;top:10px;right:13px;font-size:15px;color:rgba(255,255,255,0.25);cursor:pointer;padding:4px}
.p-top{display:flex;align-items:center;gap:12px;margin-bottom:11px}
#p-num{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Josefin Sans',sans-serif;font-weight:900;font-size:21px;
  border:2.5px solid rgba(255,255,255,0.14);
}
.p-meta{flex:1;min-width:0}
#p-title{font-family:'Josefin Sans',sans-serif;font-weight:700;font-size:16px;color:#fff}
#p-sub{font-size:11px;color:rgba(255,255,255,0.42);margin-top:3px;line-height:1.4}
#p-stars{font-size:22px;letter-spacing:2px;margin-left:auto;flex-shrink:0}
.p-xprow{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.p-xplbl{font-size:10px;color:rgba(255,255,255,0.35);font-family:monospace;white-space:nowrap}
.p-bar{flex:1;height:4px;background:rgba(255,255,255,0.10);border-radius:2px;overflow:hidden}
#p-bar-fill{height:100%;border-radius:2px;transition:width .5s}
#pbtn{
  width:100%;padding:14px;border:none;border-radius:13px;
  font-family:'Josefin Sans',sans-serif;font-weight:900;
  font-size:16px;letter-spacing:2px;cursor:pointer;transition:all .18s;
}
#pbtn.play{background:#ff8832;color:#fff;box-shadow:0 4px 22px rgba(255,136,50,0.40)}
#pbtn.play:active{transform:scale(0.97);box-shadow:none}
#pbtn.boss{background:linear-gradient(135deg,#ff4400,#ff8800);color:#fff;box-shadow:0 4px 22px rgba(255,60,0,0.42)}
#pbtn.retry{background:#1a4a1a;color:#70ce70;border:1px solid #2a7a2a}
#pbtn.lock{background:#181818;color:#333;cursor:default}
</style>
</head>
<body>
<canvas id="cvs"></canvas>
<div id="hdr">
  <div id="back" onclick="window.location.href='world-map.html'">←</div>
  <div id="hinfo">
    <div id="htitle">⬡ BLENDER 課程地圖</div>
    <div id="hsub">Micky Lin × TA HUB · 12 關卡</div>
  </div>
  <div id="hxp"><span>⭐</span><span id="hxpv">0 XP</span></div>
</div>
<div id="panel">
  <span id="pcx" onclick="closePanel()">✕</span>
  <div class="p-top">
    <div id="p-num">1</div>
    <div class="p-meta">
      <div id="p-title">關卡名稱</div>
      <div id="p-sub">副標題</div>
    </div>
    <div id="p-stars">☆☆☆</div>
  </div>
  <div class="p-xprow">
    <span class="p-xplbl" id="p-xplbl">XP +0</span>
    <div class="p-bar"><div id="p-bar-fill" style="width:0%;background:#ff8832"></div></div>
  </div>
  <button id="pbtn" class="play" onclick="enterLv()">PLAY!</button>
</div>

<script>
// ─── GLOBALS ───
var cvs,ctx,W,H,dpr,T=0,RAF,selIdx=-1;

// ─── LEVEL DATA ───
var LVS=[
  {n:1, title:'介面認識',       sub:'Blender 5.0 UI 五大區域',       xp:350, key:'blender_ui_lv1',  file:'blender-ui-lv1.html',  boss:false},
  {n:2, title:'偏好設定',       sub:'Preferences & 單位設定',         xp:380, key:'blender_ui_lv2',  file:'blender-ui-lv2.html',  boss:false},
  {n:3, title:'視角控制',       sub:'Move / Rotate / Zoom 三鍵',     xp:400, key:'blender_ui_lv3',  file:'blender-ui-lv3.html',  boss:false},
  {n:4, title:'物件控制 GRS',   sub:'G移動・R旋轉・S縮放',            xp:420, key:'blender_ui_lv4',  file:'blender-ui-lv4.html',  boss:false},
  {n:5, title:'Cursor & 物件', sub:'Shift+A 新增 / 合併 / 刪除',     xp:440, key:'blender_ui_lv5',  file:'blender-ui-lv5.html',  boss:false},
  {n:6, title:'建模 — 點',     sub:'Connect・Merge・Snap・Slider',   xp:480, key:'blender_ui_lv6',  file:'blender-ui-lv6.html',  boss:false},
  {n:7, title:'建模 — 邊',     sub:'Loop・Bevel・Bridge・Ring',      xp:500, key:'blender_ui_lv7',  file:'blender-ui-lv7.html',  boss:false},
  {n:8, title:'建模 — 面',     sub:'Extrude・Inset・Flip Normal',    xp:520, key:'blender_ui_lv8',  file:'blender-ui-lv8.html',  boss:false},
  {n:9, title:'管狀物建模',     sub:'Bezier Curve → Mesh',            xp:540, key:'blender_ui_lv9',  file:'blender-ui-lv9.html',  boss:false},
  {n:10,title:'Modifier 指令', sub:'Array・Mirror・Solidify・SubSurf',xp:560, key:'blender_ui_lv10', file:'blender-ui-lv10.html', boss:false},
  {n:11,title:'UV 拆UV',        sub:'Mark Seam・Unwrap・Pack Islands', xp:580, key:'blender_ui_lv11', file:'blender-ui-lv11.html', boss:false},
  {n:12,title:'Boss 關',        sub:'Export FBX 完整流程總複習',       xp:700, key:'blender_ui_lv12', file:'blender-ui-lv12.html', boss:true},
];

// ─── NODE POSITIONS (S-curve winding bottom-left → top-right) ───
var NPOS=[
  {fx:0.10,fy:0.80},  // 1
  {fx:0.22,fy:0.70},  // 2
  {fx:0.17,fy:0.58},  // 3
  {fx:0.31,fy:0.50},  // 4
  {fx:0.44,fy:0.57},  // 5
  {fx:0.53,fy:0.46},  // 6
  {fx:0.46,fy:0.34},  // 7
  {fx:0.60,fy:0.28},  // 8
  {fx:0.71,fy:0.37},  // 9
  {fx:0.73,fy:0.23},  // 10
  {fx:0.84,fy:0.15},  // 11
  {fx:0.92,fy:0.09},  // 12 BOSS
];

// ─── PROGRESS ───
function isDone(lv){try{var d=JSON.parse(localStorage.getItem(lv.key)||'{}');return!!d.done;}catch(e){return false;}}
function isLocked(i){return i>0&&!isDone(LVS[i-1]);}
function totalXP(){var x=0;LVS.forEach(function(lv){if(isDone(lv))x+=lv.xp;});return x;}

// ─── SETUP ───
function setup(){
  cvs=document.getElementById('cvs'); ctx=cvs.getContext('2d');
  resize();
  cvs.addEventListener('click',    onClick);
  cvs.addEventListener('touchend', onTouch,{passive:true});
  window.addEventListener('resize',function(){ctx.setTransform(1,0,0,1,0,0);resize();});
  document.getElementById('hxpv').textContent=totalXP()+' XP';
}
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2.5);
  W=window.innerWidth; H=window.innerHeight;
  cvs.width=W*dpr; cvs.height=H*dpr;
  cvs.style.width=W+'px'; cvs.style.height=H+'px';
  ctx.scale(dpr,dpr);
}

// ─── BACKGROUND ───
// Deterministic hill profile (no Math.random)
function hY(seed,xFrac){
  return Math.sin(xFrac*7.1*seed+1.2)*0.50
        +Math.sin(xFrac*4.2*seed+0.7)*0.30
        +Math.sin(xFrac*12.5*seed+2.5)*0.20;
}

// Fixed tree x positions per hill band
var HILL_TREES=[
  [0.04,0.11,0.19,0.28,0.38,0.50,0.60,0.70,0.80,0.88,0.96],
  [0.02,0.09,0.18,0.28,0.38,0.49,0.59,0.69,0.79,0.91,0.99],
  [0.05,0.14,0.24,0.34,0.44,0.54,0.64,0.74,0.84,0.93],
  [0.07,0.17,0.27,0.37,0.47,0.57,0.67,0.77,0.87,0.97],
];
var HILL_DEFS=[
  {yb:0.28,amp:0.06,top:'#72b862',bot:'#60a850',seed:1.20,treeSz:0.042},
  {yb:0.42,amp:0.08,top:'#4a8a3a',bot:'#3a7828',seed:0.85,treeSz:0.052},
  {yb:0.57,amp:0.09,top:'#2e6a1e',bot:'#1e5810',seed:1.65,treeSz:0.060},
  {yb:0.72,amp:0.09,top:'#1a5010',bot:'#103808',seed:2.10,treeSz:0.068},
];

function drawBG(){
  // Sky gradient
  var sky=ctx.createLinearGradient(0,0,0,H*0.52);
  sky.addColorStop(0,'#a8e4fc');
  sky.addColorStop(0.45,'#78caf0');
  sky.addColorStop(1,'#50b0e0');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*0.52);

  // 5 Clouds (fixed relative positions, drifting with T)
  var cdef=[
    {bx:0.04,y:0.04,w:0.10,a:0.80},
    {bx:0.26,y:0.02,w:0.09,a:0.72},
    {bx:0.50,y:0.05,w:0.12,a:0.78},
    {bx:0.73,y:0.03,w:0.08,a:0.70},
    {bx:0.89,y:0.07,w:0.09,a:0.65},
  ];
  cdef.forEach(function(c,i){
    var x=((c.bx+T*0.008*(0.5+i*0.1))%1.1)*W;
    drawCloud(x, c.y*H, c.w*W, c.a);
  });

  // Hill bands (far → near)
  HILL_DEFS.forEach(function(hd,li){
    var ybase=hd.yb*H, amp=hd.amp*H;
    // Hill shape
    ctx.beginPath(); ctx.moveTo(0,H);
    var steps=100;
    for(var xi=0;xi<=steps;xi++){
      var xf=xi/steps;
      var y=ybase+hY(hd.seed,xf)*amp;
      if(xi===0) ctx.lineTo(0,y);
      else ctx.lineTo(xf*W,y);
    }
    ctx.lineTo(W,H); ctx.closePath();
    var g=ctx.createLinearGradient(0,ybase-amp,0,ybase+amp*2.5);
    g.addColorStop(0,hd.top); g.addColorStop(1,hd.bot);
    ctx.fillStyle=g; ctx.fill();

    // Trees along hill top
    if(li>=1){
      var cols=HILL_TREES[li]||HILL_TREES[0];
      for(var ti=0;ti<cols.length;ti++){
        var xf2=cols[ti];
        var tx=xf2*W;
        var ty=ybase+hY(hd.seed,xf2)*amp;
        var sz=hd.treeSz*Math.min(W,H)*(0.9+(ti%3)*0.07);
        drawTree(tx,ty,sz,hd.bot,hd.top);
      }
    }
  });

  // Ground base
  ctx.fillStyle='#0c3208';
  ctx.fillRect(0,H*0.88,W,H*0.12);

  // Rocks (decorative, fixed positions)
  var rocks=[[0.30,0.82],[0.52,0.76],[0.65,0.68],[0.20,0.72],[0.78,0.72]];
  rocks.forEach(function(r,i){
    var rx=r[0]*W, ry=r[1]*H;
    var rs=H*(0.022+i*0.004);
    ctx.beginPath();
    ctx.ellipse(rx,ry,rs*1.5,rs*0.9,0,0,Math.PI*2);
    ctx.fillStyle='#5a6048'; ctx.fill();
    ctx.beginPath();
    ctx.ellipse(rx-rs*0.3,ry-rs*0.25,rs*0.6,rs*0.45,0,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.14)'; ctx.fill();
  });
}

function drawCloud(cx,cy,cw,alpha){
  var r=cw*0.36;
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.shadowColor='rgba(160,210,240,0.4)'; ctx.shadowBlur=8;
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(cx,       cy,       r*0.88,0,Math.PI*2);
  ctx.arc(cx+cw*0.23,cy-r*0.14,r*0.98,0,Math.PI*2);
  ctx.arc(cx+cw*0.46,cy+r*0.05,r*0.80,0,Math.PI*2);
  ctx.arc(cx+cw*0.19,cy+r*0.22,r*0.68,0,Math.PI*2);
  ctx.arc(cx-cw*0.04,cy+r*0.18,r*0.63,0,Math.PI*2);
  ctx.fill(); ctx.restore();
}

function drawTree(tx,ty,sz,dark,light){
  ctx.fillStyle='#4a2e10';
  ctx.fillRect(tx-sz*0.07,ty,sz*0.14,sz*0.36);
  var clrs=[dark,light,'#5aba3a'];
  for(var l=0;l<3;l++){
    ctx.beginPath();
    ctx.moveTo(tx,   ty-sz*(0.88+l*0.28));
    ctx.lineTo(tx-sz*(0.46-l*0.06), ty-sz*(0.12+l*0.26));
    ctx.lineTo(tx+sz*(0.46-l*0.06), ty-sz*(0.12+l*0.26));
    ctx.closePath(); ctx.fillStyle=clrs[l]; ctx.fill();
  }
}

// ─── PATH ───
function pts(){return NPOS.map(function(p){return{x:p.fx*W,y:p.fy*H};});}
function drawSmooth(pts){
  ctx.moveTo(pts[0].x,pts[0].y);
  for(var i=1;i<pts.length;i++){
    var a=pts[i-1],b=pts[i];
    ctx.quadraticCurveTo(a.x,a.y,(a.x+b.x)/2,(a.y+b.y)/2);
  }
  ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);
}

function drawPath(){
  var p=pts();
  // Dark shadow offset
  ctx.save(); ctx.translate(0,9); ctx.globalAlpha=0.25;
  ctx.lineWidth=34; ctx.strokeStyle='#000';
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); drawSmooth(p); ctx.stroke(); ctx.restore();
  // Outline
  ctx.save(); ctx.lineWidth=34; ctx.strokeStyle='#a03e08';
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); drawSmooth(p); ctx.stroke(); ctx.restore();
  // Gold outer
  ctx.save(); ctx.lineWidth=26; ctx.strokeStyle='#d09818';
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); drawSmooth(p); ctx.stroke(); ctx.restore();
  // Bright yellow
  ctx.save(); ctx.lineWidth=16; ctx.strokeStyle='#ffdc40';
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); drawSmooth(p); ctx.stroke(); ctx.restore();
  // Shine
  ctx.save(); ctx.lineWidth=5.5; ctx.strokeStyle='rgba(255,255,255,0.44)';
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); drawSmooth(p); ctx.stroke(); ctx.restore();
  // Center animated dashes
  ctx.save();
  ctx.setLineDash([9,15]); ctx.lineDashOffset=-(T*18)%24;
  ctx.lineWidth=2.5; ctx.strokeStyle='rgba(255,255,255,0.36)';
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); drawSmooth(p); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}

// ─── NODE ───
function NR(i){return Math.min(W,H)*(LVS[i].boss?0.058:0.046);}

function drawNode(i){
  var lv=LVS[i], p=NPOS[i];
  var x=p.fx*W, y=p.fy*H;
  var done=isDone(lv), lock=isLocked(i), isSel=(selIdx===i);
  var r=NR(i);

  // Pulse for current
  if(!done&&!lock) r*=(1+Math.sin(T*3.0+i*0.9)*0.055);

  // Colors
  var borderC,fillA,fillB,numC;
  if(done)      {borderC='#b09010';fillA='#ffdc50';fillB='#a08010';numC='#6a4000';}
  else if(lock) {borderC='#333';   fillA='#444';   fillB='#1e1e1e';numC='#555';  }
  else if(lv.boss){borderC='#e04800';fillA='#ff8000';fillB='#c03800';numC='#fff';}
  else          {borderC='#dd3800';fillA='#ff6818';fillB='#be2c00';numC='#fff';  }

  // Selection glow ring
  if(isSel){
    ctx.save();
    ctx.beginPath(); ctx.arc(x,y,r*1.6,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,'+(0.36+Math.sin(T*4)*0.18)+')';
    ctx.lineWidth=3.5; ctx.stroke(); ctx.restore();
  }
  // Ambient glow for unlocked
  if(!done&&!lock){
    var gl=ctx.createRadialGradient(x,y,0,x,y,r*2.6);
    gl.addColorStop(0,lv.boss?'rgba(255,80,0,0.30)':'rgba(255,80,0,0.22)');
    gl.addColorStop(1,'transparent');
    ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(x,y,r*2.6,0,Math.PI*2); ctx.fill();
  }
  // Drop shadow
  ctx.beginPath(); ctx.arc(x,y+r*0.24,r*1.05,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.34)'; ctx.fill();
  // Border
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=borderC; ctx.fill();
  // Main fill
  var fg=ctx.createRadialGradient(x,y-r*0.32,r*0.05,x,y,r*0.88);
  fg.addColorStop(0,fillA); fg.addColorStop(1,fillB);
  ctx.beginPath(); ctx.arc(x,y,r*0.86,0,Math.PI*2);
  ctx.fillStyle=fg; ctx.fill();
  // Shine spot
  ctx.beginPath(); ctx.arc(x-r*0.22,y-r*0.28,r*0.26,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.20)'; ctx.fill();

  // Inner content
  ctx.textAlign='center'; ctx.textBaseline='middle';
  if(lock){
    ctx.font=(r*0.90)+'px sans-serif';
    ctx.fillText('🔒',x,y+r*0.06);
  } else {
    ctx.font='bold '+(r*0.84)+'px "Josefin Sans",sans-serif';
    ctx.fillStyle=numC;
    ctx.fillText(lv.boss?'★':lv.n, x, y+r*0.07);
  }

  // Stars above (if done)
  if(done){
    var sz=r*0.64;
    for(var s=0;s<3;s++){
      var sx=x+(s-1)*sz*0.90, sy=y-r*1.54+Math.abs(s-1)*sz*0.18;
      ctx.font=sz+'px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle=s<2?'#ffd820':'rgba(200,158,0,0.45)';
      ctx.fillText('★',sx,sy);
    }
  }

  // Lv label below
  if(!lock){
    var fs=Math.max(8,r*0.40);
    ctx.font='bold '+fs+'px "Josefin Sans",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='top';
    var lbl=lv.boss?'BOSS':'Lv'+lv.n;
    var tw=ctx.measureText(lbl).width+fs*0.8;
    var lx=x-tw/2, ly=y+r*1.40;
    ctx.fillStyle='rgba(0,0,0,0.52)';
    var bh=fs*1.5;
    ctx.beginPath();
    ctx.moveTo(lx+bh*0.3,ly);ctx.lineTo(lx+tw-bh*0.3,ly);
    ctx.quadraticCurveTo(lx+tw,ly,lx+tw,ly+bh*0.3);
    ctx.lineTo(lx+tw,ly+bh*0.7);ctx.quadraticCurveTo(lx+tw,ly+bh,lx+tw-bh*0.3,ly+bh);
    ctx.lineTo(lx+bh*0.3,ly+bh);ctx.quadraticCurveTo(lx,ly+bh,lx,ly+bh*0.7);
    ctx.lineTo(lx,ly+bh*0.3);ctx.quadraticCurveTo(lx,ly,lx+bh*0.3,ly);ctx.closePath();
    ctx.fill();
    ctx.fillStyle=done?'#ffd820':lock?'#444':'#fff';
    ctx.fillText(lbl,x,ly+bh*0.12);
  }

  // Boss crown decoration
  if(lv.boss&&!lock){
    var crownY=y-r*1.10;
    ctx.font=(r*0.70)+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('👑',x,crownY);
  }
}

// ─── HIT TEST ───
function getNode(mx,my){
  for(var i=LVS.length-1;i>=0;i--){
    var p=NPOS[i];
    var r=NR(i)*1.6;
    var dx=mx-p.fx*W, dy=my-p.fy*H;
    if(dx*dx+dy*dy<r*r)return i;
  }
  return -1;
}
function onClick(e){if(e.clientY<58)return;var i=getNode(e.clientX,e.clientY);if(i>=0){selIdx=i;showPanel(i);}else closePanel();}
function onTouch(e){var t=e.changedTouches[0];if(!t||t.clientY<58)return;var i=getNode(t.clientX,t.clientY);if(i>=0){selIdx=i;showPanel(i);}}

// ─── PANEL ───
function showPanel(i){
  var lv=LVS[i];
  var done=isDone(lv), lock=isLocked(i);
  document.getElementById('p-title').textContent=(lv.boss?'⭐ ':'')+lv.title;
  document.getElementById('p-sub').textContent=lv.sub;
  document.getElementById('p-xplbl').textContent='XP +'+lv.xp;
  document.getElementById('p-bar-fill').style.width=(done?100:0)+'%';
  document.getElementById('p-stars').textContent=done?'★★★':'☆☆☆';
  var num=document.getElementById('p-num');
  num.textContent=lv.boss?'★':lv.n;
  if(done)       {num.style.background='#b09010';num.style.color='#6a4000';}
  else if(lock)  {num.style.background='#1e1e1e';num.style.color='#3a3a3a';}
  else if(lv.boss){num.style.background='#e04800';num.style.color='#fff';}
  else           {num.style.background='#dd3800';num.style.color='#fff';}
  var btn=document.getElementById('pbtn');
  if(lock)       {btn.className='lock'; btn.textContent='🔒 完成上一關解鎖';}
  else if(done)  {btn.className='retry';btn.textContent='再次挑戰 ↩';}
  else if(lv.boss){btn.className='boss';btn.textContent='挑戰 BOSS ★';}
  else           {btn.className='play';btn.textContent='PLAY!';}
  document.getElementById('panel').classList.add('on');
}
function closePanel(){document.getElementById('panel').classList.remove('on');selIdx=-1;}
function enterLv(){
  if(selIdx<0)return;
  var lv=LVS[selIdx];
  if(isLocked(selIdx))return;
  window.location.href=lv.file;
}

// ─── DRAW LOOP ───
function draw(){
  ctx.clearRect(0,0,W,H);
  drawBG();
  drawPath();
  // Sort nodes back-to-front (higher fy = nearer = draw last)
  var order=LVS.map(function(lv,i){return i;});
  order.sort(function(a,b){return NPOS[a].fy-NPOS[b].fy;});
  order.forEach(drawNode);
}
function loop(){RAF=requestAnimationFrame(loop);T+=0.016;draw();}
window.onload=function(){setup();loop();};
</script>
</body>
</html>
