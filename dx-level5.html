<script>
(function(){const s=document.getElementById("stars");for(let i=0;i<70;i++){const d=document.createElement("div");d.className="star";d.style.cssText="left:"+Math.random()*100+"%;top:"+Math.random()*100+"%;--d:"+(2+Math.random()*4)+"s;--dl:"+Math.random()*4+"s";s.appendChild(d);}})();

const CASTLE_KEY="dx5_done",CASTLE_TOTAL=9,CASTLE_NUM=5,NEXT_CASTLE=6;
let earned=JSON.parse(localStorage.getItem(CASTLE_KEY)||"[]");
let currentLesson=null;
const demoInited={};

const LESSONS=[
  {id:"h1",num:"5-1",icon:"🗻",title:"Height Map 地形生成",desc:"高度圖、頂點網格、地形 Mesh",xp:100,type:"normal",q:"Height Map 地形生成時，高度值存儲在哪裡？",opts:["頂點顏色","灰階貼圖的 R 通道","法線貼圖","深度緩衝"],ans:1,src:"rastertek.com/dx11win10tut42.html",story:`<span class="emoji-big">🗻</span><span class="hl">Height Map</span> 用一張灰階圖定義地形高度！<br><br>白色 = 最高山峰，黑色 = 最低谷地<br><br>生成流程：<br>1️⃣ 讀取灰階圖，每個像素對應一個頂點<br>2️⃣ 像素亮度 → 頂點 Y 座標<br>3️⃣ 連接相鄰頂點建立三角形 Mesh<br><br><code style="color:var(--acc2)">// 像素亮度轉高度\nfloat height = heightMap[z*width+x].r / 255.0f * MAX_HEIGHT;</code>`,code:`<span class="cm">// 從 Height Map 建立地形頂點</span>
<span class="kw">for</span>(<span class="kw">int</span> z=<span class="num">0</span>;z<height;z++) <span class="kw">for</span>(<span class="kw">int</span> x=<span class="num">0</span>;x<width;x++){
  <span class="tp">float</span> y = heightMap[z*width+x]/<span class="num">255.0f</span> * <span class="num">50.0f</span>;
  vertices[idx].pos = {x, y, z};
  vertices[idx].tex = {x/<span class="tp">float</span>(width), z/<span class="tp">float</span>(height)};
  idx++;
}
<span class="cm">// 建立三角形索引</span>
<span class="kw">for</span>(<span class="kw">int</span> z=<span class="num">0</span>;z<height-<span class="num">1</span>;z++) <span class="kw">for</span>(<span class="kw">int</span> x=<span class="num">0</span>;x<width-<span class="num">1</span>;x++){
  indices.push_back(z*width+x);
  indices.push_back((z+<span class="num">1</span>)*width+x);
  indices.push_back(z*width+x+<span class="num">1</span>);
}`},
  {id:"h2",num:"5-2",icon:"🌿",title:"地形貼圖分層",desc:"高度混合材質、草/岩石/雪、Blend Map",xp:100,type:"normal",q:"地形貼圖分層（Texture Splatting）的混合依據是什麼？",opts:["多邊形顏色","高度值或 Blend Map 遮罩","法線方向","光照強度"],ans:1,src:"rastertek.com/dx11win10tut43.html",story:`<span class="emoji-big">🌿</span><span class="hl">Texture Splatting</span> 讓地形根據高度自動換材質！<br><br>低處 → 草地 🌿<br>中處 → 岩石 🪨<br>高處 → 雪地 ❄️<br><br><code style="color:var(--acc2)">float snowBlend = smoothstep(0.6, 0.8, height);\nfloat rockBlend = smoothstep(0.3, 0.5, height);\nreturn lerp(grass, lerp(rock, snow, snowBlend), rockBlend);</code>`,code:`<span class="tp">float4</span> <span class="fn">TerrainPS</span>(<span class="tp">PixelInput</span> i):SV_TARGET {
  <span class="tp">float</span>  h=i.height; <span class="cm">// 頂點插值高度</span>
  <span class="tp">float4</span> grass=grassTex.<span class="fn">Sample</span>(ss,i.tex*<span class="num">8</span>);
  <span class="tp">float4</span> rock =rockTex.<span class="fn">Sample</span>(ss,i.tex*<span class="num">8</span>);
  <span class="tp">float4</span> snow =snowTex.<span class="fn">Sample</span>(ss,i.tex*<span class="num">8</span>);
  <span class="tp">float</span>  rb=<span class="fn">smoothstep</span>(<span class="num">.3</span>,<span class="num">.5</span>,h);
  <span class="tp">float</span>  sb=<span class="fn">smoothstep</span>(<span class="num">.65</span>,<span class="num">.8</span>,h);
  <span class="kw">return</span> <span class="fn">lerp</span>(<span class="fn">lerp</span>(grass,rock,rb),snow,sb);
}`},
  {id:"h3",num:"5-3",icon:"☀️",title:"地形光照與法線計算",desc:"有限差分法線、地形陰影、環境光",xp:120,type:"normal",q:"地形的頂點法線最常用什麼方法計算？",opts:["從貼圖讀取","從相鄰高度差計算（有限差分法）","手動設定","從幾何著色器生成"],ans:1,src:"rastertek.com/dx11win10tut44.html",story:`<span class="emoji-big">☀️</span>地形法線不能用 Normal Map，要用<span class="hl">有限差分法</span>即時計算！<br><br><code style="color:var(--acc2)">// 取相鄰高度差計算法線\nfloat hL = heightAt(x-1, z);\nfloat hR = heightAt(x+1, z);\nfloat hD = heightAt(x, z-1);\nfloat hU = heightAt(x, z+1);\nnormal = normalize(vec3(hL-hR, 2.0, hD-hU));</code><br><br>🔹 地形越陡 → 法線越傾斜 → 光照越弱<br>🔹 創造自然的山坡光影效果！`,code:`<span class="cm">// 有限差分法計算地形法線</span>
<span class="kw">void</span> <span class="fn">CalcNormal</span>(<span class="kw">int</span> x, <span class="kw">int</span> z) {
  <span class="tp">float</span> hL=<span class="fn">GetHeight</span>(x-<span class="num">1</span>,z), hR=<span class="fn">GetHeight</span>(x+<span class="num">1</span>,z);
  <span class="tp">float</span> hD=<span class="fn">GetHeight</span>(x,z-<span class="num">1</span>), hU=<span class="fn">GetHeight</span>(x,z+<span class="num">1</span>);
  <span class="tp">XMFLOAT3</span> n={hL-hR, <span class="num">2.0f</span>, hD-hU};
  <span class="tp">XMVECTOR</span> v=<span class="fn">XMLoadFloat3</span>(&n);
  v=<span class="fn">XMVector3Normalize</span>(v);
  <span class="fn">XMStoreFloat3</span>(&m_normals[z*width+x],v);
}`},
  {id:"h4",num:"5-4",icon:"🌅",title:"Sky Dome 天空穹頂",desc:"反轉法線、漸層顏色、無深度寫入",xp:100,type:"normal",q:"渲染天空穹頂時為何要關閉深度寫入？",opts:["節省效能","讓其他物件不被天空遮住，始終在最後面","增加亮度","讓顏色更鮮豔"],ans:1,src:"rastertek.com/dx11win10tut45.html",story:`<span class="emoji-big">🌅</span><span class="hl">Sky Dome</span>（天空穹頂）= 把相機放在球體中心，從裡面看！<br><br>三個關鍵設定：<br>🔹 <span class="hl">反轉法線</span>：面向球體內部，才能從內部看到<br>🔹 <span class="hl">關閉深度寫入</span>：天空永遠在最遠處<br>🔹 <span class="hl">天空跟著相機移動</span>：讓天空感覺無限遠<br><br>顏色從頂部深藍漸變到底部淺藍，模擬大氣散射！`,code:`<span class="cm">// SkyDome VS：讓天空球跟著相機移動</span>
<span class="tp">float4</span> <span class="fn">SkyVS</span>(<span class="tp">float3</span> pos : POSITION) : SV_POSITION {
  pos += cameraPos; <span class="cm">// 球心永遠在相機位置</span>

}
<span class="cm">// SkyDome PS：根據高度做漸層</span>
<span class="tp">float4</span> <span class="fn">SkyPS</span>(<span class="tp">SkyInput</span> i) : SV_TARGET {

}`},
  {id:"h5",num:"5-5",icon:"🌊",title:"地形水面",desc:"水位平面、反射、Fresnel 混合",xp:120,type:"normal",q:"地形水面要正確顯示反射，需要哪個額外的渲染步驟？",opts:["增加水面頂點數量","以水面為基準用反射矩陣重新渲染場景到 RTT","加入更多光源","計算水波高度"],ans:1,src:"rastertek.com/dx11win10tut49.html",story:`<span class="emoji-big">🌊</span>地形水面 = 天空倒影 + 地形倒影 + 波動法線！<br><br>渲染流程：<br>1️⃣ 以水面平面建立<span class="hl">反射矩陣</span><br>2️⃣ 翻轉相機，把場景渲染到 <span class="hl">Reflect RTT</span><br>3️⃣ 渲染水面時：<br>&nbsp;&nbsp;&nbsp;— 採樣 Reflect RTT 作為反射<br>&nbsp;&nbsp;&nbsp;— 採樣 Normal Map 做波浪扭曲<br>&nbsp;&nbsp;&nbsp;— 用 <span class="hl">Fresnel</span> 混合反射和透明`,code:`<span class="tp">float4</span> <span class="fn">WaterPS</span>(<span class="tp">WaterInput</span> i):SV_TARGET {
  <span class="cm">// Normal Map 動畫</span>
  <span class="tp">float3</span> N=normalTex.<span class="fn">Sample</span>(ss,i.tex+waveOffset)*<span class="num">2</span>-<span class="num">1</span>;
  <span class="cm">// 反射 UV 加擾動</span>
  <span class="tp">float2</span> reflUV=i.reflPos.xy/i.reflPos.w*<span class="tp">float2</span>(<span class="num">.5</span>,-.5)+<span class="num">.5</span>+N.xy*<span class="num">.02</span>;
  <span class="tp">float4</span> refl=reflTex.<span class="fn">Sample</span>(ss,reflUV);
  <span class="cm">// Fresnel</span>
  <span class="tp">float</span> fr=<span class="fn">pow</span>(<span class="num">1</span>-<span class="fn">dot</span>(N,viewDir),<span class="num">2</span>);
  <span class="kw">return</span> <span class="fn">lerp</span>(deepColor,refl,fr);
}`},
  {id:"h6",num:"5-6",icon:"🌫️",title:"地形霧效",desc:"指數霧、高度霧、大氣遠景消隱",xp:100,type:"normal",q:"高度霧（Height Fog）跟深度霧的區別是什麼？",opts:["高度霧更消耗效能","高度霧根據 Y 高度衰減，低處較濃，適合山谷晨霧效果","深度霧更精準","兩者完全相同"],ans:1,src:"rastertek.com/dx11win10tut46.html",story:`<span class="emoji-big">🌫️</span>地形霧效有兩種：<br><br>🔹 <span class="hl">深度霧</span>（Depth Fog）：根據相機距離，越遠越霧<br>🔹 <span class="hl">高度霧</span>（Height Fog）：根據 Y 高度，低處更濃<br><br>山谷晨霧：高度霧！低窪地區積霧，山峰清晰可見<br><br><code style="color:var(--acc2)">// 高度霧密度\nfloat heightFog = exp(-max(0, worldY) * fogDensity);\nreturn lerp(fogColor, sceneColor, heightFog);</code>`,code:`<span class="tp">float4</span> <span class="fn">FogPS</span>(<span class="tp">PixelInput</span> i):SV_TARGET {
  <span class="tp">float4</span> color = diffuseTex.<span class="fn">Sample</span>(ss,i.tex);
  <span class="cm">// 深度霧</span>
  <span class="tp">float</span> depthFog=<span class="fn">exp</span>(-fogDensity*i.depth);
  <span class="cm">// 高度霧（低處更濃）</span>
  <span class="tp">float</span> heightFog=<span class="fn">exp</span>(-<span class="fn">max</span>(<span class="num">0</span>,i.worldY)*heightFogDensity);
  <span class="cm">// 合併兩種霧</span>
  <span class="tp">float</span> fog=<span class="fn">min</span>(depthFog,heightFog);
  <span class="kw">return</span> <span class="fn">lerp</span>(fogColor,color,fog);
}`},
  {id:"h7",num:"5-7",icon:"🌲",title:"Billboard 植被",desc:"草叢 Billboard、面向相機、LOD",xp:100,type:"normal",q:"Billboard 植被的核心技術是什麼？",opts:["每棵樹都是 3D 模型","讓 2D 平面永遠面向相機，用少量頂點模擬植被","增加多邊形","使用粒子"],ans:1,src:"rastertek.com/dx11win10tut47.html",story:`<span class="emoji-big">🌲</span><span class="hl">Billboard 植被</span> = 2D 草/樹貼圖永遠面向相機！<br><br>遊戲中的草地通常是幾百萬個 Billboard，而不是真正的 3D 草！<br><br>兩種 Billboard 方式：<br>🔹 <span class="hl">Screen-Aligned</span>：平面始終垂直螢幕<br>🔹 <span class="hl">World-Axis Aligned</span>：只繞 Y 軸旋轉（樹木常用）<br><br>加上 <span class="hl">LOD</span>（Level of Detail）：遠處用更少多邊形`,code:`<span class="cm">// Billboard VS — 面向相機</span>
<span class="tp">float4</span> <span class="fn">BillboardVS</span>(<span class="tp">VertexInput</span> v):SV_POSITION {
  <span class="cm">// 從 View Matrix 取相機的 Right/Up 方向</span>
  <span class="tp">float3</span> right={view._11,view._21,view._31};
  <span class="tp">float3</span> up   ={<span class="num">0,1,0</span>}; <span class="cm">// 固定 Y 軸</span>
  <span class="tp">float3</span> pos=treePos
    +right*v.offset.x*treeSize
    +up   *v.offset.y*treeSize;
  <span class="kw">return</span> <span class="fn">mul</span>(<span class="tp">float4</span>(pos,<span class="num">1</span>),viewProj);
}`},
  {id:"h8",num:"5-8",icon:"🎯",title:"Instancing 大量實例化",desc:"DrawInstanced、Instance Buffer、草地渲染",xp:120,type:"normal",q:"Instancing 最主要解決什麼問題？",opts:["增加貼圖精度","減少 Draw Call 次數，一次 GPU 指令繪製大量相同物件","改善陰影品質","加快光照計算"],ans:1,src:"rastertek.com/dx11win10tut48.html",story:`<span class="emoji-big">🎯</span><span class="hl">Instancing</span> = 一個 Draw Call 繪製成千上萬個相同物件！<br><br>傳統方式：每棵樹一個 Draw Call → CPU 瓶頸！<br>Instancing：一個 Draw Call + 位置資料緩衝 → GPU 全速運行！<br><br><code style="color:var(--acc2)">// 一次繪製 10000 棵樹\nctx->DrawIndexedInstanced(indexCount, 10000, 0, 0, 0);</code><br><br>🔹 每個實例有獨立的 <span class="hl">World Matrix</span>（位置、旋轉、縮放）<br>🔹 從 <span class="hl">Instance Buffer</span> 讀取`,code:`<span class="cm">// Instance Buffer 設定</span>
<span class="tp">D3D11_BUFFER_DESC</span> bd={};
bd.Usage=D3D11_USAGE_DEFAULT;
bd.ByteWidth=<span class="kw">sizeof</span>(<span class="tp">InstanceData</span>)*<span class="num">10000</span>;
bd.BindFlags=D3D11_BIND_VERTEX_BUFFER;
device-><span class="fn">CreateBuffer</span>(&bd,&initData,&m_instanceBuf);

<span class="cm">// VS 讀取 Instance 資料</span>
<span class="tp">float4</span> <span class="fn">InstVS</span>(<span class="tp">VertexInput</span> v,<span class="tp">InstanceInput</span> inst):SV_POSITION {
  <span class="tp">float4</span> world=<span class="fn">mul</span>(<span class="tp">float4</span>(v.pos,<span class="num">1</span>),inst.worldMatrix);
  <span class="kw">return</span> <span class="fn">mul</span>(world,viewProj);
}`},
  {id:"h9",num:"5-9",icon:"👑",title:"Boss：完整地形場景",desc:"地形+天空+水+霧+植被整合",xp:160,type:"boss",q:"整合地形場景時，各元素的渲染順序是什麼？",opts:["隨意順序","天空→地形→水面→透明植被（由不透明到透明）","水面最先渲染","植被最先渲染"],ans:1,src:"rastertek.com/dx11win10tut50.html",story:`<span class="emoji-big">👑</span>完整地形場景的<span class="hl">渲染順序</span>至關重要！<br><br>1️⃣ <span class="hl">Reflection Pass</span>：翻轉相機，渲染水面反射到 RTT<br>2️⃣ <span class="hl">天空穹頂</span>：關閉深度寫入，最大 Z 值<br>3️⃣ <span class="hl">地形 Mesh</span>：主體，有完整深度測試<br>4️⃣ <span class="hl">水面</span>：採樣反射 RTT，Alpha Blend<br>5️⃣ <span class="hl">透明植被</span>：由遠到近，Alpha Test<br><br>順序錯了 → 水面反射消失、植被穿透地形！`,code:`<span class="cm">// 完整地形渲染流程</span>
<span class="kw">void</span> <span class="fn">Render</span>() {
  <span class="cm">// Pass 1: 水面反射</span>
  <span class="fn">SetReflectionRTT</span>();
  <span class="fn">RenderSky</span>(reflectCamera);
  <span class="fn">RenderTerrain</span>(reflectCamera);
  <span class="cm">// Pass 2: 主場景</span>
  <span class="fn">SetBackBuffer</span>();
  <span class="fn">RenderSky</span>(mainCamera);     <span class="cm">// 關閉深度寫入</span>
  <span class="fn">RenderTerrain</span>(mainCamera); <span class="cm">// 有深度測試</span>
  <span class="fn">RenderWater</span>(mainCamera);   <span class="cm">// Alpha blend</span>
  <span class="fn">RenderTrees</span>(mainCamera);   <span class="cm">// Alpha test, 由遠到近</span>
}`},
];

function makeSphere(r){const v=[];const ST=28,SL=36;function pv(la,lo){const x=Math.cos(la)*Math.cos(lo),y=Math.sin(la),z=Math.cos(la)*Math.sin(lo);v.push(x*r,y*r,z*r,x,y,z);}for(let si=0;si<ST;si++){const la0=(si/ST-.5)*Math.PI,la1=((si+1)/ST-.5)*Math.PI;for(let li=0;li<SL;li++){const lo0=li/SL*Math.PI*2,lo1=(li+1)/SL*Math.PI*2;pv(la0,lo0);pv(la1,lo0);pv(la1,lo1);pv(la0,lo0);pv(la1,lo1);pv(la0,lo1);}}return new Float32Array(v);}
function syncCV(cv,h){const w=cv.clientWidth||600;if(cv.width!==w||cv.height!==h){cv.width=w;cv.height=h;cv.style.height=h+"px";}return w/h;}
function updateXP(){
  const tot=earned.reduce((s,id)=>{const l=LESSONS.find(x=>x.id===id);return s+(l?l.xp:0);},0);
  const mx=LESSONS.reduce((s,l)=>s+l.xp,0);
  document.getElementById("xp-fill").style.width=(tot/mx*100)+"%";
  document.getElementById("xp-total").textContent=tot+" / "+mx;
  document.getElementById("done-count").textContent=earned.length;
}

function renderLessons(){
  const list=document.getElementById("lesson-list");
  list.innerHTML="";
  LESSONS.forEach((lesson,idx)=>{
    const isDone=earned.includes(lesson.id);
    const isActive=currentLesson===lesson.id;
    const isLocked=idx>0&&!earned.includes(LESSONS[idx-1].id)&&!isDone&&!isActive;
    const div=document.createElement("div");
    div.className="lesson"+(isDone?" done":"")+(isActive?" active":"")+(isLocked?" locked":"")+(lesson.type==="boss"?" boss":"");
    div.id="lesson-"+lesson.id;
    const numCls=isDone?"done-num":isActive?"active-num":"locked-num";
    const metaHTML=lesson.type==="boss"
      ?'<span class="boss-badge">👑 BOSS</span><span class="xp-badge">+'+lesson.xp+' XP</span>'
      :'<span class="xp-badge">+'+lesson.xp+' XP</span>';
    const checkHTML=isDone?'<div class="check">✓</div>':(isLocked?'<div class="check" style="color:var(--txt2)">🔒</div>':"");
    div.innerHTML='<div class="lesson-header"><div class="lesson-num '+numCls+'">'+(isDone?"✓":lesson.icon)+'</div><div class="lesson-info"><div class="lesson-title">'+lesson.num+" "+lesson.title+'</div><div class="lesson-desc">'+lesson.desc+'</div></div><div class="lesson-meta">'+metaHTML+checkHTML+'</div></div>'+(isActive?'<div class="lesson-body">'+buildBody(lesson,isDone)+'</div>':'<div class="lesson-body"></div>');
    if(!isLocked)div.querySelector(".lesson-header").addEventListener("click",()=>toggleLesson(lesson.id));
    if(idx<LESSONS.length-1){const conn=document.createElement("div");conn.className="connector";list.appendChild(div);list.appendChild(conn);}
    else list.appendChild(div);
  });
}

function toggleLesson(id){
  currentLesson=(currentLesson===id)?null:id;
  renderLessons();
  if(currentLesson){
    setTimeout(()=>{
      const el=document.getElementById("lesson-"+id);
      if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
      initDemo(id);
    },50);
  }
}

function buildBody(lesson,isDone){
  const opts=lesson.opts.map((o,i)=>'<div class="opt" id="opt-'+lesson.id+"-"+i+'" onclick="checkAns(\''+lesson.id+"\',"+i+')"><div class="opt-key">'+["A","B","C","D"][i]+"</div>"+o+"</div>").join("");
  return '<div class="tabs"><div class="tab on" onclick="switchTab(this,\'story-'+lesson.id+"\',\'"+lesson.id+'\')">📖 概念</div><div class="tab" onclick="switchTab(this,\'demo-'+lesson.id+"\',\'"+lesson.id+'\')">🎮 互動</div><div class="tab" onclick="switchTab(this,\'code-'+lesson.id+"\',\'"+lesson.id+'\')">💻 HLSL</div></div><div id="story-'+lesson.id+'" class="tab-panel on"><div class="story-box">'+lesson.story+'</div><a class="src-link" href="https://www.'+lesson.src+'" target="_blank">📖 Rastertek 原始教學 →</a><div class="quiz-box" style="margin-top:16px"><div class="quiz-title">🎯 理解測驗</div><div class="quiz-q">'+lesson.q+'</div><div class="opts">'+opts+'</div><div id="ex-'+lesson.id+'" style="display:none;margin-top:12px;padding:12px;background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.2);border-radius:10px;font-size:.85rem;color:var(--txt2)"></div></div>'+(isDone?'<button class="complete-btn" disabled style="background:var(--border);color:var(--txt2)">✅ 已完成！</button>':'<button class="complete-btn" id="btn-'+lesson.id+'" onclick="completeL(\''+lesson.id+'\')">完成測驗後解鎖 →</button>')+'</div><div id="demo-'+lesson.id+'" class="tab-panel"><div id="dc-'+lesson.id+'"><div style="text-align:center;padding:40px;color:var(--txt2)">點互動載入 Demo…</div></div></div><div id="code-'+lesson.id+'" class="tab-panel"><div class="code-block"><button class="copy-btn" onclick="copyC(this)">複製</button>'+lesson.code+'</div></div>';
}

function switchTab(tabEl,panelId,lessonId){
  const body=document.getElementById("lesson-"+lessonId).querySelector(".lesson-body");
  body.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  body.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("on"));
  tabEl.classList.add("on");document.getElementById(panelId).classList.add("on");
  if(panelId.startsWith("demo-"))initDemo(lessonId);
}

function checkAns(lessonId,idx){
  const lesson=LESSONS.find(l=>l.id===lessonId);
  // Only mark the clicked option — no answer reveal
  document.querySelectorAll('[id^="opt-'+lessonId+'-"]').forEach((o,i)=>{
    o.classList.remove("correct","wrong");
    if(i===idx){
      o.classList.add(idx===lesson.ans?"correct":"wrong");
    }
  });
  const ex=document.getElementById("ex-"+lessonId);
  if(ex){
    ex.style.display="block";
    ex.textContent=idx===lesson.ans?"✅ 正確！":"❌ 答錯了，再試試看！";
  }
  const btn=document.getElementById("btn-"+lessonId);

// h1: Height Map — interactive 3D terrain from noise
function demoHeightMap(cont,isMobile){
  cont.innerHTML=`<div class="demo-wrap"><div class="demo-label">🗻 Height Map 地形 — 灰階高度圖生成 3D 地形</div><canvas style="width:100%;display:block;height:280px"></canvas></div>
  <div class="slider-row"><label>⛰️ 地形高度</label><input type="range" min="10" max="100" value="40" id="terrH" oninput="updTH()"><span class="slider-val" id="thv">0.40</span></div>
  <div class="ctrl-row"><button class="ctrl-btn active" onclick="setTerrMode(0)">🗺️ 高度圖</button><button class="ctrl-btn" onclick="setTerrMode(1)">🏔️ 3D 地形</button><button class="ctrl-btn" onclick="setTerrMode(2)">📐 線框</button></div>`;

  const cv=cont.querySelector("canvas");
  function sync(){const w=cv.clientWidth||600;if(cv.width!==w||cv.height!==280){cv.width=w;cv.height=280;cv.style.height="280px";}return w/280;}
  sync();if(isMobile)window.addEventListener("resize",sync);

  const g=cv.getContext("webgl");if(!g)return;
  function mkS(t,s){const sh=g.createShader(t);g.shaderSource(sh,s);g.compileShader(sh);return sh;}
  function mkP(vs,fs){const p=g.createProgram();g.attachShader(p,mkS(g.VERTEX_SHADER,vs));g.attachShader(p,mkS(g.FRAGMENT_SHADER,fs));g.linkProgram(p);return p;}

  // Generate terrain mesh from procedural noise
  const N=48; // grid resolution
  function noise2D(x,z,seed){
    const a=Math.sin(x*1.7+seed)*43758.5;
    const b=Math.sin(z*2.3+seed*1.3)*35891.2;
    return (Math.sin(a+b)*.5+.5);
  }
  function fbm(x,z){
    let v=0,amp=1,freq=1;
    for(let i=0;i<4;i++){v+=noise2D(x*freq,z*freq,i*7.3)*amp;amp*=.5;freq*=2;}
    return v;
  }

  // Build grid
  const verts=[]; const indices=[];
  for(let z=0;z<=N;z++)for(let x=0;x<=N;x++){
    const nx=(x/N)*4, nz=(z/N)*4;
    const h=fbm(nx,nz);
    verts.push((x/N)*2-1, h, (z/N)*2-1); // pos
    verts.push(h); // height for color
  }
  for(let z=0;z<N;z++)for(let x=0;x<N;x++){
    const i=z*(N+1)+x;
    indices.push(i,i+N+1,i+1, i+1,i+N+1,i+N+2);
  }
  const vD=new Float32Array(verts),iD=new Uint16Array(indices);
  const vB=g.createBuffer();g.bindBuffer(g.ARRAY_BUFFER,vB);g.bufferData(g.ARRAY_BUFFER,vD,g.STATIC_DRAW);
  const iB=g.createBuffer();g.bindBuffer(g.ELEMENT_ARRAY_BUFFER,iB);g.bufferData(g.ELEMENT_ARRAY_BUFFER,iD,g.STATIC_DRAW);

  // Height map display prog (2D view)
  const hmProg=mkP(
    "attribute vec3 p;attribute float h;varying float vH;uniform float asp;void main(){vH=h;gl_Position=vec4(p.x*0.9/asp,p.z*0.9,0,1);}",
    "precision mediump float;varying float vH;void main(){vec3 col=mix(vec3(.1,.2,.05),mix(vec3(.45,.3,.15),vec3(.9,.9,.9),max(0.,vH*1.5-.5)),min(1.,vH*1.5));gl_FragColor=vec4(col,1.);}"
  );
  // 3D terrain prog
  const terrProg=mkP(
    "attribute vec3 p;attribute float h;varying float vH;varying vec3 vN;uniform float asp;uniform float tilt;uniform float hScale;void main(){vH=h;float y=h*hScale;float cy=cos(tilt),sy=sin(tilt);float py=y*cy-p.z*sy,pz=y*sy+p.z*cy;vN=normalize(vec3(0,1,0));gl_Position=vec4(p.x*0.88/asp,py*0.88-0.1,pz*0.01,1.);}",
    "precision mediump float;varying float vH;varying vec3 vN;uniform int wire;void main(){if(wire==1){gl_FragColor=vec4(.2,.8,.4,1.);return;}vec3 col=vH<.35?mix(vec3(.15,.45,.2),vec3(.35,.25,.1),vH*3.):vH<.65?mix(vec3(.35,.25,.1),vec3(.45,.4,.35),((vH-.35)/.3)):mix(vec3(.45,.4,.35),vec3(.95,.97,1.),((vH-.65)/.35));float lite=max(dot(vN,normalize(vec3(.5,.8,.3))),0.);gl_FragColor=vec4(col*(.3+lite*.7),1.);}"
  );

  g.enable(g.DEPTH_TEST);
  let hScale=0.40,mode=0,t=0;
  window.updTH=()=>{hScale=document.getElementById("terrH").value/100;document.getElementById("thv").textContent=hScale.toFixed(2);};
  window.setTerrMode=m=>{mode=m;cont.querySelectorAll(".ctrl-btn").forEach(b=>b.classList.remove("active"));event.target.classList.add("active");};

  function frame(){
    t+=0.008;const asp=sync();
    g.viewport(0,0,cv.width,cv.height);g.clearColor(.04,.03,.09,1);g.clear(g.COLOR_BUFFER_BIT|g.DEPTH_BUFFER_BIT);
    g.bindBuffer(g.ARRAY_BUFFER,vB);g.bindBuffer(g.ELEMENT_ARRAY_BUFFER,iB);
    if(mode===0){
      g.useProgram(hmProg);
      const aP=g.getAttribLocation(hmProg,"p"),aH=g.getAttribLocation(hmProg,"h");
      g.enableVertexAttribArray(aP);g.vertexAttribPointer(aP,3,g.FLOAT,false,16,0);
      g.enableVertexAttribArray(aH);g.vertexAttribPointer(aH,1,g.FLOAT,false,16,12);
      g.uniform1f(g.getUniformLocation(hmProg,"asp"),asp);
      g.drawElements(g.TRIANGLES,iD.length,g.UNSIGNED_SHORT,0);
    } else {
      g.useProgram(terrProg);
      const aP=g.getAttribLocation(terrProg,"p"),aH=g.getAttribLocation(terrProg,"h");
      g.enableVertexAttribArray(aP);g.vertexAttribPointer(aP,3,g.FLOAT,false,16,0);
      g.enableVertexAttribArray(aH);g.vertexAttribPointer(aH,1,g.FLOAT,false,16,12);
      g.uniform1f(g.getUniformLocation(terrProg,"asp"),asp);
      g.uniform1f(g.getUniformLocation(terrProg,"hScale"),hScale);
      g.uniform1f(g.getUniformLocation(terrProg,"tilt"),0.5);
      g.uniform1i(g.getUniformLocation(terrProg,"wire"),mode===2?1:0);
      if(mode===2){
        g.drawElements(g.LINES,iD.length,g.UNSIGNED_SHORT,0);
      } else {
        g.drawElements(g.TRIANGLES,iD.length,g.UNSIGNED_SHORT,0);
      }
    }
    requestAnimationFrame(frame);
  }
  frame();
}

// h2: Texture Splatting — height-based material blending
function demoSplatting(cont,isMobile){
  cont.innerHTML=`<div class="demo-wrap"><div class="demo-label">🌿 Texture Splatting — 高度決定材質</div><canvas style="width:100%;display:block;height:260px"></canvas></div>
  <div class="slider-row"><label>🌊 水位高度</label><input type="range" min="0" max="80" value="25" id="wlevel" oninput="updWL()"><span class="slider-val" id="wlv">0.25</span></div>`;
  const cv=cont.querySelector("canvas");
  function sync(){const w=cv.clientWidth||600;if(cv.width!==w||cv.height!==260){cv.width=w;cv.height=260;cv.style.height="260px";}return w/260;}
  sync();if(isMobile)window.addEventListener("resize",sync);
  const g=cv.getContext("webgl");if(!g)return;
  function mkS(t,s){const sh=g.createShader(t);g.shaderSource(sh,s);g.compileShader(sh);return sh;}
  function mkP(vs,fs){const p=g.createProgram();g.attachShader(p,mkS(g.VERTEX_SHADER,vs));g.attachShader(p,mkS(g.FRAGMENT_SHADER,fs));g.linkProgram(p);return p;}
  const prog=mkP(
    "attribute vec2 p;varying vec2 uv;void main(){uv=p*.5+.5;gl_Position=vec4(p,0,1);}",
    `precision mediump float;varying vec2 uv;uniform float wl;uniform float t;
     float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
     float noise(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.-2.*f);return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+1.),u.x),u.y);}
     float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.1;a*=.5;}return v;}
     void main(){
       float h=fbm(uv*3.);
       // Texture splatting based on height
       vec3 water=vec3(.1,.3,.6);
       vec3 sand =vec3(.75,.65,.4);
       vec3 grass=vec3(.2,.55,.15);
       vec3 rock =vec3(.4,.35,.28);
       vec3 snow =vec3(.88,.92,.96);
       vec3 col;
       if(h<wl)         col=water;
       else if(h<wl+.06)col=sand;
       else if(h<.55)   col=mix(grass,rock,smoothstep(.35,.55,h));
       else if(h<.75)   col=mix(rock,snow,smoothstep(.55,.75,h));
       else             col=snow;
       // Simple lighting using fd normals
       float dx=fbm(uv*3.+vec2(.01,0))-fbm(uv*3.-vec2(.01,0));
       float dy=fbm(uv*3.+vec2(0,.01))-fbm(uv*3.-vec2(0,.01));
       vec3 N=normalize(vec3(-dx*8.,-dy*8.,1.));
       vec3 L=normalize(vec3(.5,.7,.6));
       float lite=max(dot(N,L),0.);
       // Water shimmer
       if(h<wl){float w=noise(uv*20.+t*vec2(1.,.7))*.15;lite=.6+w;}
       gl_FragColor=vec4(col*(.25+lite*.75),1.);
     }`
  );
  const buf=g.createBuffer();g.bindBuffer(g.ARRAY_BUFFER,buf);g.bufferData(g.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),g.STATIC_DRAW);
  const aP=g.getAttribLocation(prog,"p");
  g.enableVertexAttribArray(aP);g.vertexAttribPointer(aP,2,g.FLOAT,false,0,0);
  const uWL=g.getUniformLocation(prog,"wl"),uT=g.getUniformLocation(prog,"t");
  let wl=0.25,t=0;
  window.updWL=()=>{wl=document.getElementById("wlevel").value/100;document.getElementById("wlv").textContent=wl.toFixed(2);};
  function frame(){
    t+=0.016;sync();g.viewport(0,0,cv.width,cv.height);
    g.useProgram(prog);g.bindBuffer(g.ARRAY_BUFFER,buf);g.enableVertexAttribArray(aP);g.vertexAttribPointer(aP,2,g.FLOAT,false,0,0);
    g.uniform1f(uWL,wl);g.uniform1f(uT,t);g.drawArrays(g.TRIANGLE_STRIP,0,4);
    requestAnimationFrame(frame);
  }
  frame();
}

// h3: Terrain lighting — normals from finite differences
function demoTerrainLight(cont,isMobile){
  cont.innerHTML=`<div class="demo-wrap"><div class="demo-label">☀️ 地形光照 — 有限差分法計算法線</div><canvas style="width:100%;display:block;height:260px"></canvas></div>
  <div class="slider-row"><label>☀️ 光源角度</label><input type="range" min="-80" max="80" value="35" id="sunA" oninput="updSun()"><span class="slider-val" id="sunv">35°</span></div>
  <div class="ctrl-row"><button class="ctrl-btn active" onclick="setLightMode(0)">☀️ 一般光照</button><button class="ctrl-btn" onclick="setLightMode(1)">📐 法線視覺化</button></div>`;
  const cv=cont.querySelector("canvas");
  function sync(){const w=cv.clientWidth||600;if(cv.width!==w||cv.height!==260){cv.width=w;cv.height=260;cv.style.height="260px";}return w/260;}
  sync();if(isMobile)window.addEventListener("resize",sync);
  const g=cv.getContext("webgl");if(!g)return;
  function mkS(t,s){const sh=g.createShader(t);g.shaderSource(sh,s);g.compileShader(sh);return sh;}
  function mkP(vs,fs){const p=g.createProgram();g.attachShader(p,mkS(g.VERTEX_SHADER,vs));g.attachShader(p,mkS(g.FRAGMENT_SHADER,fs));g.linkProgram(p);return p;}
  const prog=mkP(
    "attribute vec2 p;varying vec2 uv;void main(){uv=p*.5+.5;gl_Position=vec4(p,0,1);}",
    `precision mediump float;varying vec2 uv;uniform vec3 sunDir;uniform int mode;
     float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
     float noise(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.-2.*f);return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+1.),u.x),u.y);}
     float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.1;a*=.5;}return v;}
     void main(){
       float ep=0.005;
       float h =fbm(uv*3.);
       float hL=fbm((uv+vec2(-ep,0))*3.);
       float hR=fbm((uv+vec2( ep,0))*3.);
       float hD=fbm((uv+vec2(0,-ep))*3.);
       float hU=fbm((uv+vec2(0, ep))*3.);
       // Finite difference normal
       vec3 N=normalize(vec3((hL-hR)/(2.*ep)*4.,(hD-hU)/(2.*ep)*4.,1.));
       if(mode==1){
         // Normal visualisation
         gl_FragColor=vec4(N*.5+.5,1.);
         return;
       }
       float diff=max(dot(N,sunDir),0.);
       float amb=.25;
       vec3 col=h<.35?vec3(.2,.55,.15):h<.65?vec3(.38,.3,.22):vec3(.85,.88,.9);
       gl_FragColor=vec4(col*(amb+diff*(1.-amb)),1.);
     }`
  );
  const buf=g.createBuffer();g.bindBuffer(g.ARRAY_BUFFER,buf);g.bufferData(g.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),g.STATIC_DRAW);
  const aP=g.getAttribLocation(prog,"p"),uSun=g.getUniformLocation(prog,"sunDir"),uMode=g.getUniformLocation(prog,"mode");
  g.enableVertexAttribArray(aP);g.vertexAttribPointer(aP,2,g.FLOAT,false,0,0);

  window.updSun=()=>{sunAng=parseInt(document.getElementById("sunA").value);document.getElementById("sunv").textContent=sunAng+"°";};
  window.setLightMode=m=>{lMode=m;cont.querySelectorAll(".ctrl-btn").forEach(b=>b.classList.remove("active"));event.target.classList.add("active");};
  function frame(){

    g.useProgram(prog);g.bindBuffer(g.ARRAY_BUFFER,buf);g.enableVertexAttribArray(aP);g.vertexAttribPointer(aP,2,g.FLOAT,false,0,0);
    g.uniform3f(uSun,Math.cos(r)*.7,.6,Math.sin(r)*.4+.5);g.uniform1i(uMode,lMode);
    g.drawArrays(g.TRIANGLE_STRIP,0,4);
    requestAnimationFrame(frame);
  }
  frame();
}

    `precision mediump float;varying vec3 vP;uniform int sky;uniform float t;

     void main(){

       float h=fbm(uv*3.+.5);
       float waterLine=.38;
       // Two-layer wave normals
       float tt=t*wsp;
       float u1=uv.x+tt*.04, v1=uv.y+tt*.03;
       float u2=uv.x-tt*.03, v2=uv.y+tt*.025;
       vec3 N=normalize(vec3(
         sin(u1*8.)*0.4+sin(u2*6.)*0.2,
         cos(v1*8.)*0.4+cos(v2*6.)*0.2,
         1.0));
       if(h>waterLine){
         // Land: texture splatting
         vec3 col=h<.5?vec3(.22,.55,.15):h<.7?vec3(.38,.3,.22):vec3(.85,.88,.9);
         float diff=max(dot(normalize(vec3(.5,.8,.6)),vec3(0,0,1)),0.);
         gl_FragColor=vec4(col*(.3+diff*.7),1.);
       } else {
         // Water: deep blue + sky reflection + specular
         vec3 deep=vec3(.05,.18,.42);
         vec3 skyRefl=vec3(.5,.72,.95);
         float fresnel=pow(1.-abs(N.z),.8);
         vec3 col=mix(deep,skyRefl,fresnel*.7);
         vec3 L=normalize(vec3(.5,.8,.6));
         vec3 H=normalize(L+vec3(0,0,1));
         float spec=pow(max(dot(N,H),0.),64.)*1.5;
         col+=vec3(1.,.97,.85)*spec;
         gl_FragColor=vec4(clamp(col,0.,1.),1.);
       }
     }`
  );
  const buf=g.createBuffer();g.bindBuffer(g.ARRAY_BUFFER,buf);g.bufferData(g.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),g.STATIC_DRAW);
  const aP=g.getAttribLocation(prog,"p"),uT=g.getUniformLocation(prog,"t"),uWsp=g.getUniformLocation(prog,"wsp");
  g.enableVertexAttribArray(aP);g.vertexAttribPointer(aP,2,g.FLOAT,false,0,0);
  let wsp=0.40,t=0;
  window.updWSP=()=>{wsp=document.getElementById("wsp").value/100;document.getElementById("wspv").textContent=wsp.toFixed(2);};
  function frame(){
    t+=0.016;sync();g.viewport(0,0,cv.width,cv.height);
    g.useProgram(prog);g.bindBuffer(g.ARRAY_BUFFER,buf);g.enableVertexAttribArray(aP);g.vertexAttribPointer(aP,2,g.FLOAT,false,0,0);
    g.uniform1f(uT,t);g.uniform1f(uWsp,wsp);g.drawArrays(g.TRIANGLE_STRIP,0,4);
    requestAnimationFrame(frame);
  }
  frame();
}

function demoFullTerrain(cont,isMobile){
  cont.innerHTML=`<div class="demo-wrap"><div class="demo-label">👑 完整地形場景 — 天空+地形+水面+霧</div><canvas style="width:100%;display:block;height:300px"></canvas></div>
  <div class="slider-row"><label>⏰ 時間</label><input type="range" min="0" max="100" value="30" id="dayT" oninput="updDT()"><span class="slider-val" id="dtv">0.30</span></div>`;
  const cv=cont.querySelector("canvas");
  function sync(){const w=cv.clientWidth||600;if(cv.width!==w||cv.height!==300){cv.width=w;cv.height=300;cv.style.height="300px";}return w/300;}
  sync();if(isMobile)window.addEventListener("resize",sync);
  const g=cv.getContext("webgl");if(!g)return;
  function mkS(t,s){const sh=g.createShader(t);g.shaderSource(sh,s);g.compileShader(sh);return sh;}
  function mkP(vs,fs){const p=g.createProgram();g.attachShader(p,mkS(g.VERTEX_SHADER,vs));g.attachShader(p,mkS(g.FRAGMENT_SHADER,fs));g.linkProgram(p);return p;}
  const prog=mkP(
    "attribute vec2 p;varying vec2 uv;void main(){uv=p*.5+.5;gl_Position=vec4(p,0,1);}",
    `precision mediump float;varying vec2 uv;uniform float dayTime;uniform float wt;
     float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
     float noise(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.-2.*f);return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+1.),u.x),u.y);}
     float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.1;a*=.5;}return v;}
     void main(){
       // Horizon split: top 40% sky, bottom 60% terrain+water
       float horizon=.42;
       float h=fbm(uv*3.+.8);
       float waterLine=.35;
       // Sky
       float dawnDusk=abs(dayTime-.5)*2.;
       vec3 zenith=mix(vec3(.05,.08,.25),vec3(.15,.45,.85),dayTime);
       vec3 hor=mix(vec3(.9,.4,.1),mix(vec3(.55,.75,.95),vec3(.15,.2,.55),dayTime),dayTime);
       // Sun position
       float sunX=(dayTime-.5)*2.;
       float sunY=dayTime<.5?dayTime*2.:(1.-dayTime)*2.;
       vec3 sky=mix(hor,zenith,uv.y);
       vec2 skyUV=(uv-vec2(.5,.42))*(vec2(1.6,.8));
       float sd=length(skyUV-vec2(sunX*.4,sunY*.4+.1));
       sky+=mix(vec3(1.,.9,.6),vec3(.9,.5,.1),dawnDusk)*max(0.,1.-sd*10.)*smoothstep(.08,.0,sd);
       sky+=mix(vec3(1.,.85,.5),vec3(.7,.3,.1),dawnDusk)*exp(-sd*4.)*.3;
       if(uv.y>horizon){
         gl_FragColor=vec4(clamp(sky,0.,1.),1.);return;
       }
       // Terrain UV remapped
       vec2 tUV=vec2(uv.x,uv.y/horizon);
       float th=fbm(tUV*3.+.8);
       float depth=1.-tUV.y;
       // Fog density
       float fog=exp(-depth*depth*2.5);
       vec3 fogCol=mix(hor,zenith,.3);
       if(th<waterLine){
         // Water
         vec3 deep=vec3(.05,.18,.42)*dayTime+vec3(.02,.05,.1)*(1.-dayTime);
         vec3 reflSky=hor*.8;
         float wn=sin(tUV.x*20.+wt)*.015+sin(tUV.y*15.+wt*1.3)*.012;
         vec3 wN=normalize(vec3(wn,wn,1.));
         float fr=pow(1.-abs(wN.z),.6);
         vec3 wCol=mix(deep,reflSky,fr*.7);
         float spec=pow(max(dot(wN,normalize(vec3(sunX+.5,sunY+.3,1.))),0.),64.)*dayTime*.8;
         wCol+=vec3(1.,.97,.85)*spec;
         gl_FragColor=vec4(mix(wCol,fogCol,1.-fog),1.);
       } else {
         // Land
         float lt=mix(0.,1.,dayTime*.9+.1);
         vec3 col=th<.45?vec3(.22,.55,.15)*lt:th<.65?vec3(.38,.3,.22)*lt:vec3(.82,.85,.9)*lt;
         // Terrain normal lighting
         float dx=fbm((tUV+vec2(.01,0))*3.+.8)-th;
         float dy=fbm((tUV+vec2(0,.01))*3.+.8)-th;
         vec3 N=normalize(vec3(-dx*8.,1.,-dy*8.));
         vec3 L=normalize(vec3(sunX*.5+.3,sunY*.8+.2,.5));
         float diff=max(dot(N,L),0.);col*=(.2+diff*.8);
         gl_FragColor=vec4(mix(col,fogCol,1.-fog),1.);
       }
     }`
  );
  const buf=g.createBuffer();g.bindBuffer(g.ARRAY_BUFFER,buf);g.bufferData(g.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),g.STATIC_DRAW);
  const aP=g.getAttribLocation(prog,"p"),uDay=g.getUniformLocation(prog,"dayTime"),uWT=g.getUniformLocation(prog,"wt");
  g.enableVertexAttribArray(aP);g.vertexAttribPointer(aP,2,g.FLOAT,false,0,0);
  let dayT=0.30,wt=0;
  window.updDT=()=>{dayT=document.getElementById("dayT").value/100;document.getElementById("dtv").textContent=dayT.toFixed(2);};
  function frame(){

    g.useProgram(prog);g.bindBuffer(g.ARRAY_BUFFER,buf);g.enableVertexAttribArray(aP);g.vertexAttribPointer(aP,2,g.FLOAT,false,0,0);
    g.uniform1f(uDay,dayT);g.uniform1f(uWT,wt);g.drawArrays(g.TRIANGLE_STRIP,0,4);
    requestAnimationFrame(frame);
  }
  frame();
}

// 2-5: Point Light - moving light with attenuation
function demoPointLight(cont,isMobile){
  cont.innerHTML=`<div class="demo-wrap"><div class="demo-label">🔵 Point Light — 移動光源衰減效果</div><canvas style="width:100%;display:block;height:260px"></canvas></div>
  <div class="slider-row"><label>📏 衰減係數</label><input type="range" min="1" max="100" value="10" id="pat" oninput="updPL()"><span class="slider-val" id="pvp">0.10</span></div>
  <div class="ctrl-row">
    <button class="ctrl-btn active" onclick="setPLM(9)">🔥 火焰模式</button>
  </div>`;

  const cv=cont.querySelector("canvas");
  function syncSize(){const w=cv.clientWidth||600;if(cv.width!==w||cv.height!==260){cv.width=w;cv.height=260;cv.style.height="260px";}return w/260;}
  syncSize();
  if(isMobile) window.addEventListener("resize",()=>syncSize());

  const g=cv.getContext("webgl"); if(!g) return;
  function mkS(t,s){const sh=g.createShader(t);g.shaderSource(sh,s);g.compileShader(sh);return sh;}
  function mkP(vs,fs){const p=g.createProgram();g.attachShader(p,mkS(g.VERTEX_SHADER,vs));g.attachShader(p,mkS(g.FRAGMENT_SHADER,fs));g.linkProgram(p);return p;}

  // Sphere geometry
  const ST=32,SL=40,vA=[],nA=[],iA=[];
  for(let a=0;a<=ST;a++){const phi=Math.PI*a/ST;for(let b=0;b<=SL;b++){const th=2*Math.PI*b/SL;const x=Math.sin(phi)*Math.cos(th),y=Math.cos(phi),z=Math.sin(phi)*Math.sin(th);vA.push(x*.79,y*.79,z*.79);nA.push(x,y,z);}}
  for(let a=0;a<ST;a++)for(let b=0;b<SL;b++){const p0=a*(SL+1)+b,q=p0+SL+1;iA.push(p0,q,p0+1,q,q+1,p0+1);}
  const vD=new Float32Array(vA),nD=new Float32Array(nA),iD=new Uint16Array(iA);
  function mkBuf(d,t){const b=g.createBuffer();g.bindBuffer(t,b);g.bufferData(t,d,g.STATIC_DRAW);return b;}
  const vB=mkBuf(vD,g.ARRAY_BUFFER),nB=mkBuf(nD,g.ARRAY_BUFFER),iB=mkBuf(iD,g.ELEMENT_ARRAY_BUFFER);

  const prog=mkP(
    // VS: Y-rotation + orthographic projection
    `attribute vec3 aPos;attribute vec3 aNor;
     varying vec3 vN;varying vec3 vW;
     uniform float asp;uniform float rotY;
     void main(){
       float cy=cos(rotY),sy=sin(rotY);
       vec3 rp=vec3(aPos.x*cy+aPos.z*sy, aPos.y, -aPos.x*sy+aPos.z*cy);
       vec3 rn=vec3(aNor.x*cy+aNor.z*sy, aNor.y, -aNor.x*sy+aNor.z*cy);
       vN=rn; vW=rp;
       gl_Position=vec4(rp.x*0.92/asp, rp.y*0.92+0.22, rp.z*0.1, 1.0);
     }`,
    `precision mediump float;
     varying vec3 vN; varying vec3 vW;
     uniform vec3 lP0,lP1,lP2, lC0,lC1,lC2;
     uniform float k; uniform int nL; uniform float flameAtt;

     // Fixed key light (directional, no attenuation) — always illuminates sphere front
     vec3 keyLight(vec3 N, vec3 P){
       vec3 L = normalize(vec3(-0.4, 0.6, 1.0));  // upper-left-front
       vec3 V = normalize(vec3(0.0, 0.0, 2.5) - P);
       vec3 H = normalize(L + V);
       float lambert = max(dot(N, L), 0.0);
       float spec    = pow(max(dot(N, H), 0.0), 96.0);
       vec3 base = vec3(0.85, 0.15, 0.15);
       return base * lambert * 1.8 + vec3(1.0,0.95,0.85) * spec * 2.2;
     }

     // Orbiting point light with attenuation — shows k slider effect
     vec3 pointLight(vec3 N, vec3 P, vec3 lPos, vec3 lCol){
       vec3 toL = lPos - P;
       float dist = max(length(toL), 0.001);
       vec3 L = normalize(toL);
       float lambert = max(dot(N, L), 0.0);
       vec3 V = normalize(vec3(0.0, 0.0, 2.5) - P);
       vec3 H = normalize(L + V);
       float spec = pow(max(dot(N, H), 0.0), 128.0);
       // k=0.01 bright, k=1.0 nearly dark
       float att = 1.0 / (1.0 + k*dist*2.0 + k*dist*dist*4.0);
       vec3 base = vec3(0.85, 0.15, 0.15);
       return (base * lCol * lambert * 3.5 + lCol * spec * 2.0) * att;
     }

     void main(){
       vec3 N = normalize(vN);
       vec3 base = vec3(0.85, 0.15, 0.15);

       // Hemisphere ambient
       float sky = N.y*0.5+0.5;
       vec3 amb = base * mix(vec3(0.05,0.02,0.02), vec3(0.28,0.10,0.10), sky);

       // Fire ground bounce: scales with attenuation — dimmer when k is high
       float groundFire = max(-N.y, 0.0);
       vec3 fireBounce = vec3(0.9, 0.35, 0.05) * groundFire * flameAtt * 1.8;

       // Fixed key light (always visible, shows glossiness)
       vec3 key = keyLight(N, vW);

       // Orbiting point lights (show attenuation)
       vec3 pts = pointLight(N, vW, lP0, lC0);
       if(nL>=2) pts += pointLight(N, vW, lP1, lC1);
       if(nL>=3) pts += pointLight(N, vW, lP2, lC2);

       gl_FragColor = vec4(clamp(amb + fireBounce + key + pts, 0.0, 1.0), 1.0);
     }`
  );

  g.useProgram(prog);
  const aPos=g.getAttribLocation(prog,"aPos"), aNor=g.getAttribLocation(prog,"aNor");
  const uAsp=g.getUniformLocation(prog,"asp"), uK=g.getUniformLocation(prog,"k"), uNL=g.getUniformLocation(prog,"nL"), uRotY=g.getUniformLocation(prog,"rotY");
  const uFlameAtt=g.getUniformLocation(prog,"flameAtt");
  const uLP=[0,1,2].map(i=>g.getUniformLocation(prog,"lP"+i));
  const uLC=[0,1,2].map(i=>g.getUniformLocation(prog,"lC"+i));

  // Light dot shader
  const dotP=mkP(
    `attribute vec2 p;uniform float asp;void main(){gl_Position=vec4(p.x*0.92/asp,p.y*0.92,0,1);gl_PointSize=14.0;}`,
    `precision mediump float;uniform vec3 col;void main(){float d=length(gl_PointCoord-0.5)*2.0;if(d>1.0)discard;gl_FragColor=vec4(col,1.0-d*0.3);}`
  );
  const haloP=mkP(
    `attribute vec2 p;uniform float asp;void main(){gl_Position=vec4(p.x*0.92/asp,p.y*0.92,0,1);gl_PointSize=36.0;}`,
    `precision mediump float;uniform vec3 col;void main(){float d=length(gl_PointCoord-0.5)*2.0;if(d>1.0)discard;gl_FragColor=vec4(col,(1.0-d)*(1.0-d)*0.4);}`
  );
  const dotAP=g.getAttribLocation(dotP,"p"), dotUC=g.getUniformLocation(dotP,"col"), dotAS=g.getUniformLocation(dotP,"asp");
  const haloAP=g.getAttribLocation(haloP,"p"), haloUC=g.getUniformLocation(haloP,"col"), haloAS=g.getUniformLocation(haloP,"asp");
  const ptBuf=g.createBuffer();

  g.enable(g.DEPTH_TEST);
  g.enable(g.BLEND); g.blendFunc(g.SRC_ALPHA, g.ONE_MINUS_SRC_ALPHA);

  const lCols=[[1.0,0.8,0.3],[0.3,0.6,1.0],[0.5,1.0,0.4]];
  // Lights orbit at r=1.4 in front hemisphere
  function lPos(i,t){
    const speed=[0.9,0.6,1.2][i], phase=[0,2.1,4.2][i];
    const a=t*speed+phase;
    const x=Math.cos(a)*1.2;
    const y=Math.sin(a)*0.9;
    const z=0.7; // always in front
    return [x,y,z];
  }

  // Flame: flickering position + intensity noise using sin harmonics
  function flameNoise(t,seed){
    return Math.sin(t*7.3+seed)*0.4 + Math.sin(t*13.1+seed*2.1)*0.2
         + Math.sin(t*23.7+seed*0.7)*0.1 + Math.sin(t*43.0+seed*3.3)*0.05;
  }
  function flamePos(t){
    // Flame hovers below sphere, flickers side-to-side
    const jx = flameNoise(t, 0)*0.18;
    const jy = flameNoise(t, 5)*0.12 - 0.80; // below sphere
    const jz = 0.55;
    return [jx, jy, jz];
  }
  function flameIntensity(t){
    return 1.0 + flameNoise(t,1)*0.45; // 0.55 ~ 1.45 flicker range
  }

  let kVal=0.10, nL=9, t=0;
  window.updPL=()=>{kVal=document.getElementById("pat").value/100;document.getElementById("pvp").textContent=kVal.toFixed(2);};
  window.setPLM=n=>{nL=n;cont.querySelectorAll(".ctrl-btn").forEach(b=>b.classList.remove("active"));event.target.classList.add("active");};

  function frame(){
    t+=0.016;
    const asp=syncSize();
    g.viewport(0,0,cv.width,cv.height);
    g.clearColor(0.04,0.03,0.09,1); g.clear(g.COLOR_BUFFER_BIT|g.DEPTH_BUFFER_BIT);

    // Flame mode (nL===9) vs normal mode
    const isFlame = nL===9;
    const lights = isFlame
      ? [flamePos(t), flamePos(t+1.1), flamePos(t+2.2)]
      : [0,1,2].map(i=>lPos(i,t));
    const flameMult = isFlame ? Math.max(0.7, flameIntensity(t)) : 1.0;
    const flameColors = isFlame ? [
      [1.0*flameMult, 0.55*flameMult, 0.05],
      [1.0*flameMult, 0.35*flameMult, 0.02],
      [0.9*flameMult, 0.65*flameMult, 0.08],
    ] : lCols;
    const activeLights = isFlame ? 3 : nL;

    // Draw sphere
    g.useProgram(prog);
    // Compute attenuation at sphere surface (dist≈0.79 from center) for fireBounce
    const flameDist=0.79+Math.abs(lights[0][1]+0.80);
    const flameAtt=1.0/(1.0+kVal*flameDist*2.0+kVal*flameDist*flameDist*4.0);
    g.uniform1f(uAsp,asp); g.uniform1f(uK,kVal); g.uniform1i(uNL,activeLights); g.uniform1f(uRotY,t*0.5);
    g.uniform1f(uFlameAtt, flameAtt);
    lights.forEach(([x,y,z],i)=>{g.uniform3f(uLP[i],x,y,z); g.uniform3f(uLC[i],...flameColors[i]);});
    g.bindBuffer(g.ARRAY_BUFFER,vB); g.enableVertexAttribArray(aPos); g.vertexAttribPointer(aPos,3,g.FLOAT,false,0,0);
    g.bindBuffer(g.ARRAY_BUFFER,nB); g.enableVertexAttribArray(aNor); g.vertexAttribPointer(aNor,3,g.FLOAT,false,0,0);
    g.bindBuffer(g.ELEMENT_ARRAY_BUFFER,iB);
    g.drawElements(g.TRIANGLES,iD.length,g.UNSIGNED_SHORT,0);

    // Draw halos & dots
    g.depthMask(false);
    for(let i=0;i<activeLights;i++){
      const [x,y]=lights[i];
      const d=new Float32Array([x,y]);
      g.bindBuffer(g.ARRAY_BUFFER,ptBuf); g.bufferData(g.ARRAY_BUFFER,d,g.DYNAMIC_DRAW);
      [haloP,dotP].forEach((p2,pi)=>{
        g.useProgram(p2);
        const ap=pi===0?haloAP:dotAP, uc=pi===0?haloUC:dotUC, as2=pi===0?haloAS:dotAS;
        g.enableVertexAttribArray(ap); g.vertexAttribPointer(ap,2,g.FLOAT,false,0,0);
        g.uniform3f(uc,...flameColors[i]); g.uniform1f(as2,asp);
        g.drawArrays(g.POINTS,0,1);
      });
    }
    g.depthMask(true);
    requestAnimationFrame(frame);
  }
  frame();
}

  const uasp=gl.getUniformLocation(p,"asp"),ul=gl.getUniformLocation(p,"layers"),ut2=gl.getUniformLocation(p,"t");
  gl.enable(gl.DEPTH_TEST);
  window.setMT=n=>{layers=n;cont.querySelectorAll(".ctrl-btn").forEach(b=>b.classList.remove("active"));event.target.classList.add("active");};
  function frame(){
    t+=.016;
    const asp=syncCV(cv,260);
    gl.viewport(0,0,cv.width,cv.height);
    gl.clearColor(.04,.03,.09,1);gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
    gl.uniform1f(uasp,asp);gl.uniform1i(ul,layers);gl.uniform1f(ut2,t);
    gl.drawArrays(gl.TRIANGLES,0,sph.count);requestAnimationFrame(frame);
  }
  frame();
  if(isMobile)window.addEventListener("resize",()=>syncCV(cv,260));
}

// 2-7: Reflection - Fresnel + env cube map simulation
function demoReflect(cont,isMobile){
  cont.innerHTML=`<div class="demo-wrap"><div class="demo-label">💎 Reflection — Fresnel 混合係數</div><canvas style="width:100%;display:block;height:260px"></canvas></div>
  <div class="slider-row"><label>💎 反射強度</label><input type="range" min="0" max="100" value="40" id="rfl" oninput="updRf()"><span class="slider-val" id="rvr">0.40</span></div>`;
  const cv=cont.querySelector("canvas");
  const gl=cv.getContext("webgl");if(!gl)return;
  let reflStrength=.4,t=0;
  const sph=setupSphere(gl,.88);
  const p=mkProg(gl,
    "attribute vec3 pos;attribute vec3 nor;varying vec3 vn;varying vec3 vr;uniform float asp;uniform float t;void main(){float cy=cos(t*.3),sy=sin(t*.3);vec3 rpos=vec3(pos.x*cy+pos.z*sy,pos.y,-pos.x*sy+pos.z*cy);vec3 rnor=vec3(nor.x*cy+nor.z*sy,nor.y,-nor.x*sy+nor.z*cy);vn=rnor;vec3 viewDir=normalize(vec3(0,0,1)-rpos);vr=reflect(-viewDir,rnor);gl_Position=vec4(rpos.x*0.92/asp,rpos.y*0.92,rpos.z*.01,1.);}",
    "precision mediump float;varying vec3 vn;varying vec3 vr;uniform float rfl;void main(){vec3 n=normalize(vn);vec3 l=normalize(vec3(1,1.5,2));float d=max(dot(n,l),0.);vec3 base=vec3(.88,.27,.27)*(.2+d*.8);vec3 r=normalize(vr);float envR=.5+.5*sin(r.x*4.+r.y*3.);float envG=.5+.5*cos(r.y*4.+r.z*2.);float envB=.5+.5*sin(r.z*5.+r.x*2.);vec3 env=vec3(envR,envG,envB);gl_FragColor=vec4(mix(base,env,rfl),1.);}");
  gl.useProgram(p);
  const ap=gl.getAttribLocation(p,"pos"),an=gl.getAttribLocation(p,"nor");
  gl.enableVertexAttribArray(ap);gl.vertexAttribPointer(ap,3,gl.FLOAT,false,24,0);
  gl.enableVertexAttribArray(an);gl.vertexAttribPointer(an,3,gl.FLOAT,false,24,12);
  const uasp=gl.getUniformLocation(p,"asp"),urfl=gl.getUniformLocation(p,"rfl"),ut2=gl.getUniformLocation(p,"t");
  gl.enable(gl.DEPTH_TEST);
  window.updRf=()=>{reflStrength=document.getElementById("rfl").value/100;document.getElementById("rvr").textContent=reflStrength.toFixed(2);};
  function frame(){
    t+=.016;
    const asp=syncCV(cv,260);
    gl.viewport(0,0,cv.width,cv.height);
    gl.clearColor(.04,.03,.09,1);gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
    gl.uniform1f(uasp,asp);gl.uniform1f(urfl,reflStrength);gl.uniform1f(ut2,t);
    gl.drawArrays(gl.TRIANGLES,0,sph.count);requestAnimationFrame(frame);
  }
  frame();
  if(isMobile)window.addEventListener("resize",()=>syncCV(cv,260));
}

// 2-8: Fog effect
function demoFog(cont,isMobile){
  cont.innerHTML=`<div class="demo-wrap"><div class="demo-label">🌫️ Fog — 遠處球體消失在霧中</div><canvas style="width:100%;display:block;height:260px"></canvas></div>
  <div class="slider-row"><label>🌫️ 霧濃度</label><input type="range" min="0" max="100" value="40" id="fdn" oninput="updFog()"><span class="slider-val" id="fvd">0.40</span></div>
  <div class="ctrl-row">
    <button class="ctrl-btn active" onclick="setFogT(0)">📏 線性霧</button>
    <button class="ctrl-btn" onclick="setFogT(1)">🌊 指數霧</button>
  </div>`;

  const cv=cont.querySelector("canvas");
  function syncSize(){const w=cv.clientWidth||600;if(cv.width!==w||cv.height!==260){cv.width=w;cv.height=260;cv.style.height="260px";}return w/260;}
  syncSize();
  if(isMobile)window.addEventListener("resize",()=>syncSize());

  const g=cv.getContext("webgl");if(!g)return;
  function mkS(t,s){const sh=g.createShader(t);g.shaderSource(sh,s);g.compileShader(sh);return sh;}
  function mkP(vs,fs){const p=g.createProgram();g.attachShader(p,mkS(g.VERTEX_SHADER,vs));g.attachShader(p,mkS(g.FRAGMENT_SHADER,fs));g.linkProgram(p);return p;}

  // Unit sphere geometry
  const ST=28,SL=36,vA=[],nA=[],iA=[];
  for(let a=0;a<=ST;a++){const phi=Math.PI*a/ST;for(let b=0;b<=SL;b++){const th=2*Math.PI*b/SL;const x=Math.sin(phi)*Math.cos(th),y=Math.cos(phi),z=Math.sin(phi)*Math.sin(th);vA.push(x,y,z);nA.push(x,y,z);}}
  for(let a=0;a<ST;a++)for(let b=0;b<SL;b++){const p0=a*(SL+1)+b,q=p0+SL+1;iA.push(p0,q,p0+1,q,q+1,p0+1);}
  const vD=new Float32Array(vA),nD=new Float32Array(nA),iD=new Uint16Array(iA);
  function mkBuf(d,t){const b=g.createBuffer();g.bindBuffer(t,b);g.bufferData(t,d,g.STATIC_DRAW);return b;}
  const vB=mkBuf(vD,g.ARRAY_BUFFER),nB=mkBuf(nD,g.ARRAY_BUFFER),iB=mkBuf(iD,g.ELEMENT_ARRAY_BUFFER);

  // VS: true perspective projection — same radius, different Z = different apparent size
  const prog=mkP(
    `attribute vec3 aPos;attribute vec3 aNor;
     varying vec3 vN;varying float vFog;
     uniform float asp;
     uniform vec3 sPos;    // sphere world position
     uniform float radius;
     uniform float fogD;
     uniform int fogT;
     void main(){
       vec3 wp = aPos*radius + sPos;
       vN = aNor;
       // Fog based on sphere depth (sPos.z, more negative = farther)
       float depth = -sPos.z;
       if(fogT==0){
         float fogEnd = max(0.5, (1.0-fogD)*12.0);
         vFog = clamp((depth-1.0)/fogEnd, 0.0, 1.0);
       } else {
         vFog = clamp(1.0-exp(-fogD*depth*0.5), 0.0, 1.0);
       }
       // Perspective: camera at z=0, scene at negative z
       float fov=0.55;
       float pz = -wp.z;
       gl_Position = vec4(
         wp.x/pz*fov/asp,
         wp.y/pz*fov,
         ((-wp.z-0.5)/15.0)*2.0-1.0,
         1.0
       );
     }`,
    `precision mediump float;
     varying vec3 vN;varying float vFog;
     uniform vec3 baseCol;
     void main(){
       vec3 N=normalize(vN);
       vec3 L=normalize(vec3(0.5,0.8,0.5));
       float diff=max(dot(N,L),0.0);
       vec3 H=normalize(L+vec3(0,0,1));
       float spec=pow(max(dot(N,H),0.0),64.0);
       vec3 lit=baseCol*(0.22+diff*0.78)+vec3(1.0,0.95,0.9)*spec*0.55;
       vec3 fogCol=vec3(0.14,0.12,0.18);
       gl_FragColor=vec4(mix(lit,fogCol,vFog),1.0);
     }`
  );

  g.useProgram(prog);
  const aPos=g.getAttribLocation(prog,"aPos"),aNor=g.getAttribLocation(prog,"aNor");
  const uAsp=g.getUniformLocation(prog,"asp");
  const uSPos=g.getUniformLocation(prog,"sPos");
  const uRad=g.getUniformLocation(prog,"radius");
  const uCol=g.getUniformLocation(prog,"baseCol");
  const uFogD=g.getUniformLocation(prog,"fogD");
  const uFogT=g.getUniformLocation(prog,"fogT");

  g.enable(g.DEPTH_TEST);

  // 3 identical spheres at different Z depths — perspective makes them look different sizes
  const SPHERES=[
    {pos:[0.0, 0.0, -2.0],  col:[0.88,0.22,0.22]},  // near: appears large
    {pos:[0.0, 0.0, -5.0],  col:[0.25,0.55,0.88]},  // mid
    {pos:[0.0, 0.0, -11.0], col:[0.25,0.78,0.42]},  // far: appears small
  ];
  const RADIUS=1.50;

  let fogD=0.40,fogT=0;
  window.updFog=()=>{fogD=document.getElementById("fdn").value/100;document.getElementById("fvd").textContent=fogD.toFixed(2);};
  window.setFogT=n=>{fogT=n;cont.querySelectorAll(".ctrl-btn").forEach(b=>b.classList.remove("active"));event.target.classList.add("active");};

  function frame(){
    const asp=syncSize();
    g.viewport(0,0,cv.width,cv.height);
    g.clearColor(0.14,0.12,0.18,1.0);
    g.clear(g.COLOR_BUFFER_BIT|g.DEPTH_BUFFER_BIT);
    g.useProgram(prog);
    g.uniform1f(uAsp,asp);
    g.uniform1f(uRad,RADIUS);
    g.uniform1f(uFogD,fogD);
    g.uniform1i(uFogT,fogT);

    g.bindBuffer(g.ARRAY_BUFFER,vB);g.enableVertexAttribArray(aPos);g.vertexAttribPointer(aPos,3,g.FLOAT,false,0,0);
    g.bindBuffer(g.ARRAY_BUFFER,nB);g.enableVertexAttribArray(aNor);g.vertexAttribPointer(aNor,3,g.FLOAT,false,0,0);
    g.bindBuffer(g.ELEMENT_ARRAY_BUFFER,iB);

    // Draw back to front
    [...SPHERES].reverse().forEach(({pos,col})=>{
      g.uniform3f(uSPos,...pos);
      g.uniform3f(uCol,...col);
      g.drawElements(g.TRIANGLES,iD.length,g.UNSIGNED_SHORT,0);
    });
    requestAnimationFrame(frame);
  }
  frame();
}
