<!DOCTYPE html>
<html lang="zh-TW">
<head>

<script>
// ── Device Detection (runs before page renders) ──
(function(){
  var ua=navigator.userAgent;
  var w=window.innerWidth||screen.width;
  var isMobile=/iPhone|iPad|iPod|Android|Mobile/i.test(ua)||w<=768;
  var isIOS=/iPhone|iPad|iPod/i.test(ua);
  var size=w<=390?'xs':w<=430?'sm':w<=768?'md':'lg';
  document.documentElement.setAttribute('data-device',isMobile?'mobile':'desktop');
  document.documentElement.setAttribute('data-size',size);
  if(isIOS)document.documentElement.classList.add('ios');
  window.DEV={isMobile:isMobile,isIOS:isIOS,size:size,W:w};
})();
</script>

<style id="device-css">
/* ── Desktop defaults (no change) ── */
[data-device="desktop"] {}

/* ── Mobile: hide desktop-only elements ── */
[data-device="mobile"] .desktop-only { display:none !important; }
[data-device="desktop"] .mobile-only { display:none !important; }

/* ── Mobile layout switches ── */
[data-device="mobile"] .main {
  flex-direction: column !important;
}
/* Left panel → bottom drawer on mobile */
[data-device="mobile"] .lp,
[data-device="mobile"] .lpanel,
[data-device="mobile"] .instr-panel {
  width: 100% !important;
  max-height: 44vh !important;
  min-height: 44vh !important;
  border-right: none !important;
  border-top: 2px solid var(--border, #333) !important;
  order: 2 !important;
  flex-shrink: 0 !important;
  overflow: hidden !important;
}
/* Right panel → hidden on mobile */
[data-device="mobile"] .rp,
[data-device="mobile"] .rpanel,
[data-device="mobile"] .right-panel { display: none !important; }

/* Viewport → top half on mobile */
[data-device="mobile"] .viewport {
  flex: 1 !important;
  order: 1 !important;
  min-height: 0 !important;
}

/* Topbar compact */
[data-device="mobile"] .tb-crumb { display: none !important; }
[data-device="mobile"] .topbar { height: 38px !important; }
[data-device="mobile"] .tb-logo { font-size: .85rem !important; padding: 0 10px !important; }

/* Chapter tabs */
[data-device="mobile"] .chtabs,
[data-device="mobile"] .chapter-tabs { height: 30px !important; }
[data-device="mobile"] .cht,
[data-device="mobile"] .ch-tab { font-size: .55rem !important; }

/* Step content */
[data-device="mobile"] .stit,
[data-device="mobile"] .step-title { font-size: .95rem !important; }
[data-device="mobile"] .desc,
[data-device="mobile"] .step-desc { font-size: .76rem !important; line-height: 1.6 !important; }
[data-device="mobile"] .lbody,
[data-device="mobile"] .instr-body { padding: 10px 12px !important; }

/* Buttons */
[data-device="mobile"] .abtn { padding: 10px !important; font-size: .9rem !important; }
[data-device="mobile"] .kh { padding: 6px 9px !important; margin-bottom: 6px !important; }
[data-device="mobile"] .ck { padding: 6px 8px !important; font-size: .74rem !important; }
[data-device="mobile"] .sdesc,
[data-device="mobile"] .desc { margin-bottom: 10px !important; }

/* Hint bar */
[data-device="mobile"] .vp-hint { font-size: .58rem !important; padding: 5px 12px !important; }

/* Sliders */
[data-device="mobile"] input[type=range] { width: 100% !important; }

/* Index page */
[data-device="mobile"] .nav-links { display: none !important; }
[data-device="mobile"] .hero { flex-direction: column !important; padding: 18px 14px !important; gap: 12px !important; min-height: auto !important; }
[data-device="mobile"] .hero-stats { display: none !important; }
[data-device="mobile"] .hero-title { font-size: 1.35rem !important; }
[data-device="mobile"] .hero-sub { font-size: .78rem !important; }
[data-device="mobile"] .cat-tab { font-size: .72rem !important; padding: 10px 9px !important; }
[data-device="mobile"] .c-card { min-width: 165px !important; max-width: 165px !important; }
[data-device="mobile"] .c-card-wide { min-width: 220px !important; max-width: 220px !important; }
[data-device="mobile"] .c-thumb { height: 105px !important; }
[data-device="mobile"] .c-title { font-size: .78rem !important; }
[data-device="mobile"] .course-entry-strip { gap: 8px !important; }
[data-device="mobile"] .entry-pill { min-width: 130px !important; padding: 9px 11px !important; }

/* Blender hub */
[data-device="mobile"] .hero { flex-direction: column !important; padding: 18px 14px 20px !important; }
[data-device="mobile"] .hero-progress { margin-left: 0 !important; width: 100% !important; text-align: center !important; }
[data-device="mobile"] .lc-desc,
[data-device="mobile"] .lc-skills { display: none !important; }
[data-device="mobile"] .play-btn { font-size: .75rem !important; padding: 6px 12px !important; }

/* World map */
[data-device="mobile"] .tech-strip { padding: 5px 8px !important; gap: 4px !important; flex-wrap: wrap !important; }
[data-device="mobile"] .tech-badge { font-size: .5rem !important; padding: 2px 5px !important; }
[data-device="mobile"] .progress-strip { right: 8px !important; }
[data-device="mobile"] .prog-name { font-size: .7rem !important; }
[data-device="mobile"] .prog-xp { display: none !important; }
[data-device="mobile"] .popup { width: 95vw !important; }
[data-device="mobile"] .popup.show { bottom: 12px !important; }
[data-device="mobile"] .hint-bar { bottom: 90px !important; font-size: .58rem !important; }

/* Build progress (level6) */
[data-device="mobile"] .build-progress { height: 36px !important; padding: 0 6px !important; }
[data-device="mobile"] .bp-step { padding: 0 5px !important; font-size: .52rem !important; }
[data-device="mobile"] .bp-step::after { display: none !important; }

/* iOS safe area */
.ios body { padding-bottom: env(safe-area-inset-bottom) !important; }
</style>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TA HUB — 技術美術精品課程</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Zen+Maru+Gothic:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;}
:root{
  /* ── 三鷹之森 吉卜力美術館 配色 ── */
  --nav:#2e4228;        /* 深森林苔綠：導覽列 */
  --nav2:#1e2e18;       /* 更深林綠：border */
  --nav-txt:#e4edd8;    /* 嫩葉白：nav文字 */
  --bg:#f0ebe0;         /* 暖奶茶：主背景 */
  --surf:#f8f4ea;       /* 象牙白：卡片表面 */
  --surf2:#ede7d8;      /* 米亞麻：次表面 */
  --bdr:#c8c0a8;        /* 亞麻邊框 */
  --bdr2:#ddd5c0;       /* 淡米邊框 */
  --txt:#2a1e0e;        /* 深茶棕：主文字 */
  --muted:#5a5040;      /* 暗橡木：次文字 */
  --muted2:#8a806a;     /* 舊木頭：輔助文字 */
  --acc:#b85c2a;        /* 橡實橙棕：強調 */
  --acc-hover:#9a4a20;  /* 深橡實 */
  --acc-green:#4a7030;  /* 森林綠 */
  --teal:#3d5a3a;       /* 苔蘚深綠 */
  --gold:#c87820;       /* 秋葉金 */
  --leaf:#8ab040;       /* 新芽綠 */
  --white:#fffff8;      /* 微暖白 */
}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
  background:var(--bg);
  color:var(--txt);
  font-family:'Zen Maru Gothic',sans-serif;
  font-weight:500;
  min-height:100dvh;
  display:flex;flex-direction:column;
  overflow-x:hidden;
}

/* ════════════════════ NAV ════════════════════ */
/* sticky wrapper */
.sticky-top{
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(30,52,16,.1);
}
nav{
  background:#fff;
  border-bottom:1px solid var(--bdr);
  padding:0 32px;
  height:60px;
  display:flex;align-items:center;gap:20px;
}
.logo{
  font-family:'Fredoka One',sans-serif;
  font-size:1.3rem;color:var(--teal);
  letter-spacing:.05em;
  display:flex;align-items:center;gap:8px;
  text-decoration:none;flex-shrink:0;
}
.logo-leaf{font-size:1.1rem;}

.nav-links{display:flex;align-items:center;gap:4px;}
.nav-link{
  font-size:.82rem;color:var(--muted);
  padding:6px 12px;border-radius:6px;
  cursor:pointer;text-decoration:none;
  transition:all .15s;white-space:nowrap;
  font-weight:500;
}
.nav-link:hover{color:var(--teal);background:rgba(61,90,58,.07);}

.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--bg);
  border:1px solid var(--bdr);
  border-radius:100px;padding:7px 16px;
  width:220px;transition:.2s;
}
.search-box:focus-within{border-color:var(--teal);background:#fff;}
.search-box input{background:none;border:none;outline:none;font-size:.8rem;color:var(--txt);width:100%;}
.search-box input::placeholder{color:var(--muted2);}
.search-icon{color:var(--muted2);font-size:.85rem;}
.nav-cart{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);border:1px solid var(--bdr);
  cursor:pointer;font-size:1rem;position:relative;
  transition:all .15s;
}
.nav-cart:hover{background:#fff;border-color:var(--teal);}
.cart-badge{
  position:absolute;top:-2px;right:-2px;
  width:15px;height:15px;border-radius:50%;
  background:var(--acc);color:#fff;
  font-size:.6rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;
  border:2px solid #fff;
}
.btn-login{
  font-size:.8rem;font-weight:600;
  padding:8px 18px;border-radius:100px;
  border:1.5px solid var(--bdr);
  background:#fff;color:var(--txt);
  cursor:pointer;transition:.15s;
}
.btn-login:hover{border-color:var(--teal);color:var(--teal);}
.btn-signup{
  font-size:.8rem;font-weight:700;
  padding:8px 18px;border-radius:100px;
  background:var(--acc-green);color:#fff;
  border:none;cursor:pointer;transition:.2s;
}
.btn-signup:hover{background:#2e4228;box-shadow:0 4px 12px rgba(61,90,58,.3);}

/* ════════════════════ CATEGORY BAR ════════════════════ */
.cat-bar{
  background:#fff;
  border-bottom:2px solid var(--bdr);
  padding:0 32px;
  display:flex;align-items:center;
  overflow-x:auto;flex-shrink:0;
  gap:2px;
}
.cat-bar::-webkit-scrollbar{height:0;}
.cat-tab{
  font-size:.84rem;font-weight:600;
  color:var(--muted);
  padding:14px 16px;
  border:none;background:none;cursor:pointer;
  border-bottom:2.5px solid transparent;
  margin-bottom:-2px;white-space:nowrap;
  transition:all .18s;
  display:flex;align-items:center;gap:6px;
  letter-spacing:.01em;
}
.cat-tab:hover{color:var(--teal);}
.cat-tab.active{color:var(--teal);border-bottom-color:var(--acc);font-weight:700;}

/* sub pills */
.sub-bar{
  background:#f8f4ea;
  border-bottom:1px solid var(--bdr);
  padding:0 32px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  max-height:0;overflow:hidden;
  transition:max-height .32s cubic-bezier(.4,0,.2,1),padding .28s ease;
}
.sub-bar.open{max-height:80px;padding:10px 32px;}
.pill{
  font-size:.78rem;font-weight:600;
  color:#2a1e0e;
  background:#f0ebe0;
  border:1.5px solid #b8a888;
  border-radius:100px;padding:5px 14px;cursor:pointer;
  transition:all .18s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;white-space:nowrap;
}
.pill::after{
  content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);
  transform:skewX(-15deg);transition:none;pointer-events:none;
}
.pill:hover{
  transform:translateY(-2px) scale(1.06);
  background:#c8e890;color:#2a1e0e;
  border-color:#4a7030;
  box-shadow:0 0 0 1px #4a7030,0 4px 10px rgba(74,112,48,.25);
}
.pill:hover::after{left:140%;transition:left .38s ease;}
.pill:active{transform:scale(.95);transition:all .07s;}
.pill.on{background:var(--teal);color:#d8f5e8;border-color:var(--teal);}
.pill.on:hover{background:#2e4228;color:#d8f5e8;transform:translateY(-2px) scale(1.04);}

/* ════════════════════ HERO BANNER ════════════════════ */
.hero{
  background:linear-gradient(135deg,#2a1e0e 0%,#2e4228 50%,#1a3830 100%);
  padding:40px 32px;
  display:flex;align-items:center;gap:32px;
  position:relative;overflow:hidden;min-height:200px;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(138,176,64,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(138,176,64,.05) 1px,transparent 1px);
  background-size:32px 32px;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(184,92,42,.2);
  border:1px solid rgba(184,92,42,.5);
  border-radius:100px;padding:4px 12px;
  font-family:'Space Mono',monospace;
  font-size:.65rem;color:#f0b090;letter-spacing:.06em;
  margin-bottom:12px;
}
.hero-title{
  font-family:'Fredoka One',sans-serif;
  font-size:2rem;color:#f0f8ec;
  letter-spacing:-.01em;line-height:1.2;
  margin-bottom:8px;
}
.hero-sub{
  font-size:.88rem;color:rgba(216,240,232,.65);
  max-width:44ch;line-height:1.7;margin-bottom:20px;
}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap;}
.hbtn-p{
  font-family:'Fredoka One',sans-serif;font-size:.88rem;
  background:#c8e890;color:#2a1e0e;
  padding:10px 22px;border-radius:100px;
  border:none;cursor:pointer;text-decoration:none;
  transition:.2s;display:inline-flex;align-items:center;gap:6px;
}
.hbtn-p:hover{background:#b8e888;transform:translateY(-1px);box-shadow:0 4px 14px rgba(74,112,48,.3);}
.hbtn-s{
  font-family:'Fredoka One',sans-serif;font-size:.88rem;
  background:transparent;color:#d8f0e8;
  padding:10px 22px;border-radius:100px;
  border:1.5px solid rgba(255,255,255,.25);cursor:pointer;text-decoration:none;
  transition:.2s;display:inline-flex;align-items:center;gap:6px;
}
.hbtn-s:hover{background:rgba(255,255,255,.1);}
.hero-stats{
  display:flex;gap:28px;margin-left:auto;flex-shrink:0;
  padding:20px 24px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:16px;
  backdrop-filter:blur(8px);
}
.hero-stat{text-align:center;}
.hero-stat-num{
  font-family:'Fredoka One',sans-serif;
  font-size:1.6rem;color:#c8e890;letter-spacing:-.01em;
  line-height:1.1;
}
.hero-stat-lbl{
  font-family:'Space Mono',monospace;
  font-size:.62rem;color:rgba(216,240,232,.5);
  letter-spacing:.06em;text-transform:uppercase;margin-top:3px;
}

/* ════════════════════ PAGE BODY ════════════════════ */
.page{max-width:1440px;margin:0 auto;padding:0 32px 48px;width:100%;}

/* ════════════════════ SECTION ════════════════════ */
.section{margin-top:40px;}
.sec-hdr{
  display:flex;align-items:baseline;gap:10px;
  margin-bottom:18px;
  padding-bottom:12px;
  border-bottom:1.5px solid var(--bdr);
}
.sec-title{
  font-family:'Fredoka One',sans-serif;
  font-size:1.15rem;color:var(--txt);letter-spacing:.01em;
}
/* sat.cool inline count style */
.sec-meta{
  font-family:'Space Mono',monospace;
  font-size:.68rem;color:var(--muted2);letter-spacing:.04em;
}
.sec-more{
  margin-left:auto;
  font-size:.78rem;color:var(--teal);font-weight:600;
  cursor:pointer;text-decoration:none;
  display:flex;align-items:center;gap:4px;
  transition:.15s;
}
.sec-more:hover{color:#2e4228;}

/* ════════════════════ CARD ROW — sat.cool style horizontal scroll ════════════════════ */
.card-row{
  display:flex;gap:14px;
  overflow-x:auto;
  padding-bottom:8px;
  scroll-snap-type:x mandatory;
}
.card-row::-webkit-scrollbar{height:4px;}
.card-row::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px;}

/* ── Course Card ── */
.c-card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--bdr);
  min-width:230px;max-width:230px;
  cursor:pointer;
  scroll-snap-align:start;
  transition:all .2s;
  flex-shrink:0;
}
.c-card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 28px rgba(30,52,16,.12);
  border-color:#c8c0a8;
}
.c-thumb{
  height:136px;
  display:flex;align-items:center;justify-content:center;
  font-size:2.8rem;
  position:relative;overflow:hidden;
}
.c-thumb.g1{background:linear-gradient(135deg,#d4f0a8,#a8d878);}
.c-thumb.g2{background:linear-gradient(135deg,#b8d4f0,#88b8e8);}
.c-thumb.g3{background:linear-gradient(135deg,#f0d0a8,#e8b878);}
.c-thumb.g4{background:linear-gradient(135deg,#d8c8f0,#b8a0e0);}
.c-thumb.g5{background:linear-gradient(135deg,#f0c8d0,#e0a0b0);}
.c-thumb.g6{background:linear-gradient(135deg,#c8f0e8,#90d8c8);}

/* sat.cool style: badge overlay on thumb */
.c-badge{
  position:absolute;top:10px;left:10px;
  font-family:'Space Mono',monospace;font-size:.62rem;font-weight:700;
  padding:3px 9px;border-radius:100px;letter-spacing:.04em;
}
.cb-fund{background:#b85c2a;color:#fff;}
.cb-sale{background:#c87820;color:#fff;}
.cb-hot{background:#3d5a3a;color:#fff;}
.cb-new{background:#3d6a28;color:#fff;}
.cb-soon{background:rgba(30,52,16,.6);color:#d8f0e8;backdrop-filter:blur(4px);}

/* fundraising progress */
.fund-bar{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.2);height:3px;
}
.fund-fill{height:100%;background:linear-gradient(90deg,#8ab040,#c8e890);border-radius:2px;}

.c-body{padding:12px 14px 14px;}
.c-title{
  font-size:.88rem;font-weight:700;color:var(--txt);
  line-height:1.45;margin-bottom:6px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.c-teacher{
  font-family:'Space Mono',monospace;
  font-size:.65rem;color:var(--muted2);
  letter-spacing:.03em;margin-bottom:10px;
}
.c-price{display:flex;align-items:baseline;gap:6px;margin-bottom:8px;}
.c-price-now{
  font-family:'Fredoka One',sans-serif;
  font-size:1rem;color:var(--acc);letter-spacing:.01em;
}
.c-price-ori{
  font-family:'Space Mono',monospace;
  font-size:.68rem;color:var(--muted2);
  text-decoration:line-through;
}
.c-footer{
  display:flex;align-items:center;gap:8px;
  font-family:'Space Mono',monospace;
  font-size:.63rem;color:var(--muted2);letter-spacing:.03em;
}
.c-dot{width:3px;height:3px;border-radius:50%;background:var(--bdr);}

/* fundraising reached */
.fund-reached{
  font-family:'Space Mono',monospace;
  font-size:.62rem;color:#3d6a28;font-weight:700;
  background:rgba(61,106,40,.1);
  border-radius:4px;padding:1px 6px;letter-spacing:.03em;
}

/* ── Wide card (募資 highlight) ── */
.c-card-wide{
  background:#fff;border-radius:14px;overflow:hidden;
  border:1px solid var(--bdr);
  min-width:300px;max-width:300px;
  cursor:pointer;scroll-snap-align:start;
  transition:all .2s;flex-shrink:0;
}
.c-card-wide:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(30,52,16,.12);border-color:#c8c0a8;}
.c-card-wide .c-thumb{height:175px;font-size:3.5rem;}

/* ════════════════════ NEWS STRIP ════════════════════ */
.news-strip{
  background:linear-gradient(90deg,#2e4228,#3d5a3a);
  border-radius:12px;padding:16px 24px;
  display:flex;align-items:center;gap:16px;
  margin-top:24px;overflow:hidden;
}
.news-label{
  font-family:'Space Mono',monospace;font-size:.65rem;
  color:#c8e890;letter-spacing:.08em;text-transform:uppercase;
  flex-shrink:0;background:rgba(200,240,160,.15);
  padding:3px 8px;border-radius:4px;
}
.news-items{
  display:flex;gap:24px;overflow-x:auto;flex:1;
}
.news-items::-webkit-scrollbar{height:0;}
.news-item{
  font-size:.82rem;color:rgba(216,240,232,.8);
  white-space:nowrap;cursor:pointer;transition:.15s;
}
.news-item:hover{color:#d8f0e8;}
.news-item span{color:#c8e890;margin-right:8px;font-family:'Space Mono',monospace;font-size:.7rem;}

/* ════════════════════ EMPTY STATE ════════════════════ */
.empty-state{
  text-align:center;padding:40px 0;
  font-family:'Space Mono',monospace;
  font-size:.78rem;color:var(--muted2);letter-spacing:.04em;

function cardHTML(c,wide){
  const cls = wide ? 'c-card-wide' : 'c-card';
  const linkOpen  = c.link ? `<a href="${c.link}" style="text-decoration:none;display:block;color:inherit;">` : '';
  const linkClose = c.link ? '</a>' : '';
  const priceHTML = c.now==='免費'
    ? `<div class="c-price"><span class="c-price-now" style="color:var(--teal)">🌱 免費入門</span></div>`
    : `<div class="c-price"><span class="c-price-now">${c.now}</span>${c.ori?`<span class="c-price-ori">${c.ori}</span>`:''}</div>`;
  const footerHTML = c.students
    ? `<div class="c-footer"><span>👥 ${c.students}</span><div class="c-dot"></div><span>⏱ ${c.hours}</span></div>`
    : c.countdown
      ? `<div class="c-footer" style="color:var(--acc)">${c.countdown}</div>`
      : c.fundPct
        ? `<div class="c-footer"><span class="fund-reached">✦ ${c.fundPct}</span></div>`
        : '';
  return linkOpen+`<div class="${cls}"
    <div class="c-thumb ${c.bg}">
      ${c.icon}
      <div class="c-badge ${c.badge}">${c.badgeTxt}</div>
      ${c.fundPct?`<div class="fund-bar"><div class="fund-fill" style="width:${Math.min(100,parseInt(c.fundPct))}%"></div></div>`:''}
    </div>
    <div class="c-body">
      <div class="c-title">${c.title}</div>
      <div class="c-teacher">${c.teacher}</div>
      ${priceHTML}
      ${footerHTML}
    </div>
  </div>`+linkClose;
}

function sectionHTML(title, items, wide=false){
  if(!items||items.length===0) return '';
  return `<div class="section">
    <div class="sec-hdr">
      <span class="sec-title">${title}</span>
      <span class="sec-meta">${items.length} 個課程</span>
      <a class="sec-more" href="#">全部查看 →</a>
    </div>
    <div class="card-row">${items.map(c=>cardHTML(c,wide)).join('')}</div>
  </div>`;
}

function newsStripHTML(items){
  if(!items||items.length===0) return '';
  return `<div class="news-strip">
    <div class="news-label">📡 最新消息</div>
    <div class="news-items">${items.map(n=>`<div class="news-item"><span>[${n.tag}]</span>${n.text}</div>`).join('')}</div>
  </div>`;
}

function renderCat(cat){
  const d=DB[cat];
  let html='';

  // ── Course entry shortcuts per category ──
  const ENTRIES = {
    opengl:[
      {icon:'🌱',name:'像素王國',meta:'OpenGL 入門 · 10 關',link:'opengl-seed.html',free:true},
      {icon:'🏰',name:'OpenGL 城堡',meta:'進階版 · 9 關',link:'opengl-map.html',free:false},
    ],
    directx:[
      {icon:'⚔️',name:'DirectX 要塞',meta:'DX11 入門 · 9 關',link:'dx-level1.html',free:false},
      {icon:'🗺️',name:'DX 關卡地圖',meta:'全覽 · 9 城',link:'dx-map.html',free:false},
    ],
    blender:[
      {icon:'🏗️',name:'Blender 關卡地圖',meta:'建模入門 · 6 關',link:'blender-hub.html',free:false},
      {icon:'🟠',name:'關卡 1 直接開始',meta:'介面 · 視角 · Cube',link:'blender-level1.html',free:true},
    ],
  };
  if(ENTRIES[cat]){
    html+=`<div class="course-entry-strip">
      ${ENTRIES[cat].map(e=>`
        <a href="${e.link}" class="entry-pill${e.free?' free':''}">
          <span class="entry-pill-icon">${e.icon}</span>
          <span class="entry-pill-text">
            <span class="entry-pill-name">${e.name}</span>
            <span class="entry-pill-meta">${e.meta}</span>
          </span>
          <span class="entry-pill-badge">${e.free?'免費':'▶ 進入'}</span>
        </a>`).join('')}
    </div>`;
  }

  if(d.news_strip?.length) html+=newsStripHTML(d.news_strip);
  if(d.fund?.length)  html+=sectionHTML('🚀 募資課程',d.fund,true);
  if(d.sale?.length)  html+=sectionHTML('⏰ 限時優惠',d.sale);
  if(d.hot?.length)   html+=sectionHTML('🔥 熱門課程',d.hot);
  if(!d.fund?.length&&!d.sale?.length&&!d.hot?.length){
    html+=`<div class="section"><div class="empty-state">— 此分類最新消息詳見上方快訊 —</div></div>`;
  }
  document.getElementById('page-body').innerHTML=html;
}

function renderPills(cat){
  const bar=document.getElementById('sub-bar');
  bar.innerHTML=(PILLS[cat]||[]).map((p,i)=>
    `<button class="pill${i===0?' on':''}" onclick="selPill(this)">${p}</button>`
  ).join('');
  bar.classList.add('open');
  activePill=bar.querySelector('.pill.on');
}

function setCat(tabEl,cat){
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  tabEl.classList.add('active');
  renderPills(cat);
  renderCat(cat);
}

function selPill(el){
  if(activePill)activePill.classList.remove('on');
  el.classList.add('on');activePill=el;
}

// init
renderPills('blender');
renderCat('blender');

// ── Index Mobile Adjustments ──
if(DEV.isMobile){
  // Add a mobile bottom nav bar
  const mobileNav = document.createElement('div');
  mobileNav.style.cssText='position:fixed;bottom:0;left:0;right:0;height:56px;background:#2e4228;border-top:1px solid #3d5a3a;display:flex;align-items:stretch;z-index:200;padding-bottom:env(safe-area-inset-bottom)';
  const navItems=[
    {icon:'🏠',label:'首頁',href:'#'},
    {icon:'🌱',label:'像素王國',href:'opengl-seed.html'},
    {icon:'🏰',label:'OpenGL',href:'opengl-map.html'},
    {icon:'⚔️',label:'DirectX',href:'dx-map.html'},
    {icon:'🟠',label:'Blender',href:'blender-hub.html'},
  ];
  navItems.forEach(item=>{
    const a=document.createElement('a');
    a.href=item.href;
    a.style.cssText='flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-decoration:none;color:rgba(216,240,216,.6);font-family:Fredoka One,sans-serif;';
    a.innerHTML=`<span style="font-size:1.1rem">${item.icon}</span><span style="font-size:.52rem;letter-spacing:.03em">${item.label}</span>`;
    mobileNav.appendChild(a);
  });
  document.body.appendChild(mobileNav);
  // Add padding so content isn't hidden behind nav
  document.body.style.paddingBottom='56px';
}

</script>
</body>
</html>
