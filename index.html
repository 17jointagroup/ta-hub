<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TA 魔法學院</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--panel:#0d0f1a;--card:#131520;--border:#1d2035;--border2:#282b42;
  --acc:#00e5a0;--purple:#7c6fff;--yellow:#ffcb47;--pink:#ff6b9d;--blue:#4db8ff;--orange:#ff8c42;--red:#ff5c5c;
  --text:#e8eaf2;--muted:#4a5070;
  --font:'Nunito',sans-serif;--mono:'Space Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;min-height:100vh}

/* STARFIELD */
body::before{
  content:'';position:fixed;inset:0;z-index:-2;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%,rgba(124,111,255,.12) 0%,transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 80%,rgba(0,229,160,.06) 0%,transparent 60%);
}
.stars{position:fixed;inset:0;z-index:-1;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle linear infinite}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.7}}

/* ══════════ MAP SCREEN ══════════ */
#map{max-width:680px;margin:0 auto;padding:40px 20px 80px}
#lesson{display:none;max-width:780px;margin:0 auto;padding:0 0 80px}

.logo{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:52px}
.logo-gem{
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,var(--purple),var(--acc));
  display:flex;align-items:center;justify-content:center;font-size:1.5rem;
  box-shadow:0 0 32px rgba(124,111,255,.35);
}
.logo-name{font-size:1.6rem;font-weight:900;letter-spacing:-.03em}
.logo-name b{color:var(--acc)}

.hero{text-align:center;margin-bottom:44px}
.hero h1{font-size:clamp(1.9rem,5.5vw,3rem);font-weight:900;line-height:1.1;margin-bottom:10px}
.hero h1 em{font-style:normal;background:linear-gradient(100deg,var(--acc),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--muted);font-size:.95rem;font-weight:700;margin-bottom:18px}

.prog-wrap{background:var(--card);border:1px solid var(--border);border-radius:100px;height:8px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--purple));border-radius:100px;transition:width .7s cubic-bezier(.22,1,.36,1)}
.prog-label{font-family:var(--mono);font-size:.65rem;color:var(--muted);margin-top:6px}

/* chapter cards */
.chapters{display:flex;flex-direction:column}
.connector{width:2px;height:24px;background:linear-gradient(var(--border),var(--border2));margin:0 auto}

.chcard{
  background:var(--card);border:2px solid var(--border);border-radius:16px;
  padding:18px 20px;display:flex;align-items:center;gap:16px;
  cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;
  position:relative;overflow:hidden;
}
.chcard::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 55%,rgba(255,255,255,.018));pointer-events:none}
.chcard.locked{opacity:.38;cursor:not-allowed}
.chcard.open:hover{border-color:var(--cc);transform:translateY(-2px) scale(1.008);box-shadow:0 8px 36px color-mix(in srgb,var(--cc) 14%,transparent)}
.chcard.done{border-color:color-mix(in srgb,var(--cc) 38%,var(--border))}

.ch-ico{
  width:58px;height:58px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.7rem;
  background:color-mix(in srgb,var(--cc) 11%,var(--panel));
  border:1.5px solid color-mix(in srgb,var(--cc) 22%,transparent);
  position:relative;
}
.ch-num{
  position:absolute;bottom:-5px;right:-5px;
  width:19px;height:19px;border-radius:50%;
  background:var(--cc);color:#07080f;
  font-size:.58rem;font-weight:900;font-family:var(--mono);
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);
}
.ch-body{flex:1;min-width:0}
.ch-tag{font-family:var(--mono);font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cc);margin-bottom:3px}
.ch-title{font-size:.98rem;font-weight:900;margin-bottom:2px}
.ch-desc{font-size:.8rem;color:var(--muted);font-weight:700;line-height:1.45}
.ch-row{display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap}
.ch-time{font-family:var(--mono);font-size:.58rem;color:var(--muted)}
.ch-xp{font-family:var(--mono);font-size:.6rem;font-weight:700;color:var(--yellow);background:rgba(255,203,71,.1);border:1px solid rgba(255,203,71,.2);padding:1px 7px;border-radius:4px}
.ch-done-tag{font-family:var(--mono);font-size:.58rem;color:var(--cc)}

.badge-go{width:34px;height:34px;border-radius:50%;background:var(--cc);color:#07080f;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:900;box-shadow:0 0 16px color-mix(in srgb,var(--cc) 45%,transparent);flex-shrink:0}
.badge-done{width:34px;height:34px;border-radius:50%;background:color-mix(in srgb,var(--cc) 14%,transparent);border:2px solid var(--cc);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.badge-lock{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.03);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.85rem;color:var(--muted);flex-shrink:0}

.xp-total{text-align:center;margin-top:28px;font-family:var(--mono);font-size:1.1rem;font-weight:700;color:var(--yellow)}
.xp-total span{font-size:.7rem;color:var(--muted);font-weight:400}

/* ══════════ LESSON SCREEN ══════════ */
.lheader{
  display:flex;align-items:center;gap:12px;padding:18px 22px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;background:rgba(7,8,15,.93);backdrop-filter:blur(14px);z-index:100;
}
.back{width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all .2s;flex-shrink:0}
.back:hover{border-color:var(--lc,var(--acc));color:var(--lc,var(--acc))}
.lprog-track{flex:1;height:7px;background:var(--card);border-radius:100px;overflow:hidden}
.lprog-fill{height:100%;background:var(--lc,var(--acc));border-radius:100px;transition:width .4s ease}
.lxp{font-family:var(--mono);font-size:.65rem;font-weight:700;color:var(--yellow);background:rgba(255,203,71,.1);border:1px solid rgba(255,203,71,.2);padding:4px 10px;border-radius:8px;flex-shrink:0}

.swrap{padding:26px 22px}
.step{display:none;animation:fadeUp .28s ease}
.step.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* HOOK */
.hook{text-align:center;padding:14px 0 22px}
.hook-emoji{font-size:3.8rem;display:block;margin-bottom:14px;animation:bob 2.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hook-q{font-size:clamp(1.3rem,4vw,1.9rem);font-weight:900;line-height:1.2;margin-bottom:10px}
.hook-sub{color:var(--muted);font-size:.9rem;font-weight:700;margin-bottom:24px}
.choices{display:flex;flex-direction:column;gap:9px;max-width:420px;margin:0 auto}
.choice{
  background:var(--card);border:2px solid var(--border);border-radius:12px;
  padding:13px 17px;font-size:.9rem;font-weight:800;cursor:pointer;
  transition:all .18s;text-align:left;display:flex;align-items:center;gap:11px;
  font-family:var(--font);color:var(--text);
}
.choice:hover{border-color:var(--lc,var(--acc));transform:translateX(3px)}
.choice.correct{border-color:var(--acc);background:rgba(0,229,160,.07);color:var(--acc)}
.choice.wrong{border-color:var(--red);background:rgba(255,92,92,.07);color:var(--red);animation:shake .28s ease}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-7px)}70%{transform:translateX(7px)}}
.cico{font-size:1.15rem;flex-shrink:0}

/* EXPLAIN */
.etitle{font-size:1.18rem;font-weight:900;margin-bottom:9px}
.ebody{font-size:.9rem;color:#bfc4d8;font-weight:700;line-height:1.75;margin-bottom:14px}
.ebody strong{color:var(--text)}
.abox{background:color-mix(in srgb,var(--lc,var(--acc)) 6%,var(--card));border:1px solid color-mix(in srgb,var(--lc,var(--acc)) 24%,transparent);border-radius:10px;padding:13px 16px;margin-bottom:14px}
.albl{font-family:var(--mono);font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--lc,var(--acc));margin-bottom:5px}
.atext{font-size:.86rem;font-weight:700;line-height:1.55}
code{font-family:var(--mono);color:var(--acc);font-size:.85em}

/* TRY */
.try-title{font-size:1.1rem;font-weight:900;margin-bottom:6px}
.mission{
  background:color-mix(in srgb,var(--lc,var(--acc)) 6%,var(--card));
  border:1px solid color-mix(in srgb,var(--lc,var(--acc)) 24%,transparent);
  border-left:3px solid var(--lc,var(--acc));
  border-radius:10px;padding:11px 15px;margin-bottom:16px;
  font-size:.86rem;font-weight:700;
}
.mlbl{font-family:var(--mono);font-size:.58rem;color:var(--lc,var(--acc));letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}

/* INTERACTIVE WIDGET */
.widget{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.wbody{display:grid;grid-template-columns:1fr 1fr;gap:0}
@media(max-width:540px){.wbody{grid-template-columns:1fr}}
.wctrl{padding:16px;border-right:1px solid var(--border)}
@media(max-width:540px){.wctrl{border-right:none;border-bottom:1px solid var(--border)}}
.wprev{padding:14px;display:flex;align-items:center;justify-content:center;background:#040710;min-height:170px}
canvas{border-radius:8px;display:block}

.ctrl{margin-bottom:13px}
.ctrl:last-child{margin-bottom:0}
.crow{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.clbl{font-size:.75rem;font-weight:700;font-family:var(--mono)}
.cval{font-family:var(--mono);font-size:.68rem;color:var(--lc,var(--acc));font-weight:700}
input[type=range]{width:100%;accent-color:var(--lc,var(--acc));height:4px;cursor:pointer;display:block}

.swatches{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.sw{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .18s}
.sw.on{border-color:#fff;transform:scale(1.18)}

.fxbtns{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.fxbtn{padding:4px 10px;font-size:.72rem;font-weight:800;border-radius:8px;border:1.5px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;transition:all .18s;font-family:var(--font)}
.fxbtn.on{color:var(--lc,var(--acc));border-color:var(--lc,var(--acc));background:color-mix(in srgb,var(--lc,var(--acc)) 10%,transparent)}

.wcode{background:#020509;border-top:1px solid var(--border);padding:9px 14px;font-family:var(--mono);font-size:.68rem;color:var(--acc);line-height:1.65}
.cc{color:var(--muted)} .ck{color:var(--purple)} .cn{color:var(--orange)} .cf{color:var(--blue)}

/* CHALLENGE */
.cblock{
  background:linear-gradient(135deg,color-mix(in srgb,var(--lc,var(--acc)) 7%,var(--card)),color-mix(in srgb,var(--purple) 4%,var(--card)));
  border:1.5px solid color-mix(in srgb,var(--lc,var(--acc)) 28%,transparent);
  border-radius:16px;padding:26px;text-align:center;
}
.cico2{font-size:2.8rem;display:block;margin-bottom:12px}
.ctitle{font-size:1.15rem;font-weight:900;margin-bottom:5px}
.cdesc{color:var(--muted);font-size:.86rem;font-weight:700;margin-bottom:18px;line-height:1.55}
.csteps{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;text-align:left}
.cstep{display:flex;gap:9px;align-items:flex-start;background:rgba(0,0,0,.18);border-radius:9px;padding:9px 13px}
.csnum{width:20px;height:20px;border-radius:50%;background:var(--lc,var(--acc));color:#07080f;font-size:.6rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--mono);margin-top:1px}
.cstxt{font-size:.83rem;font-weight:700;line-height:1.4}
.hint{font-family:var(--mono);font-size:.7rem;background:rgba(0,0,0,.28);border:1px solid var(--border);border-radius:8px;padding:8px 13px;color:var(--acc);margin-bottom:14px;display:inline-block;word-break:break-all;white-space:pre-wrap;text-align:left}

/* COMPLETE */
.compblock{text-align:center;padding:18px 0}
.companim{font-size:4rem;display:block;animation:pop .55s cubic-bezier(.22,1.9,.36,1);margin-bottom:14px}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.08)}100%{transform:scale(1)}}
.comptitle{font-size:1.55rem;font-weight:900;margin-bottom:5px}
.compsub{color:var(--muted);font-size:.88rem;font-weight:700;margin-bottom:20px}
.xpgain{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,203,71,.09);border:1px solid rgba(255,203,71,.28);
  border-radius:100px;padding:7px 20px;
  font-family:var(--mono);font-size:.95rem;font-weight:700;color:var(--yellow);
  margin-bottom:18px;animation:glow 1.8s ease-in-out infinite;
}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(255,203,71,.18)}50%{box-shadow:0 0 26px rgba(255,203,71,.38)}}
.bdgcard{background:var(--card);border:2px solid var(--lc,var(--acc));border-radius:14px;padding:14px 22px;margin-bottom:18px;display:inline-flex;align-items:center;gap:11px}
.bdgico{font-size:1.9rem}
.bdgname{font-size:.88rem;font-weight:900;color:var(--lc,var(--acc))}
.bdgdesc{font-size:.72rem;color:var(--muted);font-weight:700}
.lpt{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 14px;margin-bottom:7px;text-align:left;font-size:.83rem;font-weight:700;display:flex;align-items:flex-start;gap:7px}
.lpico{color:var(--lc,var(--acc));flex-shrink:0}

/* NAV BTNS */
.navrow{display:flex;gap:9px;margin-top:20px;flex-wrap:wrap}
.btn{padding:11px 26px;border-radius:100px;font-size:.9rem;font-weight:900;cursor:pointer;border:none;transition:all .2s;font-family:var(--font);display:inline-flex;align-items:center;gap:7px}
.btn.pri{background:var(--lc,var(--acc));color:#07080f;box-shadow:0 4px 18px color-mix(in srgb,var(--lc,var(--acc)) 28%,transparent)}
.btn.pri:hover{transform:translateY(-2px);box-shadow:0 8px 26px color-mix(in srgb,var(--lc,var(--acc)) 38%,transparent)}
.btn.sec{background:var(--card);color:var(--text);border:1.5px solid var(--border)}
.btn.sec:hover{border-color:var(--lc,var(--acc));color:var(--lc,var(--acc))}
.btn.ext{background:transparent;color:var(--lc,var(--acc));border:1.5px solid color-mix(in srgb,var(--lc,var(--acc)) 38%,transparent);text-decoration:none}
.btn.ext:hover{background:color-mix(in srgb,var(--lc,var(--acc)) 8%,transparent)}

/* CONFETTI */
.cf-p{position:fixed;border-radius:2px;animation:cfall linear forwards;pointer-events:none;z-index:999}
@keyframes cfall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(800deg);opacity:0}}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 20px;font-size:.86rem;font-weight:700;box-shadow:0 8px 28px rgba(0,0,0,.4);opacity:0;transition:all .28s;pointer-events:none;z-index:200;display:flex;align-items:center;gap:7px;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- STARS -->
<div class="stars" id="stars"></div>

<!-- ═══ MAP ═══ -->
<div id="map">
  <div class="logo">
    <div class="logo-gem">🎮</div>
    <div class="logo-name">TA <b>魔法學院</b></div>
  </div>
  <div class="hero">
    <h1>學會讓遊戲<em>活起來</em>的<br>魔法技術</h1>
    <p>6 個關卡 · 從零開始 · 瀏覽器就能玩</p>
    <div class="prog-wrap"><div class="prog-fill" id="mprog" style="width:0%"></div></div>
    <div class="prog-label" id="mprogtxt">完成 0 / 6 關</div>
  </div>
  <div class="chapters" id="chlist"></div>
  <div class="xp-total" id="txp">0 <span>XP 經驗值</span></div>
</div>

<!-- ═══ LESSON ═══ -->
<div id="lesson">
  <div class="lheader">
    <div class="back" onclick="goMap()">←</div>
    <div class="lprog-track"><div class="lprog-fill" id="lprog" style="width:0%"></div></div>
    <div class="lxp" id="lxpbadge">+0 XP</div>
  </div>
  <div class="swrap" id="swrap"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ───────────────────────────────────────────────
// STARS
(function(){
  const s=document.getElementById('stars');
  for(let i=0;i<80;i++){
    const d=document.createElement('div');
    const sz=Math.random()*2+.5;
    d.style.cssText=`position:absolute;border-radius:50%;background:#fff;
      width:${sz}px;height:${sz}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      opacity:${Math.random()*.5+.1};
      animation:twinkle ${2+Math.random()*4}s ${Math.random()*4}s linear infinite`;
    s.appendChild(d);
  }
})();

// ───────────────────────────────────────────────
// STATE
const ST={
  done:JSON.parse(localStorage.getItem('ta2_done')||'[]'),
  xp:parseInt(localStorage.getItem('ta2_xp')||'0'),
};
function save(){localStorage.setItem('ta2_done',JSON.stringify(ST.done));localStorage.setItem('ta2_xp',ST.xp+'')}

// ───────────────────────────────────────────────
// CHAPTERS
const CHS=[
  {id:'c0',num:0,col:'#9d8fff',icon:'🌟',tag:'序章',title:'TA 是什麼？',desc:'看看遊戲裡哪些地方有 TA 的手跡，解開第一個謎題',time:'10 分鐘',xp:50},
  {id:'c1',num:1,col:'#ffcb47',icon:'🎨',tag:'第 1 關',title:'顏色魔法 — RGB',desc:'電腦的顏色只是三個數字。學會這個你就踏入 Shader 的世界了',time:'15 分鐘',xp:80},
  {id:'c2',num:2,col:'#00e5a0',icon:'〜',tag:'第 2 關',title:'讓東西動起來',desc:'一個叫 sin() 的函數，是遊戲裡一切「搖晃感」的秘密',time:'20 分鐘',xp:100},
  {id:'c3',num:3,col:'#ff6b9d',icon:'✨',tag:'第 3 關',title:'粒子特效系統',desc:'一個規則重複 1000 次，就能變成爆炸、火焰、雪花',time:'20 分鐘',xp:100},
  {id:'c4',num:4,col:'#4db8ff',icon:'🔧',tag:'第 4 關',title:'工具讓人更快',desc:'TA 寫程式不只做特效，也幫整個團隊省時間',time:'20 分鐘',xp:120},
  {id:'c5',num:5,col:'#ff8c42',icon:'🏆',tag:'第 5 關',title:'你的第一個作品',desc:'把前面學的全部用上，做出一個會動、會發光的 Shader 球',time:'30 分鐘',xp:200},
];

// current lesson
let curCh=null,curIdx=0;
let wAF=null,pAF=null,fAF=null;
function stopAFs(){[wAF,pAF,fAF].forEach(r=>{if(r)cancelAnimationFrame(r)});wAF=pAF=fAF=null}

// ───────────────────────────────────────────────
// MAP RENDER
function renderMap(){
  const n=ST.done.length;
  document.getElementById('mprog').style.width=(n/CHS.length*100)+'%';
  document.getElementById('mprogtxt').textContent=`完成 ${n} / ${CHS.length} 關`;
  document.getElementById('txp').innerHTML=`${ST.xp} <span>XP 經驗值</span>`;
  const el=document.getElementById('chlist');el.innerHTML='';
  CHS.forEach((ch,i)=>{
    const done=ST.done.includes(ch.id);
    const open=i===0||ST.done.includes(CHS[i-1].id);
    if(i>0){const c=document.createElement('div');c.className='connector';el.appendChild(c)}
    const card=document.createElement('div');
    card.className=`chcard ${done?'done':open?'open':'locked'}`;
    card.style.setProperty('--cc',ch.col);
    if(done||open) card.onclick=()=>startLesson(ch.id);
    const badge=done?`<div class="badge-done">✓</div>`:open?`<div class="badge-go" style="background:${ch.col}">▶</div>`:`<div class="badge-lock">🔒</div>`;
    card.innerHTML=`
      <div class="ch-ico">${ch.icon}<div class="ch-num">${ch.num}</div></div>
      <div class="ch-body">
        <div class="ch-tag">${ch.tag}</div>
        <div class="ch-title">${ch.title}</div>
        <div class="ch-desc">${ch.desc}</div>
        <div class="ch-row">
          <span class="ch-time">⏱ ${ch.time}</span>
          <span class="ch-xp">+${ch.xp} XP</span>
          ${done?`<span class="ch-done-tag">✓ 完成</span>`:''}
        </div>
      </div>
      <div>${badge}</div>`;
    el.appendChild(card);
  });
}

// LESSON FLOW
function startLesson(id){
  curCh=CHS.find(c=>c.id===id);curIdx=0;stopAFs();
  document.getElementById('lesson').style.setProperty('--lc',curCh.col);
  document.getElementById('lprog').style.background=curCh.col;
  document.getElementById('lxpbadge').textContent=`+${curCh.xp} XP`;
  document.getElementById('map').style.display='none';
  document.getElementById('lesson').style.display='block';
  window.scrollTo(0,0);renderStep();
}
function renderStep(){
  const sid=steps(curCh.id)[curIdx];
  if(!sid)return;
  const pct=(curIdx/steps(curCh.id).length)*100;
  document.getElementById('lprog').style.width=pct+'%';
  const sw=document.getElementById('swrap');sw.innerHTML='';
  const d=document.createElement('div');d.className='step active';
  const s=getStep(sid);if(!s){nextStep();return;}

  if(s.type==='hook'){
    d.innerHTML=`<div class="hook">
      <span class="hook-emoji">${s.emoji}</span>
      <div class="hook-q">${s.q}</div>
      <div class="hook-sub">${s.sub}</div>
      <div class="choices">${s.choices.map(c=>`<div class="choice" onclick="answer(this,${c.ok})"><span class="cico">${c.ico}</span>${c.text}</div>`).join('')}</div>
    </div>`;
  } else if(s.type==='explain'){
    d.innerHTML=s.html+`<div class="navrow"><button class="btn pri" onclick="nextStep()">明白了！繼續 →</button></div>`;
  } else if(s.type==='try'){
    d.innerHTML=`<div class="try-title">⚡ 試試看</div>
      <div class="mission"><div class="mlbl">🎯 任務</div>${s.mission}</div>
      <div id="trybox"></div>
      <div class="navrow" style="margin-top:16px"><button class="btn pri" onclick="nextStep()">完成！繼續 →</button></div>`;
    setTimeout(()=>{if(window[s.initFn])window[s.initFn]();},50);
  } else if(s.type==='chal'){
    d.innerHTML=`<div class="cblock">
      <span class="cico2">${s.icon}</span>
      <div class="ctitle">${s.title}</div>
      <div class="cdesc">${s.desc}</div>
      <div class="csteps">${s.csteps.map((t,i)=>`<div class="cstep"><div class="csnum">${i+1}</div><div class="cstxt">${t}</div></div>`).join('')}</div>
      <div class="hint">${s.hlbl}：<br>${s.hint}</div>
      ${s.link?`<a href="${s.link}" target="_blank" class="btn ext" style="display:inline-flex;margin-bottom:12px">🚀 去試試看</a>`:''}
      <div class="navrow" style="justify-content:center"><button class="btn pri" onclick="nextStep()">✓ 我完成了！</button></div>
    </div>`;
  } else if(s.type==='done'){
    d.innerHTML=`<div class="compblock">
      <span class="companim">${s.badge}</span>
      <div class="comptitle">🎉 關卡完成！</div>
      <div class="compsub">${curCh.title}</div>
      <div class="xpgain">⭐ +${s.xp} XP 獲得！</div>
      <div class="bdgcard"><div class="bdgico">${s.badge}</div><div><div class="bdgname">${s.bname}</div><div class="bdgdesc">${s.bdesc}</div></div></div>
      <div style="text-align:left;width:100%;max-width:380px">
        <div style="font-family:var(--mono);font-size:.6rem;color:var(--muted);margin-bottom:7px;letter-spacing:.1em">📝 這關你學到了：</div>
        ${s.pts.map(p=>`<div class="lpt"><span class="lpico">✓</span>${p}</div>`).join('')}

window.uPart=()=>{pCnt=+document.getElementById('pcsl').value;pSpd=+document.getElementById('pssl').value;document.getElementById('pcv').textContent=pCnt;document.getElementById('psv').textContent=pSpd;}

function mkP(W,H){
  const pool={snow:['#8be9fd','#a8d8ea','#fff'],fire:['#ff6b35','#ff9f43','#fbbf24','#ff4757'],magic:['#7c6fff','#ff6b9d','#00e5a0','#4db8ff']};
  const col=(pool[pFx]||pool.snow)[Math.floor(Math.random()*(pool[pFx]||pool.snow).length)];
  if(pFx==='snow')return{x:Math.random()*W,y:-8,vx:(Math.random()-.5)*pSpd,vy:Math.random()*pSpd+.5,r:Math.random()*2.5+.5,col,life:1,fade:0};
  if(pFx==='fire')return{x:W/2+(Math.random()-.5)*50,y:H-8,vx:(Math.random()-.5)*pSpd*1.5,vy:-(Math.random()*pSpd+1),r:Math.random()*3+.8,col,life:1,fade:.02+Math.random()*.018};
  return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*pSpd,vy:(Math.random()-.5)*pSpd,r:Math.random()*2.5+.5,col,life:1,fade:.006+Math.random()*.008};
}
function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function drawParticles(){
  const cv=document.getElementById('partcv');if(!cv){pAF=null;return;}
  const ctx=cv.getContext('2d'),W=200,H=155;
  ctx.fillStyle='rgba(4,8,16,.17)';ctx.fillRect(0,0,W,H);
  while(pPs.length<pCnt)pPs.push(mkP(W,H));
  pPs=pPs.filter(p=>{
    if(pFx==='snow'){p.x+=p.vx;p.y+=p.vy;if(p.y>H+8)return false;}
    else if(pFx==='fire'){p.x+=p.vx;p.y+=p.vy;p.life-=p.fade;p.r*=.996;if(p.life<=0||p.r<.2)return false;}
    else{p.x+=p.vx;p.y+=p.vy;p.life-=p.fade;if(p.life<=0)return false;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;}
    const [ri,gi,bi]=h2r(p.col);
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${ri},${gi},${bi},${p.life})`;
    ctx.shadowColor=p.col;ctx.shadowBlur=p.r*3;ctx.fill();ctx.shadowBlur=0;return true;
  });

    const px=100+Math.cos(a)*rad,py=80+Math.sin(a)*rad*.5;
    ctx.beginPath();ctx.arc(px,py,1.8+pulse*1.4,0,Math.PI*2);
    ctx.fillStyle=`rgba(${r},${g},${b},${.38+pulse*.48})`;ctx.shadowColor=`rgb(${r},${g},${b})`;ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;
  }
  ctx.fillStyle='rgba(255,255,255,.14)';ctx.font='8px "Space Mono"';ctx.fillText(`sin=${Math.sin(fT).toFixed(2)}`,6,153);
  fAF=requestAnimationFrame(drawFinal);
}

// ───────────────────────────────────────────────
// CONFETTI + TOAST
function confetti(col){
  const cs=[col,'#ffcb47','#ffffff','#7c6fff','#ff6b9d'];
  for(let i=0;i<65;i++){
    const e=document.createElement('div');e.className='cf-p';
    e.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cs[i%cs.length]};animation-duration:${1.4+Math.random()*2.2}s;animation-delay:${Math.random()*.9}s;transform:rotate(${Math.random()*360}deg);width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;`;
    document.body.appendChild(e);setTimeout(()=>e.remove(),4000);
  }
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
