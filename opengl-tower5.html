// ── iOS Safari Fixes ──
// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    const R=Math.min(typeof r==='number'?r:r[0],w/2,h/2);
    this.beginPath();this.moveTo(x+R,y);this.lineTo(x+w-R,y);
    this.arcTo(x+w,y,x+w,y+R,R);this.lineTo(x+w,y+h-R);
    this.arcTo(x+w,y+h,x+w-R,y+h,R);this.lineTo(x+R,y+h);
    this.arcTo(x,y+h,x,y+h-R,R);this.lineTo(x,y+R);
    this.arcTo(x,y,x+R,y,R);this.closePath();
  };
}
// WebGL context pool - prevents iOS 8-context limit crash
const _glPool = {};
function safeGL(cv) {
  if(!cv) return null;
  const id = cv.id || 'cv_'+Math.random();
  cv.id = id;
  if(_glPool[id] && !_glPool[id].isContextLost()) return _glPool[id];
  const gl = cv.getContext('webgl',{powerPreference:'low-power',preserveDrawingBuffer:false,failIfMajorPerformanceCaveat:false});
  if(!gl) return null;
  _glPool[id] = gl;
  cv.addEventListener('webglcontextlost',e=>{e.preventDefault();delete _glPool[id];});
  return gl;
}

function mkP(gl,vs,fs){const mk=(t,s)=>{const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);return sh;};const p=gl.createProgram();gl.attachShader(p,mk(gl.VERTEX_SHADER,vs));gl.attachShader(p,mk(gl.FRAGMENT_SHADER,fs));gl.linkProgram(p);return p;}
function qB(gl){const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);return b;}
function sph(r,st,sl){const v=[],n=[],i=[];for(let s=0;s<=st;s++){const phi=s/st*Math.PI;for(let q=0;q<=sl;q++){const th=q/sl*Math.PI*2;const x=Math.sin(phi)*Math.cos(th)*r,y=Math.cos(phi)*r,z=Math.sin(phi)*Math.sin(th)*r;const l=Math.sqrt(x*x+y*y+z*z)||1;v.push(x,y,z);n.push(x/l,y/l,z/l);}}for(let s=0;s<st;s++)for(let q=0;q<sl;q++){const a=s*(sl+1)+q,b=a+sl+1;i.push(a,b,a+1,b,b+1,a+1);}return{v:new Float32Array(v),n:new Float32Array(n),i:new Uint16Array(i)};}
function perspM(fov,asp,n,f){const s=1/Math.tan(fov/2);return new Float32Array([s/asp,0,0,0,0,s,0,0,0,0,(f+n)/(n-f),-1,0,0,2*f*n/(n-f),0]);}
function lookM(e,c,u){const z=nr([e[0]-c[0],e[1]-c[1],e[2]-c[2]]);const x=nr(cr(u,z));const y=cr(z,x);return new Float32Array([x[0],y[0],z[0],0,x[1],y[1],z[1],0,x[2],y[2],z[2],0,-dt(x,e),-dt(y,e),-dt(z,e),1]);}
function m4m(a,b){const r=new Float32Array(16);for(let i=0;i<4;i++)for(let j=0;j<4;j++)for(let k=0;k<4;k++)r[i*4+j]+=a[i*4+k]*b[k*4+j];return r;}
function nr(v){const l=Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2])||1;return[v[0]/l,v[1]/l,v[2]/l];}
function cr(a,b){return[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];}
function dt(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2];}

  const fs=`precision mediump float;varying vec3 vN;varying vec3 vP;uniform vec3 vp;uniform vec3 lp;uniform float sh;uniform int mode;void main(){vec3 N=normalize(vN);vec3 L=normalize(lp-vP);vec3 V=normalize(vp-vP);float dif=max(dot(N,L),0.);float spec;if(mode==0){vec3 H=normalize(L+V);spec=pow(max(dot(N,H),0.),sh);}else{vec3 R=reflect(-L,N);spec=pow(max(dot(V,R),0.),sh);}vec3 col=vec3(.9,.6,.2);gl_FragColor=vec4(col*(0.1+dif)+vec3(spec),1);}`;
  const prog=mkP(gl,vs,fs);const{v,n,i}=sph(1.2,24,24);

  const mvpL=gl.getUniformLocation(prog,'mvp'),vpL=gl.getUniformLocation(prog,'vp'),lpL=gl.getUniformLocation(prog,'lp'),shL=gl.getUniformLocation(prog,'sh'),mL=gl.getUniformLocation(prog,'mode');

}

// ── Completion System ──
const CASTLE_NUM = 5;
const CASTLE_TOTAL = 8;
const CASTLE_KEY = 'tower5_done';
const NEXT_CASTLE = 5;

function checkCompletion(){
  const done = JSON.parse(localStorage.getItem(CASTLE_KEY)||'[]').filter(Boolean).length;
  if(done >= CASTLE_TOTAL && !localStorage.getItem(CASTLE_KEY+'_comp_shown')){
    localStorage.setItem(CASTLE_KEY+'_comp_shown','1');
    setTimeout(showCompletion, 800);
  }
}

function showCompletion(){
  const overlay = document.getElementById('compOverlay');
  if(!overlay) return;
  // Fireworks
  const fw = overlay.querySelector('.fw-wrap');
  const colors=['#a78bfa','#34d399','#ffd700','#ff6b9d','#00d4ff','#ff9f43'];
  for(let i=0;i<28;i++){
    const d=document.createElement('div');
    d.className='fw';
    const tx=(Math.random()-.5)*300;
    const ty=-100-Math.random()*200;
    d.style.cssText=`width:6px;height:6px;background:${colors[i%colors.length]};left:${40+Math.random()*20}%;top:60%;--d:${.6+Math.random()*.8}s;--dl:${Math.random()*.5}s;--tx:${tx}px;--ty:${ty}px`;
    fw.appendChild(d);
  }
  overlay.classList.add('show');
}

function goNextCastle(){
  if(NEXT_CASTLE > 0){
    window.location.href='opengl-map.html#done-'+CASTLE_NUM;
  } else {
    window.location.href='opengl-map.html';
  }
}

function goMap(){ window.location.href='opengl-map.html#done-'+CASTLE_NUM; }

// Auto-scroll nav to current castle
(function(){
  const navBar = document.querySelector('div[style*="position:sticky;top:52px"]');
  if(!navBar) return;
  const current = navBar.querySelector('[style*="opacity:1"]');
  if(current) setTimeout(()=>{
    current.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }, 300);
})();

// Hook into existing complete() function
const _origComplete = complete;
if(typeof complete === 'function'){
  // Override complete to also check completion
  window._patchedComplete = true;
}
// Check on page load
document.addEventListener('DOMContentLoaded', ()=>{
  setTimeout(checkCompletion, 500);
});
// Also check after any storage changes
window.addEventListener('storage', checkCompletion);
</script>

  <button class="comp-next-btn" onclick="goNextCastle()">⚔️ 前往城堡6 →</button>

</div>
